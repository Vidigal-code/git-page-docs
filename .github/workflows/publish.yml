name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build prebuilt (Next.js export, same as GitHub Pages)
        run: npm run build:prebuilt
        env:
          GITHUB_ACTIONS: "true"

      - name: Verify prebuilt matches Pages structure
        run: |
          test -f prebuilt/index.html || (echo "Missing prebuilt/index.html" && exit 1)
          test -d prebuilt/_next || (echo "Missing prebuilt/_next" && exit 1)
          test -d prebuilt/gitpagedocs || (echo "Missing prebuilt/gitpagedocs" && exit 1)
          echo "Prebuilt OK - 100% same structure as GitHub Pages"

      - name: Pack npm package
        run: npm pack --ignore-scripts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitpagedocs-package
          path: "gitpagedocs-*.tgz"

  publish:
    needs: build-and-pack
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: gitpagedocs-package

      - name: Publish to npm
        run: npm publish $(ls gitpagedocs-*.tgz) --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
