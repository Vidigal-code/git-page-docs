name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (frontend, tools, mcp)
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests + coverage (tools)
        run: pnpm run test:cov

      - name: Integration tests (CLI contract + tools/mcp self-tests)
        run: pnpm run test:ci

      - name: Build (Next.js static)
        run: pnpm run build
        env:
          GITPAGEDOCS_REPOSITORY_SEARCH: "false"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Frontend E2E (Playwright)
        run: pnpm run test:e2e
