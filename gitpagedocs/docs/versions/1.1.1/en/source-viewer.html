<script type="application/json" id="filesData">{"files":{"README.md":"# Git Page Docs\n\n`gitpagedocs` is a CLI and runtime contract for repository documentation.\n\nIt generates and maintains a `gitpagedocs/` folder with config and versioned markdown files.  \nIt does **not** generate `index.html` or `index.js`.\n\n## Quick Start\n\nInstall in your project:\n\n```bash\nnpm install gitpagedocs\n```\n\nGenerate docs config and versioned files (recommended default):\n\n```bash\nnpx gitpagedocs\n```\n\nGenerate docs plus local layout templates:\n\n```bash\nnpx gitpagedocs --layoutconfig\n```\n\nGenerate docs, configure GitHub Pages URL, create workflow, and push:\n\n```bash\nnpx gitpagedocs --push --owner your-user --repo your-repository\n```\n\nShortcut syntax also supported:\n\n```bash\nnpx gitpagedocs --push --your-user --your-repository\n```\n\n## Layout Strategy\n\n`gitpagedocs` supports two layout strategies:\n\n### 1) Default mode (`npx gitpagedocs`)\n\n- `gitpagedocs/config.json` is generated with official layout source enabled.\n- Layouts/templates are loaded from the official repository URLs:\n  - `https://github.com/Vidigal-code/git-page-docs/tree/main/gitpagedocs/layouts`\n- Best option if you want to focus only on writing docs.\n\n### 2) Local layout mode (`npx gitpagedocs --layoutconfig`)\n\n- Generates local files in `gitpagedocs/layouts/**`:\n  - `layoutsConfig.json`\n  - `layoutsFallbackConfig.json`\n  - `templates/*.json`\n- Official layout URLs are disabled in generated config.\n- Best option if you want to create and maintain your own templates in your own repository.\n\n### Fallback behavior\n\n- Runtime keeps resilient fallback behavior if a layout/template source is unavailable.\n- In local layout mode, the runtime prioritizes local repository layout sources and does not force official template URLs by default.\n\n## Use Official Site or Your Own GitHub Pages\n\nYou can choose either:\n\n1. **Official viewer site**  \n   `https://vidigal-code.github.io/git-page-docs/`\n2. **Self-hosted viewer** in your own GitHub repository using GitHub Pages.\n\nThis means your docs can run independently from the official domain when you publish your own site.\n\n## Self-Hosted GitHub Pages Setup\n\n### 1) Prepare your repository\n\n```bash\nnpm install\nnpx gitpagedocs\n```\n\nOr, if you want local templates:\n\n```bash\nnpx gitpagedocs --layoutconfig\n```\n\n### 2) Configure runtime URL (`site.rendering`)\n\nSet `gitpagedocs/config.json` `site.rendering` to your GitHub Pages URL:\n\n```text\nhttps://<your-user>.github.io/<your-repository>/\n```\n\nExample:\n\n```text\nhttps://octocat.github.io/my-docs/\n```\n\n### 3) Build and validate locally\n\n```bash\nnpm run lint\nnpm run build\nnpm start\n```\n\n### 4) Publish with GitHub Pages\n\n- Push your repository to GitHub.\n- Enable Pages for your repository (Settings -> Pages).\n- Use the repository workflow to build/deploy static output.\n- Optional one-command bootstrap:\n  - `npx gitpagedocs --push --owner your-user --repo your-repository`\n  - This creates `.github/workflows/gitpagedocs-pages.yml`, sets `site.rendering`, commits generated artifacts, and pushes to `origin`.\n  - The generated workflow is self-sufficient: it clones the official `git-page-docs` runtime in CI, injects your `gitpagedocs/` folder, builds with your repository path, and deploys to your own GitHub Pages URL.\n  - In `--push` mode, root URL opens docs directly (search home is disabled via `site.repositorySearchHome=false`).\n  - The generated Pages workflow also forces root `index.html` redirect to your docs entrypoint (`/v/<version>`), so `https://<owner>.github.io/<repo>/` opens docs directly.\n  - The workflow trigger is generated for your current git branch automatically, so it works in repositories that do not use `main`.\n  - After push, CLI also attempts to switch repository Pages source to **GitHub Actions** automatically using `gh api` (if GitHub CLI is available and authenticated).\n\nWhen built with `GITHUB_ACTIONS=true`, the runtime enables GitHub Pages behavior.\n\n## Generated Structure\n\nDefault mode:\n\n```text\ngitpagedocs/\n  config.json\n  docs/\n    versions/\n      1.0.0/config.json\n      1.0.0/{en,pt,es}/*.md\n      1.1.0/config.json\n      1.1.0/{en,pt,es}/*.md\n      1.1.1/config.json\n      1.1.1/{en,pt,es}/*.md\n```\n\nLocal layout mode adds:\n\n```text\ngitpagedocs/layouts/\n  layoutsConfig.json\n  layoutsFallbackConfig.json\n  templates/*.json\n```\n\n## Configuration Keys (Layout Source)\n\nMain layout source keys in `gitpagedocs/config.json`:\n\n- `layoutsConfigPathOficial`\n- `layoutsConfigPathOficialUrl`\n- `layoutsConfigPathTemplatesOficial`\n- `layoutsConfigPath`\n- `layoutsConfigPathTemplates`\n\nBehavior:\n\n- If `layoutsConfigPathOficial=true`, runtime prefers official layout/template sources.\n- If `layoutsConfigPathOficial=false`, runtime prefers your repository layout/template sources (`gitpagedocs/layouts/**` or your custom paths).\n\n## Repository Search Behavior\n\nRepository search is controlled by environment/runtime context:\n\n- GitHub Pages builds (`GITHUB_ACTIONS=true`): repository-search home enabled.\n- Local runtime: controlled by `GITPAGEDOCS_REPOSITORY_SEARCH=true|false`.\n\nRecommended for local testing:\n\n```env\nGITPAGEDOCS_REPOSITORY_SEARCH=true\n```\n\n## Scripts\n\n- `npm run gitpagedocs` -> runs `node scripts/gitpagedocs-init.mjs`\n- `npm run gitpagedocs:full` -> compatibility alias for the same generator\n- `npm run build` -> generate `gitpagedocs/` + `next build`\n- `npm run build:prebuilt` -> generate + build + copy `out/` to `prebuilt/`\n- `npm run dev` -> `next dev`\n- `npm run start` -> `next start` (after `prestart` build)\n- `npm run lint` -> `eslint .`\n\n## Compatibility Flags\n\nSupported for compatibility:\n\n- `--build`\n- `--serve`\n- `--full`\n- `--push` (setup + workflow + git push automation)\n\nThese flags do not change the artifact type. Output remains `gitpagedocs/`.\n","src/app/globals.css":":root {\n  color-scheme: dark;\n}\n\n* {\n  box-sizing: border-box;\n}\n\nhtml,\nbody {\n  margin: 0;\n  padding: 0;\n  min-height: 100%;\n}\n\nbody {\n  font-family: Inter, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  background: #0b0f15;\n  color: #e2e8f0;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n","src/app/layout.tsx":"import path from \"node:path\";\nimport { readFile } from \"node:fs/promises\";\nimport type { Metadata } from \"next\";\nimport { FALLBACK_HEADER_NAME, resolveHeaderName, resolveIconPath } from \"@/shared/lib/resolve-site-assets\";\nimport \"./globals.css\";\n\nexport async function generateMetadata(): Promise<Metadata> {\n  let siteName = FALLBACK_HEADER_NAME;\n  let iconPath = \"/icon.svg\";\n  try {\n    const configPath = path.join(process.cwd(), \"gitpagedocs/config.json\");\n    const raw = await readFile(configPath, \"utf-8\");\n    const config = JSON.parse(raw) as { site?: { SiteHeaderName?: string; SiteIconPath?: string; name?: string } };\n    siteName = resolveHeaderName(config?.site?.SiteHeaderName, config?.site?.name);\n    const basePath = (process.env.NEXT_PUBLIC_GITPAGEDOCS_BASE_PATH ?? \"\").trim();\n    iconPath = resolveIconPath(config?.site?.SiteIconPath, basePath);\n  } catch {\n    // fallback kept\n  }\n  return {\n    metadataBase: new URL(\"https://vidigal-code.github.io/git-page-docs/\"),\n    title: {\n      default: siteName,\n      template: `%s | ${siteName}`,\n    },\n    description:\n      \"Generate, customize and publish multilingual markdown documentation with layout themes.\",\n    keywords: [\n      \"docs\",\n      \"markdown\",\n      \"nextjs\",\n      \"github pages\",\n      \"multilingual\",\n      \"theme\",\n      \"seo\",\n    ],\n    openGraph: {\n      title: siteName,\n      description:\n        \"Generate, customize and publish multilingual markdown documentation with layout themes.\",\n      siteName,\n      type: \"website\",\n    },\n    robots: {\n      index: true,\n      follow: true,\n    },\n    icons: {\n      icon: iconPath,\n      shortcut: iconPath,\n      apple: iconPath,\n    },\n  };\n}\n\nexport default function RootLayout({ children }: Readonly<{ children: React.ReactNode }>) {\n  return (\n    <html lang=\"en\">\n      <body>{children}</body>\n    </html>\n  );\n}\n","src/app/not-found.module.css":".section {\n  width: min(760px, 100%);\n  max-width: 100%;\n  border-radius: 16px;\n  padding: clamp(18px, 3vw, 32px);\n  box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);\n  background:\n    linear-gradient(\n      160deg,\n      color-mix(in srgb, var(--card-background) 94%, var(--primary) 6%),\n      color-mix(in srgb, var(--card-background) 92%, var(--secondary) 8%)\n    );\n  border: 1px solid var(--card-border);\n  box-sizing: border-box;\n  text-align: center;\n}\n\n.form {\n  display: grid;\n  grid-template-columns: 1fr 1fr auto;\n  gap: 12px;\n  margin-top: 20px;\n  margin-bottom: 16px;\n  text-align: left;\n}\n\n.input {\n  padding: 10px 16px;\n  border-radius: 10px;\n  border: 1px solid var(--card-border);\n  background: color-mix(in srgb, var(--background) 92%, transparent);\n  color: var(--text);\n  font-size: 1rem;\n  box-sizing: border-box;\n}\n\n.input::placeholder {\n  color: var(--text-secondary);\n}\n\n.button {\n  padding: 10px 16px;\n  border-radius: 10px;\n  border: 1px solid var(--card-border);\n  background: var(--primary);\n  color: var(--text);\n  font-weight: 600;\n  cursor: pointer;\n}\n\n.buttonFull {\n  padding: 10px 16px;\n  border-radius: 10px;\n  border: 1px solid var(--card-border);\n  background: var(--primary);\n  color: var(--text);\n  font-weight: 600;\n  cursor: pointer;\n  width: 100%;\n  display: block;\n  text-align: center;\n  box-sizing: border-box;\n}\n\n.link {\n  display: block;\n  width: 100%;\n  margin-top: 8px;\n  padding: 10px 16px;\n  border: 1px solid var(--card-border);\n  border-radius: 10px;\n  background: color-mix(in srgb, var(--background) 92%, transparent);\n  color: var(--text);\n  font-weight: 600;\n  text-decoration: none;\n  text-align: center;\n  box-sizing: border-box;\n}\n\n@media (max-width: 760px) {\n  .section {\n    padding: clamp(14px, 2.5vw, 24px);\n    margin: 0 10px;\n  }\n\n  .form {\n    grid-template-columns: 1fr;\n    gap: 10px;\n  }\n\n  .form .button {\n    width: 100%;\n  }\n\n  .form input {\n    width: 100%;\n    box-sizing: border-box;\n  }\n}\n\n@media (max-width: 480px) {\n  .section {\n    padding: 14px 12px;\n    margin: 0 8px;\n  }\n\n  .form {\n    margin-top: 16px;\n    margin-bottom: 12px;\n  }\n}\n","src/app/not-found.tsx":"\"use client\";\n\nimport { Suspense, useEffect, useMemo, useState } from \"react\";\nimport {\n  checkRepositoryHasGitPageDocs,\n  getLanguageLabelFromMenu,\n  loadRemoteDocsData,\n  parseSupportedLanguage,\n  toSearchShellCssVars,\n} from \"@/widgets/not-found-shell/model/use-not-found-remote\";\nimport type { LoadedDocsData } from \"@/widgets/not-found-shell/model/use-not-found-remote\";\nimport { PROJECT_FOOTER_URL } from \"@/shared/config/constants\";\nimport { getBasePath } from \"@/shared/lib/base-path\";\nimport { resolveHeaderIconConfig } from \"@/shared/lib/resolve-site-assets\";\nimport { SearchShellHeader } from \"@/widgets/search-shell-header/ui/search-shell-header\";\nimport { SearchShellLayout } from \"@/widgets/search-shell-layout/search-shell-layout\";\nimport { useStandaloneShellConfig } from \"@/widgets/search-shell-header/model/use-standalone-shell-config\";\nimport { useStandaloneShellPreferences } from \"@/widgets/search-shell-header/model/use-standalone-shell-preferences\";\nimport notFoundStyles from \"./not-found.module.css\";\nimport { DocsShell } from \"@/widgets/docs-shell/docs-shell\";\n\nconst NOT_INSTALLED = {\n  en: \"GitPageDocs is not installed.\",\n  pt: \"GitPageDocs Não instalado.\",\n  es: \"GitPageDocs no está instalado.\",\n};\n\nconst INSTALLED_NOT_PRERENDERED = {\n  en: \"GitPageDocs is installed in this repository.\",\n  pt: \"GitPageDocs esta instalado neste repositorio.\",\n  es: \"GitPageDocs esta instalado en este repositorio.\",\n};\n\nconst SEARCH_PROMPT = {\n  en: \"Enter owner and repository to open remote documentation.\",\n  pt: \"Informe usuário e repositório para abrir a documentação remota.\",\n  es: \"Ingresa usuario y repositorio para abrir la documentación remota.\",\n};\n\nconst INSTALLED_PROMPT = {\n  en: \"This direct URL was not pre-rendered on GitHub Pages. Use the search form below with the same owner and repository.\",\n  pt: \"Esta URL direta nao foi pre-renderizada no GitHub Pages. Use o formulario de busca abaixo com o mesmo usuario e repositorio.\",\n  es: \"Esta URL directa no fue pre-renderizada en GitHub Pages. Usa el formulario de busqueda abajo con el mismo usuario y repositorio.\",\n};\n\nconst RETURN_HOME = {\n  en: \"Return Home\",\n  pt: \"Voltar ao início\",\n  es: \"Volver al inicio\",\n};\n\ntype RepoStatus = \"unknown\" | \"checking\" | \"installed\" | \"not_installed\";\ntype SupportedLanguage = \"en\" | \"pt\" | \"es\";\ntype ParsedPath = { owner: string; repo: string; version?: string; language: SupportedLanguage };\n\nconst MIN_LOADING_TRANSITION_MS = 700;\nconst SEARCH_LANGUAGES: SupportedLanguage[] = [\"en\", \"pt\", \"es\"];\n\nfunction parsePathFromLocation(): ParsedPath | null {\n  if (typeof window === \"undefined\") {\n    return null;\n  }\n  const path = window.location.pathname;\n  const searchParams = new URLSearchParams(window.location.search);\n  const base = getBasePath();\n  const withoutBase = base ? path.slice(base.length) : path;\n  const parts = withoutBase.split(\"/\").filter(Boolean);\n  if (parts.length < 2) {\n    return null;\n  }\n  const owner = parts[0];\n  const repo = parts[1];\n  const versionFromPath = parts.length >= 4 && parts[2] === \"v\" ? parts[3] : undefined;\n  const versionFromQuery = searchParams.get(\"version\") ?? undefined;\n  const language = parseSupportedLanguage(searchParams.get(\"lang\"));\n  const version = versionFromPath || versionFromQuery;\n  return { owner, repo, version, language };\n}\n\nfunction NotFoundFallback() {\n  return (\n    <SearchShellLayout header={null} footerEnabled projectFooterUrl={PROJECT_FOOTER_URL} language=\"en\" style={{}}>\n      <section className={notFoundStyles.section}>\n        <p style={{ margin: 0, color: \"var(--text-secondary)\", textAlign: \"center\" }}>Loading...</p>\n      </section>\n    </SearchShellLayout>\n  );\n}\n\nfunction NotFoundContent() {\n  const [mounted, setMounted] = useState(false);\n  const [pathOwner, setPathOwner] = useState<string | null>(null);\n  const [pathRepo, setPathRepo] = useState<string | null>(null);\n  const [pathVersion, setPathVersion] = useState<string | undefined>(undefined);\n  const [repoStatus, setRepoStatus] = useState<RepoStatus>(\"unknown\");\n  const [loadedData, setLoadedData] = useState<LoadedDocsData | null>(null);\n  const [appLoading, setAppLoading] = useState(false);\n  const [appLoadFailed, setAppLoadFailed] = useState(false);\n  const [loaderDots, setLoaderDots] = useState(1);\n  const [loadingTransitionDone, setLoadingTransitionDone] = useState(false);\n\n  const { config: standaloneConfig } = useStandaloneShellConfig();\n  const layouts = useMemo(() => standaloneConfig?.layoutsConfig?.layouts ?? [], [standaloneConfig]);\n  const themes = standaloneConfig?.themes ?? {};\n  const siteName = standaloneConfig?.siteConfig?.name ?? \"GitPageDocs\";\n  const initialThemeBaseId = layouts.find((l) => l.id === \"aurora-dark\")?.id ?? layouts[0]?.id;\n\n  const {\n    language: lang,\n    onLanguageChange,\n    activeThemeId,\n    onThemeChange,\n    onToggleMode,\n    activeLayout,\n    nextModeIsDark,\n    canToggleMode,\n  } = useStandaloneShellPreferences({\n    siteName,\n    defaultLanguage: \"en\",\n    availableLanguages: SEARCH_LANGUAGES,\n    layouts,\n    configuredDefaultMode: \"dark\",\n    initialThemeBaseId,\n  });\n\n  const activeTheme = themes[activeLayout?.id ?? \"\"];\n  const cssVars = useMemo(() => toSearchShellCssVars(activeTheme), [activeTheme]);\n\n  const FALLBACK_LANGMENU = {\n    en: { en: \"English\", pt: \"Português\", es: \"Español\" },\n    pt: { en: \"English\", pt: \"Português\", es: \"Español\" },\n    es: { en: \"English\", pt: \"Português\", es: \"Español\" },\n  } as const;\n  const getLanguageLabel = (targetLang: string) =>\n    getLanguageLabelFromMenu(standaloneConfig?.siteConfig?.langmenu ?? FALLBACK_LANGMENU, lang, targetLang);\n\n  useEffect(() => {\n    setMounted(true);\n    function syncFromCurrentLocation() {\n      const parsed = parsePathFromLocation();\n      if (!parsed) {\n        return;\n      }\n      setPathOwner(parsed.owner);\n      setPathRepo(parsed.repo);\n      setPathVersion(parsed.version);\n    }\n    syncFromCurrentLocation();\n    if (typeof window !== \"undefined\") {\n      window.addEventListener(\"popstate\", syncFromCurrentLocation);\n      window.addEventListener(\"hashchange\", syncFromCurrentLocation);\n    }\n    return () => {\n      if (typeof window !== \"undefined\") {\n        window.removeEventListener(\"popstate\", syncFromCurrentLocation);\n        window.removeEventListener(\"hashchange\", syncFromCurrentLocation);\n      }\n    };\n  }, []);\n\n  useEffect(() => {\n    if (!pathOwner || !pathRepo) {\n      return;\n    }\n    let cancelled = false;\n    setRepoStatus(\"checking\");\n    checkRepositoryHasGitPageDocs(pathOwner, pathRepo).then((hasGitPageDocs) => {\n      if (cancelled) {\n        return;\n      }\n      setRepoStatus(hasGitPageDocs ? \"installed\" : \"not_installed\");\n    });\n    return () => {\n      cancelled = true;\n    };\n  }, [pathOwner, pathRepo]);\n\n  useEffect(() => {\n    if (!pathOwner || !pathRepo || repoStatus !== \"installed\") {\n      setLoadedData(null);\n      setAppLoading(false);\n      setAppLoadFailed(false);\n      return;\n    }\n    let cancelled = false;\n    setLoadedData(null);\n    setAppLoading(true);\n    setAppLoadFailed(false);\n    loadRemoteDocsData(pathOwner, pathRepo, pathVersion, lang as SupportedLanguage)\n      .then((data) => {\n        if (cancelled) return;\n        if (data) {\n          setLoadedData(data);\n          return;\n        }\n        setAppLoadFailed(true);\n      })\n      .finally(() => {\n        if (cancelled) return;\n        setAppLoading(false);\n      });\n    return () => {\n      cancelled = true;\n    };\n  }, [pathOwner, pathRepo, pathVersion, repoStatus, lang]);\n\n  const isRepoPath = pathOwner && pathRepo;\n  const isCheckingOrLoading =\n    Boolean(isRepoPath) && (repoStatus === \"unknown\" || repoStatus === \"checking\" || (repoStatus === \"installed\" && appLoading));\n\n  useEffect(() => {\n    if (!isCheckingOrLoading) {\n      setLoadingTransitionDone(true);\n      return;\n    }\n    setLoadingTransitionDone(false);\n    const timer = window.setTimeout(() => {\n      setLoadingTransitionDone(true);\n    }, MIN_LOADING_TRANSITION_MS);\n    return () => {\n      window.clearTimeout(timer);\n    };\n  }, [isCheckingOrLoading, pathOwner, pathRepo, pathVersion, lang]);\n\n  useEffect(() => {\n    if (!isCheckingOrLoading) {\n      setLoaderDots(1);\n      return;\n    }\n    const timer = window.setInterval(() => {\n      setLoaderDots((prev) => (prev >= 3 ? 1 : prev + 1));\n    }, 280);\n    return () => {\n      window.clearInterval(timer);\n    };\n  }, [isCheckingOrLoading]);\n\n  const basePath = getBasePath();\n  const siteConfig = standaloneConfig?.siteConfig;\n  const headerIconConfig = useMemo(\n    () =>\n      resolveHeaderIconConfig(siteConfig ?? undefined, nextModeIsDark ? \"dark\" : \"light\", basePath),\n    [siteConfig, nextModeIsDark, basePath],\n  );\n  const {\n    iconImage,\n    headerName,\n    useReactIcon: useReactHeaderIcon,\n    reactIconTag: reactHeaderIconTag,\n    reactIconStyle: headerReactIconStyle,\n    iconImgWidth,\n    iconImgHeight,\n  } = headerIconConfig;\n\n  const header = standaloneConfig ? (\n    <SearchShellHeader\n      siteName={headerName}\n      basePath={basePath}\n      language={lang}\n      languages={SEARCH_LANGUAGES}\n      onLanguageChange={(l) => onLanguageChange(l as SupportedLanguage)}\n      activeThemeId={activeThemeId}\n      layouts={layouts}\n      onThemeChange={onThemeChange}\n      nextModeIsDark={nextModeIsDark}\n      canToggleMode={canToggleMode}\n      onToggleMode={onToggleMode}\n      iconImage={iconImage}\n      iconImgWidth={iconImgWidth}\n      iconImgHeight={iconImgHeight}\n      useReactHeaderIcon={useReactHeaderIcon}\n      reactHeaderIconTag={reactHeaderIconTag}\n      headerReactIconStyle={headerReactIconStyle}\n      getLanguageLabel={getLanguageLabel}\n    />\n  ) : (\n    <SearchShellHeader\n      siteName={headerName}\n      basePath={basePath}\n      language={lang}\n      languages={SEARCH_LANGUAGES}\n      onLanguageChange={(l) => onLanguageChange(l as SupportedLanguage)}\n      activeThemeId={activeThemeId}\n      layouts={layouts}\n      onThemeChange={onThemeChange}\n      nextModeIsDark={nextModeIsDark}\n      canToggleMode={canToggleMode}\n      onToggleMode={onToggleMode}\n      iconImage={iconImage}\n      iconImgWidth={iconImgWidth}\n      iconImgHeight={iconImgHeight}\n      getLanguageLabel={getLanguageLabel}\n    />\n  );\n\n  if (!mounted) {\n    return (\n      <SearchShellLayout header={header} footerEnabled projectFooterUrl={PROJECT_FOOTER_URL} language={lang} style={cssVars}>\n        <section className={notFoundStyles.section}>\n          <p style={styles.loading}>Loading...</p>\n        </section>\n      </SearchShellLayout>\n    );\n  }\n\n  if (loadedData && loadingTransitionDone) {\n    return <DocsShell data={loadedData} />;\n  }\n\n  if (isCheckingOrLoading) {\n    const loadingTitleBase = lang === \"pt\" ? \"Carregando documentação\" : lang === \"es\" ? \"Cargando documentación\" : \"Loading documentation\";\n    const loadingTitle = `${loadingTitleBase}${\".\".repeat(loaderDots)}`;\n    const progressWidth = loaderDots === 1 ? \"34%\" : loaderDots === 2 ? \"68%\" : \"100%\";\n    return (\n      <SearchShellLayout header={header} footerEnabled projectFooterUrl={PROJECT_FOOTER_URL} language={lang} style={cssVars}>\n        <section className={notFoundStyles.section}>\n          <h1 style={styles.title}>{loadingTitle}</h1>\n          <p style={styles.description}>\n            {lang === \"pt\"\n              ? \"Repositório detectado. Abrindo o app...\"\n              : lang === \"es\"\n                ? \"Repositorio detectado. Abriendo la app...\"\n                : \"Repository detected. Opening the app...\"}\n          </p>\n          <div style={styles.loadingTrack}>\n            <div style={{ ...styles.loadingBar, width: progressWidth }} />\n          </div>\n        </section>\n      </SearchShellLayout>\n    );\n  }\n\n  if (Boolean(isRepoPath) && repoStatus === \"installed\" && appLoadFailed) {\n    return (\n      <SearchShellLayout header={header} footerEnabled projectFooterUrl={PROJECT_FOOTER_URL} language={lang} style={cssVars}>\n        <section className={notFoundStyles.section}>\n          <h1 style={styles.title}>{lang === \"pt\" ? \"Não foi possível carregar agora\" : lang === \"es\" ? \"No se pudo cargar ahora\" : \"Could not load right now\"}</h1>\n          <p style={styles.description}>\n            {lang === \"pt\"\n              ? \"O repositório possui gitpagedocs, mas houve falha temporária de rede. Tente novamente.\"\n              : lang === \"es\"\n                ? \"El repositorio tiene gitpagedocs, pero hubo un fallo temporal de red. Intenta de nuevo.\"\n                : \"This repository has gitpagedocs, but there was a temporary network failure. Try again.\"}\n          </p>\n          <button\n            type=\"button\"\n            className={notFoundStyles.buttonFull}\n            onClick={() => {\n              setRepoStatus(\"checking\");\n            }}\n          >\n            {lang === \"pt\" ? \"Tentar novamente\" : lang === \"es\" ? \"Intentar de nuevo\" : \"Try again\"}\n          </button>\n        </section>\n      </SearchShellLayout>\n    );\n  }\n\n  const safeLang = lang as SupportedLanguage;\n  const message = isRepoPath\n    ? repoStatus === \"installed\"\n      ? INSTALLED_NOT_PRERENDERED[safeLang]\n      : NOT_INSTALLED[safeLang]\n    : \"Page not found\";\n  const prompt = isRepoPath\n    ? repoStatus === \"installed\"\n      ? INSTALLED_PROMPT[safeLang]\n      : SEARCH_PROMPT[safeLang]\n    : \"The requested page does not exist.\";\n  const returnLabel = RETURN_HOME[safeLang];\n\n  return (\n    <SearchShellLayout header={header} footerEnabled projectFooterUrl={PROJECT_FOOTER_URL} language={lang} style={cssVars}>\n      <section className={notFoundStyles.section}>\n        {(repoStatus === \"not_installed\" || !isRepoPath) && <p style={styles.code}>404</p>}\n        <h1 style={styles.title}>{message}</h1>\n        <p style={styles.description}>{prompt}</p>\n\n        {isRepoPath && (\n          <form\n            className={notFoundStyles.form}\n            onSubmit={(e) => {\n              e.preventDefault();\n              const form = e.target as HTMLFormElement;\n              const owner = (form.querySelector('[name=\"owner\"]') as HTMLInputElement)?.value?.trim();\n              const repo = (form.querySelector('[name=\"repo\"]') as HTMLInputElement)?.value?.trim();\n              if (owner && repo) {\n                setPathOwner(owner);\n                setPathRepo(repo);\n                setPathVersion(undefined);\n                setRepoStatus(\"unknown\");\n                setLoadedData(null);\n                const nextPath = `${basePath ? basePath + \"/\" : \"/\"}${owner}/${repo}/`;\n                window.history.replaceState({}, \"\", nextPath);\n              }\n            }}\n          >\n            <input\n              name=\"owner\"\n              placeholder={lang === \"pt\" ? \"Usuário (ex: Vidigal-code)\" : lang === \"es\" ? \"Usuario (ej: Vidigal-code)\" : \"Owner (ex: Vidigal-code)\"}\n              defaultValue={pathOwner ?? \"\"}\n              className={notFoundStyles.input}\n            />\n            <input\n              name=\"repo\"\n              placeholder={lang === \"pt\" ? \"Repositório (ex: git-page-link-create)\" : lang === \"es\" ? \"Repositorio (ej: git-page-link-create)\" : \"Repository (ex: git-page-link-create)\"}\n              defaultValue={pathRepo ?? \"\"}\n              className={notFoundStyles.input}\n            />\n            <button type=\"submit\" className={notFoundStyles.button}>\n              {lang === \"pt\" ? \"Buscar\" : lang === \"es\" ? \"Buscar\" : \"Search\"}\n            </button>\n          </form>\n        )}\n\n        <a href={basePath ? `${basePath}/` : \"/\"} className={notFoundStyles.link}>\n          {returnLabel}\n        </a>\n      </section>\n    </SearchShellLayout>\n  );\n}\n\nexport default function NotFound() {\n  return (\n    <Suspense fallback={<NotFoundFallback />}>\n      <NotFoundContent />\n    </Suspense>\n  );\n}\n\nconst styles: Record<string, React.CSSProperties> = {\n  loading: {\n    margin: 0,\n    color: \"var(--text-secondary)\",\n    textAlign: \"center\",\n  },\n  code: {\n    margin: 0,\n    color: \"var(--text-secondary)\",\n    fontWeight: 600,\n    textAlign: \"center\",\n  },\n  title: {\n    marginTop: 8,\n    marginBottom: 12,\n    textAlign: \"center\",\n    color: \"var(--text)\",\n  },\n  description: {\n    marginTop: 0,\n    color: \"var(--text-secondary)\",\n    lineHeight: 1.6,\n    textAlign: \"center\",\n  },\n  loadingTrack: {\n    width: \"100%\",\n    height: 8,\n    borderRadius: 999,\n    border: \"1px solid var(--card-border)\",\n    background: \"color-mix(in srgb, var(--background) 90%, var(--primary) 10%)\",\n    overflow: \"hidden\",\n    marginTop: 8,\n  },\n  loadingBar: {\n    height: \"100%\",\n    borderRadius: 999,\n    background: \"linear-gradient(90deg, var(--primary), var(--secondary))\",\n    transition: \"width 220ms ease\",\n  },\n};\n","src/app/[[...repo]]/layout.tsx":"import type { Metadata } from \"next\";\nimport path from \"node:path\";\nimport { readFile } from \"node:fs/promises\";\nimport { FALLBACK_HEADER_NAME, resolveHeaderName } from \"@/shared/lib/resolve-site-assets\";\n\nexport async function generateMetadata(): Promise<Metadata> {\n  let siteName = FALLBACK_HEADER_NAME;\n  try {\n    const configPath = path.join(process.cwd(), \"gitpagedocs/config.json\");\n    const raw = await readFile(configPath, \"utf-8\");\n    const config = JSON.parse(raw) as { site?: { SiteHeaderName?: string; name?: string } };\n    siteName = resolveHeaderName(config?.site?.SiteHeaderName, config?.site?.name);\n  } catch {\n    // fallback kept\n  }\n  return {\n    title: { absolute: siteName },\n    openGraph: {\n      siteName,\n    },\n  };\n}\n\nexport default function RepoLayout({ children }: { children: React.ReactNode }) {\n  return <>{children}</>;\n}\n","src/app/[[...repo]]/page.tsx":"import { promises as fs } from \"node:fs\";\nimport path from \"node:path\";\nimport { loadDocsData } from \"@/entities/docs/api/load-docs-data\";\nimport { DocsShell } from \"@/widgets/docs-shell/docs-shell\";\nimport { RepositorySearchShell } from \"@/widgets/repository-search-shell/repository-search-shell\";\n\ninterface PageProps {\n  params: Promise<{ repo?: string[] }>;\n  searchParams?: Promise<{ version?: string }>;\n}\n\n// For static export, avoid awaiting searchParams (triggers dynamic)\nexport const dynamic = \"force-static\";\n\nfunction parseOwnerRepoFromUrl(input: string | undefined): { owner?: string; repo?: string } {\n  if (!input) return {};\n  try {\n    const normalized = input\n      .replace(/^git\\+/, \"\")\n      .replace(/^git@github\\.com:/, \"https://github.com/\")\n      .replace(/\\.git$/, \"\");\n    const parsed = new URL(normalized);\n    const parts = parsed.pathname.split(\"/\").filter(Boolean);\n    if (parts.length >= 2) {\n      return { owner: parts[0], repo: parts[1] };\n    }\n  } catch {\n    return {};\n  }\n  return {};\n}\n\nfunction parseRepoAndVersion(repoSlug: string[] | undefined): { owner?: string; repo?: string; version?: string } {\n  if (!repoSlug?.length) return {};\n  if (repoSlug.length >= 2 && repoSlug[0] === \"v\" && repoSlug[1]) {\n    return { version: repoSlug[1] };\n  }\n  if (repoSlug.length >= 4 && repoSlug[2] === \"v\" && repoSlug[3]) {\n    return { owner: repoSlug[0], repo: repoSlug[1], version: repoSlug[3] };\n  }\n  if (repoSlug.length >= 2) {\n    return { owner: repoSlug[0], repo: repoSlug[1] };\n  }\n  return {};\n}\n\nexport async function generateStaticParams() {\n  const params: { repo: string[] }[] = [{ repo: [] }];\n  const defaultVersions = [\"1.0.0\", \"1.1.0\", \"1.1.1\"];\n  let versions = defaultVersions;\n\n  const addVersionPaths = (vids: string[]) => {\n    for (const vid of vids) {\n      if (!params.some((p) => p.repo?.length >= 2 && p.repo[0] === \"v\" && p.repo[1] === vid)) {\n        params.push({ repo: [\"v\", vid] });\n      }\n    }\n  };\n\n  const addRepoWithVersions = (owner: string, repo: string, vids: string[]) => {\n    if (!params.some((p) => p.repo?.length >= 2 && p.repo[0] === owner && p.repo[1] === repo)) {\n      params.push({ repo: [owner, repo] });\n    }\n    for (const vid of vids) {\n      if (\n        !params.some(\n          (p) =>\n            p.repo?.length >= 4 && p.repo[0] === owner && p.repo[1] === repo && p.repo[2] === \"v\" && p.repo[3] === vid,\n        )\n      ) {\n        params.push({ repo: [owner, repo, \"v\", vid] });\n      }\n    }\n  };\n\n  try {\n    const configPath = path.join(process.cwd(), \"gitpagedocs/config.json\");\n    const raw = await fs.readFile(configPath, \"utf-8\");\n    const config = JSON.parse(raw);\n    versions = config?.VersionControl?.versions?.map((v: { id: string }) => v.id) ?? defaultVersions;\n    addVersionPaths(versions);\n\n    if (config?.site?.ProjectLink) {\n      const fromProjectLink = parseOwnerRepoFromUrl(config.site.ProjectLink);\n      if (fromProjectLink.owner && fromProjectLink.repo) {\n        addRepoWithVersions(fromProjectLink.owner, fromProjectLink.repo, versions);\n      }\n    }\n\n    const packageJsonPath = path.join(process.cwd(), \"package.json\");\n    const packageRaw = await fs.readFile(packageJsonPath, \"utf-8\");\n    const packageJson = JSON.parse(packageRaw) as { repository?: { url?: string } | string; homepage?: string };\n    const repositoryUrl =\n      typeof packageJson.repository === \"string\" ? packageJson.repository : packageJson.repository?.url;\n    const fromRepository = parseOwnerRepoFromUrl(repositoryUrl);\n    if (fromRepository.owner && fromRepository.repo) {\n      addRepoWithVersions(fromRepository.owner, fromRepository.repo, versions);\n    }\n    const fromHomepage = parseOwnerRepoFromUrl(packageJson.homepage);\n    if (fromHomepage.owner && fromHomepage.repo) {\n      addRepoWithVersions(fromHomepage.owner, fromHomepage.repo, versions);\n    }\n  } catch {\n    addVersionPaths(versions);\n    try {\n      const packageJsonPath = path.join(process.cwd(), \"package.json\");\n      const packageRaw = await fs.readFile(packageJsonPath, \"utf-8\");\n      const packageJson = JSON.parse(packageRaw) as { repository?: { url?: string } | string; homepage?: string };\n      const fromRepository = parseOwnerRepoFromUrl(\n        typeof packageJson.repository === \"string\" ? packageJson.repository : packageJson.repository?.url,\n      );\n      const fromHomepage = parseOwnerRepoFromUrl(packageJson.homepage);\n      if (fromRepository.owner && fromRepository.repo) {\n        addRepoWithVersions(fromRepository.owner, fromRepository.repo, versions);\n      }\n      if (fromHomepage.owner && fromHomepage.repo) {\n        addRepoWithVersions(fromHomepage.owner, fromHomepage.repo, versions);\n      }\n    } catch {\n      addRepoWithVersions(\"Vidigal-code\", \"git-page-docs\", versions);\n    }\n  }\n  return params;\n}\n\nexport default async function DocsPage({ params }: PageProps) {\n  const { repo } = await params;\n  const { owner, repo: repoName, version } = parseRepoAndVersion(repo);\n  const slugForLoad = owner && repoName ? [owner, repoName] : undefined;\n  const data = await loadDocsData(slugForLoad, version);\n\n  const repositoryNotUsingGitPageDocs = Boolean(data.activeRepository.requested && data.activeRepository.hasGitPageDocs === false);\n  if (data.showRepositorySearchHome || repositoryNotUsingGitPageDocs || !data.config.routes.length) {\n    return <RepositorySearchShell data={data} repositoryNotUsingGitPageDocs={repositoryNotUsingGitPageDocs} />;\n  }\n\n  return <DocsShell data={data} />;\n}\n","src/entities/docs/api/content/load-pages.ts":"import type {\n  ContentTypeRouteConfig,\n  LanguageCode,\n  LoadedPage,\n  PathToPageEntry,\n  RouteConfig,\n} from \"@/entities/docs/model/types\";\nimport { readLocalText } from \"../io/file-reader\";\nimport { readRemoteText } from \"../io/remote-fetcher\";\nimport { markdownToHtml } from \"../utils/markdown\";\nimport { hasPath, hasVideo } from \"../utils/route-utils\";\n\nexport async function loadPages(options: {\n  sortedIds: number[];\n  routesMd: (ContentTypeRouteConfig | RouteConfig)[];\n  routesHtml: ContentTypeRouteConfig[];\n  routesVideo: ContentTypeRouteConfig[];\n  languages: LanguageCode[];\n  source: \"local\" | \"remote\";\n  owner?: string;\n  repo?: string;\n}): Promise<{ pages: LoadedPage[]; pathToPageMap: Record<string, PathToPageEntry> }> {\n  const pathToPageMap: Record<string, PathToPageEntry> = {};\n  const pages: LoadedPage[] = [];\n  const { sortedIds, routesMd, routesHtml, routesVideo, languages, source, owner, repo } = options;\n\n  for (let pageIndex = 0; pageIndex < sortedIds.length; pageIndex++) {\n    const id = sortedIds[pageIndex];\n    const page: LoadedPage = { id };\n\n    const mdRoute = routesMd.find((r) => r.id === id);\n    if (mdRoute && hasPath(mdRoute)) {\n      const markdownByLanguage: Record<LanguageCode, string> = {};\n      await Promise.all(\n        languages.map(async (language) => {\n          const languagePath = mdRoute.path![language];\n          if (!languagePath) {\n            markdownByLanguage[language] = \"<p>Missing language file path in config.</p>\";\n            return;\n          }\n          if (source === \"remote\" && owner && repo) {\n            const remoteText = await readRemoteText(owner, repo, languagePath);\n            markdownByLanguage[language] = remoteText ? markdownToHtml(remoteText) : \"<p>Unable to load remote markdown file.</p>\";\n            return;\n          }\n          try {\n            const localText = await readLocalText(languagePath);\n            markdownByLanguage[language] = localText ? markdownToHtml(localText) : \"<p>Unable to load local markdown file.</p>\";\n          } catch {\n            markdownByLanguage[language] = \"<p>Unable to load local markdown file.</p>\";\n          }\n        }),\n      );\n      const fullscreenEnabled = \"fullscreenEnabled\" in mdRoute ? mdRoute.fullscreenEnabled : true;\n      page.md = { routeId: id, config: mdRoute, markdownByLanguage, fullscreenEnabled };\n      languages.forEach((lang) => {\n        const pathVal = mdRoute.path![lang];\n        if (pathVal) pathToPageMap[pathVal] = { pageIndex, contentType: \"md\" };\n      });\n    }\n\n    const htmlRoute = routesHtml.find((r) => r.id === id && (r.path || r.url));\n    if (htmlRoute) {\n      const fullscreenEnabled = htmlRoute.fullscreenEnabled ?? true;\n      const htmlByLanguage: Record<LanguageCode, string> = {};\n\n      if (htmlRoute.path) {\n        await Promise.all(\n          languages.map(async (language) => {\n            const languagePath = htmlRoute.path![language];\n            if (!languagePath) {\n              htmlByLanguage[language] = \"<p>Missing HTML path.</p>\";\n              return;\n            }\n            if (source === \"remote\" && owner && repo) {\n              const remoteText = await readRemoteText(owner, repo, languagePath);\n              htmlByLanguage[language] = remoteText ?? \"<p>Unable to load remote HTML.</p>\";\n              return;\n            }\n            try {\n              const localText = await readLocalText(languagePath);\n              htmlByLanguage[language] = localText ?? \"<p>Unable to load local HTML file.</p>\";\n            } catch {\n              htmlByLanguage[language] = \"<p>Unable to load local HTML file.</p>\";\n            }\n          }),\n        );\n        languages.forEach((lang) => {\n          const pathVal = htmlRoute.path![lang];\n          if (pathVal) pathToPageMap[pathVal] = { pageIndex, contentType: \"html\" };\n        });\n      } else if (htmlRoute.url) {\n        languages.forEach((lang) => {\n          htmlByLanguage[lang] = \"\";\n        });\n        const urlKey = htmlRoute.url.en ?? Object.values(htmlRoute.url)[0];\n        if (urlKey) pathToPageMap[`url:${urlKey}`] = { pageIndex, contentType: \"html\" };\n      }\n\n      page.html = { routeId: id, config: htmlRoute, htmlByLanguage, fullscreenEnabled };\n    }\n\n    const videoRoute = routesVideo.find((r) => r.id === id && hasVideo(r));\n    if (videoRoute && hasVideo(videoRoute)) {\n      const videoTypeByLanguage: Record<LanguageCode, string> = {};\n      const pathVideoByLanguage: Record<LanguageCode, string> = {};\n      languages.forEach((lang) => {\n        videoTypeByLanguage[lang] = videoRoute.video!.videoType[lang] ?? videoRoute.video!.videoType.en ?? \"youtube\";\n        pathVideoByLanguage[lang] = videoRoute.video!.pathVideo[lang] ?? videoRoute.video!.pathVideo.en ?? \"\";\n      });\n      const fullscreenEnabled = videoRoute.fullscreenEnabled ?? true;\n      page.video = { routeId: id, config: videoRoute, videoTypeByLanguage, pathVideoByLanguage, fullscreenEnabled };\n      pathToPageMap[`page:${id}`] = { pageIndex, contentType: \"video\" };\n      languages.forEach((lang) => {\n        const url = pathVideoByLanguage[lang];\n        if (url) pathToPageMap[url] = { pageIndex, contentType: \"video\" };\n      });\n    }\n\n    pages.push(page);\n  }\n\n  return { pages, pathToPageMap };\n}\n","src/entities/docs/api/io/file-reader.ts":"import { promises as fs } from \"node:fs\";\nimport path from \"node:path\";\n\nfunction isBrowser(): boolean {\n  return typeof window !== \"undefined\";\n}\n\nexport async function readLocalText(filePath: string): Promise<string | null> {\n  if (isBrowser()) {\n    try {\n      const baseUrl = window.location.origin;\n      const configuredBasePath = process.env.NEXT_PUBLIC_GITPAGEDOCS_BASE_PATH?.trim() ?? \"\";\n      const pathPrefix = configuredBasePath && window.location.pathname.startsWith(configuredBasePath) ? configuredBasePath : \"\";\n      const url = `${baseUrl}${pathPrefix}/${filePath.replace(/^\\//, \"\")}`;\n      const response = await fetch(url);\n      if (!response.ok) return null;\n      return await response.text();\n    } catch {\n      return null;\n    }\n  }\n  try {\n    const fullPath = path.join(process.cwd(), filePath);\n    return await fs.readFile(fullPath, \"utf-8\");\n  } catch {\n    return null;\n  }\n}\n\nexport async function readJsonFile<T>(filePath: string): Promise<T> {\n  const text = await readLocalText(filePath);\n  if (text === null) {\n    throw new Error(`Failed to read local file: ${filePath}`);\n  }\n  return JSON.parse(text) as T;\n}\n\nexport async function tryReadJsonFile<T>(filePath: string): Promise<T | null> {\n  try {\n    return await readJsonFile<T>(filePath);\n  } catch {\n    return null;\n  }\n}\n","src/entities/docs/api/io/remote-fetcher.ts":"import { buildGithubRawCandidates, ensureTrailingSlash, toRawGithubUrl } from \"@/entities/docs/lib/remote/github-url\";\nimport { readLocalText } from \"./file-reader\";\n\nexport async function tryFetchText(url: string): Promise<string | null> {\n  try {\n    const response = await fetch(url, {\n      headers: {\n        \"User-Agent\": \"git-page-docs\",\n      },\n    });\n    if (!response.ok) {\n      return null;\n    }\n    return response.text();\n  } catch {\n    return null;\n  }\n}\n\nexport async function readRemoteJson<T>(url: string): Promise<T | null> {\n  const rawUrl = toRawGithubUrl(url);\n  const text = await tryFetchText(rawUrl);\n  if (!text) {\n    return null;\n  }\n  try {\n    return JSON.parse(text) as T;\n  } catch {\n    return null;\n  }\n}\n\nexport function buildRepoRawBase(owner: string, repo: string, relativeBasePath: string): string {\n  return `https://raw.githubusercontent.com/${owner}/${repo}/HEAD/${ensureTrailingSlash(relativeBasePath)}`;\n}\n\nexport async function readRemoteText(owner: string, repo: string, relativePath: string): Promise<string | null> {\n  const candidates = buildGithubRawCandidates(owner, repo, relativePath);\n  for (const candidate of candidates) {\n    const result = await tryFetchText(candidate);\n    if (result !== null) {\n      return result;\n    }\n  }\n  return null;\n}\n\nexport async function readRemoteJsonFromRepo<T>(owner: string, repo: string, relativePath: string): Promise<T | null> {\n  const text = await readRemoteText(owner, repo, relativePath);\n  if (!text) {\n    return null;\n  }\n  try {\n    return JSON.parse(text) as T;\n  } catch {\n    return null;\n  }\n}\n","src/entities/docs/api/layouts/load-layouts.ts":"import path from \"node:path\";\nimport { buildFallbackLayoutsAndThemes } from \"@/entities/docs/lib/fallback-layouts\";\nimport { ensureTrailingSlash, toRawGithubUrl } from \"@/entities/docs/lib/remote/github-url\";\nimport type { LayoutItem, LayoutsConfig, ThemeTemplate } from \"@/entities/docs/model/types\";\nimport { tryReadJsonFile } from \"../io/file-reader\";\nimport { readRemoteJson, readRemoteJsonFromRepo, buildRepoRawBase } from \"../io/remote-fetcher\";\n\nconst DEFAULT_LAYOUTS_PATH = \"gitpagedocs/layouts/layoutsConfig.json\";\nconst DEFAULT_TEMPLATES_BASE_PATH = \"gitpagedocs/layouts/\";\n\nfunction deriveRemoteTemplatesBaseUrl(\n  layoutsConfigPath: string | undefined,\n  templatesPathOverride: string | undefined,\n  owner: string | undefined,\n  repo: string | undefined,\n): string | undefined {\n  if (templatesPathOverride) {\n    return ensureTrailingSlash(toRawGithubUrl(templatesPathOverride));\n  }\n\n  if (layoutsConfigPath) {\n    const rawUrl = toRawGithubUrl(layoutsConfigPath);\n    return ensureTrailingSlash(rawUrl.slice(0, rawUrl.lastIndexOf(\"/\") + 1));\n  }\n\n  if (owner && repo) {\n    return buildRepoRawBase(owner, repo, DEFAULT_TEMPLATES_BASE_PATH);\n  }\n\n  return undefined;\n}\n\nfunction buildRemoteTemplateUrl(layoutFile: string, remoteTemplatesBaseUrl: string): string {\n  const normalizedBase = ensureTrailingSlash(remoteTemplatesBaseUrl);\n  const basePath = new URL(normalizedBase).pathname;\n  const baseEndsWithTemplates = /\\/templates\\/$/i.test(basePath);\n  const normalizedFile = layoutFile.replace(/^\\.\\//, \"\");\n  const fileWithoutTemplatesPrefix = normalizedFile.replace(/^templates\\//i, \"\");\n  const filePath = baseEndsWithTemplates ? fileWithoutTemplatesPrefix : normalizedFile;\n  return new URL(filePath, normalizedBase).toString();\n}\n\nexport async function loadLayoutsAndThemes(options: {\n  isLocal: boolean;\n  owner?: string;\n  repo?: string;\n  useOfficialLayouts?: boolean;\n  officialLayoutsConfigPath?: string;\n  officialLayoutsTemplatesPath?: string;\n  layoutsConfigPath?: string;\n  layoutsConfigPathTemplates?: string;\n}): Promise<{\n  layoutsConfig: LayoutsConfig;\n  themes: Record<string, ThemeTemplate>;\n}> {\n  let layoutsConfig: LayoutsConfig | null = null;\n  let remoteTemplatesBaseUrl: string | undefined;\n  const preferredRemoteLayoutsPath = options.useOfficialLayouts\n    ? options.officialLayoutsConfigPath || options.layoutsConfigPath\n    : options.layoutsConfigPath;\n  const preferredRemoteTemplatesPath = options.useOfficialLayouts\n    ? options.officialLayoutsTemplatesPath || options.layoutsConfigPathTemplates\n    : options.layoutsConfigPathTemplates;\n\n  if (options.useOfficialLayouts && preferredRemoteLayoutsPath) {\n    const remoteConfig = await readRemoteJson<LayoutsConfig>(preferredRemoteLayoutsPath);\n    if (remoteConfig?.layouts?.length) {\n      layoutsConfig = remoteConfig;\n      remoteTemplatesBaseUrl = deriveRemoteTemplatesBaseUrl(\n        preferredRemoteLayoutsPath,\n        preferredRemoteTemplatesPath,\n        options.owner,\n        options.repo,\n      );\n    }\n  }\n\n  if (!layoutsConfig && options.isLocal) {\n    layoutsConfig = await tryReadJsonFile<LayoutsConfig>(DEFAULT_LAYOUTS_PATH);\n  } else if (!layoutsConfig) {\n    if (preferredRemoteLayoutsPath) {\n      const remoteConfig = await readRemoteJson<LayoutsConfig>(preferredRemoteLayoutsPath);\n      if (remoteConfig?.layouts?.length) {\n        layoutsConfig = remoteConfig;\n        remoteTemplatesBaseUrl = deriveRemoteTemplatesBaseUrl(\n          preferredRemoteLayoutsPath,\n          preferredRemoteTemplatesPath,\n          options.owner,\n          options.repo,\n        );\n      }\n    }\n\n    if (!layoutsConfig && options.owner && options.repo) {\n      const repoLayouts = await readRemoteJsonFromRepo<LayoutsConfig>(options.owner, options.repo, DEFAULT_LAYOUTS_PATH);\n      if (repoLayouts?.layouts?.length) {\n        layoutsConfig = repoLayouts;\n        remoteTemplatesBaseUrl = deriveRemoteTemplatesBaseUrl(\n          undefined,\n          preferredRemoteTemplatesPath,\n          options.owner,\n          options.repo,\n        );\n      }\n    }\n\n    if (!layoutsConfig?.layouts?.length) {\n      layoutsConfig = await tryReadJsonFile<LayoutsConfig>(DEFAULT_LAYOUTS_PATH);\n    }\n  }\n\n  if (!layoutsConfig?.layouts?.length) {\n    return buildFallbackLayoutsAndThemes();\n  }\n\n  const themes: Record<string, ThemeTemplate> = {};\n\n  await Promise.all(\n    layoutsConfig.layouts.map(async (layoutItem: LayoutItem) => {\n      try {\n        let template: ThemeTemplate | null = null;\n\n        if (remoteTemplatesBaseUrl && !options.isLocal) {\n          const templateUrl = buildRemoteTemplateUrl(layoutItem.file, remoteTemplatesBaseUrl);\n          template = await readRemoteJson<ThemeTemplate>(templateUrl);\n        }\n\n        if (!template) {\n          const templatePath = path.join(\"gitpagedocs/layouts\", layoutItem.file);\n          template = await tryReadJsonFile<ThemeTemplate>(templatePath);\n        }\n\n        if (!template && remoteTemplatesBaseUrl && !options.isLocal) {\n          const templateUrl = buildRemoteTemplateUrl(layoutItem.file, remoteTemplatesBaseUrl);\n          template = await readRemoteJson<ThemeTemplate>(templateUrl);\n        }\n\n        if (!template) {\n          return;\n        }\n\n        themes[layoutItem.id] = template;\n      } catch {\n        // Keep app resilient even if one template is missing.\n      }\n    }),\n  );\n\n  return { layoutsConfig, themes };\n}\n","src/entities/docs/api/load-docs-data.ts":"import type {\n  ContentTypeRouteConfig,\n  GitPageDocsConfig,\n  HierarchyConfig,\n  LoadedDocsData,\n  RouteConfig,\n} from \"@/entities/docs/model/types\";\nimport { readJsonFile } from \"./io/file-reader\";\nimport { readRemoteJsonFromRepo } from \"./io/remote-fetcher\";\nimport { parseOwnerRepoFromRenderingUrl } from \"./utils/url-utils\";\nimport { getLanguages, hasPath } from \"./utils/route-utils\";\nimport { resolveActiveVersionId, loadVersionConfig } from \"./version/resolve-version\";\nimport { loadLayoutsAndThemes } from \"./layouts/load-layouts\";\nimport { loadPages } from \"./content/load-pages\";\n\nconst DEFAULT_CONFIG_PATH = \"gitpagedocs/config.json\";\nconst DEFAULT_HIERARCHY: HierarchyConfig = { md: 0, html: 1, video: 2 };\n\nfunction isLocalRuntime(): boolean {\n  if (process.env.NODE_ENV !== \"production\") {\n    return true;\n  }\n  return process.env.VERCEL_ENV === \"development\";\n}\n\nexport async function loadDocsData(slug: string[] | undefined, selectedVersionId?: string): Promise<LoadedDocsData> {\n  const localConfig = await readJsonFile<GitPageDocsConfig>(DEFAULT_CONFIG_PATH);\n  const local = isLocalRuntime();\n  const isGithubPagesBuild = process.env.GITHUB_ACTIONS === \"true\";\n  const repositorySearchEnabledByEnv = process.env.GITPAGEDOCS_REPOSITORY_SEARCH === \"true\";\n  const repositorySearchEnabled = isGithubPagesBuild || repositorySearchEnabledByEnv;\n  const renderingRef = parseOwnerRepoFromRenderingUrl(localConfig.site.rendering);\n  const projectRef = parseOwnerRepoFromRenderingUrl(localConfig.site.ProjectLink || \"\");\n  const buildRepositoryName = process.env.GITHUB_REPOSITORY?.split(\"/\")[1]?.toLowerCase();\n  const isOfficialSearchAggregatorRepo =\n    renderingRef.repo?.toLowerCase() === \"git-page-docs\" ||\n    projectRef.repo?.toLowerCase() === \"git-page-docs\" ||\n    buildRepositoryName === \"git-page-docs\";\n\n  const requestedOwner = slug?.[0];\n  const requestedRepo = slug?.[1];\n  const isRepositoryRouteRequest = Boolean(repositorySearchEnabled && requestedOwner && requestedRepo);\n  const repositorySearchHomeEnabled = (() => {\n    if (isGithubPagesBuild && !isOfficialSearchAggregatorRepo) {\n      return false;\n    }\n    if (typeof localConfig.site.repositorySearchHome === \"boolean\") {\n      return localConfig.site.repositorySearchHome;\n    }\n    if (isGithubPagesBuild) {\n      return isOfficialSearchAggregatorRepo;\n    }\n    return true;\n  })();\n  const showRepositorySearchHome = Boolean(\n    repositorySearchEnabled && repositorySearchHomeEnabled && !requestedOwner && !requestedRepo && !selectedVersionId,\n  );\n  const renderingFallback = parseOwnerRepoFromRenderingUrl(localConfig.site.rendering);\n  const projectLinkFallback = parseOwnerRepoFromRenderingUrl(localConfig.site.ProjectLink || \"\");\n\n  let source: \"local\" | \"remote\" = \"local\";\n  let owner: string | undefined;\n  let repo: string | undefined;\n\n  const isLocalRepo = Boolean(\n    requestedOwner &&\n    requestedRepo &&\n    ((requestedOwner.toLowerCase() === projectLinkFallback.owner?.toLowerCase() &&\n      requestedRepo.toLowerCase() === projectLinkFallback.repo?.toLowerCase()) ||\n      (requestedOwner.toLowerCase() === renderingFallback.owner?.toLowerCase() &&\n        requestedRepo.toLowerCase() === renderingFallback.repo?.toLowerCase())),\n  );\n\n  if (repositorySearchEnabled && requestedOwner && requestedRepo && !isLocalRepo) {\n    source = \"remote\";\n    owner = requestedOwner;\n    repo = requestedRepo;\n  }\n\n  let config = localConfig;\n  let hasGitPageDocs = true;\n\n  if (isLocalRepo) {\n    source = \"local\";\n    owner = requestedOwner;\n    repo = requestedRepo;\n  }\n  if (owner && repo) {\n    const remoteConfig = await readRemoteJsonFromRepo<GitPageDocsConfig>(owner, repo, DEFAULT_CONFIG_PATH);\n    if (remoteConfig) {\n      config = remoteConfig;\n    } else if (isRepositoryRouteRequest) {\n      hasGitPageDocs = false;\n      config = localConfig;\n    }\n  }\n\n  const availableVersions = config.VersionControl?.versions ?? [];\n  const activeVersionId = resolveActiveVersionId(availableVersions, selectedVersionId, config.site.docsVersion);\n  const activeVersion = activeVersionId\n    ? availableVersions.find((version) => version.id === activeVersionId)\n    : undefined;\n\n  let routesMd: (ContentTypeRouteConfig | RouteConfig)[] =\n    showRepositorySearchHome || (isRepositoryRouteRequest && !hasGitPageDocs)\n      ? []\n      : (config[\"routes-md\"] ?? config.routes ?? []);\n  let routesHtml: ContentTypeRouteConfig[] = config[\"routes-html\"] ?? [];\n  let routesVideo: ContentTypeRouteConfig[] = config[\"routes-video\"] ?? [];\n  let menusHeaderMd = config[\"menus-header-md\"] ?? config[\"menus-header\"] ?? [];\n  let menusHeaderHtml = config[\"menus-header-html\"] ?? [];\n  let menusHeaderVideo = config[\"menus-header-video\"] ?? [];\n  let hierarchyPage = config.hierarchyPage ?? DEFAULT_HIERARCHY;\n  let hierarchyMenu = config.hierarchyMenu ?? DEFAULT_HIERARCHY;\n\n  if (activeVersionId) {\n    const versionEntry = activeVersion;\n    if (versionEntry) {\n      const versionConfig = await loadVersionConfig({\n        versionEntry,\n        source,\n        owner,\n        repo,\n      });\n      if (versionConfig) {\n        if (versionConfig[\"routes-md\"]?.length) routesMd = versionConfig[\"routes-md\"];\n        else if (versionConfig.routes?.length) routesMd = versionConfig.routes;\n        if (versionConfig[\"routes-html\"]?.length) routesHtml = versionConfig[\"routes-html\"];\n        if (versionConfig[\"routes-video\"]?.length) routesVideo = versionConfig[\"routes-video\"];\n        if (versionConfig[\"menus-header-md\"]?.length) menusHeaderMd = versionConfig[\"menus-header-md\"];\n        else if (versionConfig[\"menus-header\"]?.length) menusHeaderMd = versionConfig[\"menus-header\"];\n        if (versionConfig[\"menus-header-html\"]?.length) menusHeaderHtml = versionConfig[\"menus-header-html\"];\n        if (versionConfig[\"menus-header-video\"]?.length) menusHeaderVideo = versionConfig[\"menus-header-video\"];\n        if (versionConfig.hierarchyPage) hierarchyPage = versionConfig.hierarchyPage;\n        if (versionConfig.hierarchyMenu) hierarchyMenu = versionConfig.hierarchyMenu;\n      }\n    }\n  }\n\n  const routes = routesMd.filter((r) => hasPath(r)).map((r) => ({ id: r.id, path: r.path! }));\n  const menusHeader = menusHeaderMd;\n\n  const effectiveConfig: GitPageDocsConfig = {\n    ...config,\n    routes,\n    \"menus-header\": menusHeader,\n    \"routes-md\": routesMd,\n    \"routes-html\": routesHtml,\n    \"routes-video\": routesVideo,\n    \"menus-header-md\": menusHeaderMd,\n    \"menus-header-html\": menusHeaderHtml,\n    \"menus-header-video\": menusHeaderVideo,\n    hierarchyPage,\n    hierarchyMenu,\n  };\n\n  const { layoutsConfig, themes } = await loadLayoutsAndThemes({\n    isLocal: local,\n    owner,\n    repo,\n    useOfficialLayouts: effectiveConfig.site.layoutsConfigPathOficial === true,\n    officialLayoutsConfigPath: effectiveConfig.site.layoutsConfigPathOficialUrl,\n    officialLayoutsTemplatesPath: effectiveConfig.site.layoutsConfigPathTemplatesOficial,\n    layoutsConfigPath: effectiveConfig.site.layoutsConfigPath,\n    layoutsConfigPathTemplates: effectiveConfig.site.layoutsConfigPathTemplates,\n  });\n\n  const languages = getLanguages(effectiveConfig, routesMd, routesHtml, routesVideo);\n\n  const allIds = new Set<number>();\n  routesMd.forEach((r) => allIds.add(r.id));\n  routesHtml.forEach((r) => allIds.add(r.id));\n  routesVideo.forEach((r) => allIds.add(r.id));\n  const sortedIds = Array.from(allIds).sort((a, b) => a - b);\n\n  const { pages, pathToPageMap } = await loadPages({\n    sortedIds,\n    routesMd,\n    routesHtml,\n    routesVideo,\n    languages,\n    source,\n    owner,\n    repo,\n  });\n\n  const docs = pages\n    .filter((p) => p.md)\n    .map((p) => ({\n      routeId: p.id,\n      markdownByLanguage: p.md!.markdownByLanguage,\n    }));\n\n  return {\n    config: effectiveConfig,\n    docs,\n    pages,\n    pathToPageMap,\n    showRepositorySearchHome,\n    availableVersions,\n    activeVersionId,\n    activeVersion,\n    activeRepository: {\n      owner,\n      repo,\n      requested: isRepositoryRouteRequest,\n      hasGitPageDocs,\n      source,\n    },\n    availableLanguages: languages,\n    layoutsConfig,\n    themes,\n  };\n}\n","src/entities/docs/api/load-remote-docs-data-client.ts":"import { marked } from \"marked\";\nimport { buildFallbackLayoutsAndThemes } from \"@/entities/docs/lib/fallback-layouts\";\nimport { buildGithubRawCandidates, ensureTrailingSlash, toRawGithubUrl } from \"@/entities/docs/lib/remote/github-url\";\nimport type {\n  GitPageDocsConfig,\n  HeaderMenuItem,\n  LanguageCode,\n  LayoutItem,\n  LayoutsConfig,\n  LoadedDocsData,\n  LoadedPage,\n  PathToPageEntry,\n  RouteConfig,\n  ThemeTemplate,\n  VersionEntry,\n} from \"@/entities/docs/model/types\";\n\ntype VersionConfig = {\n  routes?: RouteConfig[];\n  \"menus-header\"?: HeaderMenuItem[];\n  \"routes-md\"?: RouteConfig[];\n  \"menus-header-md\"?: HeaderMenuItem[];\n};\nexport type SupportedLanguage = \"en\" | \"pt\" | \"es\";\n\nconst REQUEST_TIMEOUT_MS = 12000;\nconst DEFAULT_LAYOUTS_PATH = \"gitpagedocs/layouts/layoutsConfig.json\";\nconst DEFAULT_TEMPLATES_BASE_PATH = \"gitpagedocs/layouts/\";\nconst OFFICIAL_LAYOUTS_CONFIG_URL =\n  \"https://github.com/Vidigal-code/git-page-docs/blob/main/gitpagedocs/layouts/layoutsConfig.json\";\nconst OFFICIAL_LAYOUTS_TEMPLATES_URL =\n  \"https://github.com/Vidigal-code/git-page-docs/blob/main/gitpagedocs/layouts/templates\";\nexport async function loadStandaloneLayoutsAndThemes(): Promise<{\n  layoutsConfig: LayoutsConfig;\n  themes: Record<string, ThemeTemplate>;\n}> {\n  try {\n    const rawLayoutsUrl = toRawGithubUrl(OFFICIAL_LAYOUTS_CONFIG_URL);\n    const layoutsConfig = await fetchUrlJson<LayoutsConfig>(rawLayoutsUrl);\n    if (!layoutsConfig?.layouts?.length) {\n      return buildFallbackLayoutsAndThemes();\n    }\n    const layoutsToLoad = layoutsConfig.layouts;\n    const templatesBaseUrl = ensureTrailingSlash(\n      rawLayoutsUrl.slice(0, rawLayoutsUrl.lastIndexOf(\"/\") + 1) + \"templates/\",\n    );\n    const themes: Record<string, ThemeTemplate> = {};\n    const results = await Promise.allSettled(\n      layoutsToLoad.map(async (layout: LayoutItem) => {\n        const templateUrl = buildRemoteTemplateUrl(layout.file, templatesBaseUrl);\n        const template = await fetchUrlJson<ThemeTemplate>(templateUrl);\n        return { layout, template };\n      }),\n    );\n    for (const result of results) {\n      if (result.status === \"fulfilled\" && result.value.template) {\n        themes[result.value.layout.id] = result.value.template;\n      }\n    }\n    if (Object.keys(themes).length === 0) {\n      return buildFallbackLayoutsAndThemes();\n    }\n    return {\n      layoutsConfig: { layouts: layoutsToLoad },\n      themes,\n    };\n  } catch {\n    return buildFallbackLayoutsAndThemes();\n  }\n}\n\nexport interface OfficialSiteConfig {\n  SiteHeaderName?: string;\n  SiteIconPath?: string;\n  name?: string;\n  IconImageMenuHeaderImgWidth?: string | number;\n  IconImageMenuHeaderImgHeight?: string | number;\n  IconImageMenuHeaderLightImg?: string;\n  IconImageMenuHeaderDarkImg?: string;\n  IconImageMenuHeaderLight?: string;\n  IconImageMenuHeaderDark?: string;\n  IconImageMenuHeader?: string;\n  IconImageMenuHeaderReactIcones?: boolean;\n  IconImageMenuHeaderReactIconesTag?: string;\n  IconImageMenuHeaderReactIconesTagColorDark?: string;\n  IconImageMenuHeaderReactIconesTagColorLight?: string;\n  IconImageMenuHeaderReactIconesTagSize?: string;\n  langmenu?: Record<string, Record<string, string>>;\n}\n\nexport async function fetchOfficialSiteConfig(): Promise<OfficialSiteConfig | null> {\n  const config = await fetchRepoJson<{ site?: OfficialSiteConfig }>(\n    \"Vidigal-code\",\n    \"git-page-docs\",\n    \"gitpagedocs/config.json\",\n  );\n  return config?.site ?? null;\n}\n\nexport function parseSupportedLanguage(input: string | null | undefined): SupportedLanguage {\n  if (input === \"pt\" || input === \"es\" || input === \"en\") {\n    return input;\n  }\n  return \"en\";\n}\n\nfunction stripFrontMatter(markdown: string): string {\n  return markdown.replace(/^---\\r?\\n[\\s\\S]*?\\r?\\n---\\r?\\n/, \"\");\n}\n\nasync function tryFetchText(url: string): Promise<string | null> {\n  const controller = new AbortController();\n  const timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);\n  try {\n    const response = await fetch(url, { cache: \"no-store\", signal: controller.signal });\n    if (!response.ok) {\n      return null;\n    }\n    return await response.text();\n  } catch {\n    return null;\n  } finally {\n    clearTimeout(timer);\n  }\n}\n\nasync function fetchRepoText(owner: string, repo: string, relativePath: string): Promise<string | null> {\n  const candidates = buildGithubRawCandidates(owner, repo, relativePath);\n  for (const candidate of candidates) {\n    const content = await tryFetchText(candidate);\n    if (content !== null) {\n      return content;\n    }\n  }\n  return null;\n}\n\nasync function fetchUrlText(url: string): Promise<string | null> {\n  return tryFetchText(toRawGithubUrl(url));\n}\n\nasync function fetchRepoJson<T>(owner: string, repo: string, relativePath: string): Promise<T | null> {\n  const text = await fetchRepoText(owner, repo, relativePath);\n  if (!text) {\n    return null;\n  }\n  try {\n    return JSON.parse(text) as T;\n  } catch {\n    return null;\n  }\n}\n\nasync function fetchUrlJson<T>(url: string): Promise<T | null> {\n  const text = await fetchUrlText(url);\n  if (!text) {\n    return null;\n  }\n  try {\n    return JSON.parse(text) as T;\n  } catch {\n    return null;\n  }\n}\n\nfunction getAvailableLanguages(\n  routes: Array<{ path?: Record<LanguageCode, string> }>,\n  fallbackLanguage: LanguageCode,\n): LanguageCode[] {\n  const firstWithPath = routes.find((r) => r.path && Object.keys(r.path).length > 0);\n  if (!firstWithPath?.path) {\n    return [fallbackLanguage];\n  }\n  return Object.keys(firstWithPath.path);\n}\n\nfunction resolveActiveVersion(\n  versions: VersionEntry[],\n  selectedVersionId: string | undefined,\n  defaultVersionId: string | undefined,\n): VersionEntry | undefined {\n  if (!versions.length) {\n    return undefined;\n  }\n  if (selectedVersionId) {\n    const selected = versions.find((version) => version.id === selectedVersionId);\n    if (selected) {\n      return selected;\n    }\n  }\n  if (defaultVersionId) {\n    const preferred = versions.find((version) => version.id === defaultVersionId);\n    if (preferred) {\n      return preferred;\n    }\n  }\n  return versions[0];\n}\n\nasync function loadVersionConfig(owner: string, repo: string, versionEntry: VersionEntry): Promise<VersionConfig | null> {\n  const versionPath = versionEntry.PathConfig || versionEntry.path;\n  if (!versionPath) {\n    return null;\n  }\n\n  if (/^https?:\\/\\//i.test(versionPath)) {\n    return await fetchUrlJson<VersionConfig>(versionPath);\n  }\n\n  const normalizedPathCandidates = Array.from(\n    new Set([versionPath, versionPath.replace(/^gitpagedocs\\//, \"\"), versionPath.startsWith(\"docs/\") ? `gitpagedocs/${versionPath}` : versionPath]),\n  );\n  for (const pathCandidate of normalizedPathCandidates) {\n    const candidateConfig = await fetchRepoJson<VersionConfig>(owner, repo, pathCandidate);\n    if (candidateConfig) {\n      return candidateConfig;\n    }\n  }\n\n  return null;\n}\n\nfunction deriveRemoteTemplatesBaseUrl(\n  layoutsConfigPath: string | undefined,\n  templatesPathOverride: string | undefined,\n  owner: string,\n  repo: string,\n): string {\n  if (templatesPathOverride) {\n    return ensureTrailingSlash(toRawGithubUrl(templatesPathOverride));\n  }\n  if (layoutsConfigPath) {\n    const rawUrl = toRawGithubUrl(layoutsConfigPath);\n    return ensureTrailingSlash(rawUrl.slice(0, rawUrl.lastIndexOf(\"/\") + 1));\n  }\n  return ensureTrailingSlash(`https://raw.githubusercontent.com/${owner}/${repo}/HEAD/${DEFAULT_TEMPLATES_BASE_PATH}`);\n}\n\nfunction buildRemoteTemplateUrl(layoutFile: string, remoteTemplatesBaseUrl: string): string {\n  const normalizedBase = ensureTrailingSlash(remoteTemplatesBaseUrl);\n  const basePath = new URL(normalizedBase).pathname;\n  const baseEndsWithTemplates = /\\/templates\\/$/i.test(basePath);\n  const normalizedFile = layoutFile.replace(/^\\.\\//, \"\");\n  const fileWithoutTemplatesPrefix = normalizedFile.replace(/^templates\\//i, \"\");\n  const filePath = baseEndsWithTemplates ? fileWithoutTemplatesPrefix : normalizedFile;\n  return new URL(filePath, normalizedBase).toString();\n}\n\nasync function loadLayoutsAndThemes(config: GitPageDocsConfig, owner: string, repo: string): Promise<{\n  layoutsConfig: LayoutsConfig;\n  themes: Record<string, ThemeTemplate>;\n}> {\n  const useOfficialLayouts = config.site.layoutsConfigPathOficial === true;\n  const preferredLayoutsConfigPath = useOfficialLayouts\n    ? config.site.layoutsConfigPathOficialUrl || config.site.layoutsConfigPath || OFFICIAL_LAYOUTS_CONFIG_URL\n    : config.site.layoutsConfigPath;\n  const preferredTemplatesPath = useOfficialLayouts\n    ? config.site.layoutsConfigPathTemplatesOficial || config.site.layoutsConfigPathTemplates || OFFICIAL_LAYOUTS_TEMPLATES_URL\n    : config.site.layoutsConfigPathTemplates;\n\n  let layoutsConfig: LayoutsConfig | null = null;\n  if (useOfficialLayouts) {\n    layoutsConfig = await fetchUrlJson<LayoutsConfig>(preferredLayoutsConfigPath ?? OFFICIAL_LAYOUTS_CONFIG_URL);\n  }\n  if (!layoutsConfig?.layouts?.length && !useOfficialLayouts && preferredLayoutsConfigPath) {\n    layoutsConfig = await fetchUrlJson<LayoutsConfig>(preferredLayoutsConfigPath);\n  }\n  if (!layoutsConfig?.layouts?.length) {\n    layoutsConfig = await fetchRepoJson<LayoutsConfig>(owner, repo, DEFAULT_LAYOUTS_PATH);\n  }\n  if (!layoutsConfig?.layouts?.length && useOfficialLayouts) {\n    layoutsConfig = await fetchUrlJson<LayoutsConfig>(OFFICIAL_LAYOUTS_CONFIG_URL);\n  }\n  if (!layoutsConfig?.layouts?.length) {\n    throw new Error(\"Could not load layouts configuration.\");\n  }\n\n  const remoteTemplatesBaseUrl = deriveRemoteTemplatesBaseUrl(\n    useOfficialLayouts ? preferredLayoutsConfigPath : undefined,\n    preferredTemplatesPath,\n    owner,\n    repo,\n  );\n\n  const themes: Record<string, ThemeTemplate> = {};\n  await Promise.all(\n    layoutsConfig.layouts.map(async (layout: LayoutItem) => {\n      const templateUrl = buildRemoteTemplateUrl(layout.file, remoteTemplatesBaseUrl);\n      let template = await fetchUrlJson<ThemeTemplate>(templateUrl);\n      if (!template) {\n        template = await fetchRepoJson<ThemeTemplate>(owner, repo, `gitpagedocs/layouts/${layout.file}`);\n      }\n      if (template) {\n        themes[layout.id] = template;\n      }\n    }),\n  );\n\n  return { layoutsConfig, themes };\n}\n\nexport async function checkRepositoryHasGitPageDocs(owner: string, repo: string): Promise<boolean> {\n  const candidates = [\n    `https://raw.githubusercontent.com/${owner}/${repo}/HEAD/gitpagedocs/config.json`,\n    `https://raw.githubusercontent.com/${owner}/${repo}/main/gitpagedocs/config.json`,\n    `https://raw.githubusercontent.com/${owner}/${repo}/master/gitpagedocs/config.json`,\n  ];\n\n  for (const url of candidates) {\n    try {\n      const response = await fetch(url, { cache: \"no-store\" });\n      if (!response.ok) {\n        continue;\n      }\n      const body = await response.text();\n      JSON.parse(body);\n      return true;\n    } catch {\n      // Ignore candidate errors and try the next one.\n    }\n  }\n  return false;\n}\n\nexport async function loadRemoteDocsData(\n  owner: string,\n  repo: string,\n  selectedVersionId?: string,\n  selectedLanguage: SupportedLanguage = \"en\",\n): Promise<LoadedDocsData | null> {\n  const config = await fetchRepoJson<GitPageDocsConfig>(owner, repo, \"gitpagedocs/config.json\");\n  if (!config) {\n    return null;\n  }\n\n  const versions = config.VersionControl?.versions ?? [];\n  const activeVersion = resolveActiveVersion(versions, selectedVersionId, config.site.docsVersion);\n  const activeVersionId = activeVersion?.id;\n\n  let routes = config[\"routes-md\"] ?? config.routes ?? [];\n  let menusHeader = config[\"menus-header-md\"] ?? config[\"menus-header\"] ?? [];\n  if (activeVersion) {\n    const versionConfig = await loadVersionConfig(owner, repo, activeVersion);\n    if (versionConfig?.[\"routes-md\"]?.length) routes = versionConfig[\"routes-md\"];\n    else if (versionConfig?.routes?.length) routes = versionConfig.routes;\n    if (versionConfig?.[\"menus-header-md\"]?.length) menusHeader = versionConfig[\"menus-header-md\"];\n    else if (versionConfig?.[\"menus-header\"]?.length) menusHeader = versionConfig[\"menus-header\"];\n  }\n\n  const routesWithPath = routes.filter((r): r is RouteConfig => Boolean(r.path && Object.keys(r.path).length > 0));\n  const availableLanguages = getAvailableLanguages(routes, config.site.defaultLanguage);\n  const preferredLanguage = availableLanguages.includes(selectedLanguage)\n    ? selectedLanguage\n    : availableLanguages.includes(config.site.defaultLanguage)\n      ? config.site.defaultLanguage\n      : availableLanguages[0] ?? \"en\";\n\n  const routesForConfig: RouteConfig[] = routesWithPath.map((r) => ({ id: r.id, path: r.path }));\n\n  const effectiveConfig: GitPageDocsConfig = {\n    ...config,\n    site: {\n      ...config.site,\n      defaultLanguage: preferredLanguage,\n    },\n    routes: routesForConfig,\n    \"menus-header\": menusHeader,\n  };\n\n  const docs = await Promise.all(\n    routesWithPath.map(async (route) => {\n      const markdownByLanguage: Record<LanguageCode, string> = {};\n      await Promise.all(\n        availableLanguages.map(async (langCode) => {\n          const markdownPath = route.path![langCode];\n          if (!markdownPath) {\n            markdownByLanguage[langCode] = \"<p>Missing language file path in config.</p>\";\n            return;\n          }\n          const markdown = await fetchRepoText(owner, repo, markdownPath);\n          markdownByLanguage[langCode] = markdown\n            ? (marked.parse(stripFrontMatter(markdown)) as string)\n            : \"<p>Unable to load remote markdown file.</p>\";\n        }),\n      );\n      return {\n        routeId: route.id,\n        markdownByLanguage,\n      };\n    }),\n  );\n\n  const pathToPageMap: Record<string, PathToPageEntry> = {};\n  const pages: LoadedPage[] = docs.map((doc, idx) => {\n    const route = routesWithPath[idx];\n    availableLanguages.forEach((lang) => {\n      const pathVal = route.path[lang];\n      if (pathVal) pathToPageMap[pathVal] = { pageIndex: idx, contentType: \"md\" };\n    });\n    return {\n      id: route.id,\n      md: { routeId: route.id, config: route, markdownByLanguage: doc.markdownByLanguage, fullscreenEnabled: true },\n    };\n  });\n\n  let layoutsConfig: LayoutsConfig;\n  let themes: Record<string, ThemeTemplate>;\n  try {\n    const loadedLayouts = await loadLayoutsAndThemes(effectiveConfig, owner, repo);\n    layoutsConfig = loadedLayouts.layoutsConfig;\n    themes = loadedLayouts.themes;\n  } catch {\n    const fallback = buildFallbackLayoutsAndThemes();\n    layoutsConfig = fallback.layoutsConfig;\n    themes = fallback.themes;\n  }\n\n  return {\n    config: effectiveConfig,\n    docs,\n    pages,\n    pathToPageMap,\n    showRepositorySearchHome: false,\n    availableVersions: versions,\n    activeVersionId,\n    activeVersion,\n    activeRepository: {\n      owner,\n      repo,\n      requested: true,\n      hasGitPageDocs: true,\n      source: \"remote\",\n    },\n    availableLanguages,\n    layoutsConfig,\n    themes,\n  };\n}\n","src/entities/docs/api/utils/markdown.ts":"import matter from \"gray-matter\";\nimport { marked } from \"marked\";\n\nfunction slugify(text: string): string {\n  return text\n    .toLowerCase()\n    .replace(/[^\\w\\s-]/g, \"\")\n    .replace(/\\s+/g, \"-\")\n    .replace(/-+/g, \"-\")\n    .trim() || \"heading\";\n}\n\n/** Adds id attributes to h1-h6 that lack them, for TOC anchor links */\nfunction addHeadingIds(html: string): string {\n  return html.replace(\n    /<h([1-6])([^>]*)>([^<]*)<\\/h[1-6]>/gi,\n    (_, level, attrs, content) => {\n      if (/id=/.test(attrs)) return `<h${level}${attrs}>${content}</h${level}>`;\n      const id = slugify(content);\n      const idAttr = id ? ` id=\"${id}\"` : \"\";\n      return `<h${level}${attrs}${idAttr}>${content}</h${level}>`;\n    }\n  );\n}\n\nexport function markdownToHtml(markdown: string): string {\n  const parsed = matter(markdown);\n  const html = marked.parse(parsed.content) as string;\n  return addHeadingIds(html);\n}\n","src/entities/docs/api/utils/route-utils.ts":"import type { ContentTypeRouteConfig, GitPageDocsConfig, RouteConfig } from \"@/entities/docs/model/types\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\n\nexport function hasPath(route: ContentTypeRouteConfig | RouteConfig): route is ContentTypeRouteConfig & { path: Record<LanguageCode, string> } {\n  return \"path\" in route && typeof (route as ContentTypeRouteConfig).path === \"object\";\n}\n\nexport function hasVideo(route: ContentTypeRouteConfig): route is ContentTypeRouteConfig & { video: NonNullable<ContentTypeRouteConfig[\"video\"]> } {\n  return Boolean(route.video?.pathVideo && route.video?.videoType);\n}\n\nexport function getLanguagesFromPathRecord(pathRecord: Record<string, string> | undefined): LanguageCode[] {\n  if (!pathRecord || typeof pathRecord !== \"object\") return [];\n  return Object.keys(pathRecord);\n}\n\nexport function getLanguages(\n  config: GitPageDocsConfig,\n  routesMd: (ContentTypeRouteConfig | RouteConfig)[],\n  routesHtml: ContentTypeRouteConfig[],\n  routesVideo: ContentTypeRouteConfig[],\n): LanguageCode[] {\n  const firstMd = routesMd[0];\n  const firstHtml = routesHtml[0];\n  const firstVideo = routesVideo[0];\n  if (firstMd && hasPath(firstMd)) return getLanguagesFromPathRecord(firstMd.path);\n  if (firstHtml?.path) return getLanguagesFromPathRecord(firstHtml.path);\n  if (firstVideo?.video?.pathVideo) return getLanguagesFromPathRecord(firstVideo.video.pathVideo);\n  if (config.routes?.[0]?.path) return getLanguagesFromPathRecord(config.routes[0].path);\n  return [config.site.defaultLanguage];\n}\n","src/entities/docs/api/utils/url-utils.ts":"export function parseOwnerRepoFromRenderingUrl(rendering: string): { owner?: string; repo?: string } {\n  try {\n    const parsed = new URL(rendering);\n    const parts = parsed.pathname.split(\"/\").filter(Boolean);\n    if (parts.length >= 2) {\n      return { owner: parts[0], repo: parts[1] };\n    }\n  } catch {\n    return {};\n  }\n  return {};\n}\n","src/entities/docs/api/version/resolve-version.ts":"import type { ContentTypeRouteConfig, GitPageDocsConfig, HierarchyConfig, RouteConfig, VersionEntry } from \"@/entities/docs/model/types\";\nimport { readRemoteJson, readRemoteJsonFromRepo } from \"../io/remote-fetcher\";\nimport { tryReadJsonFile } from \"../io/file-reader\";\n\nexport interface VersionRoutesConfig {\n  routes?: RouteConfig[];\n  \"menus-header\"?: GitPageDocsConfig[\"menus-header\"];\n  \"routes-md\"?: ContentTypeRouteConfig[] | RouteConfig[];\n  \"routes-html\"?: ContentTypeRouteConfig[];\n  \"routes-video\"?: ContentTypeRouteConfig[];\n  \"menus-header-md\"?: GitPageDocsConfig[\"menus-header\"];\n  \"menus-header-html\"?: GitPageDocsConfig[\"menus-header\"];\n  \"menus-header-video\"?: GitPageDocsConfig[\"menus-header\"];\n  hierarchyPage?: HierarchyConfig;\n  hierarchyMenu?: HierarchyConfig;\n}\n\nexport function resolveActiveVersionId(\n  versions: VersionEntry[],\n  selectedVersionId: string | undefined,\n  defaultVersionId: string | undefined,\n): string | undefined {\n  if (!versions.length) {\n    return undefined;\n  }\n\n  if (selectedVersionId && versions.some((version) => version.id === selectedVersionId)) {\n    return selectedVersionId;\n  }\n\n  if (defaultVersionId && versions.some((version) => version.id === defaultVersionId)) {\n    return defaultVersionId;\n  }\n\n  return versions[0]?.id;\n}\n\nexport async function loadVersionConfig(options: {\n  versionEntry: VersionEntry;\n  source: \"local\" | \"remote\";\n  owner?: string;\n  repo?: string;\n}): Promise<VersionRoutesConfig | undefined> {\n  const versionPath = options.versionEntry.PathConfig || options.versionEntry.path;\n  if (!versionPath) {\n    return undefined;\n  }\n\n  let versionConfig: VersionRoutesConfig | null = null;\n  const normalizedPathCandidates = Array.from(\n    new Set([\n      versionPath,\n      versionPath.replace(/^gitpagedocs\\//, \"\"),\n      versionPath.startsWith(\"docs/\") ? `gitpagedocs/${versionPath}` : versionPath,\n    ]),\n  );\n\n  if (/^https?:\\/\\//i.test(versionPath)) {\n    versionConfig = await readRemoteJson<VersionRoutesConfig>(versionPath);\n  } else if (options.source === \"remote\" && options.owner && options.repo) {\n    for (const candidate of normalizedPathCandidates) {\n      versionConfig = await readRemoteJsonFromRepo<VersionRoutesConfig>(options.owner, options.repo, candidate);\n      if (versionConfig) {\n        break;\n      }\n    }\n  } else {\n    for (const candidate of normalizedPathCandidates) {\n      versionConfig = await tryReadJsonFile<VersionRoutesConfig>(candidate);\n      if (versionConfig) {\n        break;\n      }\n    }\n  }\n\n  const hasAnyRoutes =\n    (versionConfig?.routes?.length ?? 0) > 0 ||\n    (versionConfig?.[\"routes-md\"]?.length ?? 0) > 0 ||\n    (versionConfig?.[\"routes-html\"]?.length ?? 0) > 0 ||\n    (versionConfig?.[\"routes-video\"]?.length ?? 0) > 0;\n  const hasAnyMenus =\n    (versionConfig?.[\"menus-header\"]?.length ?? 0) > 0 ||\n    (versionConfig?.[\"menus-header-md\"]?.length ?? 0) > 0 ||\n    (versionConfig?.[\"menus-header-html\"]?.length ?? 0) > 0 ||\n    (versionConfig?.[\"menus-header-video\"]?.length ?? 0) > 0;\n  if ((hasAnyRoutes || hasAnyMenus) && versionConfig) {\n    return versionConfig;\n  }\n\n  return undefined;\n}\n","src/entities/docs/index.ts":"export { loadDocsData } from \"./api/load-docs-data\";\nexport { buildFooterConfigFromData } from \"./lib/footer/build-footer-config\";\nexport type * from \"./model/types\";\n","src/entities/docs/lib/fallback-layouts.ts":"import type { LayoutItem, LayoutsConfig, ThemeTemplate } from \"@/entities/docs/model/types\";\n\nconst FALLBACK_LAYOUT_ID = \"gitpagedocs-fallback-dark\";\n\nexport function buildFallbackLayoutsAndThemes(): {\n  layoutsConfig: LayoutsConfig;\n  themes: Record<string, ThemeTemplate>;\n} {\n  const fallbackLayout: LayoutItem = {\n
