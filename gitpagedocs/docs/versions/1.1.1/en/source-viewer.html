    <DocsShellControls {...controls} />\n        </div>\n      </aside>\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-quick-nav-overlay.tsx":"import { FiX } from \"react-icons/fi\";\nimport type { MenuEntry } from \"../model/menu-tree\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellQuickNavOverlayProps {\n  isOpen: boolean;\n  quickNavPlaceholder: string;\n  menuCloseLabel: string;\n  quickNavQuery: string;\n  filteredQuickNavEntries: MenuEntry[];\n  quickNavActiveIndex: number;\n  navigateHintLabel: string;\n  selectHintLabel: string;\n  escHintLabel: string;\n  closeHintLabel: string;\n  noNavigationResults: string;\n  quickNavListRef: React.RefObject<HTMLDivElement | null>;\n  quickNavItemRefs: React.RefObject<Array<HTMLButtonElement | null>>;\n  onClose: () => void;\n  onQueryChange: (value: string) => void;\n  onActiveIndexChange: (nextIndex: number | ((prev: number) => number)) => void;\n  onMenuClick: (pathClick: string, ancestorKeys: string[]) => void;\n}\n\nexport function DocsShellQuickNavOverlay({\n  isOpen,\n  quickNavPlaceholder,\n  menuCloseLabel,\n  quickNavQuery,\n  filteredQuickNavEntries,\n  quickNavActiveIndex,\n  navigateHintLabel,\n  selectHintLabel,\n  escHintLabel,\n  closeHintLabel,\n  noNavigationResults,\n  quickNavListRef,\n  quickNavItemRefs,\n  onClose,\n  onQueryChange,\n  onActiveIndexChange,\n  onMenuClick,\n}: DocsShellQuickNavOverlayProps) {\n  if (!isOpen) {\n    return null;\n  }\n  return (\n    <div className={styles.quickNavOverlay} onClick={onClose}>\n      <div className={styles.quickNavCard} onClick={(event) => event.stopPropagation()}>\n        <div className={styles.quickNavHeader}>\n          <span className={styles.quickNavHeaderTitle}>{quickNavPlaceholder}</span>\n          <button className={`${styles.button} ${styles.quickNavCloseButton}`} onClick={onClose} aria-label={menuCloseLabel} title={menuCloseLabel}>\n            <FiX aria-hidden />\n          </button>\n        </div>\n        <input\n          className={styles.quickNavInput}\n          placeholder={quickNavPlaceholder}\n          autoFocus\n          value={quickNavQuery}\n          onChange={(event) => {\n            onQueryChange(event.target.value);\n            onActiveIndexChange(0);\n          }}\n          onKeyDown={(event) => {\n            if (!filteredQuickNavEntries.length) {\n              if (event.key === \"Escape\") {\n                event.preventDefault();\n                onClose();\n              }\n              return;\n            }\n            if (event.key === \"ArrowDown\") {\n              event.preventDefault();\n              onActiveIndexChange((prev) => Math.min(prev + 1, filteredQuickNavEntries.length - 1));\n            } else if (event.key === \"ArrowUp\") {\n              event.preventDefault();\n              onActiveIndexChange((prev) => Math.max(prev - 1, 0));\n            } else if (event.key === \"Enter\") {\n              event.preventDefault();\n              const selectedEntry = filteredQuickNavEntries[quickNavActiveIndex];\n              if (selectedEntry) {\n                onMenuClick(selectedEntry.pathClick, selectedEntry.ancestorKeys);\n              }\n            } else if (event.key === \"Escape\") {\n              event.preventDefault();\n              onClose();\n            }\n          }}\n        />\n        <div className={styles.quickNavList} ref={quickNavListRef}>\n          {filteredQuickNavEntries.map((entry, index) => (\n            <button\n              key={`quick-${entry.key}`}\n              ref={(element) => {\n                quickNavItemRefs.current[index] = element;\n              }}\n              className={`${styles.menuButton} ${index === quickNavActiveIndex ? styles.quickNavItemActive : \"\"}`}\n              onClick={() => onMenuClick(entry.pathClick, entry.ancestorKeys)}\n              onMouseEnter={() => onActiveIndexChange(index)}\n            >\n              {entry.searchLabel}\n            </button>\n          ))}\n          {!filteredQuickNavEntries.length && <p className={styles.repoInfo}>{noNavigationResults}</p>}\n        </div>\n        <div className={styles.quickNavFooter}>\n          <span>↓ ↑ {navigateHintLabel}</span>\n          <span>↵ {selectHintLabel}</span>\n          <span>{escHintLabel} {closeHintLabel}</span>\n        </div>\n      </div>\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-sidebar.tsx":"import Image from \"next/image\";\nimport { BsMoonStarsFill, BsSunFill } from \"react-icons/bs\";\nimport { ReactIconByTag } from \"@/shared/ui/react-icon-by-tag\";\nimport type { MenuNode } from \"../model/menu-tree\";\nimport { DocsShellMenuTree } from \"./docs-shell-menu-tree\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellSidebarProps {\n  siteName: string;\n  useReactHeaderIcon: boolean;\n  reactHeaderIconTag: string | undefined;\n  headerReactIconStyle: React.CSSProperties;\n  activeLayoutMode: \"dark\" | \"light\" | undefined;\n  iconImage: string | undefined;\n  iconImgWidth: number;\n  iconImgHeight: number;\n  menuNodes: MenuNode[];\n  menuCloseLabel: string;\n  onMenuClick: (pathClick: string, ancestorKeys: string[]) => void;\n  onToggleNode: (nodeKey: string) => void;\n  isNodeExpanded: (nodeKey: string) => boolean;\n  onCollapseSidebar: () => void;\n}\n\nexport function DocsShellSidebar({\n  siteName,\n  useReactHeaderIcon,\n  reactHeaderIconTag,\n  headerReactIconStyle,\n  activeLayoutMode,\n  iconImage,\n  iconImgWidth,\n  iconImgHeight,\n  menuNodes,\n  menuCloseLabel,\n  onMenuClick,\n  onToggleNode,\n  isNodeExpanded,\n  onCollapseSidebar,\n}: DocsShellSidebarProps) {\n  return (\n    <aside className={styles.sidebar}>\n      <div className={styles.brand}>\n        {useReactHeaderIcon ? (\n          <span className={styles.brandReactIcon} style={headerReactIconStyle}>\n            <ReactIconByTag tag={reactHeaderIconTag} fallback={activeLayoutMode === \"dark\" ? <BsMoonStarsFill aria-hidden /> : <BsSunFill aria-hidden />} />\n          </span>\n        ) : iconImage ? (\n          <Image src={iconImage} alt={siteName} width={iconImgWidth} height={iconImgHeight} className={styles.brandIcon} unoptimized />\n        ) : null}\n        <span>{siteName}</span>\n      </div>\n      <nav className={styles.menuList}>\n        <DocsShellMenuTree\n          nodes={menuNodes}\n          keyPrefix=\"desktop\"\n          onMenuClick={onMenuClick}\n          onToggleNode={onToggleNode}\n          isNodeExpanded={isNodeExpanded}\n        />\n      </nav>\n      <div className={styles.sidebarFooter}>\n        <button className={`${styles.button} ${styles.sidebarRailButton}`} onClick={onCollapseSidebar} aria-label={menuCloseLabel} title={menuCloseLabel}>\n          ❮❮\n        </button>\n      </div>\n    </aside>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-version-links-overlay.tsx":"import { FiX } from \"react-icons/fi\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface VersionLinkOption {\n  id: \"branch\" | \"release\" | \"commit\";\n  label: string;\n  url: string;\n}\n\ninterface DocsShellVersionLinksOverlayProps {\n  isOpen: boolean;\n  versionLinksLabel: string;\n  menuCloseLabel: string;\n  options: VersionLinkOption[];\n  onClose: () => void;\n  onOpenVersionLink: (url: string) => void;\n}\n\nexport function DocsShellVersionLinksOverlay({\n  isOpen,\n  versionLinksLabel,\n  menuCloseLabel,\n  options,\n  onClose,\n  onOpenVersionLink,\n}: DocsShellVersionLinksOverlayProps) {\n  if (!isOpen || !options.length) {\n    return null;\n  }\n  return (\n    <div className={styles.versionLinksOverlay} onClick={onClose}>\n      <div className={styles.versionLinksCard} onClick={(event) => event.stopPropagation()}>\n        <div className={styles.versionLinksHeader}>\n          <strong>{versionLinksLabel}</strong>\n          <button className={`${styles.button} ${styles.versionLinksCloseButton}`} onClick={onClose} aria-label={menuCloseLabel} title={menuCloseLabel}>\n            <FiX aria-hidden />\n          </button>\n        </div>\n        <div className={styles.versionLinksList}>\n          {options.map((option) => (\n            <button\n              key={`version-link-${option.id}`}\n              className={styles.button}\n              onClick={() => {\n                onOpenVersionLink(option.url);\n                onClose();\n              }}\n            >\n              {option.label}\n            </button>\n          ))}\n        </div>\n      </div>\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/page-content-area.tsx":"\"use client\";\n\nimport type {\n  ContentTypeRouteConfig,\n  LanguageCode,\n  LoadedDocsData,\n  LoadedHtmlContent,\n  LoadedMdContent,\n  LoadedPage,\n  LoadedVideoContent,\n  RouteConfig,\n} from \"@/entities/docs/model/types\";\nimport { getLangMenuLabelFromMenu } from \"@/entities/docs/lib/i18n/lang-menu\";\nimport type { BrowseItem } from \"@/widgets/docs-shell/model/use-docs-shell-navigation-state\";\nimport type { BreadcrumbItem } from \"@/widgets/docs-shell/model/menu-tree\";\nimport type { ResolvedRouteGuideIconConfig } from \"@/shared/lib/resolve-site-assets\";\nimport { HtmlContainer, MdContainer, VideoContainer } from \"./content-type-containers\";\nimport styles from \"../docs-shell.module.css\";\n\nfunction isBrowseAllEnabled(config: ContentTypeRouteConfig | RouteConfig | undefined): boolean {\n  return Boolean(config && \"browseAll\" in config && config.browseAll === true);\n}\n\nfunction shouldShowBrowseNav(browseAllEnabled: boolean, itemsCount: number): boolean {\n  return browseAllEnabled && itemsCount > 1;\n}\n\ninterface PageContentAreaProps {\n  currentPage: LoadedPage | undefined;\n  data: LoadedDocsData;\n  language: LanguageCode;\n  isDarkMode?: boolean;\n  fullscreenCloseLabel: string;\n  fullscreenExpandLabel: string;\n  previousLabel: string;\n  nextLabel: string;\n  browsePrevLabel?: string;\n  browseNextLabel?: string;\n  mdBrowseIndex: number;\n  htmlBrowseIndex: number;\n  videoBrowseIndex: number;\n  setMdBrowseIndex: (v: number | ((p: number) => number)) => void;\n  setHtmlBrowseIndex: (v: number | ((p: number) => number)) => void;\n  setVideoBrowseIndex: (v: number | ((p: number) => number)) => void;\n  mdItems: BrowseItem<LoadedMdContent>[];\n  htmlItems: BrowseItem<LoadedHtmlContent>[];\n  videoItems: BrowseItem<LoadedVideoContent>[];\n  routeGuideEnabled?: boolean;\n  breadcrumbTrail?: BreadcrumbItem[];\n  onMenuClick?: (pathClick: string, ancestorKeys: string[]) => void;\n  homePathClick?: string;\n  homeAncestorKeys?: string[];\n  routeGuideIconConfig?: ResolvedRouteGuideIconConfig;\n}\n\nexport function PageContentArea({\n  currentPage,\n  data,\n  language,\n  isDarkMode = false,\n  fullscreenCloseLabel,\n  fullscreenExpandLabel,\n  previousLabel,\n  nextLabel,\n  browsePrevLabel,\n  browseNextLabel,\n  mdBrowseIndex,\n  htmlBrowseIndex,\n  videoBrowseIndex,\n  setMdBrowseIndex,\n  setHtmlBrowseIndex,\n  setVideoBrowseIndex,\n  mdItems,\n  htmlItems,\n  videoItems,\n  routeGuideEnabled = false,\n  breadcrumbTrail = [],\n  onMenuClick,\n  homePathClick,\n  homeAncestorKeys = [],\n  routeGuideIconConfig,\n}: PageContentAreaProps) {\n  if (!currentPage) {\n    const fallbackHtml = data.docs?.[0]?.markdownByLanguage[language] ?? \"<p>Document not found.</p>\";\n    return (\n      <article className={styles.card}>\n        <div className={styles.markdown} dangerouslySetInnerHTML={{ __html: fallbackHtml }} />\n      </article>\n    );\n  }\n\n  const hierarchy = data.config.hierarchyPage ?? { md: 0, html: 1, video: 2 };\n  const types = ([\"md\", \"html\", \"video\"] as const)\n    .filter((t) => currentPage[t])\n    .sort((a, b) => (hierarchy[a] ?? 999) - (hierarchy[b] ?? 999));\n\n  const mdConfig = currentPage.md?.config;\n  const htmlConfig = currentPage.html?.config;\n  const videoConfig = currentPage.video?.config;\n  const mdBrowseAll = isBrowseAllEnabled(mdConfig);\n  const htmlBrowseAll = isBrowseAllEnabled(htmlConfig);\n  const videoBrowseAll = isBrowseAllEnabled(videoConfig);\n\n  const currentMd = mdBrowseAll && mdItems.length > 0\n    ? mdItems[Math.min(mdBrowseIndex, mdItems.length - 1)]?.content\n    : currentPage.md;\n  const currentHtml = htmlBrowseAll && htmlItems.length > 0\n    ? htmlItems[Math.min(htmlBrowseIndex, htmlItems.length - 1)]?.content\n    : currentPage.html;\n  const currentVideo = videoBrowseAll && videoItems.length > 0\n    ? videoItems[Math.min(videoBrowseIndex, videoItems.length - 1)]?.content\n    : currentPage.video;\n\n  const mdLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"titleHeaderMenuMd\", \"Markdown\");\n  const htmlLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"titleHeaderMenuHtml\", \"Pages\");\n  const videoLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"titleHeaderMenuVideo\", \"Video\");\n\n  const prevL = browsePrevLabel ?? previousLabel;\n  const nextL = browseNextLabel ?? nextLabel;\n  const mdBrowseNav = shouldShowBrowseNav(mdBrowseAll, mdItems.length)\n      ? {\n          onPrev: () => setMdBrowseIndex((i) => Math.max(0, i - 1)),\n          onNext: () => setMdBrowseIndex((i) => Math.min(mdItems.length - 1, i + 1)),\n          prevLabel: prevL,\n          nextLabel: nextL,\n          canPrev: mdBrowseIndex > 0,\n          canNext: mdBrowseIndex < mdItems.length - 1,\n          currentIndex: mdBrowseIndex,\n          total: mdItems.length,\n          contentTypeLabel: mdLabel,\n        }\n      : undefined;\n  const htmlBrowseNav = shouldShowBrowseNav(htmlBrowseAll, htmlItems.length)\n      ? {\n          onPrev: () => setHtmlBrowseIndex((i) => Math.max(0, i - 1)),\n          onNext: () => setHtmlBrowseIndex((i) => Math.min(htmlItems.length - 1, i + 1)),\n          prevLabel: prevL,\n          nextLabel: nextL,\n          canPrev: htmlBrowseIndex > 0,\n          canNext: htmlBrowseIndex < htmlItems.length - 1,\n          currentIndex: htmlBrowseIndex,\n          total: htmlItems.length,\n          contentTypeLabel: htmlLabel,\n        }\n      : undefined;\n  const videoBrowseNav = shouldShowBrowseNav(videoBrowseAll, videoItems.length)\n      ? {\n          onPrev: () => setVideoBrowseIndex((i) => Math.max(0, i - 1)),\n          onNext: () => setVideoBrowseIndex((i) => Math.min(videoItems.length - 1, i + 1)),\n          prevLabel: prevL,\n          nextLabel: nextL,\n          canPrev: videoBrowseIndex > 0,\n          canNext: videoBrowseIndex < videoItems.length - 1,\n          currentIndex: videoBrowseIndex,\n          total: videoItems.length,\n          contentTypeLabel: videoLabel,\n        }\n      : undefined;\n\n  return (\n    <div className={styles.contentBlocksStack}>\n      {types.map((t) => {\n        if (t === \"md\" && currentMd) {\n          return (\n            <MdContainer\n              key=\"md\"\n              html={currentMd.markdownByLanguage[language] ?? \"\"}\n              config={currentMd.config}\n              language={language}\n              isDarkMode={isDarkMode}\n              fullscreenEnabled={currentMd.fullscreenEnabled}\n              fullscreenExpandLabel={fullscreenExpandLabel}\n              fullscreenCloseLabel={fullscreenCloseLabel}\n              browseNav={mdBrowseNav}\n              routeGuideEnabled={routeGuideEnabled}\n              breadcrumbTrail={breadcrumbTrail}\n              onBreadcrumbClick={onMenuClick}\n              homePathClick={homePathClick}\n              homeAncestorKeys={homeAncestorKeys}\n              routeGuideIconConfig={routeGuideIconConfig}\n            />\n          );\n        }\n        if (t === \"html\" && currentHtml) {\n          return (\n            <HtmlContainer\n              key=\"html\"\n              html={currentHtml.htmlByLanguage[language] ?? \"\"}\n              url={currentHtml.config.url?.[language] ?? currentHtml.config.url?.en}\n              config={currentHtml.config}\n              language={language}\n              isDarkMode={isDarkMode}\n              fullscreenEnabled={currentHtml.fullscreenEnabled}\n              fullscreenExpandLabel={fullscreenExpandLabel}\n              fullscreenCloseLabel={fullscreenCloseLabel}\n              browseNav={htmlBrowseNav}\n            />\n          );\n        }\n        if (t === \"video\" && currentVideo) {\n          return (\n            <VideoContainer\n              key=\"video\"\n              videoType={currentVideo.videoTypeByLanguage[language] ?? \"youtube\"}\n              pathVideo={currentVideo.pathVideoByLanguage[language] ?? \"\"}\n              language={language}\n              config={currentVideo.config}\n              isDarkMode={isDarkMode}\n              fullscreenEnabled={currentVideo.fullscreenEnabled}\n              fullscreenExpandLabel={fullscreenExpandLabel}\n              fullscreenCloseLabel={fullscreenCloseLabel}\n              browseNav={videoBrowseNav}\n            />\n          );\n        }\n        return null;\n      })}\n    </div>\n  );\n}\n","src/widgets/not-found-shell/model/use-not-found-remote.ts":"/**\n * Re-exports from entities for the not-found page.\n * Keeps app layer from importing entities directly (FSD compliance).\n */\nexport {\n  checkRepositoryHasGitPageDocs,\n  loadRemoteDocsData,\n  parseSupportedLanguage,\n} from \"@/entities/docs/api/load-remote-docs-data-client\";\nexport type { SupportedLanguage } from \"@/entities/docs/api/load-remote-docs-data-client\";\nexport { getLanguageLabelFromMenu } from \"@/entities/docs/lib/i18n/lang-menu\";\nexport { resolveThemeByMode } from \"@/entities/docs/lib/theme/resolve-theme-by-mode\";\nexport { toSearchShellCssVars } from \"@/entities/docs/lib/theme/to-css-vars\";\nexport type { LoadedDocsData } from \"@/entities/docs/model/types\";\n","src/widgets/repository-search-shell/repository-search-shell.module.css":".page {\n  min-height: 100vh;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  padding: 20px 12px 0;\n  background:\n    radial-gradient(circle at 8% -18%, color-mix(in srgb, var(--primary) 24%, transparent), transparent 44%),\n    radial-gradient(circle at 92% -22%, color-mix(in srgb, var(--secondary) 22%, transparent), transparent 42%),\n    var(--background);\n  color: var(--text);\n}\n\n.card {\n  margin: auto;\n  width: min(820px, 100%);\n  max-width: 100%;\n  box-sizing: border-box;\n  border: 1px solid var(--card-border);\n  border-radius: 16px;\n  background:\n    linear-gradient(\n      160deg,\n      color-mix(in srgb, var(--card-background) 94%, var(--primary) 6%),\n      color-mix(in srgb, var(--card-background) 92%, var(--secondary) 8%)\n    );\n  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);\n  padding: clamp(18px, 3vw, 28px);\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n}\n\n@media (max-width: 820px) {\n  .page {\n    padding: 14px 10px 0;\n  }\n\n  .card {\n    width: 100%;\n  }\n}\n\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-size: 1rem;\n}\n\n.brandIcon {\n  width: 34px;\n  height: 34px;\n  border-radius: 8px;\n  object-fit: contain;\n}\n\n.brandReactIcon {\n  width: 34px;\n  height: 34px;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--secondary);\n  font-size: 1.25rem;\n}\n\n.title {\n  margin: 2px 0 0;\n  text-align: center;\n}\n\n.description {\n  margin: 0;\n  text-align: center;\n  color: var(--text-secondary);\n  line-height: 1.5;\n}\n\n.controls {\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: center;\n  gap: 10px;\n}\n\n.form {\n  display: grid;\n  grid-template-columns: 1fr 1fr auto;\n  gap: 10px;\n}\n\n.input,\n.select,\n.button {\n  height: 42px;\n  border-radius: 10px;\n  border: 1px solid var(--card-border);\n  background: color-mix(in srgb, var(--background) 92%, transparent);\n  color: var(--text);\n  padding: 0 12px;\n  font-weight: 600;\n}\n\n.select {\n  min-width: min(240px, 100%);\n}\n\n.button {\n  min-width: 120px;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  cursor: pointer;\n}\n\n.input::placeholder {\n  color: var(--text-secondary);\n}\n\n.input:focus,\n.select:focus,\n.button:focus {\n  outline: 2px solid color-mix(in srgb, var(--primary) 55%, white 45%);\n  outline-offset: 1px;\n}\n\n@media (max-width: 760px) {\n  .page {\n    padding: 14px 10px 0;\n  }\n\n  .form {\n    grid-template-columns: 1fr;\n  }\n\n  .button {\n    width: 100%;\n  }\n}\n\n@media (max-width: 640px) {\n  .page {\n    padding: 10px 8px 0;\n  }\n\n  .card {\n    padding: clamp(14px, 2.5vw, 20px);\n  }\n}\n","src/widgets/repository-search-shell/repository-search-shell.tsx":"\"use client\";\n\nimport { useEffect, useMemo, useState } from \"react\";\nimport { useRouter } from \"next/navigation\";\nimport { getLanguageLabelFromMenu, getLangMenuLabelFromMenu } from \"@/entities/docs/lib/i18n/lang-menu\";\nimport { toSearchShellCssVars } from \"@/entities/docs/lib/theme/to-css-vars\";\nimport type { LanguageCode, LoadedDocsData } from \"@/entities/docs/model/types\";\nimport { RepositorySearchForm } from \"@/features/repository-search-form\";\nimport { SearchShellHeader } from \"@/widgets/search-shell-header/ui/search-shell-header\";\nimport { useStandaloneShellPreferences } from \"@/widgets/search-shell-header/model/use-standalone-shell-preferences\";\nimport { buildFooterConfigFromData } from \"@/entities/docs/lib/footer/build-footer-config\";\nimport { SearchShellLayout } from \"@/widgets/search-shell-layout/search-shell-layout\";\nimport { PROJECT_FOOTER_URL } from \"@/shared/config/constants\";\nimport { getBasePath } from \"@/shared/lib/base-path\";\nimport { resolveHeaderIconConfig } from \"@/shared/lib/resolve-site-assets\";\nimport styles from \"./repository-search-shell.module.css\";\n\nexport function RepositorySearchShell({\n  data,\n  repositoryNotUsingGitPageDocs,\n}: {\n  data: LoadedDocsData;\n  repositoryNotUsingGitPageDocs: boolean;\n}) {\n  const router = useRouter();\n  const defaultLanguage = data.config.site.defaultLanguage;\n  const configuredDefaultMode = data.config.site.ThemeModeDefault === \"light\" ? \"light\" : \"dark\";\n  const initialThemeBaseId = data.config.site.ThemeDefault || data.layoutsConfig.layouts[0]?.id;\n  const siteName = data.config.site.name ?? \"GitPageDocs\";\n\n  const {\n    language,\n    onLanguageChange,\n    activeThemeId,\n    onThemeChange,\n    onToggleMode,\n    activeLayout,\n    nextModeIsDark,\n    canToggleMode,\n  } = useStandaloneShellPreferences({\n    siteName,\n    defaultLanguage,\n    availableLanguages: repositoryNotUsingGitPageDocs ? ([\"en\", \"pt\", \"es\"] as LanguageCode[]) : data.availableLanguages,\n    layouts: data.layoutsConfig.layouts,\n    configuredDefaultMode,\n    initialThemeBaseId,\n  });\n\n  const [ownerInput, setOwnerInput] = useState(data.activeRepository.owner ?? \"\");\n  const [repoInput, setRepoInput] = useState(data.activeRepository.repo ?? \"\");\n  const searchLanguages: LanguageCode[] = repositoryNotUsingGitPageDocs\n    ? ([\"en\", \"pt\", \"es\"] as LanguageCode[])\n    : data.availableLanguages;\n\n  const activeTheme = data.themes[activeLayout?.id ?? \"\"];\n  const cssVars = useMemo(() => toSearchShellCssVars(activeTheme), [activeTheme]);\n\n  const basePath = getBasePath();\n  const headerIconConfig = useMemo(\n    () => resolveHeaderIconConfig(data.config.site, activeLayout?.mode ?? \"dark\", basePath),\n    [data.config.site, activeLayout?.mode, basePath],\n  );\n  const {\n    iconImage,\n    headerName,\n    useReactIcon: useReactHeaderIcon,\n    reactIconTag: reactHeaderIconTag,\n    reactIconStyle: headerReactIconStyle,\n    iconImgWidth: iconImageMenuHeaderImgWidth,\n    iconImgHeight: iconImageMenuHeaderImgHeight,\n  } = headerIconConfig;\n\n  const ownerLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"searchOwnerLabel\", \"Owner\");\n  const repoLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"searchRepoLabel\", \"Repository\");\n  const searchLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"searchButtonLabel\", \"Search\");\n\n  const localizedMessage = {\n    pt: \"GitPageDocs Não instalado.\",\n    en: \"GitPageDocs is not installed.\",\n    es: \"GitPageDocs no está instalado.\",\n  }[language];\n\n  const localizedDescription = {\n    pt: \"Informe usuario e repositorio para abrir a documentacao remota.\",\n    en: \"Enter owner and repository to open remote documentation.\",\n    es: \"Ingresa usuario y repositorio para abrir la documentacion remota.\",\n  }[language];\n\n  const currentMessage = repositoryNotUsingGitPageDocs ? localizedMessage : localizedDescription;\n  const footerEnabled = data.config.site.FooterEnabled !== false;\n\n  // Handle repository identification via URL hash (#/owner/repo) on mount only\n  useEffect(() => {\n    if (typeof window !== \"undefined\" && window.location.hash.startsWith(\"#/\")) {\n      const parts = window.location.hash.slice(2).split(\"/\").filter(Boolean);\n      if (parts.length >= 2 && (!ownerInput || !repoInput)) {\n        setOwnerInput(parts[0]);\n        setRepoInput(parts[1]);\n      }\n    }\n    // eslint-disable-next-line react-hooks/exhaustive-deps -- only run on mount to sync from hash\n  }, []);\n\n  function onSearch() {\n    const owner = ownerInput.trim();\n    const repo = repoInput.trim();\n    if (!owner || !repo) {\n      return;\n    }\n    if (typeof window !== \"undefined\") {\n      window.location.hash = `#/${owner}/${repo}`;\n    }\n    router.push(`/${owner}/${repo}`);\n  }\n\n  const header = (\n    <SearchShellHeader\n      siteName={headerName}\n      basePath={basePath}\n      language={language}\n      languages={searchLanguages}\n      onLanguageChange={onLanguageChange}\n      activeThemeId={activeThemeId}\n      layouts={data.layoutsConfig.layouts}\n      onThemeChange={onThemeChange}\n      nextModeIsDark={nextModeIsDark}\n      canToggleMode={canToggleMode}\n      onToggleMode={onToggleMode}\n      iconImage={iconImage}\n      iconImgWidth={iconImageMenuHeaderImgWidth}\n      iconImgHeight={iconImageMenuHeaderImgHeight}\n      useReactHeaderIcon={useReactHeaderIcon}\n      reactHeaderIconTag={reactHeaderIconTag}\n      headerReactIconStyle={headerReactIconStyle}\n      getLanguageLabel={(lang) => getLanguageLabelFromMenu(data.config.site.langmenu, language, lang)}\n    />\n  );\n\n  return (\n    <SearchShellLayout\n      header={header}\n      footerEnabled={footerEnabled}\n      projectFooterUrl={PROJECT_FOOTER_URL}\n      language={language}\n      style={cssVars}\n      footerConfig={buildFooterConfigFromData(data, language)}\n    >\n      <section className={styles.card}>\n        <h1 className={styles.title}>{repositoryNotUsingGitPageDocs ? localizedMessage : \"GitPageDocs\"}</h1>\n        <p className={styles.description}>{currentMessage}</p>\n        <RepositorySearchForm\n          owner={ownerInput}\n          repo={repoInput}\n          ownerLabel={ownerLabel}\n          repoLabel={repoLabel}\n          searchLabel={searchLabel}\n          onOwnerChange={setOwnerInput}\n          onRepoChange={setRepoInput}\n          onSubmit={onSearch}\n          classNames={{\n            form: styles.form,\n            input: styles.input,\n            button: styles.button,\n          }}\n        />\n      </section>\n    </SearchShellLayout>\n  );\n}\n","src/widgets/search-shell-header/model/use-standalone-shell-config.ts":"\"use client\";\n\nimport { useEffect, useState } from \"react\";\nimport {\n  fetchOfficialSiteConfig,\n  loadStandaloneLayoutsAndThemes,\n} from \"@/entities/docs/api/load-remote-docs-data-client\";\nimport type { OfficialSiteConfig } from \"@/entities/docs/api/load-remote-docs-data-client\";\nimport type { LayoutsConfig, ThemeTemplate } from \"@/entities/docs/model/types\";\n\nexport interface StandaloneShellConfig {\n  layoutsConfig: LayoutsConfig;\n  themes: Record<string, ThemeTemplate>;\n  siteConfig?: OfficialSiteConfig | null;\n}\n\nexport function useStandaloneShellConfig(): {\n  config: StandaloneShellConfig | null;\n  isLoading: boolean;\n} {\n  const [config, setConfig] = useState<StandaloneShellConfig | null>(null);\n  const [isLoading, setIsLoading] = useState(true);\n\n  useEffect(() => {\n    let cancelled = false;\n    Promise.all([loadStandaloneLayoutsAndThemes(), fetchOfficialSiteConfig()])\n      .then(([layoutsResult, siteConfig]) => {\n        if (!cancelled) {\n          setConfig({\n            ...layoutsResult,\n            siteConfig: siteConfig ?? undefined,\n          });\n        }\n      })\n      .catch(() => {\n        if (!cancelled) {\n          setConfig(null);\n        }\n      })\n      .finally(() => {\n        if (!cancelled) {\n          setIsLoading(false);\n        }\n      });\n    return () => {\n      cancelled = true;\n    };\n  }, []);\n\n  return { config, isLoading };\n}\n","src/widgets/search-shell-header/model/use-standalone-shell-preferences.ts":"\"use client\";\n\nimport { useEffect, useState } from \"react\";\nimport { usePathname, useRouter, useSearchParams } from \"next/navigation\";\nimport { resolveThemeByMode } from \"@/entities/docs/lib/theme/resolve-theme-by-mode\";\nimport { toFullPath } from \"@/shared/lib/base-path\";\nimport type { LanguageCode, LayoutItem } from \"@/entities/docs/model/types\";\n\nconst STORAGE_KEY_PREFIX = \"git-page-docs\";\n\nfunction buildStorageKey(prefix: string, siteName: string): string {\n  return `${STORAGE_KEY_PREFIX}:${prefix}:${siteName.toLowerCase().replaceAll(\" \", \"-\")}`;\n}\n\nexport interface UseStandaloneShellPreferencesArgs {\n  siteName: string;\n  defaultLanguage: LanguageCode;\n  availableLanguages: LanguageCode[];\n  layouts: LayoutItem[];\n  configuredDefaultMode: \"light\" | \"dark\";\n  initialThemeBaseId: string | undefined;\n  /** Optional: use for pathname when window is not available (SSR) */\n  fallbackPathname?: string;\n}\n\nexport function useStandaloneShellPreferences({\n  siteName,\n  defaultLanguage,\n  availableLanguages,\n  layouts,\n  configuredDefaultMode,\n  initialThemeBaseId,\n  fallbackPathname = \"/\",\n}: UseStandaloneShellPreferencesArgs) {\n  const router = useRouter();\n  const pathname = usePathname();\n  const searchParams = useSearchParams();\n\n  const languageStorageKey = buildStorageKey(\"language\", siteName);\n  const themeModeStorageKey = buildStorageKey(\"mode\", siteName);\n  const themeLayoutStorageKey = buildStorageKey(\"theme\", siteName);\n\n  const [language, setLanguage] = useState<LanguageCode>(defaultLanguage);\n  const [languageRestored, setLanguageRestored] = useState(false);\n\n  const initialThemeBase = layouts.find((l) => l.id === initialThemeBaseId) ?? layouts[0];\n  const initialThemeId = initialThemeBase\n    ? resolveThemeByMode(layouts, initialThemeBase, configuredDefaultMode).id\n    : layouts[0]?.id ?? \"\";\n\n  const [activeThemeId, setActiveThemeId] = useState(initialThemeId);\n  const [themeRestored, setThemeRestored] = useState(false);\n\n  function getCurrentPathname(): string {\n    if (typeof window !== \"undefined\") {\n      const base = (process.env.NEXT_PUBLIC_GITPAGEDOCS_BASE_PATH ?? \"\").trim();\n      const full = window.location.pathname;\n      if (base && full.startsWith(base)) {\n        return full.slice(base.length) || \"/\";\n      }\n      return full || \"/\";\n    }\n    return pathname ?? fallbackPathname;\n  }\n\n  function getCurrentSearchParams(): URLSearchParams {\n    if (typeof window !== \"undefined\") {\n      return new URLSearchParams(window.location.search);\n    }\n    return new URLSearchParams(searchParams.toString());\n  }\n\n  function replaceUrl(path: string, params: URLSearchParams) {\n    const qs = params.toString();\n    const fullPath = toFullPath(path || \"/\");\n    const nextUrl = qs ? `${fullPath}?${qs}` : fullPath;\n    if (typeof window !== \"undefined\") {\n      window.history.replaceState({}, \"\", nextUrl);\n    } else {\n      router.replace(qs ? `${path || \"/\"}?${qs}` : path || \"/\");\n    }\n  }\n\n  // Restore language from URL → localStorage\n  useEffect(() => {\n    const langFromQuery = searchParams.get(\"lang\") as LanguageCode | null;\n    if (langFromQuery && availableLanguages.includes(langFromQuery)) {\n      setLanguage(langFromQuery);\n      setLanguageRestored(true);\n      return;\n    }\n    if (languageRestored) return;\n    try {\n      const saved = window.localStorage.getItem(languageStorageKey) as LanguageCode | null;\n      if (saved && availableLanguages.includes(saved)) {\n        setLanguage(saved);\n      }\n    } catch {\n      /* ignore */\n    }\n    setLanguageRestored(true);\n  }, [searchParams, availableLanguages, languageStorageKey, languageRestored]);\n\n  // Restore theme from URL → localStorage (once)\n  useEffect(() => {\n    if (themeRestored) return;\n    const urlMode = searchParams.get(\"modetheme\");\n    const targetMode = urlMode === \"dark\" || urlMode === \"light\" ? urlMode : configuredDefaultMode;\n    try {\n      const savedMode = window.localStorage.getItem(themeModeStorageKey);\n      const savedThemeId = window.localStorage.getItem(themeLayoutStorageKey);\n      const mode = urlMode === \"dark\" || urlMode === \"light\" ? urlMode : savedMode === \"light\" || savedMode === \"dark\" ? savedMode : configuredDefaultMode;\n      const baseLayout = layouts.find((l) => l.id === savedThemeId) ?? layouts.find((l) => l.id === initialThemeBaseId) ?? layouts[0];\n      if (baseLayout) {\n        const resolved = resolveThemeByMode(layouts, baseLayout, mode);\n        setActiveThemeId(resolved.id);\n      }\n    } catch {\n      /* ignore */\n    }\n    setThemeRestored(true);\n    // eslint-disable-next-line react-hooks/exhaustive-deps -- only restore once, skip when themeRestored\n  }, [searchParams, configuredDefaultMode, layouts, initialThemeBaseId, themeModeStorageKey, themeLayoutStorageKey]);\n\n  // Persist language when changed\n  useEffect(() => {\n    if (!languageRestored) return;\n    try {\n      window.localStorage.setItem(languageStorageKey, String(language));\n    } catch {\n      /* ignore */\n    }\n  }, [language, languageStorageKey, languageRestored]);\n\n  // Persist theme mode and layout when changed\n  useEffect(() => {\n    if (!themeRestored) return;\n    const activeLayout = layouts.find((l) => l.id === activeThemeId);\n    if (activeLayout?.mode) {\n      try {\n        window.localStorage.setItem(themeModeStorageKey, activeLayout.mode);\n        window.localStorage.setItem(themeLayoutStorageKey, activeThemeId);\n      } catch {\n        /* ignore */\n      }\n    }\n  }, [themeRestored, activeThemeId, layouts, themeModeStorageKey, themeLayoutStorageKey]);\n\n  function onLanguageChange(newLang: LanguageCode) {\n    setLanguage(newLang);\n    const params = getCurrentSearchParams();\n    params.set(\"lang\", newLang);\n    replaceUrl(getCurrentPathname(), params);\n  }\n\n  function onThemeChange(themeId: string) {\n    setActiveThemeId(themeId);\n    const layout = layouts.find((l) => l.id === themeId);\n    if (layout?.mode === \"dark\" || layout?.mode === \"light\") {\n      const params = getCurrentSearchParams();\n      params.set(\"modetheme\", layout.mode);\n      replaceUrl(getCurrentPathname(), params);\n    }\n  }\n\n  function onToggleMode() {\n    const activeLayout = layouts.find((l) => l.id === activeThemeId);\n    if (!activeLayout?.supportsLightAndDarkModes) return;\n    const nextMode = activeLayout.mode === \"dark\" ? \"light\" : \"dark\";\n    const paired = resolveThemeByMode(layouts, activeLayout, nextMode);\n    setActiveThemeId(paired.id);\n    if (paired.mode === \"dark\" || paired.mode === \"light\") {\n      const params = getCurrentSearchParams();\n      params.set(\"modetheme\", paired.mode);\n      replaceUrl(getCurrentPathname(), params);\n    }\n  }\n\n  const activeLayout = layouts.find((l) => l.id === activeThemeId) ?? layouts[0];\n  const nextModeIsDark = activeLayout?.mode === \"dark\";\n  const canToggleMode = Boolean(activeLayout?.supportsLightAndDarkModes);\n\n  return {\n    language,\n    onLanguageChange,\n    activeThemeId,\n    onThemeChange,\n    onToggleMode,\n    activeLayout,\n    nextModeIsDark,\n    canToggleMode,\n  };\n}\n","src/widgets/search-shell-header/search-shell-header.module.css":".header {\n  position: sticky;\n  top: 0;\n  z-index: 20;\n  border-bottom: var(--header-border, 1px solid var(--card-border));\n  background:\n    linear-gradient(\n      90deg,\n      color-mix(in srgb, var(--header-background, var(--card-background)) 92%, var(--primary) 8%),\n      color-mix(in srgb, var(--header-background, var(--card-background)) 92%, var(--secondary) 8%)\n    );\n  backdrop-filter: blur(8px);\n}\n\n.headerInner {\n  max-width: 1200px;\n  margin: 0 auto;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  padding: 14px 18px;\n  width: 100%;\n  box-sizing: border-box;\n}\n\n@media (max-width: 640px) {\n  .headerInner {\n    padding: 12px 14px;\n  }\n}\n\n.headerLeft {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex: 1;\n  min-width: 0;\n}\n\n@media (max-width: 768px) {\n  .headerLeft {\n    justify-content: space-between;\n    gap: 16px;\n  }\n}\n\n.headerRight {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n\n.brandLink {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  color: var(--text);\n  text-decoration: none;\n  font-weight: 700;\n  font-size: 1rem;\n}\n\n.brandLink:hover {\n  color: var(--secondary);\n}\n\n.brandIcon {\n  width: 28px;\n  height: 28px;\n  border-radius: 6px;\n  object-fit: contain;\n}\n\n.brandReactIcon {\n  width: 28px;\n  height: 28px;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 1.1rem;\n}\n\n.select {\n  height: clamp(38px, 1.2vw + 30px, 42px);\n  min-width: 130px;\n  padding: 0 12px;\n  border-radius: var(--select-radius, 10px);\n  border: var(--select-border, 1px solid var(--card-border));\n  background: var(--control-background, var(--card-background));\n  color: var(--text);\n  font-weight: 600;\n  font-size: clamp(0.82rem, 0.4vw + 0.72rem, 0.95rem);\n}\n\n.modeIconButton {\n  width: clamp(38px, 1.8vw + 26px, 42px);\n  min-width: clamp(38px, 1.8vw + 26px, 42px);\n  height: clamp(38px, 1.2vw + 30px, 42px);\n  padding: 0;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: var(--control-radius, 10px);\n  border: var(--control-border, 1px solid var(--card-border));\n  background: var(--control-background, var(--card-background));\n  color: var(--text);\n  cursor: pointer;\n}\n\n.modeIconButton:hover {\n  color: var(--secondary);\n}\n\n.mobileToggle {\n  display: none;\n  width: 42px;\n  min-width: 42px;\n  height: 38px;\n  padding: 0;\n  align-items: center;\n  justify-content: center;\n  border-radius: var(--control-radius, 10px);\n  border: var(--control-border, 1px solid var(--card-border));\n  background: var(--control-background, var(--card-background));\n  color: var(--text);\n  cursor: pointer;\n  font-size: 1.2rem;\n}\n\n.mobileToggle:hover {\n  color: var(--secondary);\n}\n\n.mobileDrawerOverlay {\n  display: none;\n}\n\n.mobileDrawer {\n  width: min(320px, 90vw);\n  max-width: 100%;\n  height: 100vh;\n  margin-left: auto;\n  background:\n    linear-gradient(\n      180deg,\n      color-mix(in srgb, var(--card-background) 96%, transparent),\n      color-mix(in srgb, var(--background) 88%, transparent)\n    );\n  border-left: 1px solid var(--card-border);\n  padding: 18px 16px;\n  box-shadow: -16px 0 48px rgba(0, 0, 0, 0.45);\n  overflow-y: auto;\n}\n\n.mobileDrawerHeader {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  margin-bottom: 16px;\n}\n\n.mobileDrawerClose {\n  width: 42px;\n  min-width: 42px;\n  height: 42px;\n  padding: 0;\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  border-radius: var(--control-radius, 10px);\n  border: var(--control-border, 1px solid var(--card-border));\n  background: var(--control-background, var(--card-background));\n  color: var(--text);\n  cursor: pointer;\n}\n\n.mobileDrawerClose:hover {\n  color: var(--secondary);\n}\n\n.mobileControls {\n  display: flex;\n  flex-direction: column;\n  gap: 12px;\n}\n\n.mobileControls .select,\n.mobileControls .modeIconButton {\n  width: 100%;\n}\n\n.mobileControls .modeIconButton {\n  margin: 0;\n}\n\n@media (max-width: 768px) {\n  .mobileToggle {\n    display: inline-flex;\n  }\n\n  .headerRight {\n    display: none;\n  }\n\n  .mobileDrawerOverlay {\n    position: fixed;\n    inset: 0;\n    display: block;\n    background: rgba(2, 6, 23, 0.6);\n    z-index: 50;\n  }\n}\n","src/widgets/search-shell-header/ui/search-shell-header.tsx":"\"use client\";\n\nimport { useState } from \"react\";\nimport Image from \"next/image\";\nimport Link from \"next/link\";\nimport { LanguageSelector } from \"@/features/language-selector\";\nimport { ThemeModeToggle } from \"@/features/theme-switcher\";\nimport { ReactIconByTag } from \"@/shared/ui/react-icon-by-tag\";\nimport type { LanguageCode, LayoutItem } from \"@/entities/docs/model/types\";\nimport styles from \"../search-shell-header.module.css\";\n\ninterface SearchShellHeaderProps {\n  siteName: string;\n  basePath: string;\n  language: LanguageCode;\n  languages: LanguageCode[];\n  onLanguageChange: (lang: LanguageCode) => void;\n  activeThemeId: string;\n  layouts: LayoutItem[];\n  onThemeChange: (themeId: string) => void;\n  nextModeIsDark: boolean;\n  canToggleMode: boolean;\n  onToggleMode: () => void;\n  iconImage?: string;\n  iconImgWidth?: number;\n  iconImgHeight?: number;\n  useReactHeaderIcon?: boolean;\n  reactHeaderIconTag?: string;\n  headerReactIconStyle?: React.CSSProperties;\n  getLanguageLabel: (lang: LanguageCode) => string;\n}\n\nexport function SearchShellHeader({\n  siteName,\n  basePath,\n  language,\n  languages,\n  onLanguageChange,\n  activeThemeId,\n  layouts,\n  onThemeChange,\n  nextModeIsDark,\n  canToggleMode,\n  onToggleMode,\n  iconImage,\n  iconImgWidth = 20,\n  iconImgHeight = 20,\n  useReactHeaderIcon,\n  reactHeaderIconTag,\n  headerReactIconStyle,\n  getLanguageLabel,\n}: SearchShellHeaderProps) {\n  const [menuOpen, setMenuOpen] = useState(false);\n  // Use \"/\" so Next.js Link adds basePath automatically when configured (avoids hydration mismatch)\n  const homeHref = \"/\";\n  const darkModeLabel = \"Dark mode\";\n  const lightModeLabel = \"Light mode\";\n  const menuOpenLabel = \"Open menu\";\n  const menuCloseLabel = \"Close menu\";\n\n  const controls = (\n    <>\n      {layouts.length > 1 && (\n        <select\n          className={styles.select}\n          value={activeThemeId}\n          onChange={(e) => onThemeChange(e.target.value)}\n          aria-label=\"Theme selector\"\n        >\n          {layouts.map((layout) => (\n            <option key={layout.id} value={layout.id}>\n              {layout.name}\n            </option>\n          ))}\n        </select>\n      )}\n\n      <ThemeModeToggle\n        className={styles.modeIconButton}\n        isDarkMode={nextModeIsDark}\n        canToggle={canToggleMode}\n        label={nextModeIsDark ? darkModeLabel : lightModeLabel}\n        onToggle={onToggleMode}\n      />\n\n      {languages.length > 1 && (\n        <LanguageSelector\n          className={styles.select}\n          languages={languages}\n          value={language}\n          onChange={onLanguageChange}\n          getLabel={getLanguageLabel}\n          ariaLabel=\"Language selector\"\n        />\n      )}\n    </>\n  );\n\n  return (\n    <header className={styles.header}>\n      <div className={styles.headerInner}>\n        <div className={styles.headerLeft}>\n          <Link href={homeHref} className={styles.brandLink} aria-label={siteName}>\n            {useReactHeaderIcon && reactHeaderIconTag ? (\n              <span className={styles.brandReactIcon} style={headerReactIconStyle}>\n                <ReactIconByTag tag={reactHeaderIconTag} />\n              </span>\n            ) : iconImage ? (\n              <Image src={iconImage} alt=\"\" width={iconImgWidth} height={iconImgHeight} className={styles.brandIcon} unoptimized />\n            ) : (\n              <span className={styles.brandReactIcon} style={headerReactIconStyle}>\n                <ReactIconByTag tag=\"FaGithubSquare\" />\n              </span>\n            )}\n            <strong>{siteName}</strong>\n          </Link>\n          <button\n            type=\"button\"\n            className={styles.mobileToggle}\n            onClick={() => setMenuOpen((v) => !v)}\n            aria-label={menuOpen ? menuCloseLabel : menuOpenLabel}\n            title={menuOpen ? menuCloseLabel : menuOpenLabel}\n          >\n            {menuOpen ? \"✕\" : \"☰\"}\n          </button>\n        </div>\n\n        <div className={styles.headerRight}>{controls}</div>\n      </div>\n\n      {menuOpen && (\n        <div\n          className={styles.mobileDrawerOverlay}\n          onClick={() => setMenuOpen(false)}\n          onKeyDown={(e) => e.key === \"Escape\" && setMenuOpen(false)}\n        >\n          <aside\n            className={styles.mobileDrawer}\n            onClick={(e) => e.stopPropagation()}\n            onKeyDown={(e) => e.stopPropagation()}\n          >\n            <div className={styles.mobileDrawerHeader}>\n              <strong>{siteName}</strong>\n              <button\n                type=\"button\"\n                className={styles.mobileDrawerClose}\n                onClick={() => setMenuOpen(false)}\n                aria-label={menuCloseLabel}\n                title={menuCloseLabel}\n              >\n                ✕\n              </button>\n            </div>\n            <div className={styles.mobileControls}>{controls}</div>\n          </aside>\n        </div>\n      )}\n    </header>\n  );\n}\n","src/widgets/search-shell-layout/search-shell-layout.module.css":".wrapper {\n  min-height: 100vh;\n  display: flex;\n  flex-direction: column;\n  background:\n    radial-gradient(circle at 8% -18%, color-mix(in srgb, var(--primary) 24%, transparent), transparent 44%),\n    radial-gradient(circle at 92% -22%, color-mix(in srgb, var(--secondary) 22%, transparent), transparent 42%),\n    var(--background);\n  color: var(--text);\n}\n\n.main {\n  flex: 1;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 20px 12px;\n  width: 100%;\n  box-sizing: border-box;\n}\n\n@media (max-width: 640px) {\n  .main {\n    padding: 14px 10px;\n  }\n}\n\n@media (max-width: 480px) {\n  .main {\n    padding: 12px 8px;\n  }\n}\n\n.wrapper ::-webkit-scrollbar {\n  width: 8px;\n  height: 8px;\n}\n\n.wrapper ::-webkit-scrollbar-track {\n  background: var(--scrollbar-track, transparent);\n}\n\n.wrapper ::-webkit-scrollbar-thumb {\n  background: var(--scrollbar-thumb, color-mix(in srgb, var(--text-secondary) 40%, transparent));\n  border-radius: 4px;\n}\n\n.wrapper ::-webkit-scrollbar-thumb:hover {\n  background: var(--scrollbar-thumb-hover, color-mix(in srgb, var(--text-secondary) 60%, transparent));\n}\n","src/widgets/search-shell-layout/search-shell-layout.tsx":"import type { ReactNode, CSSProperties } from \"react\";\nimport { SiteFooter, type FooterConfig, type FooterDateMode } from \"@/shared/ui/site-footer\";\nimport styles from \"./search-shell-layout.module.css\";\n\nconst DEFAULT_FOOTER_LABELS: Record<string, string> = {\n  en: \"Project\",\n  pt: \"Projeto\",\n  es: \"Proyecto\",\n};\n\nexport type { FooterConfig };\n\ninterface SearchShellLayoutProps {\n  children: ReactNode;\n  header: ReactNode;\n  footerEnabled?: boolean;\n  projectFooterUrl: string;\n  language: string;\n  style?: CSSProperties;\n  footerConfig?: FooterConfig;\n}\n\nexport function SearchShellLay <script>
(function(){
var el=document.getElementById("filesData");
var raw=el.textContent;
var data=JSON.parse(raw);
var files=data.files, keys=data.fileKeys, treeData=data.tree||{};
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML}
var viewMode="code";
function setViewMode(mode){viewMode=mode}
function selectFile(path){
  document.querySelectorAll(".sidebar .file.active").forEach(function(n){n.classList.remove("active")});
  document.querySelectorAll(".sidebar .folder.active").forEach(function(n){n.classList.remove("active")});
  var node=document.querySelector('.sidebar .file[data-path="'+path.replace(/"/g,'\"')+'"]');
  if(node){node.classList.add("active");node.scrollIntoView({block:"nearest"})}
  var content=files[path]||"";
  var isReadme=path.toLowerCase()==="readme.md";
  var viewer=document.getElementById("viewer");
  if(isReadme){
    var btnHtml='<div class="btn-group"><button class="btn'+(viewMode==='preview'?' active':'')+'" data-mode="preview">Preview</button><button class="btn'+(viewMode==='code'?' active':'')+'" data-mode="code">Code</button></div>';
    if(viewMode==="preview"&&typeof marked!=="undefined"){
      viewer.innerHTML=btnHtml+'<div class="md-preview">'+marked.parse(content||"")+'</div>';
    }else{
      var lines=(content||"").split("\n");
      var lineHtml="";
      lines.forEach(function(line,i){lineHtml+="<span class=\"line-num\">"+(i+1)+"</span><span class=\"line\">"+esc(line)+"\n</span>"});
      viewer.innerHTML=btnHtml+"<code>"+lineHtml+"</code>";
      if(typeof hljs!=="undefined"){var c=viewer.querySelector("code");if(c){c.className="language-markdown";hljs.highlightElement(c)}}
    }
    viewer.classList.remove("empty");
    viewer.querySelectorAll(".btn").forEach(function(btn){
      btn.onclick=function(){
        setViewMode(btn.dataset.mode);
        selectFile(path);
      };
    });
    return;
  }
  var lines=content.split("\n");
  var html="";
  lines.forEach(function(line,i){html+="<span class=\"line-num\">"+(i+1)+"</span><span class=\"line\">"+esc(line)+"\n</span>"});
  viewer.innerHTML="<code>"+html+"</code>";
  viewer.classList.remove("empty");
  if(typeof hljs!=="undefined"){var c=viewer.querySelector("code");c.className="";hljs.highlightElement(c)}
}
function renderTree(node, parentEl, indent){
  indent=indent||0;
  var keys=Object.keys(node).sort();
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    var v=node[k];
    if(k==="path")continue;
    if(v&&typeof v==="object"&&v.path){
      var div=document.createElement("div");
      div.className="file";
      div.dataset.path=v.path;
      div.style.marginLeft=(indent*16)+"px";
      div.innerHTML="<span class=\"icon\">&#128196;</span>"+esc(k);
      div.onclick=function(p){return function(){selectFile(p)}}(v.path);
      parentEl.appendChild(div);
    }else if(v&&typeof v==="object"){
      var folderDiv=document.createElement("div");
      folderDiv.className="folder";
      folderDiv.style.marginLeft=(indent*16)+"px";
      folderDiv.innerHTML="<span class=\"icon\">&#128193;</span>"+esc(k);
      folderDiv.onclick=function(e){if(e.target.closest(".file"))return; var next=e.currentTarget.querySelector(".children");if(next)next.style.display=next.style.display==="none"?"block":"none"};
      var children=document.createElement("div");
      children.className="children";
      parentEl.appendChild(folderDiv);
      parentEl.appendChild(children);
      renderTree(v,children,indent+1);
    }
  }
}
function buildTree(){
  var tree=document.getElementById("tree");
  if(Object.keys(treeData).length>0){
    renderTree(treeData,tree,0);
  }else{
    keys.sort();
    keys.forEach(function(k){
      var div=document.createElement("div");
      div.className="file";
      div.dataset.path=k;
      div.innerHTML="<span class=\"icon\">&#128196;</span>"+esc(k);
      div.onclick=function(){selectFile(k)};
      tree.appendChild(div);
    });
  }
}
buildTree();
})();
</script>
