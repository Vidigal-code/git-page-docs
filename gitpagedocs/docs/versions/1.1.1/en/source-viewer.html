NavLabel: string;\n  showVersionSelector: boolean;\n  availableVersions: VersionEntry[];\n  selectedVersionValue: string;\n  versionLabel: string;\n  isLanguageSelectVisible: boolean;\n  availableLanguages: string[];\n  language: string;\n  languageLabelResolver: (lang: string) => string;\n  hideThemeSelector: boolean;\n  activeThemeId: string;\n  layouts: LayoutItem[];\n  canToggleMode: boolean;\n  nextModeIsDark: boolean;\n  darkModeLabel: string;\n  lightModeLabel: string;\n}\n\nexport function useDocsShellConfig(\n  data: LoadedDocsData,\n  activeLayout: { mode?: \"dark\" | \"light\" } | undefined,\n  language: string,\n  selectedVersionValue: string,\n  activeThemeId: string,\n  canToggleMode: boolean,\n  nextModeIsDark: boolean,\n) {\n  const basePath = getBasePath();\n\n  const headerIconConfig = useMemo(\n    () => resolveHeaderIconConfig(data.config.site, activeLayout?.mode ?? \"dark\", basePath),\n    [data.config.site, activeLayout?.mode, basePath],\n  );\n\n  const versionLinkOptions = useMemo(() => buildVersionLinkOptions(data.activeVersion), [data.activeVersion]);\n  const branchLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"branchLabel\", \"Branch\");\n  const releaseLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"releaseLabel\", \"Release\");\n  const commitLabel = getLangMenuLabelFromMenu(data.config.site.langmenu, language, \"commitLabel\", \"Commit\");\n\n  const versionLinkOptionsWithLabels = useMemo(\n    () =>\n      versionLinkOptions.map((option) => ({\n        ...option,\n        label: option.id === \"branch\" ? branchLabel : option.id === \"release\" ? releaseLabel : commitLabel,\n      })),\n    [versionLinkOptions, branchLabel, releaseLabel, commitLabel],\n  );\n\n  const mode = activeLayout?.mode ?? \"dark\";\n  const site = data.config.site;\n\n  const controlsConfig: DocsShellControlsConfig = useMemo(\n    () => ({\n      fallbackProjectLink: data.activeVersion?.ProjectLink?.trim() || site.ProjectLink?.trim(),\n      projectLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"projectLabel\", \"Project\"),\n      useReactProjectLinkIcon: Boolean(site.IconProjectLinkReactIcones),\n      projectLinkReactIconTag: site.IconProjectLinkReactIconesTag,\n      projectLinkReactIconStyle: {\n        color: (mode === \"dark\" ? site.IconProjectLinkReactIconesTagColorDark : site.IconProjectLinkReactIconesTagColorLight)?.trim() || undefined,\n        fontSize: site.IconProjectLinkReactIconesTagSize?.trim() || undefined,\n      },\n      versionLinkOptionsWithLabels,\n      versionLinksLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"versionLinksLabel\", \"Repository links\"),\n      useReactVersionLinksIcon: Boolean(site.IconVersionLinksReactIcones),\n      versionLinksIconTag: site.IconVersionLinksReactIconesTag,\n      versionLinksIconStyle: {\n        color: (mode === \"dark\" ? site.IconVersionLinksReactIconesTagColorDark : site.IconVersionLinksReactIconesTagColorLight)?.trim() || undefined,\n        fontSize: site.IconVersionLinksReactIconesTagSize?.trim() || undefined,\n      },\n      versionLinksIconImage:\n        (mode === \"dark\"\n          ? site.IconVersionLinksDarkImg?.trim() || site.IconVersionLinksHeaderDark?.trim()\n          : site.IconVersionLinksLightImg?.trim() || site.IconVersionLinksLight?.trim()) || undefined,\n      versionLinksIconImgWidth: Number(site.IconVersionLinksImgWidth) || 20,\n      versionLinksIconImgHeight: Number(site.IconVersionLinksImgHeight) || 20,\n      infoIconImgWidth: Number(site.IconInfoHeaderMenuImgWidth) || 20,\n      infoIconImgHeight: Number(site.IconInfoHeaderMenuImgHeight) || 20,\n      previewIconImgWidth: Number(site.IconPreviewProjectLinkImgWidth) || 20,\n      previewIconImgHeight: Number(site.IconPreviewProjectLinkImgHeight) || 20,\n      showInfoButton: Boolean(data.activeVersion?.UpdateDate?.trim()),\n      updateDate: data.activeVersion?.UpdateDate?.trim() ?? \"\",\n      lastUpdateLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"lastUpdateVersionLabel\", \"Last update version\"),\n      useReactInfoIcon: Boolean(site.IconInfoHeaderMenuReactIcones),\n      infoIconTag: site.IconInfoHeaderMenuReactIconesTag,\n      infoIconStyle: {\n        color: (mode === \"dark\" ? site.IconInfoHeaderMenuReactIconesTagColorDark : site.IconInfoHeaderMenuReactIconesTagColorLight)?.trim() || undefined,\n        fontSize: site.IconInfoHeaderMenuReactIconesTagSize?.trim() || undefined,\n      },\n      infoIconImage:\n        (mode === \"dark\"\n          ? site.IconInfoHeaderMenuDarkImg?.trim() || site.IconInfoHeaderMenuHeaderDark?.trim()\n          : site.IconInfoHeaderMenuLightImg?.trim() || site.IconInfoHeaderMenuLight?.trim()) || undefined,\n      showPreviewButton: Boolean(data.activeVersion?.PreviewProject?.trim()),\n      previewProjectUrl: data.activeVersion?.PreviewProject?.trim() ?? \"\",\n      useReactPreviewIcon: Boolean(site.IconPreviewProjectLinkReactIcones),\n      previewIconTag: site.IconPreviewProjectLinkReactIconesTag,\n      previewIconStyle: {\n        color: (mode === \"dark\" ? site.IconPreviewProjectLinkReactIconesTagColorDark : site.IconPreviewProjectLinkReactIconesTagColorLight)?.trim() || undefined,\n        fontSize: site.IconPreviewProjectLinkReactIconesTagSize?.trim() || undefined,\n      },\n      previewIconImage:\n        (mode === \"dark\"\n          ? site.IconPreviewProjectLinkDarkImg?.trim() || site.IconPreviewProjectLinkHeaderDark?.trim()\n          : site.IconPreviewProjectLinkLightImg?.trim() || site.IconPreviewProjectLinkLight?.trim()) || undefined,\n      focusModeEnabled: Boolean(site.FocusMode),\n      focusModeLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"focusMode\", \"Focus mode\"),\n      activeNavigation: Boolean(site.ActiveNavigation),\n      quickNavLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"quickNavigation\", \"Ctrl+K\"),\n      showVersionSelector: data.availableVersions.length > 1,\n      availableVersions: data.availableVersions,\n      selectedVersionValue,\n      versionLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"versionLabel\", \"Version\"),\n      isLanguageSelectVisible: data.availableLanguages.length > 1,\n      availableLanguages: data.availableLanguages,\n      language,\n      languageLabelResolver: (lang: string) => getLanguageLabelFromMenu(site.langmenu, language, lang),\n      hideThemeSelector: Boolean(site.HideThemeSelector),\n      activeThemeId,\n      layouts: data.layoutsConfig.layouts,\n      canToggleMode,\n      nextModeIsDark,\n      darkModeLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"darkMode\", \"Dark mode\"),\n      lightModeLabel: getLangMenuLabelFromMenu(site.langmenu, language, \"lightMode\", \"Light mode\"),\n    }),\n    [\n      data.activeVersion,\n      data.availableVersions,\n      data.availableLanguages,\n      data.layoutsConfig.layouts,\n      site,\n      language,\n      mode,\n      versionLinkOptionsWithLabels,\n      selectedVersionValue,\n      activeThemeId,\n      canToggleMode,\n      nextModeIsDark,\n    ],\n  );\n\n  const footerConfig = useMemo(\n    () => buildFooterConfigFromData(data, language),\n    [data, language],\n  );\n\n  return {\n    headerIconConfig,\n    controlsConfig,\n    footerEnabled: data.config.site.FooterEnabled !== false,\n    footerConfig,\n  };\n}\n","src/widgets/docs-shell/model/use-docs-shell-keyboard.ts":"import { useEffect } from \"react\";\nimport type { Dispatch, SetStateAction } from \"react\";\n\nexport function useDocsShellKeyboard(options: {\n  activeNavigation: boolean;\n  quickNavOpen: boolean;\n  focusModeOpen: boolean;\n  setMenuOpen: Dispatch<SetStateAction<boolean>>;\n  setFocusModeOpen: (value: boolean) => void;\n  setQuickNavOpen: Dispatch<SetStateAction<boolean>>;\n  setQuickNavQuery: (value: string) => void;\n}) {\n  const {\n    activeNavigation,\n    quickNavOpen,\n    focusModeOpen,\n    setMenuOpen,\n    setFocusModeOpen,\n    setQuickNavOpen,\n    setQuickNavQuery,\n  } = options;\n\n  useEffect(() => {\n    if (!activeNavigation) return;\n\n    function onKeyDown(event: KeyboardEvent) {\n      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === \"k\") {\n        event.preventDefault();\n        setMenuOpen(false);\n        setFocusModeOpen(false);\n        setQuickNavOpen((prev) => !prev);\n        if (!quickNavOpen) {\n          setQuickNavQuery(\"\");\n        }\n      }\n\n      if (event.key === \"Escape\" && focusModeOpen) {\n        event.preventDefault();\n        setFocusModeOpen(false);\n      }\n    }\n\n    window.addEventListener(\"keydown\", onKeyDown);\n    return () => window.removeEventListener(\"keydown\", onKeyDown);\n  }, [\n    activeNavigation,\n    quickNavOpen,\n    focusModeOpen,\n    setMenuOpen,\n    setFocusModeOpen,\n    setQuickNavOpen,\n    setQuickNavQuery,\n  ]);\n}\n","src/widgets/docs-shell/model/use-docs-shell-language-state.ts":"import { useEffect, useState } from \"react\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\n\ninterface UseDocsShellLanguageStateArgs {\n  defaultLanguage: LanguageCode;\n  availableLanguages: LanguageCode[];\n  languageStorageKey: string;\n  searchParams: URLSearchParams | { get(name: string): string | null };\n  pathname: string;\n  getCurrentSearchParams: () => URLSearchParams;\n  replaceUrlWithoutNavigation: (nextPathname: string, params: URLSearchParams) => void;\n}\n\nexport function useDocsShellLanguageState({\n  defaultLanguage,\n  availableLanguages,\n  languageStorageKey,\n  searchParams,\n  pathname,\n  getCurrentSearchParams,\n  replaceUrlWithoutNavigation,\n}: UseDocsShellLanguageStateArgs) {\n  const [language, setLanguage] = useState<LanguageCode>(defaultLanguage);\n  const [languageRestored, setLanguageRestored] = useState(false);\n\n  useEffect(() => {\n    const langFromQuery = searchParams.get(\"lang\") as LanguageCode | null;\n    if (langFromQuery && availableLanguages.includes(langFromQuery)) {\n      setLanguage(langFromQuery);\n      setLanguageRestored(true);\n    }\n  }, [searchParams, availableLanguages]);\n\n  useEffect(() => {\n    if (languageRestored) {\n      return;\n    }\n    try {\n      const savedLanguage = window.localStorage.getItem(languageStorageKey) as LanguageCode | null;\n      if (savedLanguage && availableLanguages.includes(savedLanguage)) {\n        queueMicrotask(() => {\n          setLanguage(savedLanguage);\n          setLanguageRestored(true);\n        });\n        return;\n      }\n    } catch {\n      // Ignore localStorage errors (private mode / blocked storage).\n    }\n    setLanguageRestored(true);\n  }, [languageStorageKey, availableLanguages, languageRestored]);\n\n  useEffect(() => {\n    if (!languageRestored) {\n      return;\n    }\n    try {\n      window.localStorage.setItem(languageStorageKey, String(language));\n    } catch {\n      // Ignore localStorage errors (private mode / blocked storage).\n    }\n  }, [language, languageStorageKey, languageRestored]);\n\n  function onLanguageChange(newLang: LanguageCode) {\n    setLanguage(newLang);\n    const params = getCurrentSearchParams();\n    params.set(\"lang\", newLang);\n    params.delete(\"version\");\n    const cleanPath = pathname.replace(/\\/$/, \"\") || pathname;\n    replaceUrlWithoutNavigation(cleanPath, params);\n  }\n\n  return { language, setLanguage, onLanguageChange };\n}\n","src/widgets/docs-shell/model/use-docs-shell-linear-nav.ts":"import { useMemo } from \"react\";\nimport type { LoadedDocsData } from \"@/entities/docs/model/types\";\nimport { buildUnifiedHeaderMenuTree, flattenMenuTree, getPageIndexByPathClick } from \"./menu-tree\";\n\nexport function useDocsShellLinearNav(data: LoadedDocsData, language: string, safePageIndex: number) {\n  const headerMenuTree = useMemo(\n    () => buildUnifiedHeaderMenuTree(data, language, safePageIndex),\n    [data, language, safePageIndex],\n  );\n\n  const headerMenuEntries = useMemo(() => flattenMenuTree(headerMenuTree), [headerMenuTree]);\n\n  const linearNavigationEntries = useMemo(() => {\n    const seenPages = new Set<number>();\n    return headerMenuEntries.filter((entry) => {\n      if (!entry.pathClick) return false;\n      const pageIdx = getPageIndexByPathClick(data, entry.pathClick);\n      if (pageIdx < 0 || seenPages.has(pageIdx)) return false;\n      seenPages.add(pageIdx);\n      return true;\n    });\n  }, [headerMenuEntries, data]);\n\n  const currentLinearNavigationIndex = useMemo(\n    () => linearNavigationEntries.findIndex((entry) => getPageIndexByPathClick(data, entry.pathClick) === safePageIndex),\n    [linearNavigationEntries, data, safePageIndex],\n  );\n\n  const canGoPrevious = currentLinearNavigationIndex > 0;\n  const canGoNext =\n    currentLinearNavigationIndex >= 0 && currentLinearNavigationIndex < linearNavigationEntries.length - 1;\n\n  return {\n    headerMenuTree,\n    headerMenuEntries,\n    linearNavigationEntries,\n    currentLinearNavigationIndex,\n    canGoPrevious,\n    canGoNext,\n  };\n}\n","src/widgets/docs-shell/model/use-docs-shell-navigation-state.ts":"import { useEffect, useState } from \"react\";\nimport type {\n  LanguageCode,\n  LoadedDocsData,\n  LoadedHtmlContent,\n  LoadedMdContent,\n  LoadedPage,\n  LoadedVideoContent,\n} from \"@/entities/docs/model/types\";\nimport { getPageIndexByPathClick } from \"./menu-tree\";\n\nexport interface BrowseItem<T> {\n  pageIndex: number;\n  content: T;\n}\n\nfunction getMdItems(pages: LoadedPage[]): BrowseItem<LoadedMdContent>[] {\n  return pages.flatMap((p, i) => (p.md ? [{ pageIndex: i, content: p.md }] : []));\n}\n\nfunction getHtmlItems(pages: LoadedPage[]): BrowseItem<LoadedHtmlContent>[] {\n  return pages.flatMap((p, i) => (p.html ? [{ pageIndex: i, content: p.html }] : []));\n}\n\nfunction getVideoItems(pages: LoadedPage[]): BrowseItem<LoadedVideoContent>[] {\n  return pages.flatMap((p, i) => (p.video ? [{ pageIndex: i, content: p.video }] : []));\n}\n\nfunction getBrowseIndexForPage<T>(items: BrowseItem<T>[], pageIndex: number): number {\n  const idx = items.findIndex((x) => x.pageIndex === pageIndex);\n  return idx >= 0 ? idx : 0;\n}\n\ninterface UseDocsShellNavigationStateArgs {\n  data: LoadedDocsData;\n  language: LanguageCode;\n  setSidebarOpen: (open: boolean) => void;\n  setMenuOpen: (open: boolean) => void;\n}\n\nexport function useDocsShellNavigationState({\n  data,\n  language,\n  setSidebarOpen,\n  setMenuOpen,\n}: UseDocsShellNavigationStateArgs) {\n  const [pageIndex, setPageIndex] = useState(0);\n  const [expandedMenuMap, setExpandedMenuMap] = useState<Record<string, boolean>>({});\n  const [mdBrowseIndex, setMdBrowseIndex] = useState(0);\n  const [htmlBrowseIndex, setHtmlBrowseIndex] = useState(0);\n  const [videoBrowseIndex, setVideoBrowseIndex] = useState(0);\n\n  const pages = data.pages ?? [];\n  const mdItems = getMdItems(pages);\n  const htmlItems = getHtmlItems(pages);\n  const videoItems = getVideoItems(pages);\n\n  useEffect(() => {\n    setMdBrowseIndex(getBrowseIndexForPage(mdItems, pageIndex));\n    setHtmlBrowseIndex(getBrowseIndexForPage(htmlItems, pageIndex));\n    setVideoBrowseIndex(getBrowseIndexForPage(videoItems, pageIndex));\n    // eslint-disable-next-line react-hooks/exhaustive-deps -- sync browse indices when page or items change\n  }, [pageIndex, pages.length, mdItems.length, htmlItems.length, videoItems.length]);\n\n  function onMenuClick(pathClick: string, ancestorKeys: string[] = []) {\n    const idx = getPageIndexByPathClick(data, pathClick);\n    if (idx >= 0) {\n      setPageIndex(idx);\n    }\n    if (ancestorKeys.length) {\n      setExpandedMenuMap((prev) => {\n        const nextMap = { ...prev };\n        ancestorKeys.forEach((key) => {\n          nextMap[key] = true;\n        });\n        return nextMap;\n      });\n    }\n    setSidebarOpen(true);\n    setMenuOpen(false);\n  }\n\n  function toggleNode(nodeKey: string) {\n    setExpandedMenuMap((prev) => ({\n      ...prev,\n      [nodeKey]: !prev[nodeKey],\n    }));\n  }\n\n  function isNodeExpanded(nodeKey: string): boolean {\n    return expandedMenuMap[nodeKey] ?? true;\n  }\n\n  function expandAncestors(ancestorKeys: string[]) {\n    if (ancestorKeys.length === 0) return;\n    setExpandedMenuMap((prev) => {\n      const next = { ...prev };\n      ancestorKeys.forEach((k) => { next[k] = true; });\n      return next;\n    });\n  }\n\n  return {\n    pageIndex,\n    setPageIndex,\n    routeIndex: pageIndex,\n    expandedMenuMap,\n    onMenuClick,\n    toggleNode,\n    isNodeExpanded,\n    mdBrowseIndex,\n    htmlBrowseIndex,\n    videoBrowseIndex,\n    setMdBrowseIndex,\n    setHtmlBrowseIndex,\n    setVideoBrowseIndex,\n    mdItems,\n    htmlItems,\n    videoItems,\n    expandAncestors,\n  };\n}\n","src/widgets/docs-shell/model/use-docs-shell-popups.ts":"import { useState } from \"react\";\n\nexport function useDocsShellPopups() {\n  const [menuOpen, setMenuOpen] = useState(false);\n  const [sidebarOpen, setSidebarOpen] = useState(true);\n  const [versionLinksPopupOpen, setVersionLinksPopupOpen] = useState(false);\n  const [infoPopupOpen, setInfoPopupOpen] = useState(false);\n\n  return {\n    menuOpen,\n    setMenuOpen,\n    sidebarOpen,\n    setSidebarOpen,\n    versionLinksPopupOpen,\n    setVersionLinksPopupOpen,\n    infoPopupOpen,\n    setInfoPopupOpen,\n  };\n}\n","src/widgets/docs-shell/model/use-docs-shell-theme-state.ts":"import { useEffect, useMemo, useState } from \"react\";\nimport { resolveThemeByMode } from \"@/entities/docs/lib/theme/resolve-theme-by-mode\";\nimport type { LayoutItem } from \"@/entities/docs/model/types\";\n\ninterface UseDocsShellThemeStateArgs {\n  layouts: LayoutItem[];\n  configuredDefaultMode: \"light\" | \"dark\";\n  initialThemeBaseId: string | undefined;\n  searchParams: URLSearchParams | { get(name: string): string | null };\n  themeModeStorageKey: string;\n  themeLayoutStorageKey: string;\n  pathname: string;\n  getCurrentSearchParams: () => URLSearchParams;\n  replaceUrlWithoutNavigation: (nextPathname: string, params: URLSearchParams) => void;\n}\n\nexport function useDocsShellThemeState({\n  layouts,\n  configuredDefaultMode,\n  initialThemeBaseId,\n  searchParams,\n  themeModeStorageKey,\n  themeLayoutStorageKey,\n  pathname,\n  getCurrentSearchParams,\n  replaceUrlWithoutNavigation,\n}: UseDocsShellThemeStateArgs) {\n  const initialThemeBase = layouts.find((layout) => layout.id === initialThemeBaseId) ?? layouts[0];\n  const initialThemeId = initialThemeBase ? resolveThemeByMode(layouts, initialThemeBase, configuredDefaultMode).id : \"\";\n  const [activeThemeId, setActiveThemeId] = useState(initialThemeId);\n  const [themeModeRestored, setThemeModeRestored] = useState(false);\n\n  const activeLayout = useMemo(() => layouts.find((layout) => layout.id === activeThemeId) ?? layouts[0], [layouts, activeThemeId]);\n  const nextMode = activeLayout?.mode === \"dark\" ? \"light\" : \"dark\";\n  const canToggleMode = Boolean(activeLayout?.supportsLightAndDarkModes);\n\n  useEffect(() => {\n    if (themeModeRestored) {\n      return;\n    }\n    try {\n      const urlMode = searchParams.get(\"modetheme\");\n      const savedMode = window.localStorage.getItem(themeModeStorageKey);\n      const savedThemeId = window.localStorage.getItem(themeLayoutStorageKey);\n      const targetMode =\n        urlMode === \"dark\" || urlMode === \"light\"\n          ? urlMode\n          : savedMode === \"light\" || savedMode === \"dark\"\n            ? savedMode\n            : configuredDefaultMode;\n      const baseLayout = layouts.find((layout) => layout.id === savedThemeId) ?? layouts.find((layout) => layout.id === initialThemeBaseId) ?? layouts[0];\n      if (baseLayout) {\n        const resolved = resolveThemeByMode(layouts, baseLayout, targetMode);\n        queueMicrotask(() => {\n          setActiveThemeId(resolved.id);\n          setThemeModeRestored(true);\n        });\n        return;\n      }\n    } catch {\n      // Ignore localStorage errors.\n    }\n    setThemeModeRestored(true);\n  }, [themeModeStorageKey, themeLayoutStorageKey, configuredDefaultMode, layouts, initialThemeBaseId, searchParams, themeModeRestored]);\n\n  useEffect(() => {\n    if (!themeModeRestored || !activeLayout?.mode) {\n      return;\n    }\n    try {\n      window.localStorage.setItem(themeModeStorageKey, activeLayout.mode);\n    } catch {\n      // Ignore localStorage errors.\n    }\n  }, [themeModeStorageKey, activeLayout?.mode, themeModeRestored]);\n\n  useEffect(() => {\n    if (!themeModeRestored || !activeThemeId) {\n      return;\n    }\n    try {\n      window.localStorage.setItem(themeLayoutStorageKey, activeThemeId);\n    } catch {\n      // Ignore localStorage errors.\n    }\n  }, [themeLayoutStorageKey, activeThemeId, themeModeRestored]);\n\n  useEffect(() => {\n    function syncThemeFromStorage() {\n      try {\n        const savedMode = window.localStorage.getItem(themeModeStorageKey);\n        const targetMode = savedMode === \"light\" || savedMode === \"dark\" ? savedMode : configuredDefaultMode;\n        const currentBase = layouts.find((layout) => layout.id === activeThemeId) ?? layouts[0];\n        if (!currentBase) {\n          return;\n        }\n        const resolved = resolveThemeByMode(layouts, currentBase, targetMode);\n        if (resolved.id !== activeThemeId) {\n          setActiveThemeId(resolved.id);\n        }\n      } catch {\n        // Ignore localStorage errors.\n      }\n    }\n\n    function onStorage(event: StorageEvent) {\n      if (event.key === themeModeStorageKey) {\n        syncThemeFromStorage();\n      }\n    }\n\n    function onVisibilityChange() {\n      if (!document.hidden) {\n        syncThemeFromStorage();\n      }\n    }\n\n    window.addEventListener(\"storage\", onStorage);\n    window.addEventListener(\"focus\", syncThemeFromStorage);\n    document.addEventListener(\"visibilitychange\", onVisibilityChange);\n    return () => {\n      window.removeEventListener(\"storage\", onStorage);\n      window.removeEventListener(\"focus\", syncThemeFromStorage);\n      document.removeEventListener(\"visibilitychange\", onVisibilityChange);\n    };\n  }, [themeModeStorageKey, configuredDefaultMode, layouts, activeThemeId]);\n\n  function updateModethemeInUrl(mode: \"dark\" | \"light\") {\n    const params = getCurrentSearchParams();\n    params.set(\"modetheme\", mode);\n    replaceUrlWithoutNavigation(pathname, params);\n  }\n\n  function onThemeChange(themeId: string) {\n    setActiveThemeId(themeId);\n    const layout = layouts.find((item) => item.id === themeId);\n    if (layout?.mode === \"dark\" || layout?.mode === \"light\") {\n      updateModethemeInUrl(layout.mode);\n    }\n  }\n\n  function onToggleMode() {\n    if (!activeLayout) {\n      return;\n    }\n    const paired = resolveThemeByMode(layouts, activeLayout, nextMode);\n    setActiveThemeId(paired.id);\n    if (paired.mode === \"dark\" || paired.mode === \"light\") {\n      updateModethemeInUrl(paired.mode);\n    }\n  }\n\n  return { activeThemeId, activeLayout, nextMode, canToggleMode, onThemeChange, onToggleMode };\n}\n","src/widgets/docs-shell/model/use-docs-shell-url-params.ts":"\"use client\";\n\nimport { useEffect } from \"react\";\nimport type { LanguageCode, LoadedDocsData } from \"@/entities/docs/model/types\";\nimport { getBreadcrumbTrail, getPageIndexByPathClick } from \"./menu-tree\";\nimport { buildUnifiedHeaderMenuTree } from \"./menu-tree\";\n\nexport type FullscreenContentType = \"md\" | \"html\" | \"video\" | null;\n\nexport interface UrlParamsAction {\n  type: \"navigate\";\n  pageIndex: number;\n  ancestorKeys: string[];\n}\n\nexport interface FullscreenParams {\n  type: FullscreenContentType;\n  lang: LanguageCode;\n  file?: string;\n  id?: number;\n  slug?: string;\n}\n\nfunction findPathClickBySlug(data: LoadedDocsData, slug: string, _lang: LanguageCode): string | null {\n  const keys = Object.keys(data.pathToPageMap ?? {});\n  const normalized = slug.toLowerCase().replace(/\\.(md|html)$/, \"\");\n  for (const key of keys) {\n    const lower = key.toLowerCase();\n    if (\n      lower.endsWith(`/${normalized}`) ||\n      lower.endsWith(`/${normalized}.md`) ||\n      lower.endsWith(`/${normalized}.html`)\n    ) {\n      return key;\n    }\n  }\n  return null;\n}\n\nexport function useDocsShellUrlParams(\n  searchParams: URLSearchParams,\n  data: LoadedDocsData,\n  language: LanguageCode,\n  setPageIndex: (idx: number) => void,\n  expandAncestors: (keys: string[]) => void,\n  onParamsProcessed?: (action: UrlParamsAction | null) => void,\n  onFullscreenRequest?: (params: FullscreenParams) => void\n) {\n  useEffect(() => {\n    const menuLang = searchParams.get(\"menu\") as LanguageCode | null;\n    const menuId = searchParams.get(\"id\");\n    const menuNome = searchParams.get(\"nome\");\n    const mdHash = typeof window !== \"undefined\" && window.location.hash ? window.location.hash.slice(1) : \"\";\n    const mdfull = searchParams.get(\"mdfull\");\n    const mdfullFile = searchParams.get(\"file\");\n    const videofull = searchParams.get(\"videofull\");\n    const videofullId = searchParams.get(\"id\");\n    const videofullSlug = searchParams.get(\"slug\");\n    const htmlfull = searchParams.get(\"htmlfull\");\n    const htmlfullFile = searchParams.get(\"file\");\n\n    if (onFullscreenRequest) {\n      if (mdfull && mdfullFile) {\n        onFullscreenRequest({ type: \"md\", lang: mdfull as LanguageCode, file: mdfullFile });\n        return;\n      }\n      if (videofull) {\n        const id = videofullId ? parseInt(videofullId, 10) : undefined;\n        onFullscreenRequest({\n          type: \"video\",\n          lang: videofull as LanguageCode,\n          id: Number.isNaN(id) ? undefined : id,\n          slug: videofullSlug ?? undefined,\n        });\n        return;\n      }\n      if (htmlfull && htmlfullFile) {\n        onFullscreenRequest({ type: \"html\", lang: htmlfull as LanguageCode, file: htmlfullFile });\n        return;\n      }\n    }\n\n    if (menuLang && (menuId || menuNome)) {\n      let pathClick: string | null = null;\n      let ancestorKeys: string[] = [];\n\n      if (menuId) {\n        const idNum = parseInt(menuId, 10);\n        if (!Number.isNaN(idNum)) {\n          const route = data.config.routes.find((r) => r.id === idNum);\n          if (route && route.path) {\n            pathClick = (route.path as Record<string, string>)[menuLang] ?? (route.path as Record<string, string>).en ?? null;\n          }\n        }\n      } else if (menuNome) {\n        pathClick = findPathClickBySlug(data, menuNome, menuLang);\n      }\n\n      if (pathClick) {\n        const pageIdx = getPageIndexByPathClick(data, pathClick);\n        if (pageIdx >= 0) {\n          const tree = buildUnifiedHeaderMenuTree(data, menuLang, pageIdx);\n          const trail = getBreadcrumbTrail(tree, pathClick);\n          const ancestorKeys = trail.length > 0 ? trail[trail.length - 1].ancestorKeys : [];\n          setPageIndex(pageIdx);\n          expandAncestors(ancestorKeys);\n          onParamsProcessed?.({ type: \"navigate\", pageIndex: pageIdx, ancestorKeys });\n        }\n      }\n    }\n\n    if (mdHash && typeof window !== \"undefined\") {\n      const el = document.getElementById(mdHash);\n      if (el) {\n        setTimeout(() => el.scrollIntoView({ behavior: \"smooth\" }), 100);\n      }\n    }\n\n    onParamsProcessed?.(null);\n  }, [\n    searchParams,\n    data,\n    language,\n    setPageIndex,\n    expandAncestors,\n    onParamsProcessed,\n    onFullscreenRequest,\n  ]);\n}\n","src/widgets/docs-shell/model/use-docs-shell-url.ts":"import { useCallback } from \"react\";\nimport { usePathname, useRouter, useSearchParams } from \"next/navigation\";\nimport { toFullPath } from \"@/shared/lib/base-path\";\n\nexport function useDocsShellUrl() {\n  const pathname = usePathname();\n  const router = useRouter();\n  const searchParams = useSearchParams();\n\n  const getCurrentSearchParams = useCallback((): URLSearchParams => {\n    if (typeof window !== \"undefined\") {\n      return new URLSearchParams(window.location.search);\n    }\n    return new URLSearchParams(searchParams.toString());\n  }, [searchParams]);\n\n  const replaceUrlWithoutNavigation = useCallback(\n    (nextPathname: string, params: URLSearchParams): void => {\n      if (typeof window !== \"undefined\") {\n        const appPath = nextPathname || pathname || \"/\";\n        const qs = params.toString();\n        const nextUrl = qs ? `${toFullPath(appPath)}?${qs}` : toFullPath(appPath);\n        window.history.replaceState({}, \"\", nextUrl);\n        return;\n      }\n      const normalizedPath = nextPathname || pathname || \"/\";\n      const qs = params.toString();\n      router.replace(qs ? `${normalizedPath}?${qs}` : normalizedPath);\n    },\n    [pathname, router],\n  );\n\n  return { getCurrentSearchParams, replaceUrlWithoutNavigation, pathname, searchParams, router };\n}\n","src/widgets/docs-shell/model/use-docs-shell-version-sync.ts":"import { useEffect } from \"react\";\nimport { useSearchParams } from \"next/navigation\";\nimport { buildVersionPath } from \"@/entities/docs/lib/routing/version-path\";\nimport { toFullPath } from \"@/shared/lib/base-path\";\nimport type { VersionEntry } from \"@/entities/docs/model/types\";\n\nexport function useDocsShellVersionSync(options: {\n  showVersionSelector: boolean;\n  isRemoteRepositorySession: boolean;\n  pathname: string;\n  versionStorageKey: string;\n  availableVersions: VersionEntry[];\n  routerReplace: (url: string) => void;\n}) {\n  const searchParams = useSearchParams();\n  const {\n    showVersionSelector,\n    isRemoteRepositorySession,\n    pathname,\n    versionStorageKey,\n    availableVersions,\n    routerReplace,\n  } = options;\n\n  useEffect(() => {\n    if (!showVersionSelector) return;\n    const params = new URLSearchParams(searchParams.toString());\n    const urlVersion = params.get(\"version\");\n    const hasVersionInPath = /\\/v\\/[^/]+\\/?$/.test(pathname);\n    const pathVersionMatch = pathname.match(/\\/v\\/([^/]+)\\/?$/);\n    const versionFromPath = pathVersionMatch?.[1];\n    const hasVersionInConfig = (versionId: string | null | undefined) =>\n      Boolean(versionId && availableVersions.some((v) => v.id === versionId));\n\n    if (isRemoteRepositorySession) {\n      const validUrlVersion = hasVersionInConfig(urlVersion) ? urlVersion : undefined;\n      const validPathVersion = hasVersionInConfig(versionFromPath) ? versionFromPath : undefined;\n\n      if (validUrlVersion && validUrlVersion !== validPathVersion) {\n        const appBase = pathname.replace(/\\/v\\/[^/]+\\/?$/, \"\").replace(/\\/$/, \"\");\n        params.delete(\"version\");\n        const targetAppPath = buildVersionPath(appBase, validUrlVersion);\n        const qs = params.toString();\n        const nextUrl = qs ? `${targetAppPath}?${qs}` : targetAppPath;\n        if (typeof window !== \"undefined\") {\n          window.location.replace(qs ? `${toFullPath(targetAppPath)}?${qs}` : toFullPath(targetAppPath));\n        } else {\n          routerReplace(nextUrl);\n        }\n        return;\n      }\n\n      if (urlVersion && !validUrlVersion) {\n        params.delete(\"version\");\n        if (typeof window !== \"undefined\") {\n          const qs = params.toString();\n          const nextUrl = qs ? `${toFullPath(pathname)}?${qs}` : toFullPath(pathname);\n          window.history.replaceState({}, \"\", nextUrl);\n        } else {\n          const qs = params.toString();\n          routerReplace(qs ? `${pathname}?${qs}` : pathname);\n        }\n      }\n      return;\n    }\n\n    params.delete(\"version\");\n    if (urlVersion && availableVersions.some((v) => v.id === urlVersion) && !hasVersionInPath) {\n      const appBase = pathname.replace(/\\/$/, \"\") || pathname;\n      const target = `${appBase}/v/${urlVersion}`;\n      const qs = params.toString();\n      routerReplace(qs ? `${target}?${qs}` : target);\n      return;\n    }\n    try {\n      const savedVersion = window.localStorage.getItem(versionStorageKey);\n      if (savedVersion && availableVersions.some((v) => v.id === savedVersion) && !hasVersionInPath) {\n        const appBase = pathname.replace(/\\/v\\/[^/]+\\/?$/, \"\").replace(/\\/$/, \"\") || pathname;\n        const target = buildVersionPath(appBase, savedVersion);\n        const qs = params.toString();\n        routerReplace(qs ? `${target}?${qs}` : target);\n      }\n    } catch {\n      // Ignore localStorage errors (private mode / blocked storage).\n    }\n  }, [\n    showVersionSelector,\n    isRemoteRepositorySession,\n    searchParams,\n    versionStorageKey,\n    availableVersions,\n    pathname,\n    routerReplace,\n  ]);\n}\n","src/widgets/docs-shell/model/use-focus-mode.ts":"import { useMemo, useState } from \"react\";\n\nfunction splitMarkdownHtmlIntoPages(html: string): string[] {\n  const content = html.trim();\n  if (!content) {\n    return [];\n  }\n  const headingRegex = /<h[1-6][^>]*>[\\s\\S]*?<\\/h[1-6]>/gi;\n  const headingMatches = Array.from(content.matchAll(headingRegex));\n  if (!headingMatches.length) {\n    return [content];\n  }\n  const pages: string[] = [];\n  const firstHeadingIndex = headingMatches[0]?.index ?? 0;\n  const intro = content.slice(0, firstHeadingIndex).trim();\n  if (intro) {\n    pages.push(intro);\n  }\n  headingMatches.forEach((match, index) => {\n    const start = match.index ?? 0;\n    const end = headingMatches[index + 1]?.index ?? content.length;\n    const sectionHtml = content.slice(start, end).trim();\n    if (sectionHtml) {\n      pages.push(sectionHtml);\n    }\n  });\n  return pages.length ? pages : [content];\n}\n\nexport function useFocusMode(markdownHtml: string) {\n  const [focusModeOpen, setFocusModeOpen] = useState(false);\n  const [focusModePageIndex, setFocusModePageIndex] = useState(0);\n  const focusModePages = useMemo(() => splitMarkdownHtmlIntoPages(markdownHtml), [markdownHtml]);\n  const safeFocusModePageIndex =\n    focusModePageIndex >= 0 && focusModePageIndex < focusModePages.length ? focusModePageIndex : 0;\n  const focusModeCurrentHtml = focusModePages[safeFocusModePageIndex] ?? markdownHtml;\n  const canFocusModeGoPrevious = safeFocusModePageIndex > 0;\n  const canFocusModeGoNext = safeFocusModePageIndex < focusModePages.length - 1;\n\n  function openFocusMode() {\n    setFocusModePageIndex(0);\n    setFocusModeOpen(true);\n  }\n\n  function closeFocusMode() {\n    setFocusModeOpen(false);\n  }\n\n  function onFocusModeNavigate(offset: -1 | 1) {\n    setFocusModePageIndex((prev) => {\n      const next = prev + offset;\n      if (next < 0 || next >= focusModePages.length) {\n        return prev;\n      }\n      return next;\n    });\n  }\n\n  return {\n    focusModeOpen,\n    setFocusModeOpen,\n    focusModePages,\n    safeFocusModePageIndex,\n    focusModeCurrentHtml,\n    canFocusModeGoPrevious,\n    canFocusModeGoNext,\n    openFocusMode,\n    closeFocusMode,\n    onFocusModeNavigate,\n  };\n}\n","src/widgets/docs-shell/model/use-quick-navigation.ts":"import { useEffect, useMemo, useRef, useState } from \"react\";\n\ninterface QuickNavigationEntryBase {\n  searchLabel: string;\n}\n\nexport function useQuickNavigation<TEntry extends QuickNavigationEntryBase>(entries: TEntry[]) {\n  const [quickNavOpen, setQuickNavOpen] = useState(false);\n  const [quickNavQuery, setQuickNavQuery] = useState(\"\");\n  const [quickNavActiveIndex, setQuickNavActiveIndex] = useState(0);\n  const quickNavListRef = useRef<HTMLDivElement | null>(null);\n  const quickNavItemRefs = useRef<Array<HTMLButtonElement | null>>([]);\n\n  const filteredQuickNavEntries = useMemo<TEntry[]>(() => {\n    const normalizedQuery = quickNavQuery.trim().toLowerCase();\n    if (!normalizedQuery) {\n      return entries;\n    }\n    return entries.filter((entry) => entry.searchLabel.toLowerCase().includes(normalizedQuery));\n  }, [entries, quickNavQuery]);\n\n  function openQuickNavigation() {\n    setQuickNavOpen(true);\n    setQuickNavQuery(\"\");\n    setQuickNavActiveIndex(0);\n  }\n\n  function closeQuickNavigation() {\n    setQuickNavOpen(false);\n    setQuickNavQuery(\"\");\n    setQuickNavActiveIndex(0);\n  }\n\n  useEffect(() => {\n    if (!quickNavOpen) {\n      return;\n    }\n    const list = quickNavListRef.current;\n    const activeButton = quickNavItemRefs.current[quickNavActiveIndex];\n    if (!list || !activeButton) {\n      return;\n    }\n    activeButton.scrollIntoView({ block: \"nearest\" });\n  }, [quickNavOpen, quickNavActiveIndex, filteredQuickNavEntries.length]);\n\n  useEffect(() => {\n    if (!quickNavOpen) {\n      return;\n    }\n    quickNavListRef.current?.scrollTo({ top: 0, behavior: \"auto\" });\n  }, [quickNavOpen, quickNavQuery]);\n\n  return {\n    quickNavOpen,\n    setQuickNavOpen,\n    quickNavQuery,\n    setQuickNavQuery,\n    quickNavActiveIndex,\n    setQuickNavActiveIndex,\n    quickNavListRef,\n    quickNavItemRefs,\n    filteredQuickNavEntries,\n    openQuickNavigation,\n    closeQuickNavigation,\n  };\n}\n","src/widgets/docs-shell/model/use-version-routing.ts":"import { useMemo } from \"react\";\nimport { buildVersionPath } from \"@/entities/docs/lib/routing/version-path\";\nimport type { LanguageCode, VersionEntry } from \"@/entities/docs/model/types\";\nimport { toFullPath } from \"@/shared/lib/base-path\";\n\ninterface UseVersionRoutingArgs {\n  pathname: string;\n  versionFromQuery: string | null;\n  activeVersionId?: string;\n  availableVersions: VersionEntry[];\n  isLanguageSelectVisible: boolean;\n  isRemoteRepositorySession: boolean;\n  language: LanguageCode;\n  getCurrentSearchParams: () => URLSearchParams;\n  routerReplace: (url: string) => void;\n}\n\nexport function useVersionRouting({\n  pathname,\n  versionFromQuery,\n  activeVersionId,\n  availableVersions,\n  isLanguageSelectVisible,\n  isRemoteRepositorySession,\n  language,\n  getCurrentSearchParams,\n  routerReplace,\n}: UseVersionRoutingArgs) {\n  const versionFromPath = useMemo(() => {\n    const match = pathname.match(/\\/v\\/([^/]+)\\/?$/);\n    return match?.[1];\n  }, [pathname]);\n\n  const selectedVersionValue = useMemo(() => {\n    const isKnownVersion = (versionId: string | null | undefined) =>\n      Boolean(versionId && availableVersions.some((version) => version.id === versionId));\n    if (isKnownVersion(versionFromPath)) {\n      return versionFromPath as string;\n    }\n    if (isKnownVersion(versionFromQuery)) {\n      return versionFromQuery as string;\n    }\n    if (isKnownVersion(activeVersionId)) {\n      return activeVersionId as string;\n    }\n    return availableVersions[0]?.id ?? \"\";\n  }, [versionFromPath, versionFromQuery, activeVersionId, availableVersions]);\n\n  function buildPathFromCurrentLocation(versionId: string): { targetPath: string; params: URLSearchParams } {\n    const cleanPath = pathname.replace(/\\/v\\/[^/]+\\/?$/, \"\").replace(/\\/$/, \"\");\n    const params = typeof window !== \"undefined\" ? new URLSearchParams(window.location.search) : getCurrentSearchParams();\n    return { targetPath: buildVersionPath(cleanPath, versionId), params };\n  }\n\n  function onVersionChange(versionId: string) {\n    const cleanPath = pathname.replace(/\\/v\\/[^/]+\\/?$/, \"\").replace(/\\/$/, \"\");\n    const targetAppPath = buildVersionPath(cleanPath, versionId);\n\n    if (isRemoteRepositorySession) {\n      if (typeof window !== \"undefined\") {\n        const params = new URLSearchParams(window.location.search);\n        params.set(\"lang\", String(language));\n        params.delete(\"version\");\n        const qs = params.toString();\n        const fullUrl = qs ? `${toFullPath(targetAppPath)}?${qs}` : toFullPath(targetAppPath);\n        window.location.assign(fullUrl);\n      } else {\n        const params = getCurrentSearchParams();\n        params.delete(\"version\");\n        params.set(\"lang\", String(language));\n        const qs = params.toString();\n        routerReplace(qs ? `${targetAppPath}?${qs}` : targetAppPath);\n      }\n      return;\n    }\n\n    const { params } = buildPathFromCurrentLocation(versionId);\n    params.delete(\"version\");\n    if (isLanguageSelectVisible) {\n      params.set(\"lang\", language);\n    } else {\n      params.delete(\"lang\");\n    }\n    const qs = params.toString();\n    const nextUrl = qs ? `${targetAppPath}?${qs}` : targetAppPath;\n    if (typeof window !== \"undefined\") {\n      window.location.assign(qs ? `${toFullPath(targetAppPath)}?${qs}` : toFullPath(targetAppPath));\n      return;\n    }\n    routerReplace(nextUrl);\n  }\n\n  return { versionFromPath, selectedVersionValue, onVersionChange };\n}\n","src/widgets/docs-shell/ui/content-type-containers/content-container-wrapper.tsx":"\"use client\";\n\nimport { useState } from \"react\";\nimport { FiX } from \"react-icons/fi\";\nimport { MdFullscreen } from \"react-icons/md\";\nimport styles from \"../../docs-shell.module.css\";\n\nconst DEFAULT_CONTAINER_MARGIN = \"0\";\n\nexport interface BrowseNavProps {\n  onPrev: () => void;\n  onNext: () => void;\n  prevLabel: string;\n  nextLabel: string;\n  canPrev: boolean;\n  canNext: boolean;\n  currentIndex: number;\n  total: number;\n  contentTypeLabel?: string;\n}\n\ninterface ContentContainerWrapperProps {\n  header?: React.ReactNode;\n  children: React.ReactNode;\n  fullscreenEnabled?: boolean;\n  fullscreenCloseLabel: string;\n  fullscreenExpandLabel: string;\n  marginTop?: string;\n  marginBottom?: string;\n  browseNav?: BrowseNavProps;\n  browseNavPosition?: \"top\" | \"bottom\" | \"both\";\n}\n\nfunction BrowseNavBar({ browseNav }: { browseNav: BrowseNavProps }) {\n  const countText = `${browseNav.currentIndex + 1}/${browseNav.total}`;\n  return (\n    <div className={styles.browseNavBar}>\n      <button\n        type=\"button\"\n        className={styles.button}\n        onClick={browseNav.onPrev}\n        disabled={!browseNav.canPrev}\n        aria-label={browseNav.prevLabel}\n      >\n        {browseNav.prevLabel}\n      </button>\n      <span className={styles.browseCount} aria-live=\"polite\">\n        {browseNav.contentTypeLabel ? `${browseNav.contentTypeLabel} ${countText}` : countText}\n      </span>\n      <button\n        type=\"button\"\n        className={styles.button}\n        onClick={browseNav.onNext}\n        disabled={!browseNav.canNext}\n        aria-label={browseNav.nextLabel}\n      >\n        {browseNav.nextLabel}\n      </button>\n    </div>\n  );\n}\n\nexport function ContentContainerWrapper({\n  header,\n  children,\n  fullscreenEnabled = false,\n  fullscreenCloseLabel,\n  fullscreenExpandLabel,\n  marginTop,\n  marginBottom,\n  browseNav,\n  browseNavPosition = \"top\",\n}: ContentContainerWrapperProps) {\n  const [isFullscreen, setIsFullscreen] = useState(false);\n  const marginTopVal = marginTop?.trim() || DEFAULT_CONTAINER_MARGIN;\n  const marginBottomVal = marginBottom?.trim() || DEFAULT_CONTAINER_MARGIN;\n\n  const wrapperStyle = {\n    marginTop: marginTopVal,\n    marginBottom: marginBottomVal,\n  };\n\n  const showTopNav = browseNav && (browseNavPosition === \"top\" || browseNavPosition === \"both\");\n\n  if (!fullscreenEnabled) {\n    return (\n      <div style={wrapperStyle}>\n        {header}\n        {showTopNav && <BrowseNavBar browseNav={browseNav} />}\n        {children}\n      </div>\n    );\n  }\n\n  return (\n    <div className={styles.contentContainerWrapper} style={wrapperStyle}>\n      {header}\n      {showTopNav && <BrowseNavBar browseNav={browseNav} />}\n      <div className={styles.contentContainerWithButton}>\n        <button\n          type=\"button\"\n          className={styles.fullscreenButtonInside}\n          onClick={() => setIsFullscreen(true)}\n          aria-label={fullscreenExpandLabel}\n          title={fullscreenExpandLabel}\n        >\n          <MdFullscreen aria-hidden />\n        </button>\n        {children}\n      </div>\n      {isFullscreen && (\n        <div\n          className={styles.contentContainerFullscreen}\n          role=\"dialog\"\n          aria-modal=\"true\"\n          aria-label={fullscreenCloseLabel}\n        >\n          <button\n            type=\"button\"\n            className={styles.fullscreenCloseButton}\n            onClick={() => setIsFullscreen(false)}\n            aria-label={fullscreenCloseLabel}\n            title={fullscreenCloseLabel}\n          >\n            <FiX aria-hidden />\n          </button>\n          <div className={styles.contentContainerFullscreenInner}>{children}</div>\n        </div>\n      )}\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/content-type-containers/content-header-block.tsx":"\"use client\";\n\nimport type { ContentTypeRouteConfig } from \"@/entities/docs/model/types\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\nimport styles from \"../../docs-shell.module.css\";\n\nfunction parseCssToStyle(css: string | undefined): React.CSSProperties {\n  if (!css) return {};\n  const out: Record<string, string> = {};\n  css.split(\";\").forEach((part) => {\n    const idx = part.indexOf(\":\");\n    if (idx < 0) return;\n    const k = part.slice(0, idx).trim();\n    const v = part.slice(idx + 1).trim();\n    if (!k || !v) return;\n    const camel = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());\n    out[camel] = v;\n  });\n  return out as React.CSSProperties;\n}\n\nexport interface ContentHeaderBlockProps {\n  config?: ContentTypeRouteConfig;\n  language: LanguageCode;\n  isDarkMode?: boolean;\n}\n\nexport function ContentHeaderBlock({ config, language, isDarkMode = false }: ContentHeaderBlockProps) {\n  const title = config?.title?.[language] ?? config?.title?.en;\n  const description = config?.description?.[language] ?? config?.description?.en;\n  const titleIsVisible = config?.titleIsVisible ?? false;\n  const descriptionIsVisible = config?.descriptionIsVisible ?? false;\n  const titlePosition = config?.titlePosition ?? \"center\";\n  const descriptionPosition = config?.descriptionPosition ?? \"center\";\n  const titleCss = isDarkMode ? config?.titleDarkCss ?? config?.titleCss : config?.titleLightCss ?? config?.titleCss;\n  const descCss = isDarkMode ? config?.descriptionDarkCss ?? config?.descriptionCss : config?.descriptionLightCss ?? config?.descriptionCss;\n\n  if (!(titleIsVisible && title) && !(descriptionIsVisible && description)) {\n    return null;\n  }\n\n  return (\n    <header className={styles.contentHeaderAboveCard}>\n      {titleIsVisible && title && (\n        <h1\n          className={styles.contentTitle}\n          style={{\n            textAlign: ([\"center\", \"left\", \"right\"].includes(titlePosition ?? \"\") ? titlePosition : \"center\") as React.CSSProperties[\"textAlign\"],\n            ...parseCssToStyle(titleCss),\n          }}\n        >\n          {title}\n        </h1>\n      )}\n      {descriptionIsVisible && description && (\n        <h3\n          className={styles.contentDescription}\n          style={{\n            textAlign: ([\"center\", \"left\", \"right\"].includes(descriptionPosition ?? \"\") ? descriptionPosition : \"center\") as React.CSSProperties[\"textAlign\"],\n            ...parseCssToStyle(descCss),\n          }}\n        >\n          {description}\n        </h3>\n      )}\n    </header>\n  );\n}\n","src/widgets/docs-shell/ui/content-type-containers/html-container.tsx":"\"use client\";\n\nimport { useMemo } from \"react\";\nimport type { ContentTypeRouteConfig } from \"@/entities/docs/model/types\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\nimport { isFrameBlockedUrl } from \"@/shared/lib/is-frame-blocked-url\";\nimport { ContentContainerWrapper, type BrowseNavProps } from \"./content-container-wrapper\";\nimport { ContentHeaderBlock } from \"./content-header-block\";\nimport styles from \"../../docs-shell.module.css\";\n\nconst BASE_TARGET_BLANK = \"<base target=\\\"_blank\\\" />\";\nconst BASE_TARGET_SELF = \"<base target=\\\"_self\\\" />\";\n\nconst EXTERNAL_LINK_LABELS: Record<string, { message: string; button: string }> = {\n  pt: {\n    message: \"Esta página não pode ser incorporada. Abra em uma nova aba para visualizar.\",\n    button: \"Abrir em nova aba\",\n  },\n  es: {\n    message: \"Esta página no puede incrustarse. Ábrela en una nueva pestaña para verla.\",\n    button: \"Abrir en nueva pestaña\",\n  },\n  en: {\n    message: \"This page cannot be embedded. Open it in a new tab to view.\",\n    button: \"Open in new tab\",\n  },\n};\n\nfunction getExternalLinkLabels(lang: string) {\n  return EXTERNAL_LINK_LABELS[lang] ?? EXTERNAL_LINK_LABELS.en;\n}\n\ninterface ExternalLinkFallbackProps {\n  url: string;\n  language: string;\n  messageClassName: string;\n  buttonClassName: string;\n}\n\nfunction ExternalLinkFallback({\n  url,\n  language,\n  messageClassName,\n  buttonClassName,\n}: ExternalLinkFallbackProps) {\n  const { message, button } = getExternalLinkLabels(language);\n  return (\n    <div className={styles.externalLinkCard}>\n      <p className={messageClassName}>{message}</p>\n      <a href={url} target=\"_blank\" rel=\"noopener noreferrer\" className={buttonClassName}>\n        {button}\n      </a>\n    </div>\n  );\n}\n\nfunction injectBaseTarget(html: string, blockLink: boolean): string {\n  const baseTag = blockLink ? BASE_TARGET_BLANK : BASE_TARGET_SELF;\n  const lower = html.toLowerCase();\n  const headEnd = lower.indexOf(\"</head>\");\n  if (headEnd >= 0) {\n    return html.slice(0, headEnd) + baseTag + html.slice(headEnd);\n  }\n  return baseTag + html;\n}\n\nfunction getContainerStyle(container: ContentTypeRouteConfig[\"container\"]): React.CSSProperties {\n  if (container === \"full\") {\n    return { minHeight: \"80vh\", overflow: \"auto\" };\n  }\n  if (typeof container === \"number\" && container > 0) {\n    return { height: container, overflow: \"auto\" };\n  }\n  return {};\n}\n\ninterface HtmlContainerProps {\n  html?: string;\n  url?: string;\n  config?: ContentTypeRouteConfig;\n  language: LanguageCode;\n  fullscreenEnabled?: boolean;\n  fullscreenCloseLabel: string;\n  fullscreenExpandLabel: string;\n  isDarkMode?: boolean;\n  browseNav?: BrowseNavProps;\n}\n\nexport function HtmlContainer({\n  html = \"\",\n  url,\n  config,\n  language,\n  fullscreenEnabled = false,\n  fullscreenCloseLabel,\n  fullscreenExpandLabel,\n  isDarkMode = false,\n  browseNav,\n}: HtmlContainerProps) {\n  const blockLink = config?.blockLink !== false;\n  const srcdoc = useMemo(\n    () => (html ? injectBaseTarget(html, blockLink) : null),\n    [html, blockLink],\n  );\n\n  const containerStyle = getContainerStyle(config?.container);\n  const externalUrl = url ?? config?.url?.[language] ?? config?.url?.en;\n  const useExternalUrl = Boolean(externalUrl);\n  const isBlocked = useExternalUrl && isFrameBlockedUrl(externalUrl ?? undefined);\n\n  const header = <ContentHeaderBlock config={config} language={language} isDarkMode={isDarkMode} />;\n  const wrapperClass = isBlocked\n    ? `${styles.htmlWrapper} ${styles.htmlWrapperExternalLink}`\n    : styles.htmlWrapper;\n  const content = (\n    <article className={styles.card}>\n      <div className={wrapperClass} style={containerStyle}>\n        {isBlocked ? (\n          <ExternalLinkFallback\n            url={externalUrl ?? \"\"}\n            language={language}\n            messageClassName={styles.externalLinkMessage}\n            buttonClassName={styles.externalLinkButton}\n          />\n        ) : useExternalUrl ? (\n          <iframe\n            title=\"HTML content\"\n            className={styles.htmlIframe}\n            src={externalUrl ?? \"\"}\n            sandbox=\"allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox\"\n            referrerPolicy=\"no-referrer\"\n          />\n        ) : (\n          <iframe\n            title=\"HTML content\"\n            className={styles.htmlIframe}\n            srcDoc={srcdoc ?? undefined}\n            sandbox=\"allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox\"\n            referrerPolicy=\"no-referrer\"\n          />\n        )}\n      </div>\n    </article>\n  );\n\n  return (\n    <ContentContainerWrapper\n      header={header}\n      fullscreenEnabled={fullscreenEnabled}\n      fullscreenCloseLabel={fullscreenCloseLabel}\n      fullscreenExpandLabel={fullscreenExpandLabel}\n      marginTop={config?.marginTop}\n      marginBottom={config?.marginBottom}\n      browseNav={browseNav}\n    >\n      {content}\n    </ContentContainerWrapper>\n  );\n}\n","src/widgets/docs-shell/ui/content-type-containers/index.ts":"export { MdContainer } from \"./md-container\";\nexport { HtmlContainer } from \"./html-container\";\nexport { VideoContainer } from \"./video-container\";\n","src/widgets/docs-shell/ui/content-type-containers/md-container.tsx":"\"use client\";\n\nimport { useMemo } from \"react\";\nimport type { ContentTypeRouteConfig } from \"@/entities/docs/model/types\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\nimport type { BreadcrumbItem } from \"@/widgets/docs-shell/model/menu-tree\";\nimport type { ResolvedRouteGuideIconConfig } from \"@/shared/lib/resolve-site-assets\";\nimport { extractHeadingsFromHtml } from \"@/entities/docs/lib/markdown/extract-headings\";\nimport { ContentContainerWrapper, type BrowseNavProps } from \"./content-container-wrapper\";\nimport { ContentHeaderBlock } from \"./content-header-block\";\nimport { RouteGuideBreadcrumb, TocTree } from \"@/features/route-guide\";\nimport styles from \"../../docs-shell.module.css\";\n\nfunction getContainerStyle(container: ContentTypeRouteConfig[\"container\"]): React.CSSProperties {\n  if (container === \"full\") {\n    return { minHeight: \"80vh\", overflow: \"auto\" };\n  }\n  if (typeof container === \"number\" && container > 0) {\n    return { height: container, overflow: \"auto\" };\n  }\n  return {};\n}\n\ninterface MdContainerProps {\n  html: string;\n  config?: ContentTypeRouteConfig;\n  language: LanguageCode;\n  fullscreenEnabled?: boolean;\n  fullscreenCloseLabel: string;\n  fullscreenExpandLabel: string;\n  isDarkMode?: boolean;\n  browseNav?: BrowseNavProps;\n  routeGuideEnabled?: boolean;\n  breadcrumbTrail?: BreadcrumbItem[];\n  onBreadcrumbClick?: (pathClick: string, ancestorKeys: string[]) => void;\n  homePathClick?: string;\n  homeAncestorKeys?: string[];\n  routeGuideIconConfig?: ResolvedRouteGuideIconConfig;\n}\n\nexport function MdContainer({\n  html,\n  config,\n  language,\n  fullscreenEnabled = false,\n  fullscreenCloseLabel,\n  fullscreenExpandLabel,\n  isDarkMode = false,\n  browseNav,\n  routeGuideEnabled = false,\n  breadcrumbTrail = [],\n  onBreadcrumbClick,\n  homePathClick,\n  homeAncestorKeys = [],\n  routeGuideIconConfig,\n}: MdContainerProps) {\n  const containerStyle = getContainerStyle(config?.container);\n  const breadcrumb =\n    routeGuideEnabled &&\n    breadcrumbTrail.length > 0 &&\n    onBreadcrumbClick &&\n    routeGuideIconConfig ? (\n      <RouteGuideBreadcrumb\n        trail={breadcrumbTrail}\n        onNavigate={onBreadcrumbClick}\n        iconConfig={routeGuideIconConfig}\n        homePathClick={homePathClick}\n        homeAncestorKeys={homeAncestorKeys}\n      />\n    ) : null;\n\n  const routeguideBrand = config && \"RouteguideBrand\" in config && config.RouteguideBrand === true;\n  const headings = useMemo(() => {\n    if (!routeguideBrand) return [];\n    const specificIds =\n      config && \"RouteGuideSpeciFicbrand\" in config ? (config.RouteGuideSpeciFicbrand ?? []) : [];\n    return extractHeadingsFromHtml(html, specificIds);\n  }, [routeguideBrand, html, config]);\n  const toc = routeguideBrand && headings.length > 0 ? <TocTree headings={headings} /> : null;\n\n  const header = (\n    <>\n      {breadcrumb}\n      <ContentHeaderBlock config={config} language={language} isDarkMode={isDarkMode} />\n      {toc}\n    </>\n  );\n  const content = (\n    <article className={styles.card}>\n      <div className={styles.markdown} style={containerStyle} dangerouslySetInnerHTML={{ __html: html }} />\n    </article>\n  );\n\n  return (\n    <ContentContainerWrapper\n      header={header}\n      fullscreenEnabled={fullscreenEnabled}\n      fullscreenCloseLabel={fullscreenCloseLabel}\n      fullscreenExpandLabel={fullscreenExpandLabel}\n      marginTop={config?.marginTop}\n      marginBottom={config?.marginBottom}\n      browseNav={browseNav}\n    >\n      {content}\n    </ContentContainerWrapper>\n  );\n}\n","src/widgets/docs-shell/ui/content-type-containers/video-container.tsx":"\"use client\";\n\nimport type { ContentTypeRouteConfig } from \"@/entities/docs/model/types\";\nimport type { LanguageCode } from \"@/entities/docs/model/types\";\nimport { getEmbedUrl, isNativeAudio, isNativeVideo } from \"@/entities/docs/lib/video/embed-url\";\nimport { ContentContainerWrapper, type BrowseNavProps } from \"./content-container-wrapper\";\nimport styles from \"../../docs-shell.module.css\";\n\nfunction getContainerStyle(container: ContentTypeRouteConfig[\"container\"]): React.CSSProperties {\n  if (container === \"full\") {\n    return { minHeight: \"80vh\", overflow: \"auto\" };\n  }\n  if (typeof container === \"number\" && container > 0) {\n    return { height: container, overflow: \"auto\" };\n  }\n  return {};\n}\n\nfunction parseCssToStyle(css: string | undefined): React.CSSProperties {\n  if (!css) return {};\n  const out: Record<string, string> = {};\n  css.split(\";\").forEach((part) => {\n    const idx = part.indexOf(\":\");\n    if (idx < 0) return;\n    const k = part.slice(0, idx).trim();\n    const v = part.slice(idx + 1).trim();\n    if (!k || !v) return;\n    const camel = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());\n    out[camel] = v;\n  });\n  return out as React.CSSProperties;\n}\n\ninterface VideoContainerProps {\n  videoType: string;\n  pathVideo: string;\n  language: LanguageCode;\n  config?: ContentTypeRouteConfig;\n  fullscreenEnabled?: boolean;\n  fullscreenCloseLabel: string;\n  fullscreenExpandLabel: string;\n  isDarkMode?: boolean;\n  browseNav?: BrowseNavProps;\n}\n\nexport function VideoContainer({\n  videoType,\n  pathVideo,\n  language,\n  config,\n  fullscreenEnabled = false,\n  fullscreenCloseLabel,\n  fullscreenExpandLabel,\n  isDarkMode = false,\n  browseNav,\n}: VideoContainerProps) {\n  const type = String(videoType).toLowerCase();\n  const embedUrl = getEmbedUrl(videoType, pathVideo, language);\n\n  const title = config?.title?.[language] ?? config?.title?.en;\n  const description = config?.description?.[language] ?? config?.description?.en;\n  const titleIsVisible = config?.titleIsVisible ?? false;\n  const descriptionIsVisible = config?.descriptionIsVisible ?? false;\n  const titleCss = isDarkMode ? config?.titleDarkCss ?? config?.titleCss : config?.titleLightCss ?? config?.titleCss;\n  const descCss = isDarkMode ? config?.descriptionDarkCss ?? config?.descriptionCss : config?.descriptionLightCss ?? config?.descriptionCss;\n\n  const mediaElement = (() => {\n    if (isNativeAudio(type)) {\n      return (\n        <div className={styles.videoWrapper}>\n          <audio controls className={styles.videoNative} src={embedUrl}>\n            Your browser does not support the audio element.\n          </audio>\n        </div>\n      );\n    }\n    if (isNativeVideo(type)) {\n      return (\n        <div className={styles.videoWrapper}>\n          <video controls className={styles.videoNative} src={embedUrl} style={{ width: \"100%\", maxWidth: \"100%\" }}>\n            Your browser does not support the video element.\n          </video>\n        </div>\n      );\n    }\n    return (\n      <div className={styles.videoWrapper}>\n        <iframe\n          title=\"Video embed\"\n          className={styles.videoIframe}\n          src={embedUrl}\n          allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\"\n          allowFullScreen\n        />\n      </div>\n    );\n  })();\n\n  const content = (\n    <article className={styles.card}>\n      {titleIsVisible && title && (\n        <h1\n          className={styles.contentTitleVideoInside}\n          style={{ textAlign: \"center\", ...parseCssToStyle(titleCss) }}\n        >\n          {title}\n        </h1>\n      )}\n      {mediaElement}\n      {descriptionIsVisible && description && (\n        <h3\n          className={styles.contentDescriptionVideoInside}\n          style={{ textAlign: \"center\", ...parseCssToStyle(descCss) }}\n        >\n          {description}\n        </h3>\n      )}\n    </article>\n  );\n\n  return (\n    <ContentContainerWrapper\n      fullscreenEnabled={fullscreenEnabled}\n      fullscreenCloseLabel={fullscreenCloseLabel}\n      fullscreenExpandLabel={fullscreenExpandLabel}\n      marginTop={config?.marginTop}\n      marginBottom={config?.marginBottom}\n      browseNav={browseNav}\n    >\n      {content}\n    </ContentContainerWrapper>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-controls.tsx":"import Image from \"next/image\";\nimport { LanguageSelector } from \"@/features/language-selector\";\nimport { QuickNavigationTrigger } from \"@/features/quick-navigation\";\nimport { ThemeModeToggle } from \"@/features/theme-switcher\";\nimport { VersionSelector } from \"@/features/version-selector\";\nimport type { VersionLinkOption } from \"@/entities/docs/lib/version-links\";\nimport type { LanguageCode, LayoutItem, VersionEntry } from \"@/entities/docs/model/types\";\nimport { ReactIconByTag } from \"@/shared/ui/react-icon-by-tag\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellControlsProps {\n  fallbackProjectLink: string | undefined;\n  projectLabel: string;\n  useReactProjectLinkIcon: boolean;\n  projectLinkReactIconTag: string | undefined;\n  projectLinkReactIconStyle: React.CSSProperties;\n  versionLinkOptionsWithLabels: VersionLinkOption[];\n  versionLinksLabel: string;\n  useReactVersionLinksIcon: boolean;\n  versionLinksIconTag: string | undefined;\n  versionLinksIconStyle: React.CSSProperties;\n  versionLinksIconImage: string | undefined;\n  versionLinksIconImgWidth: number;\n  versionLinksIconImgHeight: number;\n  infoIconImgWidth: number;\n  infoIconImgHeight: number;\n  previewIconImgWidth: number;\n  previewIconImgHeight: number;\n  showInfoButton: boolean;\n  updateDate: string;\n  lastUpdateLabel: string;\n  useReactInfoIcon: boolean;\n  infoIconTag: string | undefined;\n  infoIconStyle: React.CSSProperties;\n  infoIconImage: string | undefined;\n  showPreviewButton: boolean;\n  previewProjectUrl: string;\n  useReactPreviewIcon: boolean;\n  previewIconTag: string | undefined;\n  previewIconStyle: React.CSSProperties;\n  previewIconImage: string | undefined;\n  focusModeEnabled: boolean;\n  focusModeLabel: string;\n  activeNavigation: boolean;\n  quickNavLabel: string;\n  showVersionSelector: boolean;\n  availableVersions: VersionEntry[];\n  selectedVersionValue: string;\n  versionLabel: string;\n  isLanguageSelectVisible: boolean;\n  availableLanguages: LanguageCode[];\n  language: LanguageCode;\n  languageLabelResolver: (lang: LanguageCode) => string;\n  hideThemeSelector: boolean;\n  activeThemeId: string;\n  layouts: LayoutItem[];\n  canToggleMode: boolean;\n  nextModeIsDark: boolean;\n  darkModeLabel: string;\n  lightModeLabel: string;\n  onOpenVersionLinksPopup: () => void;\n  onOpenInfoPopup: () => void;\n  onOpenFocusMode: () => void;\n  onOpenQuickNavigation: () => void;\n  onVersionChange: (versionId: string) => void;\n  onLanguageChange: (language: LanguageCode) => void;\n  onThemeChange: (themeId: string) => void;\n  onToggleMode: () => void;\n}\n\nexport function DocsShellControls({\n  fallbackProjectLink,\n  projectLabel,\n  useReactProjectLinkIcon,\n  projectLinkReactIconTag,\n  projectLinkReactIconStyle,\n  versionLinkOptionsWithLabels,\n  versionLinksLabel,\n  useReactVersionLinksIcon,\n  versionLinksIconTag,\n  versionLinksIconStyle,\n  versionLinksIconImage,\n  versionLinksIconImgWidth,\n  versionLinksIconImgHeight,\n  infoIconImgWidth,\n  infoIconImgHeight,\n  previewIconImgWidth,\n  previewIconImgHeight,\n  showInfoButton,\n  updateDate,\n  lastUpdateLabel,\n  useReactInfoIcon,\n  infoIconTag,\n  infoIconStyle,\n  infoIconImage,\n  showPreviewButton,\n  previewProjectUrl,\n  useReactPreviewIcon,\n  previewIconTag,\n  previewIconStyle,\n  previewIconImage,\n  focusModeEnabled,\n  focusModeLabel,\n  activeNavigation,\n  quickNavLabel,\n  showVersionSelector,\n  availableVersions,\n  selectedVersionValue,\n  versionLabel,\n  isLanguageSelectVisible,\n  availableLanguages,\n  language,\n  languageLabelResolver,\n  hideThemeSelector,\n  activeThemeId,\n  layouts,\n  canToggleMode,\n  nextModeIsDark,\n  darkModeLabel,\n  lightModeLabel,\n  onOpenVersionLinksPopup,\n  onOpenInfoPopup,\n  onOpenFocusMode,\n  onOpenQuickNavigation,\n  onVersionChange,\n  onLanguageChange,\n  onThemeChange,\n  onToggleMode,\n}: DocsShellControlsProps) {\n  return (\n    <>\n      {fallbackProjectLink && (\n        <a\n          href={fallbackProjectLink}\n          target=\"_blank\"\n          rel=\"noreferrer\"\n          className={`${styles.button} ${styles.githubLinkButton}`}\n          aria-label={projectLabel}\n          title={projectLabel}\n        >\n          {useReactProjectLinkIcon ? (\n            <ReactIconByTag tag={projectLinkReactIconTag} style={projectLinkReactIconStyle} />\n          ) : (\n            <svg viewBox=\"0 0 24 24\" aria-hidden className={styles.githubIcon}>\n              <path\n                fill=\"currentColor\"\n                d=\"M12 2C6.48 2 2 6.58 2 12.24c0 4.53 2.87 8.37 6.85 9.72.5.1.68-.22.68-.5 0-.24-.01-.9-.01-1.77-2.78.62-3.37-1.37-3.37-1.37-.46-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.93.85.09-.67.35-1.12.64-1.37-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.74-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05A9.32 9.32 0 0 1 12 6.88a9.3 9.3 0 0 1 2.5.35c1.9-1.33 2.74-1.05 2.74-1.05.54 1.42.2 2.47.1 2.73.64.71 1.03 1.62 1.03 2.74 0 3.94-2.33 4.8-4.56 5.06.36.31.68.92.68 1.86 0 1.35-.01 2.43-.01 2.76 0 .27.18.6.69.49A10.22 10.22 0 0 0 22 12.24C22 6.58 17.52 2 12 2Z\"\n              />\n            </svg>\n          )}\n        </a>\n      )}\n      {!!versionLinkOptionsWithLabels.length && (\n        <button className={`${styles.button} ${styles.headerIconButton}`} onClick={onOpenVersionLinksPopup} aria-label={versionLinksLabel} title={versionLinksLabel}>\n          {useReactVersionLinksIcon ? (\n            <ReactIconByTag tag={versionLinksIconTag} style={versionLinksIconStyle} />\n          ) : versionLinksIconImage ? (\n            <Image src={versionLinksIconImage} alt=\"\" width={versionLinksIconImgWidth} height={versionLinksIconImgHeight} className={styles.headerIcon} unoptimized />\n          ) : (\n            <ReactIconByTag tag={versionLinksIconTag} style={versionLinksIconStyle} />\n          )}\n        </button>\n      )}\n      {showInfoButton && (\n        <button className={`${styles.button} ${styles.headerIconButton}`} onClick={onOpenInfoPopup} aria-label={lastUpdateLabel} title={lastUpdateLabel}>\n          {useReactInfoIcon ? (\n            <ReactIconByTag tag={infoIconTag} style={infoIconStyle} />\n          ) : infoIconImage ? (\n            <Image src={infoIconImage} alt=\"\" width={infoIconImgWidth} height={infoIconImgHeight} className={styles.headerIcon} unoptimized />\n          ) : (\n            <ReactIconByTag tag={infoIconTag} style={infoIconStyle} />\n          )}\n        </button>\n      )}\n      {showPreviewButton && previewProjectUrl && (\n        <a\n          href={previewProjectUrl}\n          target=\"_blank\"\n          rel=\"noreferrer\"\n          className={`${styles.button} ${styles.githubLinkButton}`}\n          aria-label=\"Preview\"\n          title=\"Preview\"\n        >\n          {useReactPreviewIcon ? (\n            <ReactIconByTag tag={previewIconTag} style={previewIconStyle} />\n          ) : previewIconImage ? (\n            <Image src={previewIconImage} alt=\"\" width={previewIconImgWidth} height={previewIconImgHeight} className={styles.headerIcon} unoptimized />\n          ) : (\n            <ReactIconByTag tag={previewIconTag} style={previewIconStyle} />\n          )}\n        </a>\n      )}\n      {focusModeEnabled && (\n        <button className={styles.button} onClick={onOpenFocusMode} aria-label={focusModeLabel}>\n          {focusModeLabel}\n        </button>\n      )}\n      {activeNavigation && <QuickNavigationTrigger className={styles.button} label={quickNavLabel} onClick={onOpenQuickNavigation} />}\n      {showVersionSelector && (\n        <VersionSelector\n          className={styles.select}\n          versions={availableVersions}\n          value={selectedVersionValue}\n          onChange={onVersionChange}\n          ariaLabel={versionLabel}\n        />\n      )}\n      {isLanguageSelectVisible && (\n        <LanguageSelector\n          className={styles.select}\n          languages={availableLanguages}\n          value={language}\n          onChange={onLanguageChange}\n          getLabel={languageLabelResolver}\n          ariaLabel=\"Language selector\"\n        />\n      )}\n      {!hideThemeSelector && (\n        <select className={styles.select} value={activeThemeId} onChange={(event) => onThemeChange(event.target.value)} aria-label=\"Theme selector\">\n          {layouts.map((layout) => (\n            <option key={layout.id} value={layout.id}>\n              {layout.name}\n            </option>\n          ))}\n        </select>\n      )}\n      <ThemeModeToggle\n        className={`${styles.button} ${styles.modeIconButton}`}\n        isDarkMode={nextModeIsDark}\n        canToggle={canToggleMode}\n        label={nextModeIsDark ? darkModeLabel : lightModeLabel}\n        onToggle={onToggleMode}\n      />\n    </>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-focus-overlay.tsx":"import { FiX } from \"react-icons/fi\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellFocusOverlayProps {\n  isOpen: boolean;\n  focusModeLabel: string;\n  menuCloseLabel: string;\n  previousLabel: string;\n  nextLabel: string;\n  focusModeCurrentHtml: string;\n  canFocusModeGoPrevious: boolean;\n  canFocusModeGoNext: boolean;\n  onClose: () => void;\n  onNavigate: (offset: -1 | 1) => void;\n}\n\nexport function DocsShellFocusOverlay({\n  isOpen,\n  focusModeLabel,\n  menuCloseLabel,\n  previousLabel,\n  nextLabel,\n  focusModeCurrentHtml,\n  canFocusModeGoPrevious,\n  canFocusModeGoNext,\n  onClose,\n  onNavigate,\n}: DocsShellFocusOverlayProps) {\n  if (!isOpen) {\n    return null;\n  }\n  return (\n    <div className={styles.focusModeOverlay} onClick={onClose}>\n      <div className={styles.focusModeCard} onClick={(event) => event.stopPropagation()}>\n        <div className={styles.focusModeHeader}>\n          <strong>{focusModeLabel}</strong>\n          <button className={`${styles.button} ${styles.focusModeCloseButton}`} onClick={onClose} aria-label={menuCloseLabel} title={menuCloseLabel}>\n            <FiX aria-hidden />\n          </button>\n        </div>\n        <div className={styles.focusModeBody}>\n          <div className={styles.markdown} dangerouslySetInnerHTML={{ __html: focusModeCurrentHtml }} />\n        </div>\n        <div className={styles.focusModeFooter}>\n          <button className={styles.button} onClick={() => onNavigate(-1)} disabled={!canFocusModeGoPrevious}>\n            {previousLabel}\n          </button>\n          <button className={styles.button} onClick={() => onNavigate(1)} disabled={!canFocusModeGoNext}>\n            {nextLabel}\n          </button>\n        </div>\n      </div>\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-header.tsx":"import Image from \"next/image\";\nimport { BsMoonStarsFill, BsSunFill } from \"react-icons/bs\";\nimport { ReactIconByTag } from \"@/shared/ui/react-icon-by-tag\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellHeaderProps {\n  headerName: string;\n  iconImage: string | undefined;\n  useReactHeaderIcon: boolean;\n  reactHeaderIconTag: string | undefined;\n  headerReactIconStyle: React.CSSProperties;\n  iconImgWidth: number;\n  iconImgHeight: number;\n  menuOpen: boolean;\n  menuOpenLabel: string;\n  menuCloseLabel: string;\n  onToggleMenu: () => void;\n  activeLayoutMode: \"dark\" | \"light\" | undefined;\n  controls: React.ReactNode;\n}\n\nexport function DocsShellHeader({\n  headerName,\n  iconImage,\n  useReactHeaderIcon,\n  reactHeaderIconTag,\n  headerReactIconStyle,\n  iconImgWidth,\n  iconImgHeight,\n  menuOpen,\n  menuOpenLabel,\n  menuCloseLabel,\n  onToggleMenu,\n  activeLayoutMode,\n  controls,\n}: DocsShellHeaderProps) {\n  return (\n    <header className={styles.header}>\n      <div className={styles.headerInner}>\n        <div className={styles.headerLeft}>\n          {useReactHeaderIcon ? (\n            <span className={styles.headerReactIcon} style={headerReactIconStyle}>\n              <ReactIconByTag\n                tag={reactHeaderIconTag}\n                fallback={activeLayoutMode === \"dark\" ? <BsMoonStarsFill aria-hidden /> : <BsSunFill aria-hidden />}\n              />\n            </span>\n          ) : iconImage ? (\n            <Image\n              src={iconImage}\n              alt={headerName}\n              width={iconImgWidth}\n              height={iconImgHeight}\n              className={styles.headerIcon}\n              unoptimized\n            />\n          ) : null}\n          <strong>{headerName}</strong>\n          <button\n            className={`${styles.button} ${styles.mobileToggle}`}\n            onClick={onToggleMenu}\n            aria-label={menuOpen ? menuCloseLabel : menuOpenLabel}\n            title={menuOpen ? menuCloseLabel : menuOpenLabel}\n          >\n            {menuOpen ? \"✕\" : \"☰\"}\n          </button>\n        </div>\n\n        <div className={styles.headerRight}>{controls}</div>\n      </div>\n    </header>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-info-overlay.tsx":"import { FiX } from \"react-icons/fi\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellInfoOverlayProps {\n  isOpen: boolean;\n  lastUpdateLabel: string;\n  updateDate: string;\n  menuCloseLabel: string;\n  onClose: () => void;\n}\n\nexport function DocsShellInfoOverlay({ isOpen, lastUpdateLabel, updateDate, menuCloseLabel, onClose }: DocsShellInfoOverlayProps) {\n  if (!isOpen) {\n    return null;\n  }\n  return (\n    <div className={styles.versionLinksOverlay} onClick={onClose} role=\"presentation\">\n      <div className={styles.versionLinksCard} onClick={(e) => e.stopPropagation()} role=\"dialog\" aria-modal=\"true\" aria-label={lastUpdateLabel}>\n        <div className={styles.versionLinksHeader}>\n          <strong>{lastUpdateLabel}</strong>\n          <button className={`${styles.button} ${styles.versionLinksCloseButton}`} onClick={onClose} aria-label={menuCloseLabel} title={menuCloseLabel}>\n            <FiX aria-hidden />\n          </button>\n        </div>\n        <div className={styles.versionLinksList}>\n          <p className={styles.infoOverlayDate}>{updateDate}</p>\n        </div>\n      </div>\n    </div>\n  );\n}\n","src/widgets/docs-shell/ui/docs-shell-menu-tree.tsx":"import { FiChevronDown, FiChevronRight } from \"react-icons/fi\";\nimport type { MenuNode } from \"../model/menu-tree\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellMenuTreeProps {\n  nodes: MenuNode[];\n  keyPrefix: string;\n  onMenuClick: (pathClick: string, ancestorKeys: string[]) => void;\n  onToggleNode: (nodeKey: string) => void;\n  isNodeExpanded: (nodeKey: string) => boolean;\n}\n\nexport function DocsShellMenuTree({ nodes, keyPrefix, onMenuClick, onToggleNode, isNodeExpanded }: DocsShellMenuTreeProps) {\n  return nodes.map((node) => {\n    const hasChildren = node.children.length > 0;\n    const expanded = isNodeExpanded(node.key);\n    const isSectionHeader = node.isSectionHeader === true;\n\n    if (isSectionHeader) {\n      return (\n        <div key={`${keyPrefix}-${node.key}`} className={styles.menuNode}>\n          <div className={styles.menuNodeRow}>\n            <span className={styles.menuSectionLabel}>{node.title}</span>\n          </div>\n        </div>\n      );\n    }\n\n    return (\n      <div key={`${keyPrefix}-${node.key}`} className={styles.menuNode}>\n        <div className={styles.menuNodeRow}>\n          {hasChildren ? (\n            <div className={`${styles.menuActionContainer} ${node.active ? styles.menuButtonActive : \"\"}`}>\n              <button className={styles.menuActionMain} onClick={() => onMenuClick(node.pathClick, node.ancestorKeys)}>\n                {`${node.level > 0 ? \"› \".repeat(node.level) : \"\"}${node.title}`}\n              </button>\n              <button\n                className={styles.menuExpandInline}\n                onClick={() => onToggleNode(node.key)}\n                aria-label={expanded ? \"Collapse submenu\" : \"Expand submenu\"}\n                title={expanded ? \"Collapse submenu\" : \"Expand submenu\"}\n              >\n                {expanded ? <FiChevronDown aria-hidden /> : <FiChevronRight aria-hidden />}\n              </button>\n            </div>\n          ) : (\n            <button className={`${styles.menuButton} ${node.active ? styles.menuButtonActive : \"\"}`} onClick={() => onMenuClick(node.pathClick, node.ancestorKeys)}>\n              {`${node.level > 0 ? \"› \".repeat(node.level) : \"\"}${node.title}`}\n            </button>\n          )}\n        </div>\n        {hasChildren && expanded && (\n          <div className={styles.menuChildren}>\n            <DocsShellMenuTree\n              nodes={node.children}\n              keyPrefix={keyPrefix}\n              onMenuClick={onMenuClick}\n              onToggleNode={onToggleNode}\n              isNodeExpanded={isNodeExpanded}\n            />\n          </div>\n        )}\n      </div>\n    );\n  });\n}\n","src/widgets/docs-shell/ui/docs-shell-mobile-drawer.tsx":"import type { MenuNode } from \"../model/menu-tree\";\nimport { DocsShellControls } from \"./docs-shell-controls\";\nimport { DocsShellMenuTree } from \"./docs-shell-menu-tree\";\nimport styles from \"../docs-shell.module.css\";\n\ninterface DocsShellMobileDrawerProps {\n  isOpen: boolean;\n  siteName: string;\n  menuNodes: MenuNode[];\n  menuCloseLabel: string;\n  onClose: () => void;\n  onMenuClick: (pathClick: string, ancestorKeys: string[]) => void;\n  onToggleNode: (nodeKey: string) => void;\n  isNodeExpanded: (nodeKey: string) => boolean;\n  controls: React.ComponentProps<typeof DocsShellControls>;\n}\n\nexport function DocsShellMobileDrawer({\n  isOpen,\n  siteName,\n  menuNodes,\n  menuCloseLabel,\n  onClose,\n  onMenuClick,\n  onToggleNode,\n  isNodeExpanded,\n  controls,\n}: DocsShellMobileDrawerProps) {\n  if (!isOpen) {\n    return null;\n  }\n  return (\n    <div className={styles.mobileDrawerOverlay} onClick={onClose}>\n      <aside className={styles.mobileDrawer} onClick={(event) => event.stopPropagation()}>\n        <div className={styles.mobileDrawerHeader}>\n          <strong>{siteName}</strong>\n          <button className={`${styles.button} ${styles.mobileDrawerClose}`} onClick={onClose} aria-label={menuCloseLabel} title={menuCloseLabel}>\n            ✕\n          </button>\n        </div>\n        <nav className={styles.mobileMenu}>\n          <DocsShellMenuTree\n            nodes={menuNodes}\n            keyPrefix=\"mobile\"\n            onMenuClick={onMenuClick}\n            onToggleNode={onToggleNode}\n            isNodeExpanded={isNodeExpanded}\n          />\n        </nav>\n        <div className={styles.mobileControls}>\n
