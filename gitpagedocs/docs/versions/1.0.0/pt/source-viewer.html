th?: string },\r\n  ) => Promise<void>;\r\n  writeText: (root: string, relativePath: string, data: string) => Promise<void>;\r\n  logSuccess: (message: string) => void;\r\n  logInfo: (message: string) => void;\r\n}\r\n","cli/application/report/config-only-reporter.mjs":"/** Config-only command output messages - SRP: single place for all report messages */\n\nexport function reportConfigOnlySuccess(options) {\n  return [`Generated: ${options.outputDir}/ (config-only)`, \"No index.html/index.js generated.\"];\n}\n\nexport function reportLayoutConfig(options) {\n  if (options.useLocalLayoutConfig) {\n    return [\"Local layouts generated in gitpagedocs/layouts/ (--layoutconfig).\"];\n  } else {\n    return [\"Using official remote layouts config by default (no local gitpagedocs/layouts generated).\"];\n  }\n}\n\nexport function reportRenderingUrl(options) {\n  if (options.githubOwner && options.githubRepo) {\n    return [\n      `Configured rendering URL: https://${options.githubOwner}.github.io/${options.githubRepo}/`,\n      `Official viewer remains available: https://vidigal-code.github.io/git-page-docs/${options.githubOwner}/${options.githubRepo}?modetheme=light&lang=pt`,\n    ];\n  }\n  return [];\n}\n\nexport function reportPushMode() {\n  return [\n    \"Generated: .github/workflows/gitpagedocs-pages.yml\",\n    \"Push mode enabled: committed and pushed gitpagedocs/ + workflow to origin.\",\n  ];\n}\n\nexport function reportBuildFlag() {\n  return [\"`--build` keeps compatibility flag but output remains gitpagedocs/.\"];\n}\n\nexport function reportFullOrServeSkipped() {\n  return [\"External commands were skipped (no prebuilt copy and no local serve spawn).\"];\n}\n\nexport function reportPrebuiltDetected() {\n  return [\"`prebuilt/` detected, but ignored by config-only generator.\"];\n}\n\nexport function reportAll(options, prebuiltDetected) {\n  const lines = [];\n  lines.push(...reportConfigOnlySuccess(options));\n  lines.push(...reportLayoutConfig(options));\n  lines.push(...reportRenderingUrl(options));\n  if (options.shouldPush) {\n    lines.push(...reportPushMode());\n  }\n  if (options.isBuild) {\n    lines.push(...reportBuildFlag());\n  }\n  if (options.mode === \"full\" || options.isServe) {\n    lines.push(...reportFullOrServeSkipped());\n  }\n  if (prebuiltDetected) {\n    lines.push(...reportPrebuiltDetected());\n  }\n  return lines;\n}\n","cli/application/use-cases/dispatch-mode.ts":"import type { CliOptions } from \"../../domain/models/cli-options\";\r\nimport type { CliCommandRunner, CliRuntimeParams } from \"../ports/cli-runtime-ports\";\r\n\r\nexport async function dispatchMode(\r\n  options: CliOptions,\r\n  params: CliRuntimeParams,\r\n  runner: CliCommandRunner,\r\n): Promise<void> {\r\n  if (options.mode === \"ai\") {\r\n    await runner.runAi({ ...params, options });\r\n    return;\r\n  }\r\n  if (options.mode === \"home\") {\r\n    await runner.runHome({ ...params, options });\r\n    return;\r\n  }\r\n  await runner.runConfigOnly({ ...params, options });\r\n}\r\n","cli/builders/config-orchestrator.mjs":"/** Orchestrate build of config artifacts for gitpagedocs */\n\nimport { LAYOUTS, FALLBACK_LAYOUTS } from \"../data/layouts.mjs\";\nimport { DOCS } from \"../content/docs.mjs\";\nimport { DOC_VERSIONS } from \"../data/version-constants.mjs\";\nimport { buildRootConfig } from \"./root-config-builder.mjs\";\nimport { buildVersionConfig } from \"./version-config-builder.mjs\";\nimport { generateSourceViewerHtml } from \"./source-viewer.mjs\";\n\n/**\n * Build all config artifacts (root, layouts, versions, docs).\n * @param {object} options - { useLocalLayoutConfig, githubOwner, githubRepo, root }\n * @returns {object} { rootConfig, layoutsConfig, fallbackLayoutsConfig, docs, docsHtml, versionConfigs }\n */\nexport function buildConfigArtifacts(options = {}) {\n  const root = options.root ?? process.cwd();\n\n  const rootConfig = buildRootConfig(options);\n  const layoutsConfig = { layouts: LAYOUTS };\n  const fallbackLayoutsConfig = { layouts: FALLBACK_LAYOUTS };\n\n  const sourceViewerHtml = generateSourceViewerHtml(root);\n  const docsHtml = {\n    sourceViewer: { pt: sourceViewerHtml, en: sourceViewerHtml, es: sourceViewerHtml },\n  };\n\n  const versionConfigs = {};\n  for (const versionId of DOC_VERSIONS) {\n    versionConfigs[versionId] = buildVersionConfig(versionId);\n  }\n\n  return {\n    rootConfig,\n    layoutsConfig,\n    fallbackLayoutsConfig,\n    docs: DOCS,\n    docsHtml,\n    versionConfigs,\n  };\n}\n","cli/builders/root-config-builder.mjs":"/** Build root config for gitpagedocs */\r\nimport { OFFICIAL_LAYOUTS_CONFIG_URL, OFFICIAL_LAYOUTS_TEMPLATES_URL } from \"../data/urls.mjs\";\r\nimport { DOCS } from \"../content/docs.mjs\";\r\nimport { DOC_VERSIONS } from \"../data/version-constants.mjs\";\r\nimport { defaultLangMenu } from \"../data/i18n-langmenu.mjs\";\r\nimport { defaultTranslations } from \"../data/i18n-translations.mjs\";\r\nimport { getDefaultSiteConfig } from \"../data/default-site-config.mjs\";\r\n\r\nexport function buildRootConfig(options = {}) {\r\n  const useLocalLayoutConfig = Boolean(options.useLocalLayoutConfig);\r\n  const useOfficialLayouts = !useLocalLayoutConfig;\r\n  const githubOwner = options.githubOwner;\r\n  const githubRepo = options.githubRepo;\r\n  const repositorySearchHome = false;\r\n  const renderingUrl =\r\n    githubOwner && githubRepo\r\n      ? `https://${githubOwner}.github.io/${githubRepo}/`\r\n      : \"https://vidigal-code.github.io/git-page-docs/\";\r\n  const projectLink =\r\n    githubOwner && githubRepo\r\n      ? `https://github.com/${githubOwner}/${githubRepo}`\r\n      : \"https://github.com/Vidigal-code/git-page-docs\";\r\n\r\n  const versionEntries = DOC_VERSIONS.map((id) => ({\r\n    id,\r\n    path: `gitpagedocs/docs/versions/${id}/config.json`,\r\n    ProjectLink: projectLink,\r\n    PathConfig: `gitpagedocs/docs/versions/${id}/config.json`,\r\n    PreviewProject: \"\",\r\n    UpdateDate: \"\",\r\n    branch: \"\",\r\n    release: \"\",\r\n    commit: \"\",\r\n  }));\r\n\r\n  const baseSiteConfig = getDefaultSiteConfig(DOCS, projectLink);\r\n\r\n  return {\r\n    site: {\r\n      ...baseSiteConfig,\r\n      layoutsConfigPathOficial: useOfficialLayouts,\r\n      layoutsConfigPathTemplatesOficial: useOfficialLayouts ? OFFICIAL_LAYOUTS_TEMPLATES_URL : \"\",\r\n      layoutsConfigPathOficialUrl: useOfficialLayouts ? OFFICIAL_LAYOUTS_CONFIG_URL : \"\",\r\n      repositorySearchHome,\r\n      rendering: renderingUrl,\r\n      AiChatEnabled: true,\r\n      docsAccess: { enabled: false, publicKey: \"\" },\r\n      langmenu: defaultLangMenu,\r\n    },\r\n    VersionControl: {\r\n      versions: versionEntries,\r\n    },\r\n    translations: defaultTranslations,\r\n  };\r\n}\r\n","cli/builders/route-builders.mjs":"/** Build route objects for md, html, and video content types */\n\nexport function buildMdRoute(versionId, routeId, pathByLang, titles, descriptions, options = {}) {\n  const {\n    titleCss = \"font-size: 1.85rem; font-weight: 700;\",\n    titleDarkCss = \"font-size: 1.85rem; font-weight: 700; color: var(--text);\",\n    titleLightCss = \"font-size: 1.85rem; font-weight: 700; color: var(--text);\",\n    titlePosition = \"center\",\n    titleIsVisible = true,\n    descriptionCss = \"font-size: 1.2rem; font-weight: 500;\",\n    descriptionDarkCss = \"font-size: 1.2rem; font-weight: 500; color: var(--text-secondary);\",\n    descriptionLightCss = \"font-size: 1.2rem; font-weight: 500; color: var(--text-secondary);\",\n    descriptionPosition = \"center\",\n    descriptionIsVisible = true,\n    fullscreenEnabled = true,\n    marginTop = \"\",\n    marginBottom = \"\",\n    blockLink = true,\n    container,\n    browseAll = false,\n    RouteguideBrand = true,\n    RouteGuideSpeciFicbrand = [],\n    RouteguideBrandPosition = \"center\",\n    RouteguideBrandContainerTop = false,\n    audio,\n    authorization,\n  } = options;\n  const out = {\n    id: routeId,\n    title: titles ?? { pt: \"Documentação\", en: \"Documentation\", es: \"Documentación\" },\n    description: descriptions ?? { pt: \"Descrição da página\", en: \"Page description\", es: \"Descripción de la página\" },\n    titleCss,\n    titleDarkCss,\n    titleLightCss,\n    titlePosition,\n    titleIsVisible,\n    descriptionCss,\n    descriptionDarkCss,\n    descriptionLightCss,\n    descriptionPosition,\n    descriptionIsVisible,\n    path: pathByLang,\n    fullscreenEnabled,\n    marginTop,\n    marginBottom,\n    blockLink,\n    container,\n    browseAll,\n    RouteguideBrand,\n    RouteGuideSpeciFicbrand,\n    RouteguideBrandPosition,\n    RouteguideBrandContainerTop,\n  };\n  if (container !== undefined) out.container = container;\n  if (audio !== undefined) out.audio = audio;\n  if (authorization !== undefined) out.authorization = authorization;\n  return out;\n}\n\nexport function buildHtmlRoute(versionId, routeId, pathByLang, titles, descriptions, options = {}) {\n  const base = buildMdRoute(versionId, routeId, pathByLang, titles, descriptions, options);\n  return { ...base };\n}\n\nexport function buildVideoRoute(versionId, routeId, videoType, pathVideo, titles, descriptions, options = {}) {\n  const {\n    titleCss = \"font-size: 1.85rem; font-weight: 700;\",\n    titleDarkCss = \"font-size: 1.85rem; font-weight: 700; color: var(--text);\",\n    titleLightCss = \"font-size: 1.85rem; font-weight: 700; color: var(--text);\",\n    titlePosition = \"center\",\n    titleIsVisible = true,\n    descriptionCss = \"font-size: 1.2rem; font-weight: 500;\",\n    descriptionDarkCss = \"font-size: 1.2rem; font-weight: 500; color: var(--text-secondary);\",\n    descriptionLightCss = \"font-size: 1.2rem; font-weight: 500; color: var(--text-secondary);\",\n    descriptionPosition = \"center\",\n    descriptionIsVisible = true,\n    fullscreenEnabled = true,\n    marginTop = \"\",\n    marginBottom = \"\",\n    blockLink = true,\n    container,\n    browseAll = false,\n    authorization,\n  } = options;\n  const videoTypeByLang = typeof videoType === \"string\" ? { pt: videoType, en: videoType, es: videoType } : videoType;\n  const pathVideoByLang = typeof pathVideo === \"string\" ? { pt: pathVideo, en: pathVideo, es: pathVideo } : pathVideo;\n  const obj = {\n    id: routeId,\n    title: titles ?? { pt: \"Vídeo\", en: \"Video\", es: \"Vídeo\" },\n    description: descriptions ?? { pt: \"Descrição do vídeo\", en: \"Video description\", es: \"Descripción del vídeo\" },\n    titleCss,\n    titleDarkCss,\n    titleLightCss,\n    titlePosition,\n    titleIsVisible,\n    descriptionCss,\n    descriptionDarkCss,\n    descriptionLightCss,\n    descriptionPosition,\n    descriptionIsVisible,\n    fullscreenEnabled,\n    marginTop,\n    marginBottom,\n    blockLink,\n    browseAll,\n    video: { videoType: videoTypeByLang, pathVideo: pathVideoByLang },\n  };\n  if (container !== undefined) obj.container = container;\n  if (authorization !== undefined) obj.authorization = authorization;\n  return obj;\n}\n","cli/builders/source-viewer.mjs":"/** Generate GitHub-style source code viewer HTML from src/, cli/, and root config files */\n\nimport path from \"node:path\";\nimport { readFileSync, readdirSync, existsSync } from \"node:fs\";\n\nfunction buildTreeFromKeys(fileKeys) {\n  const root = {};\n  for (const key of fileKeys) {\n    const parts = key.split(\"/\");\n    let curr = root;\n    for (let i = 0; i < parts.length; i++) {\n      const part = parts[i];\n      const isLast = i === parts.length - 1;\n      if (!curr[part]) curr[part] = isLast ? { path: key } : {};\n      if (isLast) curr[part].path = key;\n      else curr = curr[part];\n    }\n  }\n  return root;\n}\n\nconst ROOT_FILES = [\"README.md\", \"package.json\", \"package-lock.json\", \"next.config.ts\", \"tsconfig.json\", \".eslintrc.json\"];\n\nfunction collectSourceFiles(projectRoot) {\n  const files = {};\n  function scan(dir, prefix = \"\") {\n    if (!existsSync(dir)) return;\n    const entries = readdirSync(dir, { withFileTypes: true })\n      .sort((a, b) => a.name.localeCompare(b.name));\n    for (const e of entries) {\n      const name = e.name;\n      if (name === \"node_modules\" || name.startsWith(\".\")) continue;\n      const rel = prefix ? `${prefix}/${name}` : name;\n      const fullPath = path.join(dir, name);\n      if (e.isDirectory()) {\n        scan(fullPath, rel);\n      } else {\n        try {\n          const content = readFileSync(fullPath, \"utf-8\");\n          files[rel] = content;\n        } catch {\n          /* skip binary or unreadable */\n        }\n      }\n    }\n  }\n  for (const f of ROOT_FILES) {\n    const p = path.join(projectRoot, f);\n    if (existsSync(p)) {\n      try {\n        files[f] = readFileSync(p, \"utf-8\");\n      } catch {}\n    }\n  }\n  const srcDir = path.join(projectRoot, \"src\");\n  const cliDir = path.join(projectRoot, \"cli\");\n  if (existsSync(srcDir)) scan(srcDir, \"src\");\n  if (existsSync(cliDir)) scan(cliDir, \"cli\");\n  return files;\n}\n\n/** GitHub-like file viewer: breadcrumb bar, file header, table layout, dark theme */\nexport function generateSourceViewerHtml(root) {\n  const files = collectSourceFiles(root);\n  const fileKeys = Object.keys(files).sort();\n  const tree = buildTreeFromKeys(fileKeys);\n  const noFilesMsg = \"No files found.\";\n  const dataJson = JSON.stringify({ files, fileKeys, tree });\n  return `<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"/>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"/>\n<title>Source code - GitHub</title>\n<link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css\"/>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/tsx.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/markdown.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js\"><\/script>\n<style>\n/* GitHub dark theme - variables */\n:root{\n  --github-bg: #0d1117;\n  --github-bg-secondary: #161b22;\n  --github-bg-tertiary: #21262d;\n  --github-border: #30363d;\n  --github-border-muted: #21262d;\n  --github-fg: #e6edf3;\n  --github-fg-muted: #8b949e;\n  --github-accent: #58a6ff;\n  --github-accent-soft: #79c0ff;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Helvetica,Arial,sans-serif;background:var(--github-bg);color:var(--github-fg);min-height:100vh;font-size:14px;line-height:1.5}\n\n/* Top bar - GitHub style */\n.top-bar{background:var(--github-bg-secondary);border-bottom:1px solid var(--github-border-muted);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n.top-bar .crumb{color:var(--github-fg-muted);text-decoration:none}\n.top-bar .crumb:hover{color:var(--github-accent)}\n.top-bar .crumb-sep{color:var(--github-fg-muted);user-select:none}\n.top-bar .file-name{color:var(--github-fg);font-weight:600}\n\n/* Layout */\n.layout{display:flex;height:calc(100vh - 45px)}\n\n/* Sidebar - GitHub file tree */\n.sidebar{width:260px;min-width:200px;background:var(--github-bg-secondary);border-right:1px solid var(--github-border-muted);overflow-y:auto;padding:8px 0;flex-shrink:0}\n.sidebar .folder,.sidebar .file{padding:4px 12px 4px 8px;font-size:13px;cursor:poin
