<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

<style>
/* GitHub dark theme - variables */
:root{
  --github-bg: #0d1117;
  --github-bg-secondary: #161b22;
  --github-bg-tertiary: #21262d;
  --github-border: #30363d;
  --github-border-muted: #21262d;
  --github-fg: #e6edf3;
  --github-fg-muted: #8b949e;
  --github-accent: #58a6ff;
  --github-accent-soft: #79c0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--github-bg);color:var(--github-fg);min-height:100vh;font-size:14px;line-height:1.5}

/* Top bar - GitHub style */
.top-bar{background:var(--github-bg-secondary);border-bottom:1px solid var(--github-border-muted);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-bar .crumb{color:var(--github-fg-muted);text-decoration:none}
.top-bar .crumb:hover{color:var(--github-accent)}
.top-bar .crumb-sep{color:var(--github-fg-muted);user-select:none}
.top-bar .file-name{color:var(--github-fg);font-weight:600}

/* Layout */
.layout{display:flex;height:calc(100vh - 45px)}

/* Sidebar - GitHub file tree */
.sidebar{width:260px;min-width:200px;background:var(--github-bg-secondary);border-right:1px solid var(--github-border-muted);overflow-y:auto;padding:8px 0;flex-shrink:0}
.sidebar .folder,.sidebar .file{padding:4px 12px 4px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border-radius:6px;margin:0 8px}
.sidebar .folder:hover,.sidebar .file:hover{background:var(--github-bg-tertiary)}
.sidebar .file{color:var(--github-fg-muted)}
.sidebar .file.active{color:var(--github-accent);background:var(--github-bg-tertiary)}
.sidebar .icon{width:16px;text-align:center;flex-shrink:0}
.sidebar .icon svg{vertical-align:middle}
.sidebar .folder .icon{color:var(--github-accent-soft)}
.sidebar .chevron{width:16px;transition:transform .15s;flex-shrink:0}
.sidebar .folder.collapsed .chevron{transform:rotate(-90deg)}
.sidebar .children{margin-left:4px}
.sidebar .children.hidden{display:none}
.sidebar .search-wrap{padding:8px;border-bottom:1px solid var(--github-border-muted)}
.sidebar .search-input{width:100%;padding:6px 10px;font-size:12px;border:1px solid var(--github-border);border-radius:6px;background:var(--github-bg);color:var(--github-fg);outline:none}
.sidebar .search-input:focus{border-color:var(--github-accent)}
.sidebar .search-input::placeholder{color:var(--github-fg-muted)}
.sidebar .tree-actions{display:flex;gap:4px;padding:4px 8px;border-bottom:1px solid var(--github-border-muted)}
.sidebar .tree-btn{padding:4px 8px;font-size:11px;border:1px solid var(--github-border);border-radius:4px;background:var(--github-bg-tertiary);color:var(--github-fg-muted);cursor:pointer}
.sidebar .tree-btn:hover{color:var(--github-fg);background:var(--github-border)}

/* Content - GitHub file view */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--github-bg)}
.content .file-header{background:var(--github-bg-secondary);border-bottom:1px solid var(--github-border-muted);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content .file-header .file-path{font-weight:600;color:var(--github-fg)}
.content .file-header .copy-btn{padding:4px 12px;font-size:12px;border:1px solid var(--github-border);border-radius:6px;background:var(--github-bg-tertiary);color:var(--github-fg);cursor:pointer}
.content .file-header .copy-btn:hover{background:var(--github-border);border-color:var(--github-fg-muted)}
.content .code-wrap{flex:1;overflow:auto}
.content .code-table{width:100%;border-collapse:collapse;font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-size:12px;line-height:1.45}
.content .code-table td{vertical-align:top;padding:0}
.content .line-nums{padding:16px 0;text-align:right;user-select:none;color:var(--github-fg-muted);background:var(--github-bg-secondary);border-right:1px solid var(--github-border-muted);width:1%;min-width:50px}
.content .line-nums span{display:block;padding:0 16px}
.content .line-code{padding:16px 0;padding-left:16px}
.content .line-code .line{display:block;min-height:1.45em;white-space:pre}
.content .empty{color:var(--github-fg-muted);padding:24px;font-style:italic}
.content .md-preview{padding:24px;line-height:1.6}
.content .md-preview h1,.content .md-preview h2,.content .md-preview h3{margin-top:1em;margin-bottom:0.5em;font-weight:600}
.content .md-preview code{background:var(--github-bg-tertiary);padding:2px 6px;border-radius:4px;font-size:0.9em}
.content .md-preview pre{background:var(--github-bg-tertiary);padding:16px;overflow-x:auto;border-radius:6px;font-size:13px}
.content .btn-group{display:flex;gap:8px;margin-bottom:16px}
.content .btn{padding:6px 12px;border:1px solid var(--github-border);border-radius:6px;background:var(--github-bg-tertiary);color:var(--github-fg);cursor:pointer;font-size:12px}
.content .btn.active{background:var(--github-accent);border-color:var(--github-accent);color:#fff}
.content .btn:hover{background:var(--github-border)}

@media(max-width:767px){
  .layout{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--github-border-muted)}
  .content .code-wrap{min-height:400px}
}
</style>
</head>

  <div id="tree"></div>
</aside>
<main class="content">
  <div class="file-header" id="fileHeader" style="display:none">

    <button class="copy-btn" id="copyBtn">Copy</button>

  <div class="code-wrap">
    <pre class="content-inner" id="viewer"><code class="empty">Select a file from the sidebar</code></pre>
  </div>
</main>

<script type="application/json" id="filesData">{"files":{"README.md":"# Git Page Docs\r\n\r\n`gitpagedocs` is a CLI and runtime contract for repository documentation.\r\n\r\nIt generates and maintains a `gitpagedocs/` folder with config and versioned markdown files.  \r\nIt does **not** generate `index.html` or `index.js`.\r\n\r\n## Table of Contents\r\n\r\n- [Project Architecture (Monorepo)](#project-architecture-monorepo)\r\n- [Prerequisites](#prerequisites)\r\n- [Quick Start](#quick-start)\r\n- [Layout Strategy](#layout-strategy)\r\n- [Use Official Site or Your Own GitHub Pages](#use-official-site-or-your-own-github-pages)\r\n- [Self-Hosted GitHub Pages Setup](#self-hosted-github-pages-setup)\r\n- [Generated Structure](#generated-structure)\r\n- [Configuration Keys](#configuration-keys-layout-source)\r\n- [Version selector visibility](#version-selector-visibility)\r\n- [Repository Search Behavior](#repository-search-behavior)\r\n- [Scripts](#scripts)\r\n- [URL Routes and Query Parameters](#url-routes-and-query-parameters)\r\n- [Authorized Routes](#authorized-routes)\r\n- [CLI Options](#cli-options)\r\n- [AI CLI (interactive docs generator)](#ai-cli-interactive-docs-generator)\r\n- [Configuration File Format](#configuration-file-format)\r\n- [License](#license)\r\n\r\n## Project Architecture (Monorepo)\r\n\r\n`git-page-docs` is a **pnpm + turborepo monorepo**. All business logic lives in one shared core (`tools/`); the frontend, CLI, and MCP server are thin consumers of it.\r\n\r\n```text\r\ngit-page-docs/\r\n├── frontend/     # Next.js 15 docs viewer (static export) — see frontend/README.md\r\n├── cli/          # Hexagonal CLI, published as the `gitpagedocs` npm bin\r\n├── mcp/          # Model Context Protocol server (@gitpagedocs/mcp)\r\n├── tools/        # @gitpagedocs/tools — the ONLY home for shared business logic\r\n├── gitpagedocs/  # User contract: config + versioned docs + layouts (kept stable)\r\n├── e2e/          # Playwright end-to-end specs\r\n└── tsconfig.base.json · turbo.json · pnpm-workspace.yaml · vitest.config.ts\r\n```\r\n\r\n| Area | Package | Responsibility |\r\n| --- | --- | --- |\r\n| **frontend/** | root pkg | Next.js App Router docs viewer: multi-version / multi-language docs, 36-theme layouts, the in-docs AI chat drawer, and the `/ai` console. Built via `next build frontend` and static-exported to `out/` for GitHub Pages. |\r\n| **cli/** | `gitpagedocs` (`bin`) | Hexagonal CLI (`@clack/prompts`) that scaffolds `gitpagedocs/`, generates docs with AI, configures GitHub Pages, and launches the MCP server. |\r\n| **mcp/** | `@gitpagedocs/mcp` | MCP server (SDK 1.29): 20 tools + 7 resources for repository analysis and AI doc generation, all delegating to `tools/`. |\r\n| **tools/** | `@gitpagedocs/tools` | Shared core: 14-provider AI system (registry/factory, no switch chains), encrypted credential vault (AES-256-GCM) + password gate, logger with secret redaction, caches, config loader, filesystem + documentation services. Browser-safe subpath exports (`./ai`, `./crypto/web`, `./security/web`, …). |\r\n| **gitpagedocs/** | — | The user-facing contract: `config.{json,js,ts}`, `docs/versions/**`, `layouts/**`. Never broken by refactors. |\r\n\r\n### Security: encrypted AI credentials\r\n\r\nAPI keys are never stored in plaintext. Both the `/ai` console and the in-docs chat drawer gate access behind a **local password** that derives (PBKDF2) an AES-256-GCM key; keys are encrypted at rest in `localStorage` and decrypted only for the session. Any legacy plaintext key is migrated into the vault and wiped on first unlock.\r\n\r\n### Tooling\r\n\r\n- **pnpm workspaces** + **turborepo** for builds/tests across packages\r\n- Shared **`tsconfig.base.json`**; `npm run typecheck` covers cli / frontend / tools / mcp\r\n- **Vitest** unit + integration (coverage on `tools/src`) and **Playwright** E2E (`e2e/`)\r\n- A **smoke + byte-baseline** harness (`npm run smoke:all`) guards every legacy CLI contract\r\n- **GitHub Actions**: CI (`ci.yml`) + GitHub Pages deploy (`gitpagedocs-pages.yml`)\r\n\r\n> The sections below document the published `gitpagedocs` CLI and its runtime contract. For frontend-specific development (the Next.js viewer), see [`frontend/README.md`](frontend/README.md).\r\n\r\n## Prerequisites\r\n\r\n- **Node.js** 18+ (recommended 20+)\r\n- **npm** 9+\r\n\r\n## Quick Start\r\n\r\nInstall the CLI globally, or run it one-off:\r\n\r\n```bash\r\nnpm install -g @gitpagedocs/cli   # global install\r\ngitpagedocs                       # then run anywhere (the bin is `gitpagedocs`)\r\n\r\n# or, no install:\r\nnpx @gitpagedocs/cli\r\n```\r\n\r\n> `gitpagedocs` is published from the [`cli/`](cli/README.md) package of this monorepo. Generating docs is config-only — it never writes `index.html`/`index.js`.\r\n\r\nGenerate docs config and versioned files (recommended default):\r\n\r\n```bash\r\nnpx gitpagedocs\r\n```\r\n\r\nGenerate docs plus local layout templates:\r\n\r\n```bash\r\nnpx gitpagedocs --layoutconfig\r\n```\r\n\r\nGenerate docs, configure GitHub Pages URL, create workflow, and push:\r\n\r\n```bash\r\nnpx gitpagedocs --push --owner your-user --repo your-repository\r\n```\r\n\r\nDocs deploy at the repository root, e.g. `https://your-user.github.io/your-repository/v/1.0.0/?lang=en`.\r\n\r\nOptional `--path` to serve docs in a subpath (e.g. `docs` or `git-page-docs`):\r\n\r\n```bash\r\nnpx gitpagedocs --push --owner your-user --repo your-repository --path docs\r\n```\r\n\r\nThen docs are at `https://your-user.github.io/your-repository/docs/v/1.0.0/?lang=en`.\r\n\r\nShortcut syntax also supported:\r\n\r\n```bash\r\nnpx gitpagedocs --push --your-user --your-repository\r\n```\r\n\r\n### Standalone home distribution (`npx gitpagedocs --home`)\r\n\r\nGenerates a self-contained `gitpagedocshome/` folder with:\r\n\r\n- Static export of the docs (ready for `npx serve .`)\r\n- Pre-configured `.env`\r\n- `Dockerfile` for container deployment\r\n- `README.md` with usage instructions\r\n\r\n```bash\r\nnpx gitpagedocs --home\r\ncd gitpagedocshome\r\nnpx serve .\r\n```\r\n\r\nOr with Docker:\r\n\r\n```bash\r\ncd gitpagedocshome\r\ndocker build -t gitpagedocshome .\r\ndocker run -p 3000:80 gitpagedocshome\r\n```\r\n\r\n## Layout Strategy\r\n\r\n`gitpagedocs` supports two layout strategies:\r\n\r\n### 1) Default mode (`npx gitpagedocs`)\r\n\r\n- `gitpagedocs/config.json` (or `config.js` / `config.ts`) is generated with official layout source enabled.\r\n- Layouts/templates are loaded from the official repository URLs:\r\n  - `https://github.com/Vidigal-code/git-page-docs/tree/main/gitpagedocs/layouts`\r\n- Best option if you want to focus only on writing docs.\r\n\r\n### 2) Local layout mode (`npx gitpagedocs --layoutconfig`)\r\n\r\n- Generates local files in `gitpagedocs/layouts/**`:\r\n  - `layoutsConfig.json`\r\n  - `layoutsFallbackConfig.json`\r\n  - `templates/*.json`\r\n- Official layout URLs are disabled in generated config.\r\n- Best option if you want to create and maintain your own templates in your own repository.\r\n\r\n### Fallback behavior\r\n\r\n- Runtime keeps resilient fallback behavior if a layout/template source is unavailable.\r\n- In local layout mode, the runtime prioritizes local repository layout sources and does not force official template URLs by default.\r\n\r\n## Use Official Site or Your Own GitHub Pages\r\n\r\nYou can choose either:\r\n\r\n1. **Official viewer site**  \r\n   `https://vidigal-code.github.io/git-page-docs/`\r\n2. **Self-hosted viewer** in your own GitHub repository using GitHub Pages.\r\n\r\nThis means your docs can run independently from the official domain when you publish your own site.\r\n\r\n## Self-Hosted GitHub Pages Setup\r\n\r\n### 1) Prepare your repository\r\n\r\n```bash\r\nnpm install\r\nnpx gitpagedocs\r\n```\r\n\r\nOr, if you want local templates:\r\n\r\n```bash\r\nnpx gitpagedocs --layoutconfig\r\n```\r\n\r\n### 2) Configure runtime URL (`site.rendering`)\r\n\r\nSet `gitpagedocs/config.json` (or `config.js` / `config.ts`) `site.rendering` to your GitHub Pages URL:\r\n\r\n```text\r\nhttps://<your-user>.github.io/<your-repository>/\r\n```\r\n\r\nExample:\r\n\r\n```text\r\nhttps://octocat.github.io/my-docs/\r\n```\r\n\r\n### 3) Build and validate locally\r\n\r\n```bash\r\nnpm run lint\r\nnpm run build\r\nnpm start\r\n```\r\n\r\n### 4) Publish with GitHub Pages\r\n\r\n- Push your repository to GitHub.\r\n- Enable Pages for your repository (Settings -> Pages).\r\n- Use the repository workflow to build/deploy static output.\r\n- Optional one-command bootstrap:\r\n  - `npx gitpagedocs --push --owner your-user --repo your-repository` — docs at `https://<owner>.github.io/<repo>/<repo>/v/<version>/?lang=en` (e.g. `https://vidigal-code.github.io/energy-bill-ai-parser/energy-bill-ai-parser/v/1.0.0/?lang=en`); root redirects there; base path uses repo name so CSS/JS load correctly\r\n  - `npx gitpagedocs --push --owner your-user --repo your-repository --path docs` — docs at `https://<owner>.github.io/<repo>/docs/v/<version>/`\r\n  - This creates `.github/workflows/gitpagedocs-pages.yml`, sets `site.rendering`, commits generated artifacts, and pushes to `origin`.\r\n  - The generated workflow clones the official `git-page-docs` runtime in CI, injects your `gitpagedocs/` folder, builds, and deploys to your GitHub Pages URL.\r\n  - The workflow trigger uses your current git branch automatically.\r\n  - After push, CLI also attempts to switch repository Pages source to **GitHub Actions** using `gh api` (if GitHub CLI is available and authenticated).\r\n\r\nWhen built with `GITHUB_ACTIONS=true`, the runtime enables GitHub Pages behavior.\r\n\r\n## Generated Structure\r\n\r\nDefault mode:\r\n\r\n```text\r\ngitpagedocs/\r\n  config.json\r\n  icon.svg\r\n  docs/\r\n    versions/\r\n      1.0.0/config.json\r\n      1.0.0/{en,pt,es}/*.md\r\n      1.0.0/{en,pt,es}/source-viewer      # Source code viewer (GitHub-style)\r\n      1.1.0/...\r\n      1.1.1/...\r\n```\r\n\r\nLocal layout mode adds:\r\n\r\n```text\r\ngitpagedocs/layouts/\r\n  layoutsConfig.json\r\n  layoutsFallbackConfig.json\r\n  templates/*.json\r\n```\r\n\r\n## Configuration Keys (Layout Source)\r\n\r\nMain layout source keys in `gitpagedocs/config.json` (or `config.js` / `config.ts`):\r\n\r\n- `layoutsConfigPathOficial`\r\n- `layoutsConfigPathOficialUrl`\r\n- `layoutsConfigPathTemplatesOficial`\r\n- `layoutsConfigPath`\r\n- `layoutsConfigPathTemplates`\r\n\r\nBehavior:\r\n\r\n- If `layoutsConfigPathOficial=true`, runtime prefers official layout/template sources.\r\n- If `layoutsConfigPathOficial=false`, runtime prefers your repository layout/template sources (`gitpagedocs/layouts/**` or your custom paths).\r\n\r\n## Version selector visibility\r\n\r\nIn the docs shell, the **version** dropdown is hidden when `VersionControl.versions` resolves to **at most one unique** `id`:\r\n\r\n- One entry, or multiple entries with the same `id`, shows **no** version selector (duplicate `id` rows are deduplicated; the first wins).\r\n- Two or more **distinct** `id` values show the version selector.\r\n- **Language** and **theme** selectors are separate and are not affected by version count.\r\n\r\n## Repository Search Behavior\r\n\r\nRepository search is controlled by environment/runtime context:\r\n\r\n- GitHub Pages builds (`GITHUB_ACTIONS=true`): repository-search home enabled.\r\n- Local runtime: controlled by `GITPAGEDOCS_REPOSITORY_SEARCH=true|false`.\r\n\r\nRecommended for local testing:\r\n\r\n```env\r\nGITPAGEDOCS_REPOSITORY_SEARCH=true\r\n```\r\n\r\n## Scripts\r\n\r\n- `npm run gitpagedocs` — runs `node cli/index.mjs` (generate config and docs)\r\n- `npm run gitpagedocs:full` — compatibility alias for the same CLI\r\n- `npm run gitpagedocs:home` — generates `gitpagedocshome/` (static site + .env + Dockerfile + README)\r\n- `npm run build` — generate `gitpagedocs/` + copy icon to `public/` + `next build`\r\n- `npm run build:prebuilt` — generate + build + copy `out/` to `prebuilt/`\r\n- `npm run dev` — `next dev`\r\n- `npm run start` — `node cli/start.mjs` (spawns `next start`; runs after `prestart` build)\r\n- `npm run lint` — `eslint .`\r\n- `npm run clean` — remove `.next/`\r\n\r\n## URL Routes and Query Parameters\r\n\r\nAll routes for accessing documentation files on the official site or self-hosted GitHub Pages.\r\n\r\n### Path structure\r\n\r\n| Pattern | Description |\r\n|--------|-------------|\r\n| `/` | Repository search home (when `repositorySearchHome=true`) |\r\n| `/{owner}/{repo}/` | Docs for `owner/repo`, default version |\r\n| `/{owner}/{repo}/v/{version}/` | Docs for `owner/repo`, specific version |\r\n| `/v/{version}/` | Docs for the project’s own repo, specific version |\r\n\r\n**Base URL (official site):** `https://vidigal-code.github.io/git-page-docs/`\r\n\r\n### Query parameters\r\n\r\n| Parameter | Values | Description |\r\n|-----------|--------|-------------|\r\n| `lang` | `en`, `pt`, `es` | UI and content language |\r\n| `theme` | layout id (e.g. `aurora-dark`, `aurora-light`) | Active theme; always reflected in URL |\r\n| `modetheme` | `dark`, `light` | Theme mode (legacy; `theme` takes precedence) |\r\n| `version` | e.g. `1.0.0` | Version (alternative to path) |\r\n| `menu` | `en`, `pt`, `es` | Language for path resolution (use with `id` or `name`) |\r\n| `id` | route id (e.g. `1`, `2`) | Navigate to page by route id |\r\n| `name` | slug (e.g. `getting-started`) | Navigate to page by filename slug |\r\n| `mdfull` | `en`, `pt`, `es` | Markdown fullscreen mode |\r\n| `htmlfull` | `en`, `pt`, `es` | HTML fullscreen mode |\r\n| `file` | path (with `mdfull` or `htmlfull`) | File to show in fullscreen |\r\n| `videofull` | `en`, `pt`, `es` | Video fullscreen mode |\r\n| `audiofull` | `en`, `pt`, `es` | Audio fullscreen mode |\r\n| `slug` | video/audio slug (with `videofull` or `audiofull`) | Video/audio identifier |\r\n| `#heading-id` | anchor | Scroll to heading in markdown |\r\n\r\n### Example URLs (git-page-docs, English)\r\n\r\n**Markdown pages**\r\n\r\n- Getting Started (v1.0.0, aurora-dark theme):  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&theme=aurora-dark&menu=en&id=1  \r\n- Project overview:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&id=2  \r\n- GitHub issues and projects:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&id=3  \r\n- Introduction to Git:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&id=4  \r\n\r\n**By slug (`name`)**\r\n\r\n- Getting Started:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&name=getting-started  \r\n- Project overview:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&name=project-overview  \r\n\r\n**HTML pages** (by slug)\r\n\r\n- Source code viewer:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&name=source-viewer  \r\n\r\n**Video pages** (route id 1–4; pages combine MD + HTML + Video by id)\r\n\r\n- Video 1:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?lang=en&menu=en&id=1  \r\n\r\n**Fullscreen modes**\r\n\r\n- Markdown fullscreen:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?mdfull=en&file=gitpagedocs/docs/versions/1.0.0/en/getting-started.md  \r\n- HTML fullscreen:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?htmlfull=en&file=gitpagedocs/docs/versions/1.0.0/en/source-viewer  \r\n- Video fullscreen:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?videofull=en&id=1  \r\n\r\n**Theme selection**\r\n\r\n- aurora-dark (default dark):  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?theme=aurora-dark  \r\n- aurora-light:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.0.0/?theme=aurora-light  \r\n\r\n**Other versions**\r\n\r\n- v1.1.0:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.1.0/?lang=en&theme=aurora-dark  \r\n- v1.1.1:  \r\n  https://vidigal-code.github.io/git-page-docs/Vidigal-code/git-page-docs/v/1.1.1/?lang=en&theme=aurora-dark  \r\n\r\n## Authorized Routes\r\n\r\nRoute authorization is configured per version in:\r\n\r\n- `gitpagedocs/docs/versions/<version>/config.json`\r\n\r\nUse the top-level `auth` section plus route-level `authorization`:\r\n\r\n- `auth.accessKeys`: key ids and expected secrets\r\n- `auth.rolesStorageKey`: localStorage key used to bootstrap roles\r\n- `auth.providers`: external providers (`authjs`, `clerk`, `firebase`, `jwt`)\r\n- `authorization.accessKeyId`: requires a configured key\r\n- `authorization.requiredRoles`: requires matching roles\r\n- `authorization.requireExternalAuth`: requires authenticated external provider\r\n- `authorization.allowedProviders`: optional provider allow-list per route\r\n\r\nExample:\r\n\r\n```json\r\n{\r\n  \"auth\": {\r\n    \"accessKeys\": {\r\n      \"docs-key\": \"open-gitpagedocs-docs\"\r\n    },\r\n    \"providers\": [\r\n      { \"type\": \"authjs\", \"enabled\": true, \"sessionEndpoint\": \"/api/auth/session\" },\r\n      { \"type\": \"jwt\", \"enabled\": true, \"tokenStorageKey\": \"git-page-docs:jwt-token\" }\r\n    ]\r\n  },\r\n  \"routes-md\": [\r\n    {\r\n      \"id\": 6,\r\n      \"path\": {\r\n        \"en\": \"gitpagedocs/docs/versions/1.1.1/en/authorized-routes.md\",\r\n        \"pt\": \"gitpagedocs/docs/versions/1.1.1/pt/authorized-routes.md\",\r\n        \"es\": \"gitpagedocs/docs/versions/1.1.1/es/authorized-routes.md\"\r\n      },\r\n      \"authorization\": {\r\n        \"accessKeyId\": \"docs-key\",\r\n        \"requiredRoles\": [\"maintainer\"],\r\n        \"requireExternalAuth\": true,\r\n        \"allowedProviders\": [\"authjs\", \"jwt\"]\r\n      }\r\n    }\r\n  ]\r\n}\r\n```\r\n\r\n## CLI Options\r\n\r\n| Option | Description |\r\n|--------|-------------|\r\n| `--owner <user>` | GitHub owner (e.g. `Vidigal-code`) |\r\n| `--repo <repo>` | GitHub repository (e.g. `git-page-docs`) |\r\n| `--path <subpath>` | Subpath for docs (e.g. `docs`); without it, base path = repo name for correct asset loading on project sites |\r\n| `--output <dir>` | Output directory (default: `gitpagedocs` or `gitpagedocshome` with `--home`) |\r\n| `--search true\\|false` | Enable/disable repository search (mainly for `--home`) |\r\n| `--layoutconfig` | Generate local layout templates in `gitpagedocs/layouts/` |\r\n| `--push` | Create workflow, commit artifacts, push to origin |\r\n| `--home` | Standalone distribution in `gitpagedocshome/` (static site + .env + Dockerfile + README) |\r\n| `--interactive` / `-i` | Run in interactive mode (prompts for options) |\r\n| `ai` or `--ai` | Interactive AI documentation mode (paths, provider, API key/base URL, multilingual output) |\r\n| `--build` | Compatibility flag (no change to output) |\r\n| `--serve` | Compatibility flag |\r\n| `--full` | Compatibility flag |\r\n\r\nShortcut syntax: `npx gitpagedocs --push --<owner> --<repo>` (e.g. `--Vidigal-code --git-page-docs`) is equivalent to `--owner <owner> --repo <repo>`.\r\n\r\nWith `--home`, output is `gitpagedocshome/` (or `--output` value). Otherwise, output remains `gitpagedocs/` (or `--output` value).\r\n\r\n## AI CLI (interactive docs generator)\r\n\r\nRun:\r\n\r\n```bash\r\nnpx gitpagedocs ai\r\n```\r\n\r\nThis mode provides:\r\n\r\n- provider selection (`openai`, `claude`, `gemini`, `ollama`)\r\n- API key / base URL input\r\n- path input (supports multiple paths and cross-repo paths)\r\n- multilingual markdown generation (`pt`, `en`, `es`)\r\n- optional `.gitpagedocsconfig` persistence for manual reuse\r\n- interactive fallback when directories are missing (fix/skip/abort)\r\n\r\n**Generates in the gitpagedocs pattern.** The model is told what gitpagedocs is and\r\nreturns documentation split into multiple pages. `gitpagedocs ai` first scaffolds the base\r\n`gitpagedocs/` structure, then writes each page to\r\n`gitpagedocs/docs/versions/<latest>/<lang>/<slug>.md` (in every language) **and wires them\r\ninto that version's `config.json`** (`routes-md` + `menus-header-md`), so the AI pages show up\r\ndirectly in the docs viewer menu. The added entries are tagged `aiGenerated` and are\r\nidempotent — re-running `gitpagedocs ai` replaces them instead of duplicating.\r\n\r\n> Note: a later plain `gitpagedocs` run rebuilds the base config from the deterministic\r\n> templates and drops the AI wiring — re-run `gitpagedocs ai` to restore it.\r\n\r\n### Manual config (`.gitpagedocsconfig`)\r\n\r\nYou can run manually with a persisted config in repository root:\r\n\r\n```json\r\n{\r\n  \"version\": 1,\r\n  \"ai\": {\r\n    \"provider\": \"openai\",\r\n    \"model\": \"gpt-4o-mini\",\r\n    \"apiKey\": \"<YOUR_API_KEY>\",\r\n    \"paths\": [\"src\", \"cli\", \"../another-repo/src\"],\r\n    \"languages\": [\"pt\", \"en\", \"es\"],\r\n    \"outputDir\": \"gitpagedocs/docs\",\r\n    \"filePrefix\": \"ai-generated\",\r\n    \"contextPrompt\": \"Você é um redator técnico sênior...\"\r\n  }\r\n}\r\n```\r\n\r\nFor Ollama, use `baseUrl` instead of `apiKey`.\r\n\r\n## Documentation password gate\r\n\r\nProtect the whole documentation site behind a password:\r\n\r\n```bash\r\ngitpagedocs password\r\n```\r\n\r\nIt prompts for a password (type + confirm), writes a non-reversible **public key** to\r\n`site.docsAccess` in `gitpagedocs/config.json`, and prints a **private key** to copy. The\r\nscheme is double-hash: `privateKey = SHA256(password)`, `publicKey = SHA256(privateKey)` — the\r\npassword itself is never stored. When `docsAccess.enabled` is set, the viewer blocks the entire\r\ndocumentation behind a full-page gate; visitors unlock with the **password OR the private key**\r\n(verified against the public key). The unlock is cached in `localStorage`, and a lock icon in\r\nthe menu clears the cache to re-block. Leave `docsAccess.enabled` false (the default) to keep\r\nthe docs open.\r\n\r\n## Configuration File Format\r\n\r\nRuntime supports three config file formats (in order of precedence):\r\n\r\n- `gitpagedocs/config.json`\r\n- `gitpagedocs/config.js` (CommonJS `module.exports` or ESM `export default`)\r\n- `gitpagedocs/config.ts` (TypeScript; exports default object)\r\n\r\n## License\r\n\r\nISC. See [repository](https://github.com/Vidigal-code/git-page-docs) for details.\r\n\r\n<!-- gitpagedocs:start -->\r\n### Supported AI providers (14)\r\n\r\n| Provider | ID | Default model | Capabilities |\r\n| --- | --- | --- | --- |\r\n| OpenAI | `openai` | `gpt-4o-mini` | stream, vision |\r\n| Anthropic | `anthropic` | `claude-sonnet-4-6` | stream, vision |\r\n| Google Gemini | `gemini` | `gemini-2.0-flash` | stream, vision, audio |\r\n| OpenRouter | `openrouter` | `openai/gpt-4o-mini` | stream, vision |\r\n| Ollama (local) | `ollama` | `llama3` | stream, vision |\r\n| Azure OpenAI | `azure-openai` | `gpt-4o-mini` | stream, vision |\r\n| Mistral | `mistral` | `mistral-large-latest` | stream |\r\n| DeepSeek | `deepseek` | `deepseek-chat` | stream |\r\n| Cohere | `cohere` | `command-r-plus` | stream |\r\n| Groq | `groq` | `llama-3.3-70b-versatile` | stream |\r\n| xAI Grok | `xai` | `grok-2-latest` | stream, vision |\r\n| Together AI | `together` | `meta-llama/Llama-3.3-70B-Instruct-Turbo` | stream |\r\n| Fireworks AI | `fireworks` | `accounts/fireworks/models/llama-v3p3-70b-instruct` | stream |\r\n| Perplexity | `perplexity` | `sonar` | stream |\r\n\r\n### CLI commands\r\n\r\n- `gitpagedocs init` — scaffold gitpagedocs config files\r\n- `gitpagedocs config` — show the resolved gitpagedocs config\r\n- `gitpagedocs provider [id]` — list AI providers or show one\r\n- `gitpagedocs models [provider]` — list catalog models\r\n- `gitpagedocs ai` — interactive AI docs generator (writes pages in the gitpagedocs pattern)\r\n- `gitpagedocs document[:repo|:file|:folder]` — generate documentation with AI in the gitpagedocs pattern\r\n- `gitpagedocs password` — set a documentation access password (writes the public key to config.json)\r\n- `gitpagedocs deploy | pages` — configure GitHub Pages via Actions and push\r\n- `gitpagedocs doctor` — diagnose the environment\r\n- `gitpagedocs mcp start` — start the MCP server over stdio\r\n- `gitpagedocs version` — print the CLI version\r\n- `gitpagedocs update` — show how to update the CLI\r\n<!-- gitpagedocs:end -->\r\n","package.json":"{\r\n  \"name\": \"gitpagedocs-monorepo\",\r\n  \"version\": \"1.1.44\",\r\n  \"private\": true,\r\n  \"description\": \"Workspace root for Git Page Docs — frontend (Next.js viewer), cli (published `gitpagedocs`), mcp, and tools (shared core).\",\r\n  \"packageManager\": \"pnpm@10.33.2\",\r\n  \"engines\": {\r\n    \"node\": \">=20\"\r\n  },\r\n  \"workspaces\": [\r\n    \"frontend\",\r\n    \"cli\",\r\n    \"tools\",\r\n    \"mcp\"\r\n  ],\r\n  \"scripts\": {\r\n    \"predev\": \"node -e \\\"const fs=require('fs'); const s='gitpagedocs/icon.svg'; const d='frontend/public/icon.svg'; if(fs.existsSync(s)){fs.mkdirSync('frontend/public',{recursive:true}); fs.copyFileSync(s,d);}\\\"\",\r\n    \"dev\": \"cross-env GITPAGEDOCS_REPOSITORY_SEARCH=false next dev frontend\",\r\n    \"clean\": \"node -e \\\"const fs=require('fs'); try{fs.rmSync('frontend/.next',{recursive:true})}catch(e){}\\\"\",\r\n    \"build\": \"node cli/index.mjs && node -e \\\"const fs=require('fs'); const src='gitpagedocs/icon.svg'; const dest='frontend/public/icon.svg'; if(fs.existsSync(src)){fs.mkdirSync('frontend/public',{recursive:true}); fs.copyFileSync(src,dest);}\\\" && next build frontend\",\r\n    \"build:prebuilt\": \"node cli/index.mjs && node -e \\\"const fs=require('fs'); const src='gitpagedocs/icon.svg'; const dest='frontend/public/icon.svg'; if(fs.existsSync(src)){fs.mkdirSync('frontend/public',{recursive:true}); fs.copyFileSync(src,dest);}\\\" && next build frontend && node -e \\\"const fs=require('fs'); if(fs.existsSync('cli/prebuilt')) fs.rmSync('cli/prebuilt',{recursive:true}); fs.cpSync('frontend/out','cli/prebuilt',{recursive:true}); fs.writeFileSync('cli/prebuilt/.nojekyll','')\\\"\",\r\n    \"prestart\": \"npm run build\",\r\n    \"start\": \"cross-env GITPAGEDOCS_REPOSITORY_SEARCH=false node cli/start.mjs\",\r\n    \"lint\": \"eslint .\",\r\n    \"lint:src\": \"eslint \\\"frontend/src/**/*.{ts,tsx}\\\"\",\r\n    \"typecheck\": \"tsc --noEmit && tsc --noEmit -p frontend/tsconfig.json && tsc --noEmit -p tools/tsconfig.json && tsc --noEmit -p mcp/tsconfig.json\",\r\n    \"test:unit\": \"vitest run\",\r\n    \"test:cov\": \"vitest run --coverage\",\r\n    \"test:e2e\": \"playwright test\",\r\n    \"test:ci\": \"npm run smoke:cli && npm run smoke:flags && npm run smoke:core && npm run smoke:ai && npm run smoke:secweb && npm run smoke:mcp && npm run smoke:docs\",\r\n    \"typecheck:strict-unused\": \"tsc --noEmit --noUnusedLocals --noUnusedParameters\",\r\n    \"smoke:cli\": \"node tools/smoke/cli-smoke.mjs\",\r\n    \"smoke:flags\": \"node --import tsx tools/smoke/flag-contract.ts\",\r\n    \"smoke:core\": \"node --import tsx tools/smoke/core-selftest.ts\",\r\n    \"smoke:ai\": \"node --import tsx tools/smoke/ai-selftest.ts\",\r\n    \"smoke:secweb\": \"node --import tsx tools/smoke/security-web-selftest.ts\",\r\n    \"smoke:mcp\": \"node --import tsx mcp/smoke/mcp-selftest.ts\",\r\n    \"smoke:docs\": \"node --import tsx tools/smoke/docs-selftest.ts\",\r\n    \"smoke:all\": \"npm run smoke:cli && npm run smoke:flags && npm run smoke:core && npm run smoke:ai && npm run smoke:secweb && npm run smoke:mcp && npm run smoke:docs && npm run baseline:check\",\r\n    \"test\": \"npm run smoke:all\",\r\n    \"baseline:site\": \"node tools/gen-site-baseline.mjs\",\r\n    \"baseline:create\": \"node tools/gen-site-baseline.mjs && node tools/smoke/create-baseline.mjs\",\r\n    \"baseline:check\": \"node tools/smoke/check-baseline.mjs\",\r\n    \"turbo:build\": \"turbo run build\",\r\n    \"turbo:lint\": \"turbo run lint\",\r\n    \"turbo:typecheck\": \"turbo run typecheck\",\r\n    \"turbo:test\": \"turbo run test\",\r\n    \"gitpagedocs\": \"node cli/index.mjs\",\r\n    \"gitpagedocs:home\": \"node cli/index.mjs --home\",\r\n    \"publish:all\": \"pnpm -r publish --access public --no-git-checks\"\r\n  },\r\n  \"repository\": {\r\n    \"type\": \"git\",\r\n    \"url\": \"git+https://github.com/Vidigal-code/git-page-docs.git\"\r\n  },\r\n  \"author\": \"Vidigal-code\",\r\n  \"license\": \"ISC\",\r\n  \"bugs\": {\r\n    \"url\": \"https://github.com/Vidigal-code/git-page-docs/issues\"\r\n  },\r\n  \"homepage\": \"https://vidigal-code.github.io/git-page-docs/\",\r\n  \"devDependencies\": {\r\n    \"@eslint/eslintrc\": \"^3.3.5\",\r\n    \"@gitpagedocs/mcp\": \"workspace:*\",\r\n    \"@gitpagedocs/tools\": \"workspace:*\",\r\n    \"@playwright/test\": \"^1.60.0\",\r\n    \"@types/node\": \"^22.13.4\",\r\n    \"@types/react\": \"^19.0.8\",\r\n    \"@types/react-dom\": \"^19.0.3\",\r\n    \"@vitest/coverage-v8\": \"^4.1.8\",\r\n    \"cross-env\": \"^7.0.3\",\r\n    \"eslint\": \"^9.20.1\",\r\n    \"eslint-config-next\": \"^15.1.7\",\r\n    \"gray-matter\": \"^4.0.3\",\r\n    \"marked\": \"^15.0.7\",\r\n    \"next\": \"^15.1.7\",\r\n    \"react\": \"^19.0.0\",\r\n    \"react-dom\": \"^19.0.0\",\r\n    \"react-icons\": \"^5.4.0\",\r\n    \"tsx\": \"^4.21.0\",\r\n    \"turbo\": \"^2.9.18\",\r\n    \"typescript\": \"5.9.3\",\r\n    \"vitest\": \"^4.1.8\"\r\n  }\r\n}\r\n","tsconfig.json":"{\r\n  \"extends\": \"./tsconfig.base.json\",\r\n  \"compilerOptions\": {\r\n    \"lib\": [\"ES2022\"],\r\n    \"types\": [\"node\"],\r\n    \"noEmit\": true\r\n  },\r\n  \"include\": [\"cli/**/*.ts\"],\r\n  \"exclude\": [\"node_modules\", \"frontend\", \"tools\", \"mcp\"]\r\n}\r\n","cli/ai/application/ai-command.ts":"/**\r\n * @file ai-command.ts\r\n * @description Application service for running AI commands. Decoupled from concrete LLMs.\r\n */\r\nimport { ILLMProvider } from '../core/ports/illm-provider';\r\n\r\nexport class AiCommandService {\r\n    constructor(private provider: ILLMProvider) { }\r\n\r\n    /**\r\n     * Executes the AI Documentation Generation for a specific content\r\n     */\r\n    async runGeneration(content: string, contextPrompt?: string): Promise<string> {\r\n        return await this.provider.generateDocumentation(content, contextPrompt);\r\n    }\r\n\r\n    /**\r\n     * Executes a CLI chat prompt\r\n     */\r\n    async runChat(prompt: string): Promise<string> {\r\n        const messages = [{ role: 'user' as const, content: prompt }];\r\n        return await this.provider.chat(messages);\r\n    }\r\n}\r\n","cli/ai/application/ai-provider-factory.ts":"import type { AiProviderId } from \"../config\";\r\nimport type { ILLMProvider } from \"../core/ports/illm-provider\";\r\nimport { ToolsLlmProvider } from \"../infrastructure/llm/tools-llm-provider\";\r\n\r\n/**\r\n * Creates the CLI LLM provider. Backed by the shared @gitpagedocs/tools AI core\r\n * (one registry-driven implementation for every provider) — no per-provider\r\n * switch. The legacy provider id (openai/claude/gemini/ollama) is mapped to the\r\n * catalog inside ToolsLlmProvider.\r\n */\r\nexport function createAiProvider(input: {\r\n  provider: AiProviderId;\r\n  model: string;\r\n  apiKey?: string;\r\n  baseUrl?: string;\r\n}): ILLMProvider {\r\n  return new ToolsLlmProvider(input.provider, {\r\n    model: input.model,\r\n    apiKey: input.apiKey,\r\n    baseUrl: input.baseUrl,\r\n  });\r\n}\r\n","cli/ai/application/docs-pattern.ts":"/**\r\n * Parse an AI documentation response into gitpagedocs pages.\r\n *\r\n * The model is instructed (see GITPAGEDOCS_DOC_SYSTEM_PROMPT) to delimit each\r\n * page with a line `=== PAGE: <slug> | <Title> ===`. This splits that response\r\n * into individual pages. If the model ignored the format, the whole response is\r\n * returned as a single \"ai-overview\" page so content is never lost.\r\n */\r\n\r\nexport interface AiDocPage {\r\n  /** lowercase-kebab, English, identical across languages (used as the filename) */\r\n  slug: string;\r\n  title: string;\r\n  body: string;\r\n}\r\n\r\nconst PAGE_DELIMITER = /^===\\s*PAGE:\\s*(.+?)\\s*\\|\\s*(.*?)\\s*===\\s*$/;\r\n\r\n/** Turn an arbitrary heading into a safe lowercase-kebab slug. */\r\nexport function slugify(raw: string): string {\r\n  const slug = (raw ?? \"\")\r\n    .toLowerCase()\r\n    .normalize(\"NFKD\")\r\n    .replace(/[^a-z0-9]+/g, \"-\")\r\n    .replace(/^-+|-+$/g, \"\")\r\n    .slice(0, 60);\r\n  return slug || \"page\";\r\n}\r\n\r\nexport function parseAiPages(markdown: string): AiDocPage[] {\r\n  const text = (markdown ?? \"\").replace(/\\r\\n/g, \"\\n\").trim();\r\n  if (!text) return [];\r\n\r\n  const pages: AiDocPage[] = [];\r\n  let current: { slug: string; title: string; body: string[] } | null = null;\r\n\r\n  const flush = () => {\r\n    if (current) {\r\n      pages.push({ slug: current.slug, title: current.title, body: current.body.join(\"\\n\").trim() });\r\n    }\r\n  };\r\n\r\n  for (const line of text.split(\"\\n\")) {\r\n    const match = line.match(PAGE_DELIMITER);\r\n    if (match) {\r\n      flush();\r\n      const rawSlug = match[1].trim();\r\n      const title = match[2].trim() || rawSlug;\r\n      current = { slug: slugify(rawSlug), title, body: [] };\r\n    } else if (current) {\r\n      current.body.push(line);\r\n    }\r\n  }\r\n  flush();\r\n\r\n  const withBody = pages.filter((page) => page.body.length > 0);\r\n  if (withBody.length === 0) {\r\n    return [{ slug: \"ai-overview\", title: \"Overview\", body: text }];\r\n  }\r\n\r\n  // De-duplicate slugs within a single response (suffix later collisions).\r\n  const seen = new Map<string, number>();\r\n  return withBody.map((page) => {\r\n    const count = seen.get(page.slug) ?? 0;\r\n    seen.set(page.slug, count + 1);\r\n    return count === 0 ? page : { ...page, slug: `${page.slug}-${count + 1}` };\r\n  });\r\n}\r\n","cli/ai/application/run-ai-cli-command.ts":"import { AiCommandService } from \"./ai-command\";\r\nimport { createAiProvider } from \"./ai-provider-factory\";\r\nimport { FileSystemAdapter, type FilePayload } from \"../infrastructure/file-system-adapter\";\r\nimport {\r\n  AiConfigFileRepository,\r\n} from \"../infrastructure/ai-config-file\";\r\nimport type { AiCliRunPlan, AiCliRunSummary } from \"../core/models/ai-cli-config\";\r\nimport { promptMissingDirectories, runAiInteractivePrompt } from \"../presentation/ai-prompts\";\r\nimport { GITPAGEDOCS_DOC_SYSTEM_PROMPT } from \"../config\";\r\nimport { parseAiPages, type AiDocPage } from \"./docs-pattern\";\r\nimport { writeVersionDocs } from \"../infrastructure/version-docs-writer\";\r\n// @ts-expect-error .mjs runtime module is type-less in this package.\r\nimport { DOC_VERSIONS } from \"../../contracts/doc-versions.mjs\";\r\n\r\nconst LANGUAGE_TO_LABEL: Record<string, string> = {\r\n  pt: \"Portuguese\",\r\n  en: \"English\",\r\n  es: \"Español\",\r\n};\r\n\r\nfunction aggregateFilesPayload(files: FilePayload[]): string {\r\n  return files\r\n    .map((file) => `\\n\\n--- FILE: ${file.filePath} ---\\n\\n${file.content}`)\r\n    .join(\"\");\r\n}\r\n\r\nfunction buildLanguagePrompt(basePrompt: string, language: \"pt\" | \"en\" | \"es\"): string {\r\n  const languageLabel = LANGUAGE_TO_LABEL[language] ?? language;\r\n  const authorGuidance = basePrompt?.trim() ? `Additional author guidance:\\n${basePrompt.trim()}\\n\\n` : \"\";\r\n  return (\r\n    `${GITPAGEDOCS_DOC_SYSTEM_PROMPT}\\n\\n` +\r\n    authorGuidance +\r\n    `Output language: write every page Title and body 100% in ${languageLabel}. ` +\r\n    `Keep each page slug lowercase-kebab and in English so the languages line up.`\r\n  );\r\n}\r\n\r\nasync function collectFilesWithInteractiveFallback(\r\n  fileSystem: FileSystemAdapter,\r\n  initialPaths: string[],\r\n): Promise<{ files: FilePayload[]; scanned: string[]; skipped: string[] }> {\r\n  let queue = [...initialPaths];\r\n  let scanned: string[] = [];\r\n  let skipped: string[] = [];\r\n  const files: FilePayload[] = [];\r\n\r\n  while (queue.length > 0) {\r\n    const { existing, missing } = fileSystem.splitExistingDirectories(queue);\r\n    scanned = [...scanned, ...existing];\r\n\r\n    for (const directory of existing) {\r\n      const directoryFiles = await fileSystem.readDirectoryRecursively(directory);\r\n      files.push(...directoryFiles);\r\n    }\r\n\r\n    if (!missing.length) break;\r\n\r\n    const fallback = await promptMissingDirectories(missing);\r\n    if (fallback.abort) {\r\n      skipped = [...skipped, ...missing];\r\n      break;\r\n    }\r\n\r\n    if (!fallback.replacementPaths.length) {\r\n      skipped = [...skipped, ...missing];\r\n      break;\r\n    }\r\n\r\n    queue = fallback.replacementPaths;\r\n  }\r\n\r\n  return {\r\n    files,\r\n    scanned,\r\n    skipped,\r\n  };\r\n}\r\n\r\nasync function runPlan(plan: AiCliRunPlan, cwd: string): Promise<AiCliRunSummary> {\r\n  const provider = createAiProvider({\r\n    provider: plan.config.ai.provider,\r\n    model: plan.config.ai.model,\r\n    apiKey: plan.config.ai.apiKey,\r\n    baseUrl: plan.config.ai.baseUrl,\r\n  });\r\n\r\n  const aiService = new AiCommandService(provider);\r\n  const fileSystem = new FileSystemAdapter();\r\n\r\n  const { files, scanned, skipped } = await collectFilesWithInteractiveFallback(\r\n    fileSystem,\r\n    plan.config.ai.paths,\r\n  );\r\n\r\n  if (!files.length) {\r\n    return {\r\n      scannedDirectories: scanned,\r\n      skippedDirectories: skipped,\r\n      scannedFilesCount: 0,\r\n      outputs: [],\r\n    };\r\n  }\r\n\r\n  const payload = aggregateFilesPayload(files);\r\n  const pagesByLang: Partial<Record<\"pt\" | \"en\" | \"es\", AiDocPage[]>> = {};\r\n\r\n  for (const language of plan.config.ai.languages) {\r\n    const prompt = buildLanguagePrompt(plan.config.ai.contextPrompt, language);\r\n    const markdown = await aiService.runGeneration(payload, prompt);\r\n    pagesByLang[language] = parseAiPages(markdown);\r\n  }\r\n\r\n  // Wire the AI pages into the latest documentation version (gitpagedocs pattern).\r\n  const versionId = DOC_VERSIONS[DOC_VERSIONS.length - 1] as string;\r\n  const result = await writeVersionDocs({ cwd, versionId, pagesByLang });\r\n\r\n  return {\r\n    scannedDirectories: scanned,\r\n    skippedDirectories: skipped,\r\n    scannedFilesCount: files.length,\r\n    outputs: result.files,\r\n    pages: result.slugs,\r\n  };\r\n}\r\n\r\nexport async function runAiCliCommand(options: {\r\n  cwd: string;\r\n  onInfo?: (message: string) => void;\r\n  /** Provided by the composition root to scaffold the base gitpagedocs/ tree\r\n   * (so the version config.json exists before AI pages are wired into it). */\r\n  onScaffold?: () => Promise<void>;\r\n}): Promise<{ summary: AiCliRunSummary; runConfigScaffold: boolean }> {\r\n  const logInfo = options.onInfo ?? (() => undefined);\r\n  const configRepo = new AiConfigFileRepository(options.cwd);\r\n\r\n  const existingConfig = await configRepo.read();\r\n  const plan = await runAiInteractivePrompt(existingConfig);\r\n\r\n  if (plan.saveConfig) {\r\n    await configRepo.write(plan.config);\r\n    logInfo(`[gitpagedocs:ai] Configuration saved to ${configRepo.getConfigPath()}`);\r\n  }\r\n\r\n  // Build the base gitpagedocs structure BEFORE generation so the version\r\n  // config.json exists and the AI pages can be wired into it.\r\n  if (plan.runConfigScaffold && options.onScaffold) {\r\n    logInfo(\"[gitpagedocs] Generating base gitpagedocs structure...\");\r\n    await options.onScaffold();\r\n  }\r\n\r\n  const summary = await runPlan(plan, options.cwd);\r\n  return {\r\n    summary,\r\n    runConfigScaffold: plan.runConfigScaffold,\r\n  };\r\n}\r\n","cli/ai/config.ts":"/**\r\n * @file config.ts\r\n * @description Provider constants for the AI CLI. Co-located in cli/ so the\r\n * published `gitpagedocs` package does not reach into the frontend app. The\r\n * browser keeps its own copy at frontend/src/shared/config/ai-config.ts.\r\n */\r\n\r\n/** Legacy 4-provider id used by the interactive CLI (mapped to the 14-provider\r\n * catalog in @gitpagedocs/tools via legacyProviderToCatalogId). */\r\nexport type AiProviderId = 'openai' | 'claude' | 'gemini' | 'ollama';\r\n\r\nexport const AI_MODEL_DEFAULTS: Readonly<Record<AiProviderId, string>> = {\r\n  openai: 'gpt-4o-mini',\r\n  claude: 'claude-3-5-sonnet-20240620',\r\n  gemini: 'gemini-1.5-flash',\r\n  ollama: 'llama3',\r\n};\r\n\r\nexport const DEFAULT_AI_DOC_PROMPT =\r\n  'You are a senior tech writer. Describe the provided code.';\r\n\r\n/**\r\n * System prompt that teaches the model what gitpagedocs is and forces it to\r\n * return documentation in the gitpagedocs pattern: a sequence of pages, each\r\n * introduced by a machine-parseable delimiter line so the CLI can split the\r\n * response into individual versioned markdown pages and wire them into the\r\n * viewer's config.json (routes-md + menus-header-md).\r\n */\r\nexport const GITPAGEDOCS_DOC_SYSTEM_PROMPT = [\r\n  'You are the documentation engine for \"gitpagedocs\", a generator of multilingual,',\r\n  'versioned static documentation sites. gitpagedocs renders markdown pages from',\r\n  'gitpagedocs/docs/versions/<version>/<lang>/<page>.md and wires them into a viewer',\r\n  'through a config.json contract (routes + header menus). Your job is to analyze the',\r\n  'provided source code and produce clean, professional documentation that fits this',\r\n  'pattern so it can be dropped straight into a gitpagedocs site.',\r\n  '',\r\n  'STRICT OUTPUT FORMAT — return ONLY a sequence of pages. Begin every page with a',\r\n  'delimiter line on its own, exactly:',\r\n  '=== PAGE: <slug> | <Title> ===',\r\n  'followed by the page body in GitHub-flavored markdown. Rules:',\r\n  '- Produce 4 to 8 cohesive pages. Suggested slugs: overview, getting-started,',\r\n  '  architecture, configuration, usage, deployment (adapt to the project).',\r\n  '- <slug> MUST be lowercase-kebab-case and in ENGLISH, and identical across every',\r\n  '  language run, so the languages line up (only the Title and body are translated).',\r\n  '- Do NOT wrap the whole answer in a code fence. Do NOT add any preamble or epilogue',\r\n  '  outside the page blocks. The first line of your reply MUST be a \"=== PAGE:\" line.',\r\n  '- Base everything strictly on the analyzed files; do not invent features.',\r\n].join('\\n');\r\n\r\nexport const OLLAMA_DEFAULT_BASE_URL = 'http://localhost:11434';\r\n","cli/ai/core/models/ai-cli-config.ts":"import type { AiProviderId } from \"../../config\";\r\n\r\nexport const AI_CLI_CONFIG_FILENAME = \".gitpagedocsconfig\";\r\n\r\nexport interface AiCliConfig {\r\n  version: 1;\r\n  ai: {\r\n    provider: AiProviderId;\r\n    model: string;\r\n    apiKey?: string;\r\n    baseUrl?: string;\r\n    paths: string[];\r\n    languages: Array<\"pt\" | \"en\" | \"es\">;\r\n    outputDir: string;\r\n    filePrefix: string;\r\n    contextPrompt: string;\r\n  };\r\n}\r\n\r\nexport interface AiCliRunPlan {\r\n  config: AiCliConfig;\r\n  saveConfig: boolean;\r\n  runConfigScaffold: boolean;\r\n}\r\n\r\nexport interface AiCliRunSummary {\r\n  scannedDirectories: string[];\r\n  skippedDirectories: string[];\r\n  scannedFilesCount: number;\r\n  outputs: string[];\r\n  /** Slugs of the gitpagedocs pages wired into the version config (if any). */\r\n  pages?: string[];\r\n}\r\n","cli/ai/core/ports/illm-provider.ts":"/**\r\n * @file illm-provider.ts\r\n * @description Contract for all LLM implementations ensuring OCP and DIP.\r\n * Isolates the AI logic from the specific LLM providers (OpenAI, Claude, Ollama, etc.).\r\n */\r\n\r\nexport interface ChatMessage {\r\n    role: 'user' | 'assistant' | 'system';\r\n    content: string;\r\n    type?: 'text' | 'image' | 'audio'; // Supporting multimedia as requested\r\n}\r\n\r\nexport interface ILLMProviderConfig {\r\n    apiKey?: string;\r\n    baseUrl?: string;\r\n    model?: string;\r\n}\r\n\r\nexport interface ILLMProvider {\r\n    /**\r\n     * Generates markdown documentation based on file content.\r\n     * @param fileContent Raw content of the source file\r\n     * @param contextPrompt Optional instructions to guide the generation (e.g., FSD standard)\r\n     */\r\n    generateDocumentation(fileContent: string, contextPrompt?: string): Promise<string>;\r\n\r\n    /**\r\n     * Conversational chat support.\r\n     * @param messages Array of chat messages (system context, user history, etc.)\r\n     */\r\n    chat(messages: ChatMessage[]): Promise<string>;\r\n}\r\n","cli/ai/infrastructure/ai-config-file.ts":"import fs from \"node:fs/promises\";\r\nimport path from \"node:path\";\r\nimport {\r\n  AI_CLI_CONFIG_FILENAME,\r\n  type AiCliConfig,\r\n} from \"../core/models/ai-cli-config\";\r\n\r\nexport class AiConfigFileRepository {\r\n  constructor(private readonly cwd: string = process.cwd()) {}\r\n\r\n  getConfigPath(): string {\r\n    return path.join(this.cwd, AI_CLI_CONFIG_FILENAME);\r\n  }\r\n\r\n  async read(): Promise<AiCliConfig | null> {\r\n    const configPath = this.getConfigPath();\r\n    try {\r\n      const content = await fs.readFile(configPath, \"utf-8\");\r\n      const parsed = JSON.parse(content) as Partial<AiCliConfig>;\r\n      if (!parsed || parsed.version !== 1 || !parsed.ai) return null;\r\n      return parsed as AiCliConfig;\r\n    } catch {\r\n      return null;\r\n    }\r\n  }\r\n\r\n  async write(config: AiCliConfig): Promise<void> {\r\n    const configPath = this.getConfigPath();\r\n    const data = JSON.stringify(config, null, 2);\r\n    await fs.writeFile(configPath, `${data}\\n`, \"utf-8\");\r\n  }\r\n}\r\n","cli/ai/infrastructure/file-system-adapter.ts":"import fs from 'node:fs/promises';\r\nimport path from 'node:path';\r\nimport { statSync } from 'node:fs';\r\n\r\nexport interface FilePayload {\r\n    filePath: string;\r\n    content: string;\r\n}\r\n\r\nexport class FileSystemAdapter {\r\n    splitExistingDirectories(targetDirectories: string[]): { existing: string[]; missing: string[] } {\r\n        const existing: string[] = [];\r\n        const missing: string[] = [];\r\n\r\n        for (const targetDirectory of targetDirectories) {\r\n            const absolutePath = path.resolve(process.cwd(), targetDirectory);\r\n            try {\r\n                const stat = statSync(absolutePath);\r\n                if (stat.isDirectory()) {\r\n                    existing.push(targetDirectory);\r\n                } else {\r\n                    missing.push(targetDirectory);\r\n                }\r\n            } catch {\r\n                missing.push(targetDirectory);\r\n            }\r\n        }\r\n\r\n        return { existing, missing };\r\n    }\r\n\r\n    async readDirectoryRecursively(targetDirectory: string): Promise<FilePayload[]> {\r\n        const absolutePath = path.resolve(process.cwd(), targetDirectory);\r\n        const resolvedFiles: FilePayload[] = [];\r\n\r\n        try {\r\n            await this.traverse(absolutePath, resolvedFiles);\r\n        } catch (error) {\r\n        }\r\n\r\n        return resolvedFiles;\r\n    }\r\n\r\n    private async traverse(currentPath: string, payloadList: FilePayload[]): Promise<void> {\r\n        let stats;\r\n        try {\r\n            stats = await fs.stat(currentPath);\r\n        } catch {\r\n            return;\r\n        }\r\n\r\n        if (stats.isDirectory()) {\r\n            const basename = path.basename(currentPath);\r\n            if (['node_modules', '.git', '.next', 'out', 'dist'].includes(basename)) {\r\n                return;\r\n            }\r\n\r\n            const entries = await fs.readdir(currentPath);\r\n            for (const entry of entries) {\r\n                await this.traverse(path.join(currentPath, entry), payloadList);\r\n            }\r\n        } else if (stats.isFile()) {\r\n            const ext = path.extname(currentPath);\r\n            const validExtensions = ['.ts', '.tsx', '.js', '.jsx', '.json', '.md', '.css'];\r\n            if (validExtensions.includes(ext)) {\r\n                try {\r\n                    const content = await fs.readFile(currentPath, 'utf-8');\r\n                    payloadList.push({\r\n                        filePath: currentPath,\r\n                        content: content\r\n                    });\r\n                } catch {\r\n                }\r\n            }\r\n        }\r\n    }\r\n\r\n    async writeDocumentationOutput(outputContent: string, targetPath: string = \"documentation-output.md\"): Promise<void> {\r\n        const absoluteDest = path.resolve(process.cwd(), targetPath);\r\n        await fs.mkdir(path.dirname(absoluteDest), { recursive: true });\r\n        await fs.writeFile(absoluteDest, outputContent, 'utf-8');\r\n    }\r\n}\r\n","cli/ai/infrastructure/llm/tools-llm-provider.ts":"import { createDefaultFactory, legacyProviderToCatalogId } from \"@gitpagedocs/tools/ai\";\r\nimport type { AiMessage, ProviderConfig } from \"@gitpagedocs/tools/ports\";\r\nimport type { ILLMProvider, ChatMessage, ILLMProviderConfig } from \"../../core/ports/illm-provider\";\r\nimport { DEFAULT_AI_DOC_PROMPT, type AiProviderId } from \"../../config\";\r\n\r\nconst factory = createDefaultFactory();\r\n\r\n/**\r\n * Single CLI LLM provider backed by the shared @gitpagedocs/tools AI core.\r\n * Replaces the four duplicated CLI provider classes (OpenAI/Claude/Gemini/\r\n * Ollama) with one adapter over the registry/factory, preserving the\r\n * ILLMProvider contract used by the AI documentation flow.\r\n */\r\nexport class ToolsLlmProvider implements ILLMProvider {\r\n  private readonly providerId;\r\n  private readonly model: string;\r\n  private readonly apiKey?: string;\r\n  private readonly baseUrl?: string;\r\n\r\n  constructor(legacyProvider: AiProviderId, config: ILLMProviderConfig) {\r\n    this.providerId = legacyProviderToCatalogId(legacyProvider);\r\n    this.model = config.model ?? \"\";\r\n    this.apiKey = config.apiKey;\r\n    this.baseUrl = config.baseUrl;\r\n  }\r\n\r\n  async generateDocumentation(fileContent: string, contextPrompt?: string): Promise<string> {\r\n    return this.chat([\r\n      { role: \"system\", content: contextPrompt || DEFAULT_AI_DOC_PROMPT },\r\n      { role: \"user\", content: fileContent },\r\n    ]);\r\n  }\r\n\r\n  async chat(messages: ChatMessage[]): Promise<string> {\r\n    const system = messages\r\n      .filter((m) => m.role === \"system\")\r\n      .map((m) => m.content)\r\n      .join(\"\\n\");\r\n    const aiMessages: AiMessage[] = messages\r\n      .filter((m) => m.role !== \"system\")\r\n      .map((m) => ({ role: m.role as AiMessage[\"role\"], content: m.content }));\r\n\r\n    const config: ProviderConfig = {\r\n      providerId: this.providerId,\r\n      model: this.model,\r\n      apiKey: this.apiKey,\r\n      baseUrl: this.baseUrl,\r\n    };\r\n    const response = await factory\r\n      .create(this.providerId)\r\n      .generate({ messages: aiMessages, system: system || undefined, maxTokens: 4000 }, config);\r\n    return response.text;\r\n  }\r\n}\r\n","cli/ai/infrastructure/version-docs-writer.ts":"import fs from \"node:fs/promises\";\r\nimport path from \"node:path\";\r\n// @ts-expect-error .mjs runtime module is type-less in this package.\r\nimport { buildMdRoute } from \"../../builders/route-builders.mjs\";\r\nimport type { AiDocPage } from \"../application/docs-pattern\";\r\n\r\nconst CANONICAL_LANGS = [\"pt\", \"en\", \"es\"] as const;\r\ntype Lang = (typeof CANONICAL_LANGS)[number];\r\n\r\n/** AI routes/menus use a high, dedicated id range so they never clash with the\r\n * deterministic base routes (ids 1..N) and can be identified for idempotency. */\r\nconst AI_ROUTE_ID_BASE = 1000;\r\n\r\nexport interface VersionDocsWriteInput {\r\n  cwd: string;\r\n  versionId: string;\r\n  /** Pages generated per language (only the languages the user selected). */\r\n  pagesByLang: Partial<Record<Lang, AiDocPage[]>>;\r\n}\r\n\r\nexport interface VersionDocsWriteResult {\r\n  configPath: string;\r\n  slugs: string[];\r\n  files: string[];\r\n}\r\n\r\ninterface LangContent {\r\n  title: string;\r\n  body: string;\r\n}\r\n\r\nfunction indexBySlug(pages: AiDocPage[] | undefined): Map<string, AiDocPage> {\r\n  const map = new Map<string, AiDocPage>();\r\n  for (const page of pages ?? []) {\r\n    if (!map.has(page.slug)) map.set(page.slug, page);\r\n  }\r\n  return map;\r\n}\r\n\r\n/**\r\n * Write AI-generated pages into the gitpagedocs versioned structure and wire\r\n * them into the version config.json (routes-md + menus-header-md). Pages are\r\n * written for ALL three canonical languages (missing languages reuse an\r\n * available translation) so every route path stays valid. Idempotent: any prior\r\n * `aiGenerated` routes/menus are replaced, never duplicated. The base config and\r\n * its deterministic routes are preserved untouched.\r\n */\r\nexport async function writeVersionDocs(input: VersionDocsWriteInput): Promise<VersionDocsWriteResult> {\r\n  const { cwd, versionId, pagesByLang } = input;\r\n  const base = `gitpagedocs/docs/versions/${versionId}`;\r\n\r\n  const perLang: Record<Lang, Map<string, AiDocPage>> = {\r\n    pt: indexBySlug(pagesByLang.pt),\r\n    en: indexBySlug(pagesByLang.en),\r\n    es: indexBySlug(pagesByLang.es),\r\n  };\r\n\r\n  // Ordered unique slug list (prefer en order, then pt, then es).\r\n  const order: string[] = [];\r\n  const seen = new Set<string>();\r\n  for (const lang of [\"en\", \"pt\", \"es\"] as Lang[]) {\r\n    for (const page of pagesByLang[lang] ?? []) {\r\n      if (!seen.has(page.slug)) {\r\n        seen.add(page.slug);\r\n        order.push(page.slug);\r\n      }\r\n    }\r\n  }\r\n  if (order.length === 0) {\r\n    throw new Error(\"No AI pages to write.\");\r\n  }\r\n\r\n  const resolve = (slug: string): Record<Lang, LangContent> => {\r\n    const fallback = CANONICAL_LANGS.map((lang) => perLang[lang].get(slug)).find(Boolean);\r\n    const out = {} as Record<Lang, LangContent>;\r\n    for (const lang of CANONICAL_LANGS) {\r\n      const page = perLang[lang].get(slug) ?? fallback!;\r\n      out[lang] = { title: page.title, body: page.body };\r\n    }\r\n    return out;\r\n  };\r\n\r\n  // 1) Write the markdown files (all 3 canonical languages).\r\n  const writtenFiles: string[] = [];\r\n  for (const slug of order) {\r\n    const content = resolve(slug);\r\n    for (const lang of CANONICAL_LANGS) {\r\n      const rel = `${base}/${lang}/${slug}.md`;\r\n      const abs = path.resolve(cwd, rel);\r\n      await fs.mkdir(path.dirname(abs), { recursive: true });\r\n      await fs.writeFile(abs, `${content[lang].body}\\n`, \"utf-8\");\r\n      writtenFiles.push(rel);\r\n    }\r\n  }\r\n\r\n  // 2) Patch the version config.json (raw JSON round-trip, preserve all keys).\r\n  const configRel = `${base}/config.json`;\r\n  const configAbs = path.resolve(cwd, configRel);\r\n  let raw: string;\r\n  try {\r\n    raw = await fs.readFile(configAbs, \"utf-8\");\r\n  } catch {\r\n    throw new Error(\r\n      `Version config not found at ${configRel}. Run the base scaffold (\\`gitpagedocs\\`) first.`,\r\n    );\r\n  }\r\n  const config = JSON.parse(raw) as Record<string, unknown>;\r\n\r\n  const routesMd = Array.isArray(config[\"routes-md\"]) ? (config[\"routes-md\"] as Array<Record<string, unknown>>) : [];\r\n  const menusMd = Array.isArray(config[\"menus-header-md\"]) ? (config[\"menus-header-md\"] as Array<Record<string, unknown>>) : [];\r\n  const keptRoutes = routesMd.filter((route) => route?.aiGenerated !== true);\r\n  const keptMenus = menusMd.filter((menu) => menu?.aiGenerated !== true);\r\n\r\n  const newRoutes: Array<Record<string, unknown>> = [];\r\n  const newMenus: Array<Record<string, unknown>> = [];\r\n  order.forEach((slug, index) => {\r\n    const content = resolve(slug);\r\n    const id = AI_ROUTE_ID_BASE + index + 1;\r\n    const pathByLang = {\r\n      pt: `${base}/pt/${slug}.md`,\r\n      en: `${base}/en/${slug}.md`,\r\n      es: `${base}/es/${slug}.md`,\r\n    };\r\n    const titles = { pt: content.pt.title, en: content.en.title, es: content.es.title };\r\n    const descriptions = { pt: \"\", en: \"\", es: \"\" };\r\n    const route = buildMdRoute(versionId, id, pathByLang, titles, descriptions, {}) as Record<string, unknown>;\r\n    route.aiGenerated = true;\r\n    newRoutes.push(route);\r\n    newMenus.push({\r\n      id,\r\n      aiGenerated: true,\r\n      pt: { title: content.pt.title, \"path-click\": pathByLang.pt },\r\n      en: { title: content.en.title, \"path-click\": pathByLang.en },\r\n      es: { title: content.es.title, \"path-click\": pathByLang.es },\r\n    });\r\n  });\r\n\r\n  config[\"routes-md\"] = [...keptRoutes, ...newRoutes];\r\n  config[\"menus-header-md\"] = [...keptMenus, ...newMenus];\r\n  await fs.writeFile(configAbs, `${JSON.stringify(config, null, 2)}\\n`, \"utf-8\");\r\n\r\n  return { configPath: configRel, slugs: order, files: writtenFiles };\r\n}\r\n","cli/ai/presentation/ai-prompts.ts":"import {\r\n    AI_MODEL_DEFAULTS,\r\n    OLLAMA_DEFAULT_BASE_URL,\r\n    type AiProviderId,\r\n} from '../config';\r\nimport { PROVIDER_CATALOG, legacyProviderToCatalogId } from '@gitpagedocs/tools/ai';\r\nimport type { AiCliConfig, AiCliRunPlan } from '../core/models/ai-cli-config';\r\nimport {\r\n    askText,\r\n    askConfirm,\r\n    askSelect,\r\n    askMultiSelect,\r\n    intro,\r\n} from '../../presentation/ui/clack';\r\n\r\nexport interface InteractiveCliAnswers {\r\n    provider: AiProviderId;\r\n    apiKeyOrHost: string;\r\n    model: string;\r\n    targetDirs: string[];\r\n    languages: Array<'pt' | 'en' | 'es'>;\r\n    outputDir: string;\r\n    filePrefix: string;\r\n    saveConfig: boolean;\r\n    runConfigScaffold: boolean;\r\n    contextPrompt: string;\r\n}\r\n\r\nfunction parseCommaSeparated(value: string): string[] {\r\n    return value\r\n        .split(',')\r\n        .map((item) => item.trim())\r\n        .filter(Boolean);\r\n}\r\n\r\nfunction validateCommaSeparatedDirectories(value: string): string | undefined {\r\n    const values = parseCommaSeparated(value);\r\n    if (!values.length) return 'Provide at least one path.';\r\n    return undefined;\r\n}\r\n\r\nconst CUSTOM_MODEL = '__custom_model__';\r\n\r\n/**\r\n * Ask for the model as a SELECT of the provider's real catalog models (with the\r\n * default marked), plus a \"Custom\" escape hatch — so an invalid id like \"4.8\"\r\n * can't be typed by mistake and rejected later as a 404 by the provider.\r\n */\r\nasync function askModel(provider: AiProviderId): Promise<string> {\r\n    const catalogId = legacyProviderToCatalogId(provider);\r\n    const spec = catalogId ? PROVIDER_CATALOG[catalogId] : undefined;\r\n    const fallback = AI_MODEL_DEFAULTS[provider] || '';\r\n\r\n    if (!spec || spec.models.length === 0) {\r\n        return String(await askText({ message: 'Which model do you want to use?', defaultValue: fallback }));\r\n    }\r\n\r\n    const picked = await askSelect<string>(\r\n        'Which model do you want to use?',\r\n        [\r\n            ...spec.models.map((m) => ({\r\n                value: m.id,\r\n                label: m.id === spec.defaultModel ? `${m.id} (default)` : m.id,\r\n            })),\r\n            { value: CUSTOM_MODEL, label: 'Custom — enter a model id manually' },\r\n        ],\r\n        spec.defaultModel,\r\n    );\r\n\r\n    if (picked !== CUSTOM_MODEL) return picked;\r\n\r\n    return String(\r\n        await askText({\r\n            message: 'Enter the model id:',\r\n            defaultValue: spec.defaultModel,\r\n            validate: (value) => (value.trim() ? undefined : 'Provide a model id'),\r\n        }),\r\n    );\r\n}\r\n\r\nfunction toPlan(answers: InteractiveCliAnswers): AiCliRunPlan {\r\n    const config: AiCliConfig = {\r\n        version: 1,\r\n        ai: {\r\n            provider: answers.provider,\r\n            model: answers.model,\r\n            apiKey: answers.provider === 'ollama' ? undefined : answers.apiKeyOrHost,\r\n            baseUrl: answers.provider === 'ollama' ? answers.apiKeyOrHost : undefined,\r\n            paths: answers.targetDirs,\r\n            languages: answers.languages,\r\n            outputDir: answers.outputDir,\r\n            filePrefix: answers.filePrefix,\r\n            contextPrompt: answers.contextPrompt,\r\n        },\r\n    };\r\n\r\n    return {\r\n        config,\r\n        saveConfig: answers.saveConfig,\r\n        runConfigScaffold: answers.runConfigScaffold,\r\n    };\r\n}\r\n\r\nexport async function promptMissingDirectories(\r\n    missingDirectories: string[],\r\n): Promise<{ replacementPaths: string[]; abort: boolean }> {\r\n    const recoveryMode = await askSelect(\r\n        `I couldn't find ${missingDirectories.length} directory(ies): ${missingDirectories.join(', ')}`,\r\n        [\r\n            { value: 'fix', label: 'Fix paths now (recommended)' },\r\n            { value: 'skip', label: 'Skip missing paths and continue' },\r\n            { value: 'abort', label: 'Abort execution' },\r\n        ],\r\n        'fix',\r\n    );\r\n\r\n    if (recoveryMode === 'abort') {\r\n        return { replacementPaths: [], abort: true };\r\n    }\r\n    if (recoveryMode === 'skip') {\r\n        return { replacementPaths: [], abort: false };\r\n    }\r\n\r\n    const fixedPaths = await askText({\r\n        message: 'Enter new paths (comma-separated):',\r\n        validate: validateCommaSeparatedDirectories,\r\n    });\r\n\r\n    return {\r\n        replacementPaths: parseCommaSeparated(String(fixedPaths || '')),\r\n        abort: false,\r\n    };\r\n}\r\n\r\nexport async function promptUseExistingConfig(existingConfig: AiCliConfig): Promise<AiCliRunPlan | null> {\r\n    const useExistingConfig = await askConfirm(\r\n        'Found .gitpagedocsconfig. Do you want to use this configuration?',\r\n        true,\r\n    );\r\n\r\n    if (!useExistingConfig) return null;\r\n\r\n    const runConfigScaffold = await askConfirm(\r\n        'Generate the base gitpagedocs structure first, so the AI pages are wired into the docs viewer?',\r\n        true,\r\n    );\r\n\r\n    return {\r\n        config: existingConfig,\r\n        saveConfig: false,\r\n        runConfigScaffold,\r\n    };\r\n}\r\n\r\nexport async function runAiInteractivePrompt(existingConfig?: AiCliConfig | null): Promise<AiCliRunPlan> {\r\n    intro('🤖  GitPageDocs AI CLI — interactive mode 🤖');\r\n\r\n    if (existingConfig) {\r\n        const existingPlan = await promptUseExistingConfig(existingConfig);\r\n        if (existingPlan) return existingPlan;\r\n    }\r\n\r\n    const provider = await askSelect<AiProviderId>(\r\n        'Which AI provider should be used to generate documentation?',\r\n        [\r\n            { value: 'openai', label: 'OpenAI (GPT)' },\r\n            { value: 'claude', label: 'Anthropic (Claude)' },\r\n            { value: 'gemini', label: 'Google Gemini' },\r\n            { value: 'ollama', label: 'Ollama (Local Open Source)' },\r\n        ],\r\n        'openai',\r\n    );\r\n\r\n    const apiKeyOrHost = await askText({\r\n        message: provider === 'ollama' ? 'Ollama host URL:' : 'Provider API key:',\r\n        defaultValue: provider === 'ollama' ? OLLAMA_DEFAULT_BASE_URL : undefined,\r\n        validate: (input) => (input.length > 0 ? undefined : 'Required field'),\r\n    });\r\n\r\n    const model = await askModel(provider);\r\n\r\n    const targetDirsRaw = await askText({\r\n        message:\r\n            'Paths to analyze (comma-separated). You can include multiple repositories (e.g., src,cli,../other-repo/src):',\r\n        defaultValue: 'src,cli',\r\n        validate: validateCommaSeparatedDirectories,\r\n    });\r\n\r\n    const languages = await askMultiSelect<'en' | 'pt' | 'es'>(\r\n        'Documentation languages to generate:',\r\n        [\r\n            { value: 'en', label: 'English (en)' },\r\n            { value: 'pt', label: 'Portuguese (pt)' },\r\n            { value: 'es', label: 'Español (es)' },\r\n        ],\r\n        ['en', 'pt', 'es'],\r\n    );\r\n\r\n    const outputDir = await askText({\r\n        message: 'Output directory for generated markdown files:',\r\n        defaultValue: 'gitpagedocs/docs',\r\n        validate: (value) => (value.trim() ? undefined : 'Provide an output directory'),\r\n    });\r\n\r\n    const filePrefix = await askText({\r\n        message: 'Output file prefix:',\r\n        defaultValue: 'ai-generated',\r\n        validate: (value) => (value.trim() ? undefined : 'Provide a prefix'),\r\n    });\r\n\r\n    const contextPrompt = await askText({\r\n        message: 'Extra instructions for AI (optional):',\r\n        defaultValue:\r\n            'You are a senior technical writer. Generate professional, clear documentation with architectural insight following FSD, SOLID, and Clean Code principles.',\r\n    });\r\n\r\n    const saveConfig = await askConfirm(\r\n        'Save this configuration to .gitpagedocsconfig for future manual use?',\r\n        true,\r\n    );\r\n\r\n    const runConfigScaffold = await askConfirm(\r\n        'Generate the base gitpagedocs structure first, so the AI pages are wired into the docs viewer?',\r\n        true,\r\n    );\r\n\r\n    return toPlan({\r\n        provider,\r\n        apiKeyOrHost,\r\n        model,\r\n        targetDirs: parseCommaSeparated(targetDirsRaw),\r\n        languages,\r\n        outputDir,\r\n        filePrefix,\r\n        contextPrompt,\r\n        saveConfig,\r\n        runConfigScaffold,\r\n    });\r\n}\r\n","cli/application/config-only/handler.mjs":"/** Config-only use case - orchestrates build, write, and optional push */\n\nimport { sanitizeSegment } from \"../../domain/services/sanitize-segment.mjs\";\nimport { reportAll } from \"../report/config-only-reporter.mjs\";\n\n/**\n * Execute config-only use case\n * @param {Object} params\n * @param {Object} params.options - Parsed CLI options\n * @param {string} params.root - Project root\n * @param {string} params.pkgRoot - Package root\n * @param {string} params.prebuiltDir - Prebuilt directory path\n * @param {Function} params.buildConfigArtifacts - Artifact builder\n * @param {Function} params.createThemeTemplate - Theme template creator\n * @param {Array} params.layouts - Layout definitions\n * @param {import(\"../ports/cli-runtime-ports\").ConfigOnlyRuntimePort} runtime\n */\nexport async function executeConfigOnly(params, runtime) {\n  if (!runtime) {\n    throw new Error(\"Config-only runtime is required.\");\n  }\n\n  const { options, root, pkgRoot, prebuiltDir, buildConfigArtifacts, createThemeTemplate, layouts } = params;\n\n  const artifacts = buildConfigArtifacts({\n    useLocalLayoutConfig: options.useLocalLayoutConfig,\n    githubOwner: sanitizeSegment(options.githubOwner),\n    githubRepo: sanitizeSegment(options.githubRepo),\n    root,\n  });\n\n  await runtime.writeConfigOnlyOutput({\n    root,\n    pkgRoot,\n    outputDir: options.outputDir,\n    artifacts,\n    useLocalLayoutConfig: options.useLocalLayoutConfig,\n    layouts,\n    createThemeTemplate,\n  });\n\n  if (options.shouldPush) {\n    await runtime.ensureGitHubPagesWorkflow(\n      () => runtime.getCurrentGitBranch(root),\n      (relativePath, content) => runtime.writeText(root, relativePath, content),\n      options.docsPath || \"\",\n    );\n    runtime.runGitPushForGeneratedArtifacts(options, root, sanitizeSegment);\n  }\n\n  const reportLines = reportAll(options, runtime.hasPath(prebuiltDir));\n  for (const line of reportLines) {\n    runtime.logInfo(line);\n  }\n}\n","cli/application/home/handler.mjs":"/** Home distribution use case - static site + auxiliary files */\n\nimport { STATIC_OUTPUT_DIR, ARTIFACTS_DIR } from \"../../home/constants.mjs\";\n\n/**\n * Execute home distribution use case\n * @param {Object} params\n * @param {Object} params.options - Parsed CLI options\n * @param {string} params.root - Project root\n * @param {string} params.pkgRoot - Package root\n * @param {Function} params.buildConfigArtifacts - Artifact builder\n * @param {Function} params.createThemeTemplate - Theme template creator\n * @param {Array} params.layouts - Layout definitions\n * @param {import(\"../ports/cli-runtime-ports\").HomeRuntimePort} runtime\n */\nexport async function executeHome(params, runtime) {\n  if (!runtime) {\n    throw new Error(\"Home runtime is required.\");\n  }\n\n  const { options, root, pkgRoot, buildConfigArtifacts, createThemeTemplate, layouts } = params;\n  const outputDir = options.outputDir || \"gitpagedocshome\";\n  const repositorySearch = options.repositorySearch ?? false;\n  const basePath = options.basePath ?? \"\";\n\n  const isCurrentDir = outputDir === \".\" || outputDir === \"./\";\n  const targetDir = isCurrentDir ? root : runtime.joinPath(root, outputDir);\n\n  if (!isCurrentDir) {\n    runtime.ensureDirEmpty(root, outputDir);\n  }\n\n  const pathSegment = basePath ? basePath.replace(/^\\/+|\\/+$/g, \"\") : \"\";\n  const buildEnv = {\n    ...process.env,\n    GITHUB_ACTIONS: \"true\",\n    GITPAGEDOCS_REPOSITORY_SEARCH: String(repositorySearch),\n    GITPAGEDOCS_BASE_PATH: pathSegment ? `/${pathSegment}` : \"/\",\n    GITPAGEDOCS_PATH: pathSegment,\n  };\n\n  const artifacts = buildConfigArtifacts({\n    useLocalLayoutConfig: false,\n    githubOwner: \"\",\n    githubRepo: \"\",\n    root,\n  });\n\n  await runtime.writeConfigOnlyOutput({\n    root,\n    pkgRoot,\n    outputDir: ARTIFACTS_DIR,\n    artifacts,\n    useLocalLayoutConfig: false,\n    layouts,\n    createThemeTemplate,\n  });\n\n  runtime.runNextBuild(root, buildEnv);\n\n  const outPath = runtime.joinPath(root, STATIC_OUTPUT_DIR);\n  if (!runtime.existsPath(outPath)) {\n    throw new Error(`Static export not found at ${STATIC_OUTPUT_DIR}/. Ensure next.config exports when GITHUB_ACTIONS=true.`);\n  }\n\n  const destBase = isCurrentDir ? root : targetDir;\n  if (isCurrentDir) {\n    for (const name of runtime.readDirNames(outPath)) {\n      runtime.copyRecursive(runtime.joinPath(outPath, name), runtime.joinPath(destBase, name));\n    }\n  } else {\n    runtime.copyRecursive(outPath, destBase);\n  }\n  runtime.copyRecursive(runtime.joinPath(root, ARTIFACTS_DIR), runtime.joinPath(destBase, ARTIFACTS_DIR));\n\n  await runtime.writeHomeFiles(root, isCurrentDir ? \".\" : outputDir, { repositorySearch, basePath });\n  await runtime.writeText(root, (isCurrentDir ? \"\" : outputDir + \"/\") + \".nojekyll\", \"\");\n\n  const cdDir = isCurrentDir ? \".\" : outputDir;\n  runtime.logSuccess(`Generated: ${cdDir}/ (static site + .env + Dockerfile + README.md)`);\n  runtime.logInfo(`Serve: cd ${cdDir} && npx serve .`);\n  runtime.logInfo(`Docker: cd ${cdDir} && docker build -t gitpagedocshome . && docker run -p 3000:80 gitpagedocshome`);\n}\n","cli/application/ports/cli-runtime-ports.ts":"import type { CliOptions } from \"../../domain/models/cli-options\";\r\n\r\nexport interface BuildArtifactsInput {\r\n  useLocalLayoutConfig: boolean;\r\n  githubOwner: string;\r\n  githubRepo: string;\r\n  root: string;\r\n}\r\n\r\nexport interface LayoutDefinition {\r\n  file: string;\r\n  [key: string]: unknown;\r\n}\r\n\r\nexport interface BuiltConfigArtifacts {\r\n  rootConfig: unknown;\r\n  layoutsConfig: unknown;\r\n  fallbackLayoutsConfig: unknown;\r\n  docs?: Record<string, Record<string, string>>;\r\n  docsHtml?: Record<string, Record<string, string>>;\r\n  versionConfigs: Record<string, Record<string, unknown>>;\r\n}\r\n\r\nexport interface CliRuntimeParams {\r\n  root: string;\r\n  pkgRoot: string;\r\n  prebuiltDir: string;\r\n  buildConfigArtifacts: (input: BuildArtifactsInput) => BuiltConfigArtifacts;\r\n  createThemeTemplate: (layout: LayoutDefinition) => unknown;\r\n  layouts: LayoutDefinition[];\r\n}\r\n\r\nexport interface CliCommandContext extends CliRuntimeParams {\r\n  options: CliOptions;\r\n}\r\n\r\nexport interface CliCommandRunner {\r\n  runConfigOnly: (params: CliCommandContext) => Promise<void>;\r\n  runHome: (params: CliCommandContext) => Promise<void>;\r\n  runAi: (params: CliCommandContext) => Promise<void>;\r\n}\r\n\r\nexport interface ConfigOnlyOutputInput {\r\n  root: string;\r\n  pkgRoot: string;\r\n  outputDir: string;\r\n  artifacts: BuiltConfigArtifacts;\r\n  useLocalLayoutConfig: boolean;\r\n  layouts: LayoutDefinition[];\r\n  createThemeTemplate: (layout: LayoutDefinition) => unknown;\r\n}\r\n\r\nexport interface ConfigOnlyRuntimePort {\r\n  hasPath: (absolutePath: string) => boolean;\r\n  writeConfigOnlyOutput: (input: ConfigOnlyOutputInput) => Promise<void>;\r\n  writeText: (root: string, relativePath: string, data: string) => Promise<void>;\r\n  ensureGitHubPagesWorkflow: (\r\n    getCurrentGitBranch: () => string,\r\n    writeText: (relativePath: string, content: string) => Promise<void>,\r\n    docsPath?: string,\r\n  ) => Promise<void>;\r\n  getCurrentGitBranch: (root: string) => string;\r\n  runGitPushForGeneratedArtifacts: (\r\n    options: CliOptions,\r\n    root: string,\r\n    sanitizeSegment: (value: string | undefined | null) => string,\r\n  ) => void;\r\n  logInfo: (message: string) => void;\r\n}\r\n\r\nexport interface HomeRuntimePort {\r\n  joinPath: (...parts: string[]) => string;\r\n  ensureDirEmpty: (root: string, relativeDir: string) => void;\r\n  copyRecursive: (src: string, dest: string) => void;\r\n  readDirNames: (absolutePath: string) => string[];\r\n  existsPath: (absolutePath: string) => boolean;\r\n  runNextBuild: (root: string, env: NodeJS.ProcessEnv) => void;\r\n  writeConfigOnlyOutput: (input: ConfigOnlyOutputInput) => Promise<void>;\r\n  writeHomeFiles: (\r\n    root: string,\r\n    outputDir: string,\r\n    options: { repositorySearch?: boolean; basePa
