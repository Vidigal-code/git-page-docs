nt.mjs":"/** Domain-level sanitization for owner/repo/path segments */\n\nexport function sanitizeSegment(value) {\n  if (!value) return \"\";\n  const normalized = value.trim();\n  return /^[A-Za-z0-9._-]+$/.test(normalized) ? normalized : \"\";\n}\n","cli/home/constants.mjs":"/** Constants for home distribution */\r\n\r\nexport const STATIC_OUTPUT_DIR = \"frontend/out\";\r\nexport const ARTIFACTS_DIR = \"gitpagedocs\";\r\n","cli/home/home-file-writer.mjs":"/** Write .env, Dockerfile, README to home output directory */\n\nimport path from \"node:path\";\nimport { mkdir } from \"node:fs/promises\";\nimport { writeFile } from \"node:fs/promises\";\nimport { getEnvTemplate, getDockerfileTemplate, getReadmeTemplate } from \"./templates.mjs\";\n\n/**\n * @param {string} root\n * @param {string} outputDir - e.g. gitpagedocshome or .\n * @param {{ repositorySearch?: boolean; basePath?: string }} opts\n */\nexport async function writeHomeFiles(root, outputDir, opts = {}) {\n  const basePath = outputDir === \".\" || outputDir === \"./\" ? root : path.join(root, outputDir);\n  await mkdir(basePath, { recursive: true });\n\n  await writeFile(path.join(basePath, \".env\"), getEnvTemplate(opts), \"utf-8\");\n  await writeFile(path.join(basePath, \"Dockerfile\"), getDockerfileTemplate(), \"utf-8\");\n  await writeFile(path.join(basePath, \"README.md\"), getReadmeTemplate({ outputDir }), \"utf-8\");\n}\n","cli/home/templates.mjs":"/** Template content for home distribution files */\n\nexport function getEnvTemplate({ repositorySearch = false, basePath = \"\" }) {\n  const pathLine = basePath\n    ? `GITPAGEDOCS_PATH=${basePath}`\n    : `# GITPAGEDOCS_PATH=gi-page-docs`;\n  return `# GitPageDocs - Local development\n# Set to \"true\" to enable the search aggregator home.\nGITPAGEDOCS_REPOSITORY_SEARCH=${String(repositorySearch)}\n\n# Base path (when GITPAGEDOCS_REPOSITORY_SEARCH=false).\n# Example: localhost:3000/gi-page-docs\n${pathLine}\n`;\n}\n\nexport function getDockerfileTemplate() {\n  return `FROM nginx:alpine\nCOPY . /usr/share/nginx/html\nEXPOSE 80\nCMD [\"nginx\", \"-g\", \"daemon off;\"]\n`;\n}\n\nexport function getReadmeTemplate({ outputDir = \"gitpagedocshome\" }) {\n  const cdDir = outputDir === \".\" || outputDir === \"./\" ? \".\" : outputDir;\n  return `# GitPageDocs Home\n\nPre-built GitPageDocs static site by Vidigal-code.\n\n## Quick start\n\n\\`\\`\\`bash\nnpx serve .\n\\`\\`\\`\n\n## Docker\n\n\\`\\`\\`bash\ndocker build -t gitpagedocshome .\ndocker run -p 3000:80 gitpagedocshome\n\\`\\`\\`\n\n## Credits\n\nPowered by Vidigal-code - https://github.com/Vidigal-code/git-page-docs\n`;\n}\n","cli/index.mjs":"#!/usr/bin/env node\r\n\r\nimport path from \"node:path\";\r\nimport { fileURLToPath } from \"node:url\";\r\nimport { spawnSync } from \"node:child_process\";\r\n\r\nconst scriptPath = fileURLToPath(import.meta.url);\r\nconst scriptDir = path.dirname(scriptPath);\r\nconst tsEntry = path.join(scriptDir, \"presentation\", \"index.ts\");\r\n\r\n// Resolve tsx from THIS package's location, not the user's cwd. `node --import\r\n// tsx` would otherwise resolve the bare \"tsx\" specifier relative to the current\r\n// working directory, which fails when the CLI is installed globally and run\r\n// from a project that doesn't depend on tsx (ERR_MODULE_NOT_FOUND 'tsx').\r\nlet tsxLoader = \"tsx\";\r\ntry {\r\n  tsxLoader = import.meta.resolve(\"tsx\");\r\n} catch {\r\n  // Older Node without a stable import.meta.resolve — fall back to the bare\r\n  // specifier (works when tsx is resolvable from the cwd or globally).\r\n}\r\n\r\nconst result = spawnSync(\r\n  process.execPath,\r\n  [\"--import\", tsxLoader, tsEntry, ...process.argv.slice(2)],\r\n  {\r\n    stdio: \"inherit\",\r\n    cwd: process.cwd(),\r\n    env: process.env,\r\n  },\r\n);\r\n\r\nif (result.error) {\r\n  console.error(\"[gitpagedocs] Failed to run TypeScript CLI runtime.\", result.error);\r\n  process.exitCode = 1;\r\n} else if (typeof result.status === \"number\" && result.status !== 0) {\r\n  process.exitCode = result.status;\r\n}\r\n","cli/infrastructure/config-only/runtime.mjs":"import { existsSync } from \"node:fs\";\nimport { getCurrentGitBranch, runGitPushForGeneratedArtifacts } from \"../../runtime/git-ops.mjs\";\nimport { writeConfigOnlyOutput, writeText } from \"../../runtime/output.mjs\";\nimport { ensureGitHubPagesWorkflow } from \"../../runtime/workflow.mjs\";\nimport { logInfo } from \"../../ui/logger.mjs\";\n\nexport function createConfigOnlyRuntime() {\n  return {\n    hasPath: existsSync,\n    writeConfigOnlyOutput,\n    writeText,\n    ensureGitHubPagesWorkflow,\n    getCurrentGitBranch,\n    runGitPushForGeneratedArtifacts,\n    logInfo,\n  };\n}\n","cli/infrastructure/gitpagedocs-config-file.ts":"import fs from \"node:fs/promises\";\r\nimport { defaultConfigLoader } from \"@gitpagedocs/tools\";\r\n\r\nexport interface DocsAccessConfig {\r\n  enabled: boolean;\r\n  publicKey: string;\r\n}\r\n\r\n/**\r\n * Reads and patches the generated gitpagedocs/config.json IN PLACE, preserving\r\n * every existing key (raw-JSON round-trip — it never reserializes through a typed\r\n * model that could drop unknown fields). Used by interactive commands that need\r\n * to persist a single value (e.g. the documentation password public key).\r\n */\r\nexport class GitPageDocsConfigRepository {\r\n  constructor(private readonly cwd: string = process.cwd()) {}\r\n\r\n  /** Absolute path to the JSON config, or throws a friendly, actionable error. */\r\n  async resolvePath(): Promise<string> {\r\n    const resolved = await defaultConfigLoader.resolveConfigPath(this.cwd);\r\n    if (!resolved) {\r\n      throw new Error(\"gitpagedocs config.json not found. Run `gitpagedocs` first to generate it.\");\r\n    }\r\n    if (!resolved.endsWith(\".json\")) {\r\n      throw new Error(`Expected a JSON config to patch, found \"${resolved}\". Use a gitpagedocs/config.json.`);\r\n    }\r\n    return resolved;\r\n  }\r\n\r\n  /**\r\n   * Set `site.docsAccess = { enabled, publicKey }`, leaving all other config keys\r\n   * untouched. Returns the path that was written.\r\n   */\r\n  async patchDocsAccess(publicKey: string, enabled = true): Promise<string> {\r\n    const configPath = await this.resolvePath();\r\n    const raw = await fs.readFile(configPath, \"utf-8\");\r\n    const config = JSON.parse(raw) as Record<string, unknown>;\r\n    const site =\r\n      config.site && typeof config.site === \"object\"\r\n        ? (config.site as Record<string, unknown>)\r\n        : {};\r\n    site.docsAccess = { enabled, publicKey } satisfies DocsAccessConfig;\r\n    config.site = site;\r\n    await fs.writeFile(configPath, `${JSON.stringify(config, null, 2)}\\n`, \"utf-8\");\r\n    return configPath;\r\n  }\r\n}\r\n","cli/infrastructure/home/runtime.mjs":"import path from \"node:path\";\r\nimport { cpSync, existsSync, readdirSync, rmSync } from \"node:fs\";\r\nimport { execSync } from \"node:child_process\";\r\nimport { writeConfigOnlyOutput, writeText } from \"../../runtime/output.mjs\";\r\nimport { writeHomeFiles } from \"../../home/home-file-writer.mjs\";\r\nimport { logInfo, logSuccess } from \"../../ui/logger.mjs\";\r\n\r\nfunction ensureDirEmpty(root, relativeDir) {\r\n  const target = path.join(root, relativeDir);\r\n  if (existsSync(target)) {\r\n    rmSync(target, { recursive: true, force: true });\r\n  }\r\n}\r\n\r\nfunction copyRecursive(src, dest) {\r\n  cpSync(src, dest, { recursive: true, force: true });\r\n}\r\n\r\nfunction runNextBuild(root, env) {\r\n  execSync(\"npx next build frontend\", { cwd: root, env, stdio: \"inherit\" });\r\n}\r\n\r\nexport function createHomeRuntime() {\r\n  return {\r\n    joinPath: (...parts) => path.join(...parts),\r\n    ensureDirEmpty,\r\n    copyRecursive,\r\n    readDirNames: (absolutePath) => readdirSync(absolutePath),\r\n    existsPath: existsSync,\r\n    runNextBuild,\r\n    writeConfigOnlyOutput,\r\n    writeHomeFiles,\r\n    writeText,\r\n    logSuccess,\r\n    logInfo,\r\n  };\r\n}\r\n","cli/package.json":"{\r\n  \"name\": \"@gitpagedocs/cli\",\r\n  \"version\": \"1.1.53\",\r\n  \"description\": \"CLI that scaffolds and maintains gitpagedocs documentation, generates docs with AI, configures GitHub Pages, and runs the MCP server.\",\r\n  \"bin\": {\r\n    \"gitpagedocs\": \"index.mjs\"\r\n  },\r\n  \"main\": \"index.mjs\",\r\n  \"files\": [\r\n    \"index.mjs\",\r\n    \"start.mjs\",\r\n    \"ai\",\r\n    \"application\",\r\n    \"builders\",\r\n    \"content\",\r\n    \"contracts\",\r\n    \"data\",\r\n    \"domain\",\r\n    \"home\",\r\n    \"infrastructure\",\r\n    \"presentation\",\r\n    \"runtime\",\r\n    \"ui\",\r\n    \"prebuilt\",\r\n    \"README.md\"\r\n  ],\r\n  \"engines\": {\r\n    \"node\": \">=20\"\r\n  },\r\n  \"dependencies\": {\r\n    \"@clack/prompts\": \"^1.5.1\",\r\n    \"@gitpagedocs/mcp\": \"^1.1.53\",\r\n    \"@gitpagedocs/tools\": \"^1.1.53\",\r\n    \"tsx\": \"^4.21.0\"\r\n  },\r\n  \"repository\": {\r\n    \"type\": \"git\",\r\n    \"url\": \"git+https://github.com/Vidigal-code/git-page-docs.git\",\r\n    \"directory\": \"cli\"\r\n  },\r\n  \"keywords\": [\r\n    \"gitpagedocs\",\r\n    \"documentation\",\r\n    \"markdown\",\r\n    \"spa\",\r\n    \"cli\",\r\n    \"github-pages\",\r\n    \"create-gitpagedocs\"\r\n  ],\r\n  \"author\": \"Vidigal-code\",\r\n  \"license\": \"ISC\",\r\n  \"bugs\": {\r\n    \"url\": \"https://github.com/Vidigal-code/git-page-docs/issues\"\r\n  },\r\n  \"homepage\": \"https://vidigal-code.github.io/git-page-docs/\",\r\n  \"publishConfig\": {\r\n    \"registry\": \"https://registry.npmjs.org/\",\r\n    \"access\": \"public\"\r\n  }\r\n}\r\n","cli/presentation/commands/ai-info.ts":"import { PROVIDER_CATALOG, ALL_PROVIDER_IDS, createModelRegistry, type AiProviderId } from \"@gitpagedocs/tools\";\r\nimport type { CommandContext } from \"./run-command\";\r\n\r\nfunction capsLabel(caps: { streaming: boolean; vision: boolean; audio: boolean }): string {\r\n  const parts: string[] = [];\r\n  if (caps.streaming) parts.push(\"stream\");\r\n  if (caps.vision) parts.push(\"vision\");\r\n  if (caps.audio) parts.push(\"audio\");\r\n  return parts.join(\", \") || \"text\";\r\n}\r\n\r\n/** `gitpagedocs provider [id]` — list providers or show one provider's detail. */\r\nexport async function runProvider(ctx: CommandContext): Promise<void> {\r\n  const requested = ctx.args[1] as AiProviderId | undefined;\r\n  if (requested && PROVIDER_CATALOG[requested]) {\r\n    const spec = PROVIDER_CATALOG[requested];\r\n    // eslint-disable-next-line no-console\r\n    console.log(\r\n      `\\n  ${spec.label} (${spec.id})\\n` +\r\n        `    default model : ${spec.defaultModel}\\n` +\r\n        `    capabilities  : ${capsLabel(spec.capabilities)}\\n` +\r\n        `    base url      : ${spec.baseUrl || \"(user-provided)\"}\\n` +\r\n        `    models        : ${spec.models.map((m) => m.id).join(\", \")}\\n`,\r\n    );\r\n    return;\r\n  }\r\n\r\n  // eslint-disable-next-line no-console\r\n  console.log(`\\n  AI providers (${ALL_PROVIDER_IDS.length}):\\n`);\r\n  for (const id of ALL_PROVIDER_IDS) {\r\n    const spec = PROVIDER_CATALOG[id];\r\n    // eslint-disable-next-line no-console\r\n    console.log(`  ${id.padEnd(14)} ${spec.label.padEnd(18)} ${spec.defaultModel}`);\r\n  }\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\\n  Detail: gitpagedocs provider <id>\\n\");\r\n}\r\n\r\n/** `gitpagedocs models [provider]` — list models for one or all providers. */\r\nexport async function runModels(ctx: CommandContext): Promise<void> {\r\n  const models = createModelRegistry();\r\n  const requested = ctx.args[1] as AiProviderId | undefined;\r\n  const ids = requested && PROVIDER_CATALOG[requested] ? [requested] : ALL_PROVIDER_IDS;\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\");\r\n  for (const id of ids) {\r\n    const list = models.list(id);\r\n    // eslint-disable-next-line no-console\r\n    console.log(`  ${PROVIDER_CATALOG[id].label} (${id}):`);\r\n    for (const m of list) {\r\n      // eslint-disable-next-line no-console\r\n      console.log(`    - ${m.id}${m.id === PROVIDER_CATALOG[id].defaultModel ? \"  (default)\" : \"\"}`);\r\n    }\r\n  }\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\");\r\n}\r\n","cli/presentation/commands/config-info.ts":"import path from \"node:path\";\r\nimport { defaultConfigLoader, isAppError } from \"@gitpagedocs/tools\";\r\nimport type { CommandContext } from \"./run-command\";\r\n\r\n/** `gitpagedocs config` — resolve and summarize the active gitpagedocs config. */\r\nexport async function runConfig(ctx: CommandContext): Promise<void> {\r\n  try {\r\n    const { config, sourcePath, extension } = await defaultConfigLoader.loadGitPageDocsConfig(ctx.cwd);\r\n    const site = (config as { site?: Record<string, unknown> }).site ?? {};\r\n    // eslint-disable-next-line no-console\r\n    console.log(\r\n      `\\n  Config: ${path.relative(ctx.cwd, sourcePath)} (${extension})\\n` +\r\n        `    site name        : ${String(site.name ?? \"—\")}\\n` +\r\n        `    default language : ${String(site.defaultLanguage ?? \"—\")}\\n` +\r\n        `    languages        : ${\r\n          Array.isArray(site.supportedLanguages) ? (site.supportedLanguages as string[]).join(\", \") : \"—\"\r\n        }\\n`,\r\n    );\r\n  } catch (error) {\r\n    const message = isAppError(error) ? error.message : String(error);\r\n    // eslint-disable-next-line no-console\r\n    console.log(`\\n  No usable config found: ${message}\\n  Run \\`gitpagedocs init\\` to generate one.\\n`);\r\n  }\r\n}\r\n","cli/presentation/commands/diagnostics.ts":"import path from \"node:path\";\r\nimport { readFileSync, existsSync } from \"node:fs\";\r\nimport { execSync } from \"node:child_process\";\r\nimport { defaultConfigLoader } from \"@gitpagedocs/tools\";\r\nimport type { CommandContext } from \"./run-command\";\r\n\r\nfunction readVersion(pkgRoot: string): string {\r\n  try {\r\n    const pkg = JSON.parse(readFileSync(path.join(pkgRoot, \"package.json\"), \"utf8\"));\r\n    return String(pkg.version ?? \"unknown\");\r\n  } catch {\r\n    return \"unknown\";\r\n  }\r\n}\r\n\r\nexport async function runVersion(ctx: CommandContext): Promise<void> {\r\n  // eslint-disable-next-line no-console\r\n  console.log(`gitpagedocs ${readVersion(ctx.pkgRoot)} (node ${process.version})`);\r\n}\r\n\r\nfunction probe(label: string, command: string): { label: string; ok: boolean; detail: string } {\r\n  try {\r\n    const out = execSync(command, { stdio: [\"ignore\", \"pipe\", \"ignore\"] }).toString().trim();\r\n    return { label, ok: true, detail: out.split(\"\\n\")[0] };\r\n  } catch {\r\n    return { label, ok: false, detail: \"not found\" };\r\n  }\r\n}\r\n\r\nexport async function runDoctor(ctx: CommandContext): Promise<void> {\r\n  const checks: Array<{ label: string; ok: boolean; detail: string }> = [];\r\n  checks.push({ label: \"node\", ok: true, detail: process.version });\r\n  checks.push(probe(\"git\", \"git --version\"));\r\n  checks.push(probe(\"gh (GitHub CLI)\", \"gh --version\"));\r\n  checks.push(probe(\"pnpm\", \"pnpm --version\"));\r\n\r\n  const configPath = await defaultConfigLoader.resolveConfigPath(ctx.cwd);\r\n  checks.push({\r\n    label: \"gitpagedocs config\",\r\n    ok: Boolean(configPath),\r\n    detail: configPath ? path.relative(ctx.cwd, configPath) : \"not found (run `gitpagedocs init`)\",\r\n  });\r\n  checks.push({\r\n    label: \"gitpagedocs/ directory\",\r\n    ok: existsSync(path.join(ctx.cwd, \"gitpagedocs\")),\r\n    detail: existsSync(path.join(ctx.cwd, \"gitpagedocs\")) ? \"present\" : \"missing\",\r\n  });\r\n\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\\n  gitpagedocs doctor\\n\");\r\n  for (const c of checks) {\r\n    // eslint-disable-next-line no-console\r\n    console.log(`  ${c.ok ? \"✓\" : \"✗\"}  ${c.label.padEnd(22)} ${c.detail}`);\r\n  }\r\n  const failed = checks.filter((c) => !c.ok && c.label !== \"gh (GitHub CLI)\").length;\r\n  // eslint-disable-next-line no-console\r\n  console.log(`\\n  ${failed === 0 ? \"All required checks passed.\" : `${failed} check(s) need attention.`}\\n`);\r\n}\r\n\r\nexport async function runUpdate(ctx: CommandContext): Promise<void> {\r\n  const current = readVersion(ctx.pkgRoot);\r\n  // eslint-disable-next-line no-console\r\n  console.log(\r\n    `\\n  Installed: gitpagedocs ${current}\\n` +\r\n      \"  To update the global CLI:\\n\" +\r\n      \"    npm i -g gitpagedocs@latest\\n\" +\r\n      \"  Or, in a project:\\n\" +\r\n      \"    pnpm add -D gitpagedocs@latest\\n\",\r\n  );\r\n}\r\n","cli/presentation/commands/docs.ts":"import {\r\n  FileService,\r\n  DocUpdater,\r\n  providersSection,\r\n  cliCommandsSection,\r\n  devWorkflowSection,\r\n  securityNoteSection,\r\n  CLI_COMMANDS,\r\n} from \"@gitpagedocs/tools\";\r\nimport type { CommandContext } from \"./run-command\";\r\n\r\n/**\r\n * `gitpagedocs docs` — refresh the managed regions of the standard docs files\r\n * with deterministic content. Idempotent and marker-bounded: manual content\r\n * outside `<!-- gitpagedocs:start/end -->` is preserved; missing files are\r\n * created. Covers README, CONTRIBUTING and SECURITY (master-spec docs set).\r\n */\r\nexport async function runDocs(ctx: CommandContext): Promise<void> {\r\n  const updater = new DocUpdater(new FileService(ctx.cwd));\r\n\r\n  const updates = [\r\n    { path: \"README.md\", generated: `${providersSection()}\\n\\n${cliCommandsSection(CLI_COMMANDS)}` },\r\n    { path: \"CONTRIBUTING.md\", generated: `${devWorkflowSection()}\\n\\n${cliCommandsSection(CLI_COMMANDS)}` },\r\n    { path: \"SECURITY.md\", generated: securityNoteSection() },\r\n  ];\r\n\r\n  const results = await updater.updateManagedFiles(updates);\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\");\r\n  for (const r of results) {\r\n    const state = r.changed ? (r.replaced ? \"managed region updated\" : \"managed region added\") : \"already up to date\";\r\n    // eslint-disable-next-line no-console\r\n    console.log(`  ${r.path}: ${state}.`);\r\n  }\r\n  // eslint-disable-next-line no-console\r\n  console.log(\"\");\r\n}\r\n","cli/presentation/commands/mcp.ts":"import type { CommandContext } from \"./run-command\";\r\n\r\n/**\r\n * `gitpagedocs mcp start` — entry point for the MCP server. The server package\r\n * (@gitpagedocs/mcp) is implemented in Phase 7; this command is wired to launch\r\n * it there. Until then it reports status honestly rather than failing silently.\r\n */\r\nexport async function runMcp(ctx: CommandContext): Promise<void> {\r\n  const sub = ctx.args[1] ?? \"start\";\r\n  if (sub !== \"start\") {\r\n    // eslint-disable-next-line no-console\r\n    console.log(`\\n  Unknown mcp subcommand: ${sub}\\n  Usage: gitpagedocs mcp start\\n`);\r\n    return;\r\n  }\r\n  // stderr only: stdout is the MCP stdio channel and must stay protocol-clean.\r\n  console.error(\"[gitpagedocs] Starting MCP server over stdio (Ctrl-C to stop)...\");\r\n  // Dynamic import keeps the MCP SDK out of the frontend bundle.\r\n  const { startMcpServer } = await import(\"@gitpagedocs/mcp\");\r\n  await startMcpServer(ctx.cwd);\r\n}\r\n","cli/presentation/commands/pages.ts":"import path from \"node:path\";\r\nimport { spawnSync } from \"node:child_process\";\r\nimport type { CommandContext } from \"./run-command\";\r\nimport { askConfirm } from \"../ui/clack\";\r\nimport { askOwnerRepo, interactivePromptsAvailable } from \"../ui/prompts\";\r\n// @ts-expect-error .mjs runtime module\r\nimport { detectRepoFromGit, getCurrentGitBranch, tryConfigurePagesToGitHubActions } from \"../../runtime/git-ops.mjs\";\r\n\r\n/** Read `--name value` (or `--name=value`) from a raw arg list. */\r\nfunction readFlag(args: string[], name: string): string {\r\n  const eq = args.find((a) => a.startsWith(`${name}=`));\r\n  if (eq) return eq.slice(name.length + 1).trim();\r\n  const i = args.indexOf(name);\r\n  if (i >= 0 && args[i + 1] && !args[i + 1].startsWith(\"--\")) return args[i + 1].trim();\r\n  return \"\";\r\n}\r\n\r\n/**\r\n * `gitpagedocs pages actions` / `--pages-actions` — switch the repository's\r\n * GitHub Pages source to GitHub Actions. Detects owner/repo/branch from git,\r\n * validates the gh CLI, and confirms before changing anything (no silent\r\n * overwrite). Does NOT generate docs or push (that is `pages deploy`).\r\n */\r\nexport async function runPagesActions(ctx: CommandContext): Promise<void> {\r\n  let repo = detectRepoFromGit(ctx.cwd) as { owner: string; repo: string } | null;\r\n  if (!repo) {\r\n    if (!interactivePromptsAvailable()) {\r\n      // eslint-disable-next-line no-console\r\n      console.log(\"\\n  Could not detect a GitHub repo from the git 'origin' remote.\\n  Add a remote or use `--push --owner <o> --repo <r>`.\\n\");\r\n      return;\r\n    }\r\n    repo = await askOwnerRepo(null);\r\n  }\r\n  const branch = getCurrentGitBranch(ctx.cwd) as string;\r\n  // eslint-disable-next-line no-console\r\n  console.log(`\\n  Detected ${repo.owner}/${repo.repo} (branch ${branch}).`);\r\n  const ok = await askConfirm(`Switch GitHub Pages source to GitHub Actions for ${repo.owner}/${repo.repo}?`, false);\r\n  if (!ok) {\r\n    // eslint-disable-next-line no-console\r\n    console.log(\"  Aborted. No changes made.\\n\");\r\n    return;\r\n  }\r\n  tryConfigurePagesToGitHubActions(repo.owner, repo.repo, branch, ctx.cwd);\r\n}\r\n\r\n/**\r\n * `gitpagedocs pages deploy` — the full documented deploy flow: resolve\r\n * owner/repo (from --owner/--repo or the git remote), confirm, then run the\r\n * proven `--push` path (generate docs + workflow → commit → push → configure\r\n * Pages→Actions) and print the final site URL. Reuses the legacy push verbatim\r\n * (spawned), so `--push` behavior stays byte-identical.\r\n */\r\nexport async function runPagesDeploy(ctx: CommandContext): Promise<void> {\r\n  let owner = readFlag(ctx.args, \"--owner\");\r\n  let repo = readFlag(ctx.args, \"--repo\");\r\n  const docsPath = readFlag(ctx.args, \"--path\");\r\n\r\n  if (!owner || !repo) {\r\n    const detected = detectRepoFromGit(ctx.cwd) as { owner: string; repo: string } | null;\r\n    if (detected) {\r\n      owner = owner || detected.owner;\r\n      repo = repo || detected.repo;\r\n    }\r\n  }\r\n  if (!owner || !repo) {\r\n    if (!interactivePromptsAvailable()) {\r\n      // eslint-disable-next-line no-console\r\n      console.log(\"\\n  Could not determine owner/repo. Pass `--owner <o> --repo <r>` or add a git 'origin' remote.\\n\");\r\n      return;\r\n    }\r\n    const answered = await askOwnerRepo(null, { owner, repo });\r\n    owner = answered.owner;\r\n    repo = answered.repo;\r\n  }\r\n\r\n  // eslint-disable-next-line no-console\r\n  console.log(`\\n  Deploy ${owner}/${repo} to GitHub Pages via Actions${docsPath ? ` (path: ${docsPath})` : \"\"}.`);\r\n  const ok = await askConfirm(\r\n    `Generate docs + workflow, commit, push, and switch Pages to Actions for ${owner}/${repo}?`,\r\n    false,\r\n  );\r\n  if (!ok) {\r\n    // eslint-disable-next-line no-console\r\n    console.log(\"  Aborted. No changes made.\\n\");\r\n    return;\r\n  }\r\n\r\n  // pkgRoot is the cli package root (cli/), where the bin lives as index.mjs.\r\n  const bin = path.join(ctx.pkgRoot, \"index.mjs\");\r\n  const pushArgs = [\"--push\", \"--owner\", owner, \"--repo\", repo, ...(docsPath ? [\"--path\", docsPath] : [])];\r\n  const result = spawnSync(process.execPath, [bin, ...pushArgs], { stdio: \"inherit\", cwd: ctx.cwd, env: process.env });\r\n\r\n  if (result.status === 0) {\r\n    const seg = docsPath ? `/${docsPath.replace(/^\\/+|\\/+$/g, \"\")}` : \"\";\r\n    // eslint-disable-next-line no-console\r\n    console.log(`\\n  Deployed. Final URL: https://${owner}.github.io/${repo}${seg}/\\n`);\r\n  } else {\r\n    // eslint-disable-next-line no-console\r\n    console.log(\"\\n  Deploy did not complete (push step failed). See output above.\\n\");\r\n  }\r\n}\r\n","cli/presentation/commands/password.ts":"import { NodeCryptoService, deriveDocAccessKeys } from \"@gitpagedocs/tools\";\r\nimport type { CommandContext } from \"./run-command\";\r\nimport { askPassword, note, outro } from \"../ui/clack\";\r\nimport { interactivePromptsAvailable } from \"../ui/prompts\";\r\nimport { GitPageDocsConfigRepository } from \"../../infrastructure/gitpagedocs-config-file\";\r\n\r\nconst MIN_PASSWORD_LENGTH = 4;\r\n\r\n/**\r\n * `gitpagedocs password` — interactively set a documentation access password.\r\n *\r\n * Type + confirm a password, derive the double-hash key pair, write the PUBLIC\r\n * key into gitpagedocs/config.json (which makes the frontend gate the docs), and\r\n * print the PRIVATE key for the user to copy. The password itself is never stored.\r\n */\r\nexport async function runPassword(ctx: CommandContext): Promise<void> {\r\n  if (!interactivePromptsAvailable()) {\r\n    // eslint-disable-next-line no-console\r\n    console.log(\"\\n  `gitpagedocs password` is interactive — run it in a terminal (TTY).\\n\");\r\n    return;\r\n  }\r\n\r\n  const password = await askPassword({\r\n    message: \"Documentation password:\",\r\n    validate: (v) =>\r\n      v && v.trim().length >= MIN_PASSWORD_LENGTH\r\n        ? undefined\r\n        : `Use at least ${MIN_PASSWORD_LENGTH} characters.`,\r\n  });\r\n  const confirmation = await askPassword({\r\n    message: \"Confirm password:\",\r\n    validate: (v) => (v ? undefined : \"Required.\"),\r\n  });\r\n\r\n  if (password !== confirmation) {\r\n    note(\"Passwords do not match. Nothing was changed.\", \"Aborted\");\r\n    return;\r\n  }\r\n\r\n  const { privateKey, publicKey } = await deriveDocAccessKeys(password, new NodeCryptoService());\r\n\r\n  let configPath: string;\r\n  try {\r\n    configPath = await new GitPageDocsConfigRepository(ctx.cwd).patchDocsAccess(publicKey);\r\n  } catch (error) {\r\n    note(error instanceof Error ? error.message : String(error), \"Could not save\");\r\n    return;\r\n  }\r\n\r\n  note(\r\n    `Public key saved to ${configPath}\\nThe documentation is now password-protected.`,\r\n    \"Saved\",\r\n  );\r\n  // eslint-disable-next-line no-console\r\n  console.log(\r\n    \"\\n  PRIVATE KEY (copy & keep it safe — it also unlocks the docs):\\n\\n\" +\r\n      `    ${privateKey}\\n\\n` +\r\n      \"  Readers can unlock with the password OR this private key.\\n\" +\r\n      \"  To remove protection, set site.docsAccess.enabled to false in config.json.\\n\",\r\n  );\r\n  outro(\"Done.\");\r\n}\r\n","cli/presentation/commands/run-command.ts":"/**\r\n * New-verb command layer (Phase 6). Intercepts the informational/utility\r\n * commands that are NOT part of the legacy flag flow (version, doctor, provider,\r\n * models, config, mcp, update) and routes them to thin handlers that consume\r\n * @gitpagedocs/tools. Alias verbs (init, document, deploy, pages) are mapped in\r\n * the parser and fall through to the legacy dispatch, so this returns false for\r\n * them.\r\n */\r\nexport interface CommandContext {\r\n  argv: string[];\r\n  args: string[];\r\n  pkgRoot: string;\r\n  cwd: string;\r\n}\r\n\r\nexport type CommandHandler = (ctx: CommandContext) => Promise<void>;\r\n\r\nimport { runVersion, runDoctor, runUpdate } from \"./diagnostics\";\r\nimport { runProvider, runModels } from \"./ai-info\";\r\nimport { runConfig } from \"./config-info\";\r\nimport { runMcp } from \"./mcp\";\r\nimport { runDocs } from \"./docs\";\r\nimport { runPagesActions, runPagesDeploy } from \"./pages\";\r\nimport { runPassword } from \"./password\";\r\n\r\nconst REGISTRY: Record<string, CommandHandler> = {\r\n  version: runVersion,\r\n  \"--version\": runVersion,\r\n  \"-v\": runVersion,\r\n  doctor: runDoctor,\r\n  update: runUpdate,\r\n  provider: runProvider,\r\n  providers: runProvider,\r\n  models: runModels,\r\n  config: runConfig,\r\n  mcp: runMcp,\r\n  docs: runDocs,\r\n  password: runPassword,\r\n};\r\n\r\n/** Returns true if a new command handled the invocation (skip legacy flow). */\r\nexport async function runNewCommand(argv: string[], pkgRoot: string): Promise<boolean> {\r\n  const args = argv.slice(2);\r\n  const ctx: CommandContext = { argv, args, pkgRoot, cwd: process.cwd() };\r\n\r\n  // Configure-only Pages→Actions: `--pages-actions` flag or `pages actions` verb.\r\n  if (args.includes(\"--pages-actions\") || (args[0] === \"pages\" && args[1] === \"actions\")) {\r\n    await runPagesActions(ctx);\r\n    return true;\r\n  }\r\n  // Full deploy: `pages deploy` (detect owner/repo, confirm, run the proven\r\n  // push flow, print URL). Bare `pages`/`deploy` still fall through to legacy.\r\n  if (args[0] === \"pages\" && args[1] === \"deploy\") {\r\n    await runPagesDeploy(ctx);\r\n    return true;\r\n  }\r\n\r\n  const handler = REGISTRY[args[0] ?? \"\"];\r\n  if (!handler) return false;\r\n  await handler(ctx);\r\n  return true;\r\n}\r\n\r\nexport const NEW_COMMAND_NAMES = Object.keys(REGISTRY).filter((n) => !n.startsWith(\"-\"));\r\n","cli/presentation/index.ts":"#!/usr/bin/env node\r\n\r\nimport path from \"node:path\";\r\nimport { fileURLToPath } from \"node:url\";\r\nimport { printBanner, printCredits } from \"./ui/banner\";\r\nimport { resolveOptions } from \"./options/resolver\";\r\nimport { runNewCommand } from \"./commands/run-command\";\r\nimport { dispatchMode } from \"../application/use-cases/dispatch-mode\";\r\nimport type {\r\n  CliRuntimeParams,\r\n  ConfigOnlyRuntimePort,\r\n  HomeRuntimePort,\r\n} from \"../application/ports/cli-runtime-ports\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { buildConfigArtifacts } from \"../builders/config-orchestrator.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { createThemeTemplate } from \"../builders/theme-template.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { LAYOUTS } from \"../data/layouts.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { executeConfigOnly } from \"../application/config-only/handler.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { executeHome } from \"../application/home/handler.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { createConfigOnlyRuntime } from \"../infrastructure/config-only/runtime.mjs\";\r\n// @ts-expect-error .mjs modules are runtime-only in this package.\r\nimport { createHomeRuntime } from \"../infrastructure/home/runtime.mjs\";\r\n\r\nconst scriptDir = path.dirname(fileURLToPath(import.meta.url));\r\nconst root = process.cwd();\r\n// cli/ is the published package root (bin = cli/index.mjs). scriptDir is\r\n// cli/presentation, so pkgRoot = cli/ and the bundled prebuilt/ ships at\r\n// cli/prebuilt — works identically in-repo and when installed via npm.\r\nconst pkgRoot = path.join(scriptDir, \"..\");\r\nconst prebuiltDir = path.join(pkgRoot, \"prebuilt\");\r\n\r\nconst params: CliRuntimeParams = {\r\n  root,\r\n  pkgRoot,\r\n  prebuiltDir,\r\n  buildConfigArtifacts,\r\n  createThemeTemplate,\r\n  layouts: LAYOUTS,\r\n};\r\n\r\nasync function main(): Promise<void> {\r\n  // `mcp start` owns stdout (the MCP stdio channel) — no banner/credits there.\r\n  const stdoutOwnedByCommand = process.argv[2] === \"mcp\";\r\n  if (!stdoutOwnedByCommand) printBanner();\r\n\r\n  // New informational/utility commands (version, doctor, provider, models,\r\n  // config, mcp, update) are handled before the legacy flag flow. Alias verbs\r\n  // (init, document, deploy, pages) are mapped in the parser and fall through.\r\n  if (await runNewCommand(process.argv, pkgRoot)) {\r\n    if (!stdoutOwnedByCommand) printCredits();\r\n    return;\r\n  }\r\n\r\n  const options = await resolveOptions(process.argv, process.env);\r\n  const configOnlyRuntime = createConfigOnlyRuntime() as ConfigOnlyRuntimePort;\r\n  const homeRuntime = createHomeRuntime() as HomeRuntimePort;\r\n  await dispatchMode(options, params, {\r\n    runConfigOnly: async (context) => {\r\n      const safePrebuiltDir =\r\n        typeof context.prebuiltDir === \"string\"\r\n          ? context.prebuiltDir\r\n          : path.join(String(context.pkgRoot ?? process.cwd()), \"prebuilt\");\r\n      await executeConfigOnly(\r\n        {\r\n          ...context,\r\n          prebuiltDir: safePrebuiltDir,\r\n        },\r\n        configOnlyRuntime,\r\n      );\r\n    },\r\n    runHome: async (context) => {\r\n      await executeHome(context, homeRuntime);\r\n    },\r\n    runAi: async (context) => {\r\n      console.log(\"[gitpagedocs] Iniciando Módulo de IA na CLI...\");\r\n      const safePrebuiltDir =\r\n        typeof context.prebuiltDir === \"string\"\r\n          ? context.prebuiltDir\r\n          : path.join(String(context.pkgRoot ?? process.cwd()), \"prebuilt\");\r\n      // @ts-ignore\r\n      const { runAiCliCommand } = await import(\"../ai/application/run-ai-cli-command.ts\");\r\n      const result = await runAiCliCommand({\r\n        cwd: process.cwd(),\r\n        onInfo: (message: string) => console.log(message),\r\n        // Scaffold the base gitpagedocs/ structure before AI pages are wired in.\r\n        onScaffold: async () => {\r\n          await executeConfigOnly({ ...context, prebuiltDir: safePrebuiltDir }, configOnlyRuntime);\r\n        },\r\n      });\r\n\r\n      if (result.summary.scannedFilesCount === 0) {\r\n        console.log(\"[gitpagedocs:ai] Nenhum arquivo elegível foi encontrado nos paths informados.\");\r\n        return;\r\n      }\r\n\r\n      const pages = result.summary.pages ?? [];\r\n      console.log(\r\n        `\\n🎉 Processo completo! Páginas no padrão gitpagedocs: ${pages.join(\", \") || \"(nenhuma)\"}`,\r\n      );\r\n      console.log(\r\n        `[gitpagedocs:ai] ${result.summary.outputs.length} arquivos markdown gerados e conectados ao config.json da versão mais recente.`,\r\n      );\r\n    },\r\n  });\r\n  printCredits();\r\n}\r\n\r\nmain().catch((err: unknown) => {\r\n  console.error(\"Failed to create Git Page Docs scaffold.\", err);\r\n  process.exitCode = 1;\r\n});\r\n","cli/presentation/options/parser.ts":"import type { CliOptions } from \"../../domain/models/cli-options\";\r\nimport { DEFAULTS } from \"./schema\";\r\n\r\nconst KNOWN_FLAGS = new Set([\r\n  \"--build\",\r\n  \"--serve\",\r\n  \"--layoutconfig\",\r\n  \"--full\",\r\n  \"--push\",\r\n  \"--home\",\r\n  \"--search\",\r\n  \"--path\",\r\n  \"--output\",\r\n  \"--interactive\",\r\n  \"-i\",\r\n  \"--ai\",\r\n  \"--pages-actions\",\r\n]);\r\n\r\nfunction readOptionValue(args: string[], optionName: string): string {\r\n  const equalsArg = args.find((a) => a.startsWith(`${optionName}=`));\r\n  if (equalsArg) return equalsArg.slice(optionName.length + 1).trim();\r\n  const index = args.indexOf(optionName);\r\n  if (index >= 0) {\r\n    const next = args[index + 1];\r\n    if (next && !next.startsWith(\"--\")) return next.trim();\r\n  }\r\n  return \"\";\r\n}\r\n\r\nexport function parseCliOptions(argv: string[], env: NodeJS.ProcessEnv): CliOptions {\r\n  const args = argv.slice(2);\r\n\r\n  let githubOwner = readOptionValue(args, \"--owner\");\r\n  let githubRepo = readOptionValue(args, \"--repo\");\r\n  const docsPath = readOptionValue(args, \"--path\");\r\n  const outputDir = readOptionValue(args, \"--output\");\r\n  const searchRaw = readOptionValue(args, \"--search\");\r\n\r\n  const fallbackDashedArgs = args\r\n    .filter((a) => a.startsWith(\"--\"))\r\n    .filter((a) => !KNOWN_FLAGS.has(a))\r\n    .filter((a) => !a.startsWith(\"--owner\"))\r\n    .filter((a) => !a.startsWith(\"--repo\"))\r\n    .filter((a) => !a.startsWith(\"--path\"))\r\n    .filter((a) => !a.startsWith(\"--home\"))\r\n    .filter((a) => !a.startsWith(\"--output\"))\r\n    .filter((a) => !a.startsWith(\"--search\"))\r\n    .map((a) => a.replace(/^--/, \"\").trim())\r\n    .filter(Boolean);\r\n\r\n  if (!githubOwner && fallbackDashedArgs[0]) githubOwner = fallbackDashedArgs[0];\r\n  if (!githubRepo && fallbackDashedArgs[1]) githubRepo = fallbackDashedArgs[1];\r\n\r\n  // New verb aliases (Phase 6) that map onto existing modes without new modes.\r\n  const command = args[0];\r\n  const isDocument = command === \"document\" || (command?.startsWith(\"document:\") ?? false);\r\n  const isDeploy = command === \"deploy\" || command === \"pages\";\r\n\r\n  const isBuild = args.includes(\"--build\") || env.GITPAGEDOCS_BUILD === \"1\";\r\n  const isServe = args.includes(\"--serve\");\r\n  const useLocalLayoutConfig = args.includes(\"--layoutconfig\");\r\n  const shouldPush = args.includes(\"--push\") || isDeploy;\r\n  const isHome = args.includes(\"--home\");\r\n  const isInteractive = args.includes(\"--interactive\") || args.includes(\"-i\");\r\n  const isAi = command === \"ai\" || args.includes(\"--ai\") || isDocument;\r\n  const aiCommand =\r\n    command === \"ai\"\r\n      ? args[1]\r\n      : command === \"document\"\r\n        ? args[1] ?? \"repo\"\r\n        : command?.startsWith(\"document:\")\r\n          ? command.split(\":\")[1]\r\n          : undefined;\r\n\r\n  const mode: import(\"../../domain/models/cli-options\").CliMode = isAi ? \"ai\" : isHome ? \"home\" : args.includes(\"--full\") ? \"full\" : \"config-only\";\r\n  const repositorySearch =\r\n    searchRaw === \"true\"\r\n      ? true\r\n      : searchRaw === \"false\"\r\n        ? false\r\n        : isHome\r\n          ? DEFAULTS.home.repositorySearch\r\n          : undefined;\r\n\r\n  const normalizedPath = docsPath.trim();\r\n\r\n  return {\r\n    isBuild,\r\n    isServe,\r\n    mode,\r\n    aiCommand,\r\n    outputDir: outputDir || (isHome ? DEFAULTS.home.outputDir : DEFAULTS.outputDir),\r\n    useLocalLayoutConfig,\r\n    shouldPush,\r\n    githubOwner,\r\n    githubRepo,\r\n    docsPath: normalizedPath,\r\n    basePath: normalizedPath,\r\n    repositorySearch,\r\n    isInteractive,\r\n    hasArgs: args.length > 0,\r\n  };\r\n}\r\n","cli/presentation/options/resolver.ts":"import type { CliOptions } from \"../../domain/models/cli-options\";\r\nimport { parseCliOptions } from \"./parser\";\r\nimport {\r\n  shouldRunInteractive,\r\n  promptConfigOnlyOptions,\r\n  promptHomeOptions,\r\n  promptDeployOptions,\r\n  ensureGitRepoInteractive,\r\n  interactivePromptsAvailable,\r\n} from \"../ui/prompts\";\r\nimport { DEFAULTS } from \"./schema\";\r\n// @ts-expect-error .mjs runtime module is type-less in this package.\r\nimport { detectRepoFromGit } from \"../../runtime/git-ops.mjs\";\r\n\r\nexport async function resolveOptions(argv: string[], env: NodeJS.ProcessEnv): Promise<CliOptions> {\r\n  const parsed = parseCliOptions(argv, env);\r\n\r\n  if (parsed.mode === \"home\") {\r\n    parsed.repositorySearch = parsed.repositorySearch ?? DEFAULTS.home.repositorySearch;\r\n    parsed.basePath = parsed.basePath ?? parsed.docsPath ?? DEFAULTS.home.basePath;\r\n  }\r\n\r\n  // `deploy` / `--push` need owner + repo AND a git repo. If anything is\r\n  // missing, prompt interactively (owner/repo pre-filled from the git origin\r\n  // remote; offer to `git init`) instead of throwing. In CI/non-TTY we fall\r\n  // through so the explicit guards in the push flow still fire clearly.\r\n  if (parsed.shouldPush && interactivePromptsAvailable()) {\r\n    let resolved = parsed;\r\n    if (!parsed.githubOwner || !parsed.githubRepo) {\r\n      const detected = detectRepoFromGit(process.cwd()) as { owner: string; repo: string } | null;\r\n      resolved = await promptDeployOptions(parsed, detected);\r\n    }\r\n    await ensureGitRepoInteractive(process.cwd());\r\n    return resolved;\r\n  }\r\n\r\n  const runHomeInteractive = parsed.isInteractive || (shouldRunInteractive(argv) && parsed.mode === \"home\");\r\n  if (runHomeInteractive && parsed.mode === \"home\") {\r\n    return promptHomeOptions(parsed);\r\n  }\r\n\r\n  const runConfigInteractive = parsed.isInteractive || (shouldRunInteractive(argv) && parsed.mode === \"config-only\");\r\n  if (runConfigInteractive && parsed.mode === \"config-only\") {\r\n    return promptConfigOnlyOptions(parsed);\r\n  }\r\n\r\n  return parsed;\r\n}\r\n","cli/presentation/options/schema.ts":"export const DEFAULTS = {\n  outputDir: \"gitpagedocs\",\n  repositorySearch: false,\n  basePath: \"\",\n  home: {\n    outputDir: \"gitpagedocshome\",\n    repositorySearch: false,\n    basePath: \"\",\n  },\n} as const;\n","cli/presentation/ui/banner.ts":"export function printBanner(): void {\n  console.log(\"\");\n  console.log(\"  Git Page Docs\");\n  console.log(\"  by Vidigal-code\");\n  console.log(\"  https://github.com/Vidigal-code/git-page-docs\");\n  console.log(\"\");\n}\n\nexport function printCredits(): void {\n  console.log(\"\");\n  console.log(\"  Powered by Vidigal-code - git-page-docs\");\n  console.log(\"\");\n}\n","cli/presentation/ui/clack.ts":"/**\r\n * Thin, cancellation-aware wrappers over @clack/prompts. Centralizes the\r\n * isCancel handling so prompt modules stay declarative and a Ctrl-C exits\r\n * cleanly (mirroring the previous inquirer behaviour).\r\n */\r\nimport {\r\n  text,\r\n  password,\r\n  confirm,\r\n  select,\r\n  multiselect,\r\n  isCancel,\r\n  cancel,\r\n} from \"@clack/prompts\";\r\n\r\nfunction exitIfCancelled<T>(value: T | symbol): T {\r\n  if (isCancel(value)) {\r\n    cancel(\"Operation cancelled.\");\r\n    process.exit(0);\r\n  }\r\n  return value as T;\r\n}\r\n\r\nexport interface AskTextOptions {\r\n  message: string;\r\n  defaultValue?: string;\r\n  placeholder?: string;\r\n  validate?: (value: string) => string | undefined;\r\n}\r\n\r\nexport async function askText(options: AskTextOptions): Promise<string> {\r\n  const result = await text({\r\n    message: options.message,\r\n    placeholder: options.placeholder,\r\n    defaultValue: options.defaultValue,\r\n    initialValue: undefined,\r\n    validate: options.validate\r\n      ? (value) => options.validate?.(value ?? \"\")\r\n      : undefined,\r\n  });\r\n  return exitIfCancelled(result);\r\n}\r\n\r\nexport interface AskPasswordOptions {\r\n  message: string;\r\n  validate?: (value: string) => string | undefined;\r\n}\r\n\r\n/** Masked password prompt (input hidden as the user types). */\r\nexport async function askPassword(options: AskPasswordOptions): Promise<string> {\r\n  const result = await password({\r\n    message: options.message,\r\n    validate: options.validate\r\n      ? (value) => options.validate?.(value ?? \"\")\r\n      : undefined,\r\n  });\r\n  return exitIfCancelled(result);\r\n}\r\n\r\nexport async function askConfirm(message: string, initialValue = false): Promise<boolean> {\r\n  const result = await confirm({ message, initialValue });\r\n  return exitIfCancelled(result);\r\n}\r\n\r\nexport interface Choice<T extends string> {\r\n  value: T;\r\n  label: string;\r\n  hint?: string;\r\n}\r\n\r\nexport async function askSelect<T extends string>(\r\n  message: string,\r\n  options: Choice<T>[],\r\n  initialValue?: T,\r\n): Promise<T> {\r\n  // clack's Option<Value> is a conditional type TS can't match against a generic\r\n  // Choice<T> (identical shape); cast at the boundary, inference flows from initialValue.\r\n  const result = await select<T>({ message, options: options as never, initialValue });\r\n  return exitIfCancelled(result);\r\n}\r\n\r\nexport async function askMultiSelect<T extends string>(\r\n  message: string,\r\n  options: Choice<T>[],\r\n  initialValues?: T[],\r\n): Promise<T[]> {\r\n  const result = await multiselect<T>({ message, options: options as never, initialValues, required: true });\r\n  return exitIfCancelled(result);\r\n}\r\n\r\nexport { intro, outro, note, spinner } from \"@clack/prompts\";\r\n","cli/presentation/ui/prompts.ts":"import { existsSync } from \"node:fs\";\r\nimport path from \"node:path\";\r\nimport { execSync } from \"node:child_process\";\r\nimport type { CliOptions } from \"../../domain/models/cli-options\";\r\nimport { DEFAULTS } from \"../options/schema\";\r\nimport { askText, askConfirm, note } from \"./clack\";\r\n\r\nfunction isCiOrNonTty(): boolean {\r\n  if (process.env.CI === \"true\") return true;\r\n  if (process.env.GITHUB_ACTIONS === \"true\") return true;\r\n  if (process.stdin && !process.stdin.isTTY) return true;\r\n  return false;\r\n}\r\n\r\n/** True when clack prompts can run (interactive TTY, not CI). */\r\nexport function interactivePromptsAvailable(): boolean {\r\n  return !isCiOrNonTty();\r\n}\r\n\r\nexport function shouldRunInteractive(argv: string[]): boolean {\r\n  if (isCiOrNonTty()) return false;\r\n  const args = argv.slice(2);\r\n  if (args.includes(\"--interactive\") || args.includes(\"-i\")) return true;\r\n  if (args.length === 0) return true;\r\n  if (args.length === 1 && args[0] === \"--home\") return true;\r\n  return false;\r\n}\r\n\r\nexport async function promptHomeOptions(parsed: CliOptions): Promise<CliOptions> {\r\n  const outputDir = await askText({\r\n    message: \"Output directory:\",\r\n    defaultValue: parsed.outputDir ?? DEFAULTS.home.outputDir,\r\n    validate: (v) => (v && v.trim() ? undefined : \"Required\"),\r\n  });\r\n  const repositorySearch = await askConfirm(\r\n    \"Enable repository search home?\",\r\n    parsed.repositorySearch ?? DEFAULTS.repositorySearch,\r\n  );\r\n  const basePath = await askText({\r\n    message: \"Base path (e.g. git-page-docs, empty for root):\",\r\n    defaultValue: parsed.basePath ?? DEFAULTS.basePath,\r\n  });\r\n\r\n  return {\r\n    ...parsed,\r\n    outputDir: outputDir.trim(),\r\n    repositorySearch,\r\n    basePath: basePath?.trim() ?? \"\",\r\n  };\r\n}\r\n\r\n/**\r\n * Deploy/--push needs a GitHub owner + repo. When they are missing, prompt for\r\n * them (pre-filled from the git `origin` remote when available) instead of\r\n * crashing with \"`--push` requires owner and repo\".\r\n */\r\nexport async function askOwnerRepo(\r\n  detected: { owner: string; repo: string } | null,\r\n  defaults?: { owner?: string; repo?: string },\r\n): Promise<{ owner: string; repo: string }> {\r\n  const owner = await askText({\r\n    message: \"GitHub owner (user or organization):\",\r\n    defaultValue: defaults?.owner || detected?.owner || \"\",\r\n    validate: (v) => (v && v.trim() ? undefined : \"Owner is required.\"),\r\n  });\r\n  const repo = await askText({\r\n    message: \"GitHub repository name:\",\r\n    defaultValue: defaults?.repo || detected?.repo || \"\",\r\n    validate: (v) => (v && v.trim() ? undefined : \"Repository is required.\"),\r\n  });\r\n  return { owner: owner.trim(), repo: repo.trim() };\r\n}\r\n\r\nexport async function promptDeployOptions(\r\n  parsed: CliOptions,\r\n  detected: { owner: string; repo: string } | null,\r\n): Promise<CliOptions> {\r\n  note(\r\n    \"Deploy publishes gitpagedocs to GitHub Pages and needs the target\\nrepository (owner/repo). Press Enter to accept a detected value.\",\r\n    \"GitHub Pages deploy\",\r\n  );\r\n  const { owner, repo } = await askOwnerRepo(detected, {\r\n    owner: parsed.githubOwner,\r\n    repo: parsed.githubRepo,\r\n  });\r\n\r\n  return {\r\n    ...parsed,\r\n    githubOwner: owner,\r\n    githubRepo: repo,\r\n  };\r\n}\r\n\r\n/**\r\n * Deploy/--push needs a git repository in the current folder. When there isn't\r\n * one, offer to run `git init` instead of crashing with \"not a git repository\".\r\n * In CI/non-TTY this is a no-op so the downstream guard still reports clearly.\r\n */\r\nexport async function ensureGitRepoInteractive(root: string): Promise<void> {\r\n  if (existsSync(path.join(root, \".git\"))) return;\r\n  if (!interactivePromptsAvailable()) return;\r\n  const init = await askConfirm(\r\n    \"This folder is not a git repository yet. Initialize one here (git init)?\",\r\n    true,\r\n  );\r\n  if (!init) {\r\n    note(\"Deploy needs a git repository. Run `git init`, then retry.\", \"Heads up\");\r\n    return;\r\n  }\r\n  try {\r\n    execSync(\"git init\", { cwd: root, stdio: \"ignore\" });\r\n    note(\"Initialized an empty git repository.\", \"git\");\r\n  } catch {\r\n    note(\"Could not run `git init`. Initialize git manually, then retry.\", \"git\");\r\n  }\r\n}\r\n\r\nexport async function promptConfigOnlyOptions(parsed: CliOptions): Promise<CliOptions> {\r\n  const useLocalLayoutConfig = await askConfirm(\r\n    \"Generate local layout templates?\",\r\n    parsed.useLocalLayoutConfig ?? false,\r\n  );\r\n  const githubOwner = await askText({\r\n    message: \"GitHub owner (optional):\",\r\n    defaultValue: parsed.githubOwner ?? \"\",\r\n  });\r\n  const githubRepo = await askText({\r\n    message: \"GitHub repo (optional):\",\r\n    defaultValue: parsed.githubRepo ?? \"\",\r\n  });\r\n\r\n  return {\r\n    ...parsed,\r\n    useLocalLayoutConfig,\r\n    githubOwner: githubOwner?.trim() ?? \"\",\r\n    githubRepo: githubRepo?.trim() ?? \"\",\r\n  };\r\n}\r\n","cli/README.md":"# @gitpagedocs/cli\r\n\r\nThe **published npm package** of the [Git Page Docs](../README.md) monorepo (the command it installs is `gitpagedocs`). It scaffolds the `gitpagedocs/` docs contract, generates docs with AI, configures GitHub Pages, and runs the MCP server.\r\n\r\n```bash\r\nnpm install -g @gitpagedocs/cli   # global (installs the `gitpagedocs` command)\r\ngitpagedocs                       # generate gitpagedocs/ config (config-only)\r\n\r\n# or one-off, no install:\r\nnpx @gitpagedocs/cli\r\n```\r\n\r\n> This package ships its TypeScript sources and runs them via `tsx`; it depends on the workspace packages `@gitpagedocs/tools` and `@gitpagedocs/mcp` (published alongside it).\r\n\r\n## Commands\r\n\r\n| Command | Description |\r\n|---|---|\r\n| `gitpagedocs` | Generate `gitpagedocs/` config + versioned docs (config-only) |\r\n| `gitpagedocs --layoutconfig` | Also emit local layout templates in `gitpagedocs/layouts/` |\r\n| `gitpagedocs --push --owner <o> --repo <r> [--path <sub>]` | Generate, configure Pages, create workflow, commit + push |\r\n| `gitpagedocs --home` | Standalone distribution (`gitpagedocshome/`: static site + .env + Dockerfile) |\r\n| `gitpagedocs -i` / `--interactive` | Interactive prompts |\r\n| `gitpagedocs ai` | Interactive AI documentation generator — writes pages in the gitpagedocs pattern (see below) |\r\n| `gitpagedocs provider [id]` · `models [provider]` | List AI providers / catalog models |\r\n| `gitpagedocs document[:repo\\|:file\\|:folder]` | Generate documentation with AI in the gitpagedocs pattern |\r\n| `gitpagedocs password` | Set a documentation access password (writes the public key to `config.json`, prints the private key) |\r\n| `gitpagedocs deploy` / `pages [actions\\|deploy]` | Configure GitHub Pages via Actions + push |\r\n| `gitpagedocs docs` | Refresh managed regions of README/CONTRIBUTING/SECURITY |\r\n| `gitpagedocs doctor` · `version` · `update` | Diagnostics / version / update hint |\r\n| `gitpagedocs mcp start` | Start the MCP server over stdio |\r\n\r\nThe AI-CLI implementation lives in `cli/ai/` (relocated from the frontend so the published package is self-contained).\r\n\r\n# CLI Architecture (Clean Architecture + SOLID)\r\n\r\n## Layer Overview\r\n\r\n```\r\ncli/\r\n├── index.mjs                          # Node entry (bootstraps TS presentation via tsx)\r\n├── package.json                       # the published `gitpagedocs` package\r\n├── ai/                                # AI documentation CLI (provider/model/paths → markdown)\r\n├── contracts/                         # Stable contracts for external tooling\r\n│   └── doc-versions.mjs\r\n│\r\n├── presentation/                      # Interface/composition root\r\n│   ├── index.ts\r\n│   ├── options/\r\n│   └── ui/\r\n│\r\n├── application/                       # Use-cases and ports\r\n│   ├── config-only/handler.mjs\r\n│   ├── home/handler.mjs\r\n│   ├── report/config-only-reporter.mjs\r\n│   ├── use-cases/dispatch-mode.ts\r\n│   └── ports/cli-runtime-ports.ts\r\n│\r\n├── domain/                            # Business rules\r\n│   └── services/sanitize-segment.mjs\r\n│\r\n├── infrastructure/                    # Side effects and adapters\r\n│   ├── config-only/runtime.mjs\r\n│   └── home/runtime.mjs\r\n│\r\n├── builders/                          # Pure config builders\r\n├── data/                              # Constants and metadata\r\n├── content/                           # Static docs content\r\n├── runtime/                           # Low-level runtime helpers\r\n└── home/                              # Home templates/files\r\n```\r\n\r\n## SOLID Principles\r\n\r\n| Principle | Application |\r\n|-----------|-------------|\r\n| **SRP** | `application/report` only formats messages; handlers only orchestrate |\r\n| **OCP** | New runtime implementations can be injected through ports |\r\n| **LSP** | `dispatch-mode` works with any runner implementing `CliCommandRunner` |\r\n| **ISP** | Split runtime contracts (`ConfigOnlyRuntimePort`, `HomeRuntimePort`) |\r\n| **DIP** | Use-cases depend on `application/ports`, not concrete fs/git/exec |\r\n\r\n## Clean Architecture\r\n\r\n- **Interfaces/Presentation**: parse CLI args, resolve mode, wire dependencies in `presentation/index.ts`\r\n- **Application**: orchestrate flows with explicit ports, without direct fs/git/exec imports\r\n- **Domain**: sanitize and core rules with no infrastructure dependencies\r\n- **Infrastructure**: concrete adapters for runtime side effects\r\n- **Contracts**: `tools/smoke` consumes `cli/contracts` instead of internal CLI modules\r\n\r\n## Authorized Routes Pipeline\r\n\r\nThe CLI now generates authorized-route docs and config entries in PT/EN/ES.\r\n\r\n- Source content: `cli/content/docs.mjs` (`authorizedRoutes` key per language)\r\n- Route metadata: `cli/data/route-metas.mjs` (`ROUTE_META_ID6`)\r\n- Route path mapping: `cli/data/path-mappings.mjs` (`authorized-routes.md`)\r\n- Version config composition: `cli/builders/version-config-builder.mjs`\r\n- Doc key resolution: `cli/runtime/doc-path-resolver.mjs`\r\n\r\nGenerated artifacts include:\r\n\r\n- `gitpagedocs/docs/versions/<version>/config.json` with `auth` and route `authorization`\r\n- `gitpagedocs/docs/versions/<version>/{pt,en,es}/authorized-routes.md`\r\n- `menus-header-md` entry dedicated to Authorized Routes\r\n\r\n## GitHub Pages Push Paths\r\n\r\n- Default project-site publish (`--push` without `--path`) targets `/<repo>/`.\r\n- Custom project subpath publish (`--push --path <segment>`) targets `/<repo>/<segment>/`.\r\n- `--path` accepts a single sanitized segment (letters, numbers, `.`, `_`, `-`).\r\n\r\nExample:\r\n\r\n```bash\r\nnpx gitpagedocs --owner vidigal-code --repo energy-bill-ai-parser --path git-docs --push\r\n```\r\n\r\nExpected URL after deployment:\r\n\r\n```text\r\nhttps://vidigal-code.github.io/energy-bill-ai-parser/git-docs/\r\n```\r\n\r\n## AI CLI (interactive + config file)\r\n\r\nThe CLI now includes a dedicated interactive AI mode:\r\n\r\n```bash\r\nnpx gitpagedocs ai\r\n```\r\n\r\n### What it does\r\n\r\n- asks provider (`openai`, `claude`, `gemini`, `ollama`)\r\n- asks API key or Ollama URL\r\n- asks paths to scan (supports one or many paths, including other repositories)\r\n- generates documentation in `pt`, `en`, `es` **in the gitpagedocs pattern**\r\n- optionally persists config in `.gitpagedocsconfig`\r\n\r\n### gitpagedocs pattern output\r\n\r\nThe model is given a gitpagedocs-aware system prompt and returns documentation split into\r\npages (delimited by `=== PAGE: <slug> | <Title> ===`). The CLI scaffolds the base\r\n`gitpagedocs/` structure first, then writes each page to\r\n`gitpagedocs/docs/versions/<latest>/<lang>/<slug>.md` for every language and **wires it into\r\nthat version's `config.json`** (`routes-md` + `menus-header-md`) so the pages render in the\r\nviewer menu. Entries are tagged `aiGenerated` and idempotent (re-running replaces them). A\r\nlater plain `gitpagedocs` rebuild drops the wiring — re-run `gitpagedocs ai` to restore.\r\n\r\n### `.gitpagedocsconfig` (manual mode)\r\n\r\nYou can create/edit this file manually and then run `npx gitpagedocs ai`:\r\n\r\n```json\r\n{\r\n\t\"version\": 1,\r\n\t\"ai\": {\r\n\t\t\"provider\": \"openai\",\r\n\t\t\"model\": \"gpt-4o-mini\",\r\n\t\t\"apiKey\": \"<YOUR_API_KEY>\",\r\n\t\t\"paths\": [\"src\", \"cli\", \"../another-repo/src\"],\r\n\t\t\"languages\": [\"pt\", \"en\", \"es\"],\r\n\t\t\"outputDir\": \"gitpagedocs/docs\",\r\n\t\t\"filePrefix\": \"ai-generated\",\r\n\t\t\"contextPrompt\": \"Você é um redator técnico sênior...\"\r\n\t}\r\n}\r\n```\r\n\r\nFor Ollama, use `baseUrl` instead of `apiKey`.\r\n\r\n### Interactive fallback\r\n\r\nIf a directory is not found, CLI offers fallback choices:\r\n\r\n- fix paths and retry\r\n- skip missing paths and continue\r\n- abort safely\r\n","cli/runtime/doc-path-resolver.mjs":"/** Map doc paths to content keys and apply version badges */\n\nexport function parseDocFileToKey(fileName) {\n  if (fileName === \"index.md\") return \"index\";\n  if (fileName === \"getting-started.md\") return \"gettingStarted\";\n  if (fileName === \"configuration.md\") return \"configuration\";\n  if (fileName === \"deployment.md\") return \"deployment\";\n  if (fileName === \"architecture.md\") return \"architecture\";\n  if (fileName === \"themes.md\") return \"themes\";\n  if (fileName === \"faq.md\") return \"faq\";\n  if (fileName === \"project-overview.md\") return \"projectOverview\";\n  if (fileName === \"functionalities.md\") return \"functionalities\";\n  if (fileName === \"github-issues-projects.md\") return \"githubIssuesProjects\";\n  if (fileName === \"git-introduction.md\") return \"gitIntroduction\";\n  if (fileName === \"authorized-routes.md\") return \"authorizedRoutes\";\n  return undefined;\n}\n\nexport function parseHtmlFileToKey(fileName) {\n  const base = fileName.replace(/\\.html$/, \"\");\n  if (base === \"source-viewer\") return \"sourceViewer\";\n  return undefined;\n}\n\nexport function extractLanguageFromPath(docPath) {\n  const match = docPath.match(/\\/(pt|en|es)\\//);\n  return match?.[1];\n}\n\nexport function withVersionBadge(content, versionId, language) {\n  const normalized = typeof content === \"string\" ? content : \"\";\n  if (!normalized.trim()) {\n    return normalized;\n  }\n\n  const alreadyTagged =\n    normalized.includes(`Version: ${versionId}`) ||\n    normalized.includes(`Versao: ${versionId}`) ||\n    normalized.includes(`Version (ES): ${versionId}`);\n  if (alreadyTagged) {\n    return normalized;\n  }\n\n  const label =\n    language === \"pt\"\n      ? `> Versao: ${versionId}`\n      : language === \"es\"\n        ? `> Version (ES): ${versionId}`\n        : `> Version: ${versionId}`;\n\n  return `${normalized.trimEnd()}\\n\\n${label}\\n`;\n}\n\nexport function normalizeToOutputPath(outputDir, configPath) {\n  const normalized = configPath.replace(/^gitpagedocs\\//, \"\");\n  return `${outputDir}/${normalized}`;\n}\n","cli/runtime/git-ops.mjs":"import { existsSync } from \"node:fs\";\r\nimport path from \"node:path\";\r\nimport { execSync } from \"node:child_process\";\r\n\r\n/** Detect { owner, repo } from the git `origin` remote URL, or null. */\r\nexport function detectRepoFromGit(root) {\r\n  try {\r\n    const url = execSync(\"git remote get-url origin\", { cwd: root, stdio: \"pipe\" }).toString().trim();\r\n    const match = url.match(/[:/]([^/:]+)\\/([^/]+?)(?:\\.git)?$/);\r\n    if (match) return { owner: match[1], repo: match[2] };\r\n  } catch {\r\n    // no remote / not a repo\r\n  }\r\n  return null;\r\n}\r\n\r\nexport function tryConfigurePagesToGitHubActions(owner, repo, branch, root) {\r\n  try {\r\n    execSync(\"gh --version\", { cwd: root, stdio: \"ignore\" });\r\n  } catch {\r\n    console.warn(\r\n      \"GitHub CLI (gh) not found. Could not auto-configure Pages source. Set GitHub Pages source to 'GitHub Actions' manually in repository settings.\",\r\n    );\r\n    return;\r\n  }\r\n\r\n  const candidates = [\r\n    `gh api -X PUT \"repos/${owner}/${repo}/pages\" -f build_type=workflow`,\r\n    `gh api -X POST \"repos/${owner}/${repo}/pages\" -f build_type=workflow`,\r\n    `gh api -X POST \"repos/${owner}/${repo}/pages\" -f source[branch]=${branch} -f source[path]=/`,\r\n    `gh api -X PUT \"repos/${owner}/${repo}/pages\" -f source[branch]=${branch} -f source[path]=/ -f build_type=workflow`,\r\n  ];\r\n\r\n  for (const command of candidates) {\r\n    try {\r\n      execSync(command, { cwd: root, stdio: \"ignore\" });\r\n      console.log(\"GitHub Pages source configured for GitHub Actions.\");\r\n      return;\r\n    } catch {\r\n      // Try next candidate endpoint.\r\n    }\r\n  }\r\n\r\n  console.warn(\r\n    \"Could not auto-configure Pages source through GitHub API. Set repository Pages source to 'GitHub Actions' manually.\",\r\n  );\r\n}\r\n\r\nexport function getCurrentGitBranch(root) {\r\n  try {\r\n    const branch = execSync(\"git branch --show-current\", { cwd: root, stdio: \"pipe\" }).toString().trim();\r\n    return branch || \"main\";\r\n  } catch {\r\n    return \"main\";\r\n  }\r\n}\r\n\r\nexport function runGitPushForGeneratedArtifacts(options, root, sanitizeSegment) {\r\n  const owner = sanitizeSegment(options.githubOwner);\r\n  const repo = sanitizeSegment(options.githubRepo);\r\n  if (!owner || !repo) {\r\n    throw new Error(\"`--push` requires owner and repo. Use `--owner <owner> --repo <repo>` or `--<owner> --<repo>`.\");\r\n  }\r\n  if (!existsSync(path.join(root, \".git\"))) {\r\n    throw new Error(\"Current directory is not a git repository. Initialize git before using --push.\");\r\n  }\r\n\r\n  const repoUrl = `https://github.com/${owner}/${repo}.git`;\r\n  try {\r\n    execSync(\"git remote get-url origin\", { cwd: root, stdio: \"ignore\" });\r\n  } catch {\r\n    execSync(`git remote add origin \"${repoUrl}\"`, { cwd: root, stdio: \"inherit\" });\r\n  }\r\n\r\n  execSync('git add \"gitpagedocs\" \".github/workflows/gitpagedocs-pages.yml\"', { cwd: root, stdio: \"inherit\" });\r\n\r\n  let hasStagedChanges = false;\r\n  try {\r\n    execSync(\"git diff --cached --quiet\", { cwd: root, stdio: \"ignore\" });\r\n    hasStagedChanges = false;\r\n  } catch {\r\n    hasStagedChanges = true;\r\n  }\r\n\r\n  if (!hasStagedChanges) {\r\n    return;\r\n  }\r\n\r\n  execSync('git commit -m \"chore: setup gitpagedocs pages workflow\"', { cwd: root, stdio: \"inherit\" });\r\n\r\n  const currentBranch = getCurrentGitBranch(root);\r\n  try {\r\n    execSync(`git push -u origin ${currentBranch}`, { cwd: root, stdio: \"inherit\" });\r\n    tryConfigurePagesToGitHubActions(owner, repo, currentBranch, root);\r\n    return;\r\n  } catch {\r\n    console.warn(\"Initial push failed. Trying automatic rebase with remote branch...\");\r\n  }\r\n\r\n  try {\r\n    execSync(`git pull --rebase origin ${currentBranch}`, { cwd: root, stdio: \"inherit\" });\r\n    execSync(`git push -u origin ${currentBranch}`, { cwd: root, stdio: \"inherit\" });\r\n  } catch {\r\n    throw new Error(\r\n      `Failed to push after automatic rebase on branch '${currentBranch}'. Resolve conflicts and run 'git push -u origin ${currentBranch}' manually.`,\r\n    );\r\n  }\r\n\r\n  tryConfigurePagesToGitHubActions(owner, repo, currentBranch, root);\r\n}\r\n","cli/runtime/output.mjs":"import { existsSync, rmSync } from \"node:fs\";\r\nimport { mkdir, writeFile } from \"node:fs/promises\";\r\nimport path from \"node:path\";\r\nimport {\r\n  parseDocFileToKey,\r\n  parseHtmlFileToKey,\r\n  extractLanguageFromPath,\r\n  withVersionBadge,\r\n  normalizeToOutputPath,\r\n} from \"./doc-path-resolver.mjs\";\r\n\r\n/** True when `child` is the same as, or nested inside, `parent` (path-safe). */\r\nfunction isWithin(parent, child) {\r\n  const rel = path.relative(parent, child);\r\n  return !rel.startsWith(\"..\") && !path.isAbsolute(rel);\r\n}\r\n\r\nconst DEFAULT_ICON_SVG = `<?xml version=\"1.0\" encoding=\"utf-8\"?>\r\n<svg width=\"800px 41 7.77371 10.3255 7.78525 10.3667C7.78601 10.3694 7.78677 10.3721 7.78753 10.3748C7.79754 10.4102 7.7902 10.4483 7.7678 10.4776V10.4776C7.75074 10.4998 7.73394 10.5223 7.71741 10.545C7.24479 11.1939 6.98907 12.0213 7.00036 12.8747C7.00036 16.3399 8.80396 17.1358 10.535 17.3711L10.5708 17.3758C11.5347 17.5199 12.4587 17.511 13.4195 17.3479L13.4438 17.345C15.1832 17.1339 16.9996 16.3587 16.9996 12.8747C17.0109 12.0213 16.7552 11.1939 16.2826 10.545C16.2674 10.5242 16.252 10.5035 16.2364 10.483C16.236 10.4825 16.2356 10.482 16.2352 10.4815C16.211 10.4498 16.203 10.4085 16.2138 10.3701V10.3701C16.2257 10.3277 16.2368 10.2852 16.2471 10.2425C16.421 9.52611 16.3815 8.76076 16.1329 8.07176C16.1313 8.06753 16.1298 8.06331 16.1283 8.05909C16.1195 8.03503 16.1004 8.01628 16.0752 8.01142V8.01142C15.921 7.98164 15.3041 7.94381 14.1193 8.83491V8.83491C14.0208 8.90896 13.8933 8.93197 13.7748 8.89804C13.7556 8.89252 13.7363 8.8871 13.717 8.88177Z\" stroke=\"#323232\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\r\n<path d=\"M3 12C3 4.5885 4.5885 3 12 3C19.4115 3 21 4.5885 21 12C21 19.4115 19.4115 21 12 21C4.5885 21 3 19.4115 3 12Z\" stroke=\"#323232\" stroke-width=\"2\"/>\r\n</svg>\r\n`;\r\n\r\nasync function writeJson(root, relativePath, data) {\r\n  const absolutePath = path.join(root, relativePath);\r\n  await mkdir(path.dirname(absolutePath), { recursive: true });\r\n  await writeFile(absolutePath, `${JSON.stringify(data, null, 2)}\\n`, \"utf-8\");\r\n}\r\n\r\nexport async function writeText(root, relativePath, data) {\r\n  const absolutePath = path.join(root, relativePath);\r\n  await mkdir(path.dirname(absolutePath), { recursive: true });\r\n  await writeFile(absolutePath, data, \"utf-8\");\r\n}\r\n\r\nexport async function writeConfigOnlyOutput(options) {\r\n  const {\r\n    root,\r\n    pkgRoot,\r\n    outputDir,\r\n    artifacts,\r\n    useLocalLayoutConfig,\r\n    layouts,\r\n    createThemeTemplate,\r\n  } = options;\r\n\r\n  // Keep only versioned docs output in docs/, removing legacy root language folders.\r\n  for (const legacyLanguageDir of [\"en\", \"pt\", \"es\"]) {\r\n    const legacyPath = path.join(root, outputDir, \"docs\", legacyLanguageDir);\r\n    if (existsSync(legacyPath)) {\r\n      rmSync(legacyPath, { recursive: true, force: true });\r\n    }\r\n  }\r\n\r\n  await writeJson(root, `${outputDir}/config.json`, artifacts.rootConfig);\r\n  await writeText(root, `${outputDir}/icon.svg`, DEFAULT_ICON_SVG);\r\n  const layoutsPath = path.join(root, outputDir, \"layouts\");\r\n  if (useLocalLayoutConfig) {\r\n    await writeJson(root, `${outputDir}/layouts/layoutsConfig.json`, artifacts.layoutsConfig);\r\n    await writeJson(root, `${outputDir}/layouts/layoutsFallbackConfig.json`, artifacts.fallbackLayoutsConfig);\r\n    for (const layout of layouts) {\r\n      const template = createThemeTemplate(layout);\r\n      await writeJson(root, `${outputDir}/layouts/${layout.file}`, template);\r\n    }\r\n  } else if (existsSync(layoutsPath) && !isWithin(root, pkgRoot)) {\r\n    // Only clean a stale local layouts/ when the CLI runs from OUTSIDE the\r\n    // project (a real install) — never when pkgRoot is inside the project being\r\n    // generated (the gitpagedocs source repo), so committed layouts survive.\r\n    rmSync(layoutsPath, { recursive: true, force: true });\r\n  }\r\n\r\n  for (const [versionId, versionConfig] of Object.entries(artifacts.versionConfigs)) {\r\n    await writeJson(root, `${outputDir}/docs/versions/${versionId}/config.json`, versionConfig);\r\n  }\r\n\r\n  for (const [versionId, versionConfig] of Object.entries(artifacts.versionConfigs)) {\r\n    const versionRoutesMd = versionConfig[\"routes-md\"] ?? versionConfig.routes ?? [];\r\n    for (const route of versionRoutesMd) {\r\n      for (const docPath of Object.values(route.path ?? {})) {\r\n        const fileName = path.basename(docPath);\r\n        const key = parseDocFileToKey(fileName);\r\n        const language = extractLanguageFromPath(docPath);\r\n        const content = key && language ? artifacts.docs?.[language]?.[key] : undefined;\r\n        if (!content) continue;\r\n        const versionedContent = withVersionBadge(content, versionId, language);\r\n        await writeText(root, normalizeToOutputPath(outputDir, docPath), versionedContent);\r\n      }\r\n    }\r\n\r\n    const versionRoutesHtml = versionConfig[\"routes-html\"] ?? [];\r\n    const docsHtml = artifacts.docsHtml ?? {};\r\n    for (const route of versionRoutesHtml) {\r\n      if (route.url) continue;\r\n      for (const docPath of Object.values(route.path ?? {})) {\r\n        const fileName = path.basename(docPath);\r\n        const key = parseHtmlFileToKey(fileName);\r\n        const language = extractLanguageFromPath(docPath);\r\n        const content = key && language ? docsHtml[key]?.[language] : undefined;\r\n        if (!content) continue;\r\n        const normalizedHtmlPath = normalizeToOutputPath(outputDir, docPath);\r\n        await writeText(root, normalizedHtmlPath, content);\r\n        // Backward-compatible alias for tools or users that still expect \".html\".\r\n        if (!path.extname(docPath)) {\r\n          await writeText(root, `${normalizedHtmlPath}.html`, content);\r\n        }\r\n      }\r\n    }\r\n\r\n    // Ensure version folders always include an index file.\r\n    for (const language of [\"pt\", \"en\", \"es\"]) {\r\n      const fallbackIndex = artifacts.docs?.[language]?.index;\r\n      if (!fallbackIndex) continue;\r\n      const versionIndexPath = `${outputDir}/docs/versions/${versionId}/${language}/index.md`;\r\n      if (!existsSync(path.join(root, versionIndexPath))) {\r\n        const versionedFallbackIndex = withVersionBadge(fallbackIndex, versionId, language);\r\n        await writeText(root, versionIndexPath, versionedFallbackIndex);\r\n      }\r\n    }\r\n  }\r\n}\r\n","cli/runtime/workflow.mjs":"function sanitizeDocsPath(docsPath) {\r\n  if (!docsPath || typeof docsPath !== \"string\") return \"\";\r\n  const segment = docsPath.replace(/^\\/+|\\/+$/g, \"\").trim();\r\n  return /^[A-Za-z0-9._-]+$/.test(segment) ? segment : \"\";\r\n}\r\n\r\nexport async function ensureGitHubPagesWorkflow(getCurrentGitBranch, writeText, docsPath = \"\") {\r\n  const pathSegment = sanitizeDocsPath(docsPath);\r\n  const buildStepsBlock =\r\n    pathSegment\r\n      ? `      - name: Build static site with target repository path\r\n        run: pnpm exec next build frontend && mv frontend/out out\r\n        working-directory: .gitpagedocs-runtime\r\n        env:\r\n          GITHUB_ACTIONS: \"true\"\r\n          GITHUB_REPOSITORY: \\${{ github.repository }}\r\n          GITPAGEDOCS_REPOSITORY_SEARCH: \"true\"\r\n          GITPAGEDOCS_PATH: \"${pathSegment}\"\r\n\r\n      - name: Relocate output to custom docs path\r\n        run: |\r\n          mkdir -p .gitpagedocs-runtime/out_new/${pathSegment}\r\n          mv .gitpagedocs-runtime/out/* .gitpagedocs-runtime/out_new/${pathSegment}/\r\n          rm -rf .gitpagedocs-runtime/out\r\n          mv .gitpagedocs-runtime/out_new .gitpagedocs-runtime/out`\r\n      : `      - name: Build static site with target repository path\r\n        run: pnpm exec next build frontend && mv frontend/out out\r\n        working-directory: .gitpagedocs-runtime\r\n        env:\r\n          GITHUB_ACTIONS: \"true\"\r\n          GITHUB_REPOSITORY: \\${{ github.repository }}\r\n          GITPAGEDOCS_REPOSITORY_SEARCH: \"true\"`;\r\n  const currentBranch = getCurrentGitBranch();\r\n  const workflowPath = \".github/workflows/gitpagedocs-pages.yml\";\r\n  const workflowContent = `name: Deploy GitPageDocs\r\n\r\non:\r\n  push:\r\n    branches: [\"${currentBranch}\"]\r\n  workflow_dispatch:\r\n\r\npermissions:\r\n  contents: read\r\n  pages: write\r\n  id-token: write\r\n\r\nconcurrency:\r\n  group: \"pages\"\r\n  cancel-in-progress: true\r\n\r\njobs:\r\n  build:\r\n    runs-on: ubuntu-latest\r\n    steps:\r\n      - name: Checkout target repository\r\n        uses: actions/checkout@v4\r\n\r\n      - name: Setup pnpm\r\n        uses: pnpm/action-setup@v4\r\n\r\n      - name: Setup Node\r\n        uses: actions/setup-node@v4\r\n        with:\r\n          node-version: \"20\"\r\n\r\n      - name: Setup Pages\r\n        uses: actions/configure-pages@v5\r\n\r\n      - name: Prepare runtime source\r\n        run: |\r\n          git clone --depth 1 https://github.com/Vidigal-code/git-page-docs.git .gitpagedocs-runtime\r\n          cp .gitpagedocs-runtime/gitpagedocs/icon.svg /tmp/default-icon.svg 2>/dev/null || true\r\n          if [ -d gitpagedocs ]; then\r\n            rm -rf .gitpagedocs-runtime/gitpagedocs\r\n            cp -R gitpagedocs .gitpagedocs-runtime/gitpagedocs\r\n          fi\r\n          mkdir -p .gitpagedocs-runtime/public\r\n          if [ -f icon.svg ]; then\r\n            cp icon.svg .gitpagedocs-runtime/public/icon.svg\r\n          elif [ -f gitpagedocs/icon.svg ]; then\r\n            cp gitpagedocs/icon.svg .gitpagedocs-runtime/public/icon.svg\r\n          elif [ -f /tmp/default-icon.svg ]; then\r\n            cp /tmp/default-icon.svg .gitpagedocs-runtime/public/icon.svg\r\n          fi\r\n\r\n      - name: Install runtime dependencies\r\n        run: pnpm install --frozen-lockfile\r\n        working-directory: .gitpagedocs-runtime\r\n\r\n${buildStepsBlock}\r\n\r\n      - name: Force root URL to docs entrypoint\r\n        env:\r\n          GITHUB_REPOSITORY: \\${{ github.repository }}\r\n        run: |\r\n          node <<'NODE'\r\n          const fs = require('fs');\r\n          const path = require('path');\r\n          const pathSegment = ${JSON.stringify(pathSegment)};\r\n          const repoName = (process.env.GITHUB_REPOSITORY || '').split('/')[1] || '';\r\n          const isUserPage = repoName.toLowerCase().endsWith('.github.io');\r\n          const rootRedirectBase = pathSegment;\r\n          const cfgPath = path.join('.gitpagedocs-runtime', 'gitpagedocs', 'config.json');\r\n          if (!fs.existsSync(cfgPath)) process.exit(0);\r\n          const cfg = JSON.parse(fs.readFileSync(cfgPath, 'utf8'));\r\n          const defaultVersion = cfg?.site?.docsVersion || cfg?.VersionControl?.versions?.[0]?.id || '1.1.0';\r\n          const defaultLang = cfg?.site?.defaultLanguage || 'en';\r\n          const redirectTargetRoot = rootRedirectBase\r\n            ? './' + rootRedirectBase + '/v/' + defaultVersion + '/?lang=' + defaultLang\r\n            : './v/' + defaultVersion + '/?lang=' + defaultLang;\r\n          const redirectTargetProject = './v/' + defaultVersion + '/?lang=' + defaultLang;\r\n          const rootHtml = '<!doctype html><html><head><meta charset=\"utf-8\"><meta http-equiv=\"refresh\" content=\"0;url=' + redirectTargetRoot + '\"/><script>window.location.replace(\"' + redirectTargetRoot + '\" + (window.location.search || \"\"));<\/script></head><body>Redirecting...</body></html>';\r\n          fs.writeFileSync(path.join('.gitpagedocs-runtime', 'out', 'index.html'), rootHtml);\r\n          const projectPathSegments = [];\r\n          if (repoName && !isUserPage) projectPathSegments.push(repoName);\r\n          if (pathSegment) projectPathSegments.push(pathSegment);\r\n          if (projectPathSegments.length > 0) {\r\n            const projectIndexPath = path.join('.gitpagedocs-runtime', 'out', ...projectPathSegments, 'index.html');\r\n            if (fs.existsSync(path.dirname(projectIndexPath))) {\r\n              const projectHtml = '<!doctype html><html><head><meta charset=\"utf-8\"><meta http-equiv=\"refresh\" content=\"0;url=' + redirectTargetProject + '\"/><script>window.location.replace(\"' + redirectTargetProject + '\" + (window.location.search || \"\"));<\/script></head><body>Redirecting...</body></html>';\r\n              fs.writeFileSync(projectIndexPath, projectHtml);\r\n            }\r\n          }\r\n          NODE\r\n\r\n      - name: Add .nojekyll\r\n        run: touch .gitpagedocs-runtime/out/.nojekyll 2>/dev/null || mkdir -p .gitpagedocs-runtime/out && touch .gitpagedocs-runtime/out/.nojekyll\r\n\r\n      - name: Upload artifact\r\n        uses: actions/upload-pages-artifact@v3\r\n        with:\r\n          path: ./.gitpagedocs-runtime/out\r\n\r\n  deploy:\r\n    environment:\r\n      name: github-pages\r\n      url: \\${{ steps.deployment.outputs.page_url }}\r\n    runs-on: ubuntu-latest\r\n    needs: build\r\n    steps:\r\n      - name: Deploy to GitHub Pages\r\n        id: deployment\r\n        uses: actions/deploy-pages@v4\r\n`;\r\n  await writeText(workflowPath, workflowContent);\r\n}\r\n","cli/start.mjs":"#!/usr/bin/env node\r\nimport { spawn } from \"child_process\";\r\n\r\nconst env = { ...process.env, GITPAGEDOCS_REPOSITORY_SEARCH: \"false\" };\r\n// The Next app lives in frontend/, so `next build` emits to frontend/.next —\r\n// point `next start` at the same directory (matches `next build frontend`).\r\nconst child = spawn(\"npx\", [\"next\", \"start\", \"frontend\"], {\r\n  stdio: \"inherit\",\r\n  env,\r\n  shell: true,\r\n});\r\nchild.on(\"exit\", (code) => process.exit(code ?? 0));\r\n","cli/ui/logger.mjs":"/** Consistent log formatting */\n\nexport function logSuccess(msg) {\n  console.log(`  ✓ ${msg}`);\n}\n\nexport function logInfo(msg) {\n  console.log(`  ${msg}`);\n}\n"},"fileKeys":["README.md","cli/README.md","cli/ai/application/ai-command.ts","cli/ai/application/ai-provider-factory.ts","cli/ai/application/docs-pattern.ts","cli/ai/application/run-ai-cli-command.ts","cli/ai/config.ts","cli/ai/core/models/ai-cli-config.ts","cli/ai/core/ports/illm-provider.ts","cli/ai/infrastructure/ai-config-file.ts","cli/ai/infrastructure/file-system-adapter.ts","cli/ai/infrastructure/llm/tools-llm-provider.ts","cli/ai/infrastructure/version-docs-writer.ts","cli/ai/presentation/ai-prompts.ts","cli/application/config-only/handler.mjs","cli/application/home/handler.mjs","cli/application/ports/cli-runtime-ports.ts","cli/application/report/config-only-reporter.mjs","cli/applic
